body:
  text: 金剛身品文為二告釋題次就文下入文解釋初又二先釋題次復次下騰問意初云金剛身者生公曰長壽之與金剛皆共語丈六長壽為外應之迹金剛為內照之實實照體圓故無方也金剛四義者次第對四悉可解世界基本者金中勝者名為金精即最下金剛也勁居盛反健也所擬無前者謂所擬皆碎無者其色不定者譬第一義理以不定故能為作本遍生法界法若非圓攝焉能得入故云難視次騰意中二先正騰次有人下述古初又三初正騰意次若以通下明法體互通以成三諦三今從別下結歸品意初云通用一意者應一一牒餘三十三答成初長壽之義故云也圓通者法身無缺曰圓遍攝諸法曰通又體遍曰圓無隔曰通次互通中云若以通當名等者謂離總出別答三十問故云非無別義攬別成總無非長壽故云無非通義次述古中二先正分別次又他明下重釋初又二先敘古次今明下正釋於中云初已略說者常命等五純陀品中已略說四相至辨者四相屬口業故對常辨若束者束三十三問入初一問無非長壽若散者離總出別散遍諸答皆為顯於長壽常住意耳次重釋中二亦先敘古次今則下正釋於中云枯林入滅者謂枯林中間入滅表雙非顯真也榮林入滅表雙照顯俗也東方下雙非枯榮以顯中道榮即是真下明即照而寂以顯不思議真枯即是俗下即寂而照以顯不思議俗三諦即一諦複釋上榮即是真一諦即三諦複釋上枯即是俗差別下二然非差別下複釋上中道顯其遮照諸佛境界下結意顯佛境體融三諦相即非三教九法界情慮思說二死三惑無能侵毀故喻之以金剛次釋中初云上問中含兩者上問中上互具含兩重因果前品已答長壽因果竟今複明金剛一重因果皆法皆喻者一一身皆以金剛等為喻也舉所見者明迦葉執迹為難以扣妙釋碎為舍利者當碎為舍利也次正答中就疏大科為六初示句數單複之相次然古下述舊解三天台下明今師釋四私謂下辨私助釋五古來下初四教以示百非淺深相別六依經下帖文以顯三諦之相或一存一亡者出單句相也非念念滅者雖入涅槃不同二乘無常念念滅也非身是身者此辨一句具存亡二身非身亡也是身存也次述舊中非金剛前身者古人云金心已前猶屬無常故名非身是好身者非惡取好即相好之身因緣相成者法身為因應身為緣從起劫用以逗物宜又眾生為因法身為緣感應因緣致有應身化物故云相成是空離空者明法身體遍虗空而不同虗空也三今師中三種四句者單四句同彼止觀中句法前句約非者前非句不合是非相對為句亦合單用非非作四句身是是亦然亦應前單後複者應先作單是單非四句竟然後作複非複是四句耳四私助中為非何四句者未知不非何等四句也今言非身者則以三藏百非為所非境通非藏別非前二圓非前三如是方顯能非之極除一法相者除一身一法外所現身者皆為應物故爾五約教中亦不出其意者謂不辨百非為是何教百非今經非相意旨在何淺深有異者權淺實深也具足百福者破百非得百福是故司之上中上者於上上中更上上耳有有等者有為之法而為二十五有三界因果所拘故云有有此即以通斥藏作此說也毒器不任貯食者無常之器不任貯無生及以常住之食食則煞無生常住人也虗妄者斥藏也空不得空便者邪空拆空之所不能破相無生之空故也次第取證者先空次假後中勝劣亦爾登地為勝一中無量者即於別教地前法也無量中一者即於別教登地法也非一非無量者雙亡也不異者雙照也惡即中道亦開權也開前三教悉入圓宗況百福空者具足應云況百福假百福中也六帖文中經云非人天身者注經云雖為化物現受人天心無取著即自起然非恐怖身者雖生死恐得四無畏也非雜食身者不為四食所養以法喜禪悅自資也如來之身非身是身者真身非生滅積取故非身應身無生不生無形不形故是身也不生不滅等者寶性論云佛身無前際故不生無後際故不滅無中間故不住不集不修者非積多法不待修故無量無邊者法身彌覆豈有邊表也無有足跡者住無方定也無知無形者大悟無知妙像無形法身無形離諸相故畢竟清淨者雙遣乃淨無有動搖者法身假寂孰能動耶無受無行至有為者位滿故不受謂已出三慧故受是聞慧行是思修如來捨修息照安靜故也住位故不行不住生死故不住作即是業味即愛染雜即瞋毒如來性淨故言無也又味即煩惱雜即是果非是有為者不隨諸數故非業至數者離有餘果故非業離無餘果故非果謂永斷異熟生死因果故非行非滅者行謂流轉滅謂還滅佛觀眾生死及與涅槃同一如故非心非數者相應相不取境界總別相故心王取總心數取別佛心無得是故言非不可思議常不可議者三乘十地不能量也無識離心者現分別故名識能生後有故名心今謂無分別故非識不生後有故非心亦不離心者雖不分別而無事不知又自覺聖智真如心故其心平等者絕高下故故言平無優劣故故言等又不簡怨親如虗空故無有亦有者法身無像故無有亦通化故亦有無有去來而亦去來者既無有色誰去誰來垂形六道見有去來不破至不滅者離四相故不破乃至不絕體非未來故不出至現在不滅入過去非主亦主者法身妙絕何依何主道王三千故云亦主非有非無者不同二十五有故非有不同太虗故非無非覺至不字者已斷尋伺語言加行故非覺觀非人非天故非字應人天名故非不字又離麤細心相故非覺觀非定非不定者心馳萬境故非定寂然不動故非不定不可見了了見者十地所不覩故不可見後身見故了了見無處至宅者真則無處無空常在五道故亦處宅無闇無明者洞鑒三世故無闇現同凡夫故無明無有寂靜至靜者分身散體熾然應物故無寂靜常果恬然恒在定故故言亦寂靜是無所有至絕者無二十五有故無有不衣不食故不受功德無增故無絕清淨至諍者釋上句也無是無非故無諍也經無住處者涅槃無滅真所居也不取不墮者不進求故不取不退故不墮非法至田者絕軌相故非法化人故非非法絕言故非田應供故非非田無盡至盡者歷劫不窮故言無盡即是不盡故離一切盡是空離空者無性無相故是空也離無常無我故離空也離不常住至滅者絕言故不常住絕眾相故非念念滅無有垢濁去穢不滅無字至說者絕五塵也亦非修至量者無所進故非修集無相待故非稱量非一非異者方圓殊應故非一真性不改故不異非像至嚴者妙絕眾相而相超世也非勇至寂者摧四魔故非畏無靜不靜故無寂無熱至貌者動靜一體其相難見如來度脫至脫故者如是滅度無量無數無邊眾生實無眾生得滅度者餘句例此此且附三藏教百非以釋為後三教所非之境顯今經圓旨也又即入即出者謂入不定入故能即出出不定出故能即入即出即入故成二千因有得果者此答復以何因緣得大堅固力句正明因有成果之力是起後者起後請佛廣答三勸修者若不勸修無由契悟故復勸也護法不壞者猶護不壞法為因獲得不壞常住法身之果故云取相似因此即同類因也經云不受五戒者此文應具兩義一者全不受五戒元為護於正法二者觀經文意既云不修威儀非不受戒但元為護法於五戒上諸威儀小罪不具持耳元為護法故得持刀等二釋並通棄事者身口七支是事今持刀等不具威儀名為棄事存理者大教詮理名曰存理無名行者雖能持戒而無名行不能護法各各不能者為成四句是故著之佛及仙豫者佛是法王仙豫是人王二王各能護昔時平者佛在世時及正法時也今昔俱平者今若大法可流行無難亦不應持仗等經云守護至清淨比丘者雖持戒無犯若不護持正法猶不名清淨比丘問中棄理者迦葉意云寂靜比丘方名真僧若持刀執箭隨護法者行者名禿居士律有誠制故須問起佛答意者若隨護法者行為護正法方名持戒汝難非也經云種種說者說權法也何以知之不能決定說眾生有佛性故知是權經言九部經典者即大乘九部也何以知之既云能師子吼廣說謂除因緣譬喻論議三部也經云利益安樂者安置眾生入涅槃海中方名安樂經云非持戒至得名者應云非持戒及護法者得禿居士名經云餘四十年等者此時欲滅正是護之時爾前未用護法為此義故護法功多二名相成者由妙樂故無怒無怒故妙樂王前生是第一者六卷泥洹云王為第二弟子覺德為第一弟子此言王第一者蓋以先生彼國故爾比丘是第二依者以得出家其位則深故得第二依大乘聲聞者由聞大涅槃經所證大法身示在小故得聲聞之名猶如𦘕石者小乘人解如來無常猶如𦘕水隨𦘕隨合念念磨滅所以不取𦘕水為喻猶有師德者正意問言為堪師位為不堪為師耶法瑤曰隨逐守護迹似破戒恐無人師之德欲明此人持戒之德不虧可師之道逾盛是以迦葉發斯問也重問既自持戒者此問因前若煞若害文生護法比丘既自持戒無伴獨自如何遊行教化耶律遇強緣者雖解律教須藉白衣有力共能護法故曰強緣解經亦爾經云雜僧等者善惡無作共成此人故名雜僧但自持戒不知布薩不知羯磨不知說戒等名愚癡僧清淨者以此二緣難壞一則不求名二則不違法律經云若是聲聞者元是小乘聲聞也律中明六種五法者十誦律七法卷第一云佛語諸比丘從今聽五法成就滿十歲若過應授共住弟子具足一畜弟子二學人三無學四神解五訓誨六事用今經唯明神解一種五法故與律所列不同神解五法者謂明解五法也四事與律等者律云一知犯二知非犯三知罪輕四知罪重五知誦波羅提木叉學利廣說故云小異等隨時教化者今經菩薩為調伏眾生不擇時處擇興即說故云隨時教知重可見者知四夷犯不犯等相佛入凡夫中等者應知聖人示同眾生有自發迹有待他發如傅大士藉嵩頭陀發迹即是其例為物宜然非自不知實受至痛者應問若實受痛如何得入地獄應知由證得不痛法方能示入若云有痛不應證之應為五百亭火經云觀音菩薩為五百身在此教化或有惡比丘云彌勒佛應為五百身我亦是一人者不須證如止觀者彼觀心持戒清淨中云防止是戒義觀亦如是三觀名能防三惑名所防如此防止義遍法界不局在身口又毗尼滅滅身口諸非故又波羅提木叉保得解脫又誦者背文闇持也又律者詮量輕重分別犯非犯此即約律解名也一一皆合觀心三惑之義廣如彼文知有餘等者知有餘涅槃無餘涅槃也結歎者佛法無量下結前如來爾下歎除弟子惡邪者或起邪見不信因果等越出家入俗眾及為外道等名為越濟餘兩五法者律云一知出家法二能作教師三能作戒師四能知依止師法五能知遮道法不遮道法此即第五說誨五法也六事用五法者律云一能教弟子清淨戒二能教阿毗曇三能教毗尼四弟子他方愁共不能樂致使來若自不能因他力致來五弟子若病能供給若自不能能使他供給如是五法成就滿十歲若過應授共住弟子具足此即餘兩五法也名字功德品就疏文為四先釋名字次而此下釋功德三六卷下辨同異四就文下入文解釋初云同者等者以名字二字同是涅槃體上之稱故云同也異則離於二字謂名論召體字難體德涉公云詮體為名標德曰字此字名大槃涅槃名即是字功德者義用也依能詮名成所詮義故曰名字功德品次釋功中又二先釋名功德次稱歎下釋字功德文中云語善者寶亮曰上中下語合為一善欲明涅槃於語法中最上勝故名為上語十地無漏法為中語說生死苦無常乃至正因性為下語若說此三語盡不乖法則名為善瑜伽八十三云上語亦善者初善也謂聽聞時生歡喜故中語亦善者中善也謂修行時無取苦遠離二邊依中道行故下語亦善者後善也謂極究竟離諸垢故義善者偏就理而談其文亦善者此偏就理上文歎教也純備者語乘體足也唯此經體明因果足故言純備也具足善者於偈中其義具足如雪山一偈即備常無常二義也清淨者此經理教真正於因果俱能亡相故曰清淨梵行者此經文理能生行人梵行也金剛寶藏者此圓教所明圓果涅槃備一切功德不同孤滅解脫猶如寶藏開善合為八者合冶城上中下為一故但成八今依七譬者將七譬次第配七善文相可見初譬明大等七譬亦不出四悉文中兩重初重中悕望永斷者如食乳糜更無所須也次從又大是勝義下三又次第配為人等三但闕世界一若說三悉異即世界義則四悉義足次字功德中菩薩之門者菩薩依諸佛所修習法而修行之故得為菩薩門三辨異中非彼此中者一色一香無非大涅槃海中實道相不當彼此中流只猶入者不等致有彼中流之名一問三答者上但問云何致彼岸今品則以彼岸此岸中流三意答之故云答過所問四入文解釋中經云文字章句者謂今大乘經即聲上建立然文有二種一聲上之文二是色字之文此中正是聲上之文兼亦通其色字文也名者詮法自性如言色聲等名也句者詮法差別謂說色等有漏諸苦有為無常空無我等說佛法身常樂等差別章謂詮義究竟滿足也文即是字謂與名句作所依也故唯識論云名詮自性句詮差別文即是字為二所依且引法相以消經文復能反本者受持涅槃是本後還復此故云反本果與善殊者萬善應在初萬德應在後由善成德如何德劫故名果與善殊不為緣生者夫緣生法皆是無常緣滅亦爾軟輕如初卷記已引誠論釋竟四相品將釋疏文為三一略釋經題二從問願佛下問答釋疑三就口密下入文解釋初云以四種相等者大涅槃是總四相是別離一涅槃以為四相開示分別合秘藏涅槃照然可見故云顯然又相者以標識為義亦曰顯然次釋疑為二一問起二舊釋下正釋於中又二先敘舊次今明下正釋初又先敘次是義下破初云無解脫者若入無餘方解脫即是孤調解脫所以有法身般若時無解脫更互相覆者昔無常覆常今常破無常名破為覆名之更互昔三點無常者縱橫三點也昔說有為解脫者謂是有餘解脫耳智上意地能緣者猶是方便智上意地能緣名此以為解脫大乘望之猶是心王心所之法故曰意地能緣今昔相成者昔成今今開昔以顯涅槃正道也次破中云四句皆覆正理者門名能通各執能通不契正理故名為覆其間並決者四句互治四句即理皆須對古並決令歸正徹正徹者何所謂秘密正釋為二先略釋次更以下廣釋初云四句悉互相覆者三句覆一句一句覆三句等故云也次云不自不他者大涅槃海不當自他故云不也自說己證名說者說己所證以益於他故云說也常無所宣名說者謂常說無說名無所宣昔說法身者五分法身也三釋文中云口密者一相即四相四相即一相非一非四而一而四名之為密一相者自正是涅槃正他亦爾能隨善解亦復如之四相一相者雖有四種之用只是一大涅槃故也經云分別開示者此先標其意若取文順應云大般涅槃開示分別有四相義四相者從所詮立名也僧宗曰言自正者一謂行正如律而行二謂解正審解佛常金剛已還是無常也二正他者使人受經同我所解三能隨問答者能令人悟故難答能答備上三事之本由善解因緣也若佛如來者若昔小乘明如來者以起應故名為如來若大乘明如來以智契境名如境發智名來故名如來諸因緣至境者十界五陰等名諸因緣又四儀所覩六塵無非因緣咸是所緣之境故曰正緣於境又此因緣通昔三悉莫非因緣照因緣境者照一念三千即是實相照因緣境了達因緣即空假中名見諸因緣又無明為因了達即實相為緣方名為見實相非因等者以法性為自無明為他推成四句皆無自性以顯實相名之為見又實相非因即畢竟空故亦不在緣即不可思議假不共等二句即中道雙亡雙照如此了達實相方為見舉淺況深者比丘見火是淺事喻前佛境故云況深又火聚雖淺推成不思議境與前見因緣更無有二故得況前經云比丘見火者此即圓教比丘義通衍門觀身亦然者推破四執達成三諦方名正見抱火燒身者以不思議妙身投於妙火故不邪說僧宗曰別有因緣出枯樹經佛將比丘空曠處行見有洞然枯樹即問比丘此樹可抱不答言可不又問設有逼汝合說佛是無常若不說者抱此枯樹汝寧何耶世尊抱火死彼與此所見大同故得為證亦應開一寶者古人見自正正他與自覺覺他義同所以問起為得開不教門不同者四相三寶教門不同不可一例豈非世界者為說陰入隔歷世間之法未宜說陰無常所以含蘇但當世界之益以無我無常者於鹿菀中為說無常成於小乘賢聖既入聖已名生善益得此益已轉入方等般若以大破小成對治益夫乳養嬰兒者胸前曰嬰投之𮌎前而乳養之故曰嬰兒含蘇者上胡紺反謂以口飤口名含口自含則平聲呼飤辭吏反食也說文從人俗作此飼又具玉曰含猶與也慈是善本者無緣慈也譬初信者信世界也譬聞法自資者聞世界自資以成歡喜之相益更成病者多讚世界合他躭著即名為病況強軟食者讚歎世界尚妨修行進趣之道況後三悉邪堪可切磋者二乘已得小果來入方等恐淨名彈折聞大不謗圓機冥發如切如磋以成道器女人嘿念者顯正他相也能令受者得解悟故若不先除念子之亂豈悟常說所謂善正人也舊四釋者亦無大妨故今不破例如化童者如前聽戒童子也經云消化化字平聲呼謂盡消也若去聲濫於變化故不可用女人稱佛者僧宗曰此佛語也寶亮智秀皆云是女人語也不堪對治者此明小人只宜生善未堪入於方等對治折伏等言其不堪即是料簡經云則不供足者若得二悉益已堪對治如硬食尚消況本軟蘇而當供足經云功德已備者已得生善益名功德以備經云為說六味者僧宗曰有為有三無為有三苦以變樂為用如酢能變甜也諸法所以流遷以無常切故猶如醎味能使非酢作醎也無我之言不自在故違情如苦味之不悅人也樂以悅己為義猶如甜味人所嗜也我者制御自由物無能礙如辛味之通發也常理湛然一相無異如淡味之無分別也以常解之慧火然八倒之惑薪以資慧命喻之為食此亦一途耳消今對治之文未為全當經云煩惱為薪等者生善中及對治中所有煩惱名之為薪生善中及對治中能治智慧名智慧火用此三悉成今第一義常樂我淨涅槃之食凡聖合稱者謂世出世凡聖皆有法譬也又甜辛淡至報味者此出耶正名同若凡夫所執即為無常等三所破此別有意者出世三味破世三味通於今昔五時之中悉用以大破小成對治悉便入第一義其用談廣故云也又為消經文所以合六為三而為世三出世例爾亦云此別有意小大通昔此約一代教門小大相對苦為四悉非獨專在大乘自辨四相又今經既權實並明亦得小大共為四悉故云通也其家有佛者觀五陰家全是常住即名有佛華嚴云一切法無生一切法無滅若能如是解諸佛常現前智秀曰夫善依信立以信為家以此善心念念所緣唯在常住是則常住法身常在信家佛舉無方問者無人能問故佛自舉無方者方法也即是越於規模格而設此問餘事例爾者餘五度例爾初不知彼者此釋正顯能施人德次釋顯所受人德僧宗曰夫施財為易施人名聞為難今就名聞以釋何者謂人持戒少欲知足而此施主本意為顯此人令德不在捨財是以於稠人廣眾之中施所不受彼既不受以眾人而望之是則不受者少欲知足之譽顯也施者能捨大施之名彰也隨喜不障者故大論云菩薩摩訶薩隨喜於他如賣買香人及傍人三人俱得益故隨喜福大方便解之者此即施命故得大福又應知先舉施酒宗為答者欲起下文斷宍之制故以施宍在初經云聲聞天下者音問詩云鶴鳴九皐聲聞於天則名音問今亦如之己名達彼稱之為聞彼得聞已稱之為聞亦一聞字二音呼之經云食宍之人等者牒前一彼不食宍之釋意來為問食宍者尚不應施況不食者而當施耶以不食宍者有大功德故也盡應作佛者一切眾生皆是當來之佛精血不淨者大論云一切眾生身分皆是父母精血所成故不可噉皆他命分者所受之物皆是他人支持身命之分經云不聽食肉者何故昔聽今則不聽而有何患耶初地是大慈者若食肉者不得入初地故也夫煞傷大慈而噉傷小慈因小得大故小慈是大慈種須云為我者謂不疑即得食若云為我將肉來即不得食亦不論煞獼猴似人者以類同故故不可食虵似龍者龍於人有恩雨澤以時成熟五穀故不可食九種者亮曰不見三謂未食時喜時已二喜不聞不疑各三亦爾宗曰見中三者見斷命時見煞後屠割時聞中三者聞煞時聞屠割時疑三者此為為我煞耶乃至前後方便亦疑前後方便者欲煞前起方便心煞已起隨喜心經云我亦不說魚肉等者佛意云昔說得食肉者但是蹔時權說逗機而已何以將蹔時之言而難究竟之說經云要是壞色者此即傍引畜衣為戒耳經云胡麻油等者皆是脂膩故不得畜饕音蹈食財曰饕餮音鐵貪食曰餮若過等者裸形名不及饕餮名若過經云各有者亦是為大涅槃須制斷肉不同外道故云各有經云異意者觀機逗藥順物所宜且聽食三種肉故云異意生公曰病有二種謂從意從想逗情而止謂之從意所貪無崖謂之從想是以小制損其意都制損其想除其貪意長其慈也三種外故者見聽食三種肉而更想於十種肉又須斷十種斷十種已又更異想十種外一切肉故須一切皆斷經云悉皆恐怖者智秀曰人無害獸之心亦不害於人是以探鯁虎於山中狎翔鷗於海上若既食其肉矣豈害而永滅哉所以聞其害氣生畏怨想經云清淨之食者法身菩薩分衛之食猶尚不食經云蠱公戶反為養毒也樗勅於反三藏至因緣者因緣者是事相法門又是因緣所生法故屬因緣之教先須緣起者受戒前方便也戒體者三羯磨已即發無作方受已說相即是出相若據今文正是問隨中意不是問受中意應二釋經云何故不為波斯匿者應云何故不為四部之眾問波斯匿王頓制篇聚深妙之義而問漸制戒耶王答五錢者盜至五錢罪則入死出家之人犯者罪應滅殯至於論罪每與國主參壞經云或說深者澤洲云昔為波斯說無常名之為淺今日說常以之為深或名犯者如來初出未廣制戒名為不犯復廣制戒名之為犯寶師云經是隨機而說律是待緣方制說有不同所以今問阿毗達磨即性相求雖大小說法楷定所以不問也戒是大乘常者此是今經大涅槃心所持云戒問墮者問所防之罪能令眾生墮於地獄畜生鬼等故名為墮律及木叉問其能防能防教法說之為律知足淨命者非正釋木叉名乃就功用心中以明戒義耳聲聞之法以少欲為業若遵少欲則所作日名增長舉少欲以明戒也由有戒故成就威儀無所受畜故名淨命次答墮者墮義則通通於輕重故也經云墮於地獄乃至阿鼻者八大地獄中阿鼻最下故曰乃至其業必重趣報無間故過暴雨聞者已下說墮意脩離過行不犯性罪名堅持戒遮過亦離名不犯威儀修集下修離著行經云離身口等者澤洲云明離性罪今明不獨在性入戒等者入猶順也五部律文制斷重罪名為入戒遮離輕過名入威儀深經善義者明顯經法即詮定也與惡相違故言善義即詮慧也遮受不淨者百不淨物也一切善者謂斷一切善相盡也滋漫者慢音言瀾漫也若菓下作音萬蔓莚也十善譬頓教者如華嚴中菩薩戒已頓制竟以十善是正善法增上功德是行善法義味是其理法也頓漸開合者謂施漸頓會漸歸頓也經云能說法等者謂感應道交非感而感非應而應同契秘藏皆不可思議非一非四者亦一念心性大涅槃法不當一四可所以言非一體三寶者如一相即四相四相即一相故得相類今涅槃有妙有者得二十五王三昧名為妙有今涅槃有所師法者實相妙理常寂光土是所依法也悉據佛意者然小機自見小佛意恒實不應名同者總牒前五難文意而以非之故云不應所離所得者明今經所離煩惱則遠所得常住涅槃則大滅有滅果者滅有謂滅二十五有內滅果謂滅果報身今涅槃中有於諸佛者三身具足名有諸佛似作三難者經中語含含於有有即是苦有文不彰灼故名為似從又如彼鐵下即有文也世智斷惑者僧宗曰鈷上之鐵可譬凡夫伏結雖至非想後還復起佛則不爾永不復起復生別惑者斷麤惑已細惑顯現名之為生不同二邊者凡夫有二乘空邊躡前常無常二難而為問答如來至還生者意云如來或既滅已有於妙有若有妙有即是還生生即同凡無常經云有灰者灰雖是有不還為木佛是妙有不還無常名生於後者正取破瓶等以證斷煩惱已名生於後以證而撥涅槃經云燒彼眾生者燒凡夫通別二惑燒二乘別惑故名為諸經云遊諸覺華者華是意翫之境譬常樂我淨是佛所證之法是菩提華也故仁王云有佛三昧華也為遮皆聖者如下文云是大涅槃能建大義等皆聖所為迦葉云何難言如來煩惱未盡等開顯法身之密者能於法身示九界身名密開九界身即法名開身密出種種身者為九界身開之與合俱名身密一物覆等者若未說時三密俱覆說四相時方開口密口密雖開身意猶覆何者以未說故名覆隱顯者開身密時解脫猶隱故云各開等只覆於開者今家意云覆則俱覆開則俱開何者只開口時身意俱開但文不累書致成次第於凡不解者不解即當覆也餘何可解者破云若開口密時不解開身意時何能得解聖人之術事者佛以無謀大用何以將術事解之術言濫外人之用故不可也寧非因緣者且順古人所立其義則到一一無非感應道交故云因緣妙慧者良由種智方有此用無量不容一塵者無量即法界無量外更無一塵又塵即法界一塵之外更無有塵故云也莊周達體者謂內達體虗如幻故能如此了見自身為胡蝶及夢中自見己身遊天崖也至德者佛也初如文者我亦信如來度煩惱大海即是領旨其言有餘故更難起謂啟發如來身密之端也經云若佛已度等者難意者若言已度何故復納耶輸今既納者則應不斷煩惱等經云汝不應者用此句冠下汝不應言何緣納耶輸汝不應言實生經云能建大義者明佛住大涅槃示十界身彌滿法界無方大用重重無盡何但只能納耶輸生羅睺羅及下八復次皆是大義之相通舉菩薩者亮曰以少見佛性故名為住以下況上也逈出因果者只是逈出因人之外涅槃是因者菩薩望果行因故涅槃是因人所住經云我已久住至變化者一從本佛乘迹示現二從法身起應示現王宮生等翻曰妙者日能破闇即是實智內明象王初生者僧亮曰天竺象王生時出胎即行七步知是象王菩薩始世示自在王相也示過六道者尚未過二乘何能顯佛身密應七覺分者此釋承當西是秋方者萬物至秋皆凋落如死也北為左四天下中單越勝也東方者天竺以東為首以西為後以北為左以南為右東行示始一示始一示嬰兒二明道首以示自在也辨餘生者謂過去於此閻浮示現出家等故屬餘生將前意難後者將前口密中如迸火星永滅意來難此種種示現也經云法身常存者存即妙有也經云汝今不應作如是難者佛意云我暫借燈器以為況喻汝今不應難他喻也經云譬云燈滅者分段煩惱因果但盡譬如燈滅猶餘身智非大涅槃是小涅槃也經云非數數來者生上退下名來在色界中又有一來而非數數即上流阿那含也不受二邊生者地住已上菩薩也四相品下通開三業者正明意密兼具餘二諸覺寶藏者寶藏口密欲珠是意密秘藏身密見少佛性者初住已上所見也無顯無密者了達實相不當開云與密龍樹別意者名法華為秘密者謂開已無外曰密若言秘密經經皆等豈獨法華故云通害諸經故是無也者故是無秘密藏也經云密藏者在巷反下去更有三藏字同音唯諸經音皆作此說初諸如文者迦葉探取佛意言唯有密說無密藏也何者以昔常機未發心得說常而說無常之教意在於常豈有祕邪鄙術者以幻者所作但令人見不令人得佛則不爾常願眾生同我所得豈名為藏次九譬者澤洲云初一明如來言無隱覆故無秘藏二心無慳恡故無秘藏三法無缺少故無秘藏四無所負借故無秘藏五慈愛深重故無秘藏六惡根死盡故無秘藏七言無過失故無秘藏八重化所宜故無秘藏九法雨等潤故無秘藏此亦一途名文而已經云秘藏者在良反下有十六藏字同此音如人不從責主求物者如人欲索財物應就捉財人不見不就主索欲還無所佛亦如是實負眾生出世法財常欲還之但眾生不取義當於負經云唯有一子者喻佛如來所教聲聞名為一子愛念者喻正相大悲也將詣者喻將擬佛性之門也師者喻於諸佛所師所謂法也欲令受學者修學佛性也懼不速成者喻恐未能解佛性義也尋便將還者喻將還應身釋迦初說小後說大也其文問答者文中有二不也即問答也經云所謂如來常在不變者如有妙有今昔俱皆不變故云常存無常是通者此約含真二諦若被接者開真出中名之為常若不被接咸歸灰斷名曰無常經云降大法雨者初後皆經大雨三草二木自稟益不同非龍王咎昔權者且蹔引喻於王說言無常經云跡不可尋者僧宗曰身智俱亡也此亦昔言故應拂也下釋云近於菩提涅槃無有方所事絕近情謂難尋也偈百如此誰能解也舉積明無積者先舉財寶等是積聚之物聲聞僧等不積聚此物名無積聚又無積云積者二乘菩薩皆具此句即約法釋何者二家不積世寶名無積無漏真理自具智斷功德名為積然經中但明不積世財名無積聚若約非時取證名為積聚若得常樂我淨方名無積又菩薩於世出皆得無積聚名無積是無樂等者此明無作四諦有滅故無苦者無二死三苦八苦也是領解者謂法身之跡妙絕難尋寄大解脫而示滅也不可求其崖底者謂廣無崖深無底無非法界故不可求略說三點者廣博即法身無疣即般若至處即解脫故以三點喻之體用成就者法身為體般若解脫是用又理性三因自有體用但在於理又修中亦有體用具足專在於修又用中有體即用而體又體中有用即體而用何故爾以三德一一皆具三法故使體用互融自他具足者自行是體化他為用又若自行無用自行不滿化他無體他無所證自他悉備方名具足隨名訓釋者大訓廣博且從訓釋不可謂是待少之大者今是非大非少之大故無相待貴在正法者貴在常住正法也一人具八者一少欲二知足三遠離四精進五正念六正定七正慧八不戲論謂少欲是道多欲非道等如四依品初釋經云無諸瘡疣者三或二死因果並亡此總翻彼總者興皇但是臆度出道理涅槃既是西國總名亦應以此立大滅度總名翻彼涅槃以別翻別如文所難此是興星難前師義以別釋總者他明令經是無瘡疣等三義釋涅槃之總經云為拔毒箭者為拔三惑因毒箭塗以三德秘密妙藥經云令其離苦者令離二死果苦也亦是互現者理應自行即具化他化他即具自行所攝成處者所證諦理也六道四聖者重明十界不出六道四聖也但眾生須調伏者有機興者方可調之在畜生至畏者已永離五怖畏故也恒無飢渴者常以大涅槃食自資也無人天事者人天但以三苦八苦物為事經云有信之人者寶亮曰值以能生一念善已上乃至信首根立悉名治已今則從觀行已上分真等位皆名治已常住佛果有色者應意非色之色名佛果色但云是色其言不了經云言非色者宗曰今言聲聞非色者不垂形六道也為眾生故說非色者昔教但言捨身盡滅不說三事既無三事則無法身垂應之色故言非色為兩緣者解膳之體非色非非色為眾生現色等經云何得住者假執苦教無色為難欲令佛釋二乘之人非都無色是故佛以非想為喻實有細色說為非色經云非非想天亦色者華嚴經宣疑菩薩鼻根聞於無色宮殿之香阿含經中說舍利弗般涅槃時色無色天淚下如春細雨闍婆提般涅槃時色無色天佛前側立此云亦色廣明解脫者僧亮曰眾生所好不同廣讚解脫明無苦不盡無樂不備稱情合願吸引多端頭首數者但數又解脫者亦有八十四九十七八者加十三夫解脫者亦有九十七略不可解者不稱今經文意故不用之靈石者在台洲黃巖縣凡萬法門者據理一句皆具一萬法門以解脫之法一一皆互嚴互遍互具成百萬法門今言萬者一句是也橫竪至疣者三或二死並亡故名無疣到解脫處者以一一句皆橫遍法界竪徹真如所如橫竪皆到解脫之理具無缺者解脫一點即具三點方名具足竪可厝言者意云只可以圓心照達無不橫周法界竪窮如理豈可以紙墨盡之為力不足者智力不及也廣上無瘡疣者經中句句皆順無瘡疣義下二廣上亦爾尋文對義相甚分明經云遠離等者百句一一皆須約四教釋以顯圓想如云遠離一切繫縛者猶解脫體無二死三惑瘡疣故也又先繫縛者是生死大苦證解脫者是大涅槃大樂生死有萬累涅槃有萬淡解脫生死萬累即是涅槃又一一句中應有五意一列名二解釋三結四即如來五難解者重復分別又復文中多少不定或有初無後或有後無初或有中間而無初後於解釋中或但法說或兼喻況喻有反順其順喻者解脫亦爾其反喻者解脫不爾法喻相對前却不定或有初法次喻後合或有先喻次法後合或但先法後喻無合或但先喻後法無合文相不定故先示之至文易曉經云虗無者由證得虗無則遠離一切繫縛及瘡疣經云即無為法者實相無為法也由證無為所以虗無遠離及無瘡疣皆將後句傳傳莊嚴第一無瘡疣句廣博及解脫處亦爾是則一句皆以百廣莊嚴之經云名曰恒法者常以不遷無動嶷然為義恒以𮕜然不改為義亦左右之辭蓋言終日恒然者也經云若我無我者若我常見無我斷見闕第三句非我第四句經云唯斷取著生死非我橫生我心此之取著應斷也佛經是理不斷此也經云名不空空者常樂我淨是一實又解脫眾苦是二實名不空空經云空空者尼揵所計解脫無常樂我淨一空又非解脫二空體是無常又非解脫名無所有無作樂者只是無作樂耳此彼既去者謂從此至彼此至彼岸耳雖無此岸者令上劣勝二句果斷一分者等覺斷一分即入妙覺名果斷一分皆非斷非不斷者或智無二故不斷而釋者無常即常即非常非無常常即非常非無常故曰非也去理外生死者去分段生死也經云斷一切相者貪是結本相名貪境貪與所貪繫縛三有一切煩惱由之而起故生死之數因果無窮永斷貪故次第而滅一切解脫即一而三至而一者亦是無常即常等離獦至近者但離生死耳怖鴿至怖者舉淺顯深以舍利弗無緣慈未滿由是別體三寶故爾前是別體三歸者三跪文是經云四魔者界內外各四魔也經云無盡者涅槃常故無盡文中從則得安樂下宣說七法相即以明一體迦葉但舉昔別體三以難今一體三故云舉三難一則非妙非寶者非佛性理故非妙非一體三寶故非寶事三而一者經云則知佛性決定涅槃證事一也經云名義俱異者證別體此別有一而三也經云法名不覺者法以軌持為義謂軌生物解非覺義也空名非善者澤州云非戒定慧中行善也謂法性虗空體是勝義善攝寶師云是無記性故對佛法說名非善經云波闍者是佛姨母佛笠七日母便命終波闍乳養佛後出家波闍變臆手自織成金縷之纍待佛還宮擬用奉佛佛後還國波闍遂用奉獻佛時告曰恩愛心施無大功德當供養僧僧具三歸故今舉之以顯苦別體僧上具三破別說三者破昔別體令入今一體也經云是事不然者無生無滅其辭雖同其義全別虗空約對尋色立名解脫約對離障得名所對既異故云不然經云為化眾生故作喻者為緣說一說三如來之性本來無二或言一三者意云或但說一或但說三或但說三或但說一云何作二種說若作三說即是無常或時定說等者明如來為緣或說一體或說別體若於如來未曾有二如人害母於母一身或復得罪或不得罪四領解者經中具領三義如來至處是領上解脫處義壽是領上廣博義如來以常為壽橫周竪窮故命是領上無瘡疣義如來以智慧為命照達三或二死瘡疣故以蒙廣說三義故今具領此旨四依品就疏文為四初釋題目次問如來下問答釋疑三舊明下辨古今所明位行不同曰分此下入文解釋初文依四悉以釋題從四者數也下世界自他等異憑之而發樂欲之心故云利益次從答上云何下為人依於得大法人理善心發故云得也從三又昔下對治昔人雜真偽者以人雜魔外須依鹿菀四諦法簡之今法混小大者由聞大取小又以大破小又以大開小為此義故名之為混即今經妙對治也四從又昔依下第一義捨此就彼者人外求法如捨此就彼今經開無常人法即非常非無常即佛性理故無所捨次釋疑中云不得作如來像者佛去世後天魔波旬亦能為之所以得為如來像通論悉作者如前解脫中住首楞嚴種種示現即是通相別在四果者化道易行矣自有如來為如來者此約佛在世自化也四依為如來者宜應見者蹔時為之四依為四依者四人更互為高下位即當本下迹高本高迹下等四果為四果者權四果為實四果亦是四人互為高下也四果不能為四依者簡實四果不能為四依也合則還是佛者含亦只是一身故也初合依法者昔教但令依法也三辨古今中云十三心者十住至第三行十七心者從十住至第七行初有煩惱者由煩惱未盡故無究竟涅槃復有涅槃者第四依是因位之極雖有微細煩惱亦名涅槃究竟約後但有煩惱者四依皆是分伏分斷分證涅槃故爾唯觀行位名觀行涅槃也中論是圓者依悕似圓且一生往與之四十心共作四依者十住為第二依行向為第三依十地等覺為第四依還以十信為初依方會經文別者等者應知四依是能引之人既從權未入實所引之眾得入實者有超有次故須位位四依義猶住行向地淺深不同然初依菩薩皆在十信經文自云有人出世具煩惱性是名第一其位則定初依唯弟子者且初具煩惱性以判中間亦師等者望下為師望上為弟子四入文解釋中云標章歎者文中具歎人法也不令他緣者不令魔外二乘執無常及惡比丘擾亂也言建立者謂正法頹綱之時則能匡持建立也能住者令正法不斷名曰憶念又心思不忘名憶念正法此三句自行德者如大論云菩薩摩訶薩所謂化他即是自行今四依亦爾經云安樂人天者天來人中聽法故也僧亮曰末世通法非聲聞之位而以配菩薩者但以聲聞法眼出家其正故配之菩薩雖晦迹俗流而清白無染量同羅漢不得言具煩惱事者通或已斷所以通惑現行之事不復更起別惑被伏現行之事亦復不起但有別惑性在名具煩惱性僧宗四此從曰意止至世第一法擬地前三十心並是伏道未得真無漏也此亦通證初依之位今為判之即當名通義別也又云三賢之人雖伏煩惱所知二障令不現行未證無漏未能斷種至于登地方能斷種子煩惱故云具煩惱性此即別教義也准通共乘者以四依出世身皆為二乘像則大小並弘約通教判其位最便三乘共學通別通圓故也若准大乘十地者此依金光明經明圓人一生有超登十地之義以判故注云云准大乘判者此准通教大乘以三乘共位至七地時正使已盡所以不還三界若以七地為第三依者則以八九地留惑潤生與物結淨土緣為第四依若細就圓者如前十住已上位位皆作三依住前為初依故注云云但或體在者無明是同體惑故云體在戒慧二學者定在其其間乘戒二門也八大人覺者佛是大人菩薩亦得覺性與佛不別名八大人覺出遺教者引小列大也八人者八忍忍因也宗曰八忍地是聖人位今言非此第八人者且是性地凡夫為初依也此師亦依三乘共位以判別惑既除者斷德分具也與法相應者法身分顯修道得者智德分滿也位相小難者且古釋不當名小難耳又亦緣云未得第二第三即是難也四忍者亦是一途未為全當故今不用以前簡後者從淺向深以後簡前者從淺法瑤師曰十地判為三住處六地已還未出三界穢國為一住處七地是二圓中間非淨非穢為一住處八地已上相心都盡名為淨國為一住處此第二人未得七地已上住處義似通教今亦不用定當得果者當得妙覺果也古來二釋至解者舉不可解顯今可解依增一集者達磨多羅集今師依此釋為正同是功用者此二同彼欲界修惑並未盡但名無功用第三依已離欲惑且名無功用亦應以初果為一住處者更准倒破約色無色為二依位色無色既分為二初二二果亦應分為二依此二經文自合為一依焉得分色無色為二依耶經云客塵煩惱等者若小乘人須斯二果既未離欲則欲界修惑現行者名為客塵俱生煩惱名舊煩惱尚未能離第三果人欲界煩惱見修永盡若言有者無有是處宗曰以三界外惑為舊三界內惑為客此約枝本為義今師通幻三惑但不能障枝本之義亦同今法身顯等者昔日權教碎身舍利覆於法身今開顯已只此舍利即是法故云吾今此身即是周旋者遍於有機緣處教化也經云不亦得菩提者極果菩提也斷者徒管反約物體已離釋得佛所者有經中名等覺為等覺佛故第四依名得佛所得亦是因位分得之極也法華疏云三界因果皆名為他智斷功德皆名己利己利具足故成應化又慧朗曰斷諸煩惱釋煞賊逮得己利釋應化所作已辦釋不生欲成佛即成者一轉即入妙覺但為化他不取耳至功妙用者四人皆契極理住四依位名為至功有降魔制外之用故云妙用不教菩薩自能體達魔界如故不須教也經云我今不依至人者意云佛昔為瞿師說魔能為佛等我今但依法檢校即得世尊何用合我依人故云不依經云汝當檢校者令依小乘經法檢校如來昔曾為瞿師羅說四真諦彼悟初果如來去後魔來惑亂化作佛身告言長者我問汝說法不盡於四諦外更有一種神我諦在長者推尋都無是理遂往請佛佛即教之若魔作佛汝當檢驗知已降伏然問觀察者無呵其可問次令依教用實智而觀察之於佛尚須信智者佛所說法本應信受尚須觀察何況餘耶偷狗者依六卷偷與狗別謂賊與狗俱入大乘法舍夫狗欲為盜必見其外無守護之人內有昏夜之闇是以得入魔亦如是外無善友知識內有無明覆心魔得為亂也夫無明為夜者猶起無明魔耶為亂喻如夜入婢使者宗云聞慧其卑喻之婢使以微明之中檢魔虗實以五繫之力魔即去矣然今師通取賢聖之位伏二種魔不專在聞慧位也五屍者如憂波毱多入如意神通用身念處欲界不淨觀變作臰爛死屍繫縛魔王以臰爛屍狗穿腹破𮌎褁魔王頭以死狗頭蓋魔王頂上狗口蟲膿流出隨魔額汗流下入鼻口死狗前脚抱魔王額屍狗後脚抱魔頸臰爛死虵繞頸編𦙄以為瓔珞繞臂至手似如環釧死人繞腰死猪繫脚云云五種不淨者第一卷記引五門觀者謂苦空無常無我不淨觀也經云亦可得近大涅槃者取意說者但用大涅槃心而降伏之方得近大涅槃住秘藏何用依人又但依佛於瞿師羅經中所說令依四真諦法檢校於魔即足何用依人此釋正消經意經云非為不爾者若是大乘菩薩根性只用依法即得我意亦然但為聲聞必須依人方得降魔之法雖天而肉者肉天所見雖麤細之殊亦只共見因緣色耳菩薩雖肉者六根淨人是父母生身名之為肉行解徹理故能即如勇健譬佛性者澤洲云佛具無畏稱曰勇健十力摧耶說為威猛四念處如弓者如空弓也令依無作道品而降伏之名教方便又聞慧如弓思慧如箭修慧如槊等又云修定持弓習慧執箭起通稍道四辨長鉤神呪羂索經云視人天者悲其不見佛性無楞嚴定喻之輕弱魔無智慧者無照理之智不見佛性所以膽怯經云大呼虗故反謂招彼為呼恐他曰呼說五諦等者於四諦外計一神我諦五陰外計一神我陰十九界等例然經云不應生於憂怖者圓伊大觀達魔界如故無憂怖經云令彼降伏者依無作三學而降伏之聞魔界如者解深達理見魔即佛故如云也內乘大乘者亮云一以積德深原二以大乘經力自能降魔經云得阿竭陀藥圓伊妙觀譬阿竭陀藥達魔界即佛界無二無別故云不畏一切此約觀心合之憋芳滅反謂性多嗔怒也若作弊者謂患也非文意又欲壞他善稱弊欲敗他善名害或其術者謂不識其術也聲聞還本者謂得聲聞本心等也經云而作鄣礙者更不執無常等鄣於圓常大法經云有如是力者修大乘者有體魔如力飽德者福厚道富時無醫無藥者無醫合上佛滅無藥合上正法衰羸說有奢促者大根濃者則奢小根淡者則促持法四十年者迦葉二十年阿難二十年故成四十年後之興沒者亦是後八十年前四十年興後四十年沒能融會大小者亦有不能融會者引此未為全當迦葉佛得道日生者應悞或是相從而說迦葉是長子者所有佛法皆付迦葉為是義故名為長子經云純食粟米者二乘人唯讚羅漢第一經云受業報者二乘之人受灰斷業報也經云是福人至不聞者明大乘人始從華嚴等來皆不聞無常苦空等名粳粮譬常者以土人常食故石蜜譬我者須堅即堅須軟冷即竪煖即軟用喻於我以求有心者求二乘道名為求有何者即由不見佛性故也方便智曉者此釋未正今所不用今明大行訓之者大乘行法訓令修學也僧宗曰四依菩薩乃廣寫大乘經典流通彼處一時從化譬舉國共食經云他方無量菩薩者但是菩薩機耳經云其地則有金剛等者大法在人如地有金剛僧亮曰經所流布在地則地貴在人則人尊謂達五陰即佛性法因此法以成今法悉是金剛王至深山者借前文語來成今意故也植因深淺者先歎四依出世開演之意分擘玄毫者十絲為一毫也以分一字一句說無量義如百句解脫等指南宣楊者亡道宣揚非易卷舒宇宙者舒之則充滿法界卷之唯在一念心性一塵而已以顯常住秘藏當眾宣暢使彌綸法界利益永劫令聞者果遂若非四依之力博地輕弱焉能為之僧宗曰非德不傳非因不樹令時眾慕道修因也音聚訓輕正戒毀是命濁者只由邪命毀戒五種法師者合受持為一但成五九河者此段經文正明生信難生解難具解難僧宗曰從熈連說二恒河是聽者之因從三恒河至八河是說者之因此亦一途之說未顯四依深淺之別恒河者長八萬四千由旬闊處四十里狹處十里方一肘直下至泥得一萬斛砂其砂細如麵四恒從惑者惑多解淺故也如仕至太尉等者自淺至深之官故易丞相是特達越次之官故難初依人窮佛法盡者初依能知如來秘密之藏名為窮盡何開佛法者九恒總對初依只成別教地前菩薩之法故非今經圓佛法也勸福以遮罪者已謗者令不謗未信者令生信已信者令增進未有解信及不謗者但屬於福僧宗曰勸信之意以聞經之緣其力不淺豈得不生深信耶經云木頭幡者無所復用故也互舉一邊者自行化他必須具二方成自行化他經郄者倚戟反階十住者解同十住故也三報橫論者且一往以生望生名之為橫三障竪論者亦且一往約三障次第前後而轉名之為竪則近菩提者則為已近初住菩提也鑒誡者謂鑒照信謗者因果也四依大益者四依弘宣功大故須供養亮曰明敬師之儀也四依之德實可尊貴能生人善宜供養也問含二意者四依晦迹不可別也佛將欲說迦葉發問兼眾事者如河西所釋又護法亦不出於乘戒二門此備具之人宜須供養即是兼也以重奪輕者重上不惜何況於輕若從昔法者以小乘教觀格定故不應禮二旨只是意二意相違耶經云持戒比丘至所犯者以禮俗破戒人則名為犯然文中但經上禮下持禮破二意若從義取別結三意具足經云亦於餘經者昔經中說亮曰二教相違不應二實必應一是一虗雖自持戒不治破戒法滅不救非我弟子不治上犯況應禮耶文少而意廣者文中但云為菩薩而說是偈是文少既云為菩薩則是許菩薩以持禮破上禮下出家禮俗即是意廣三三之疑者三定三難三結之疑皆遣然答此一條者持禮破一條也如上說者上經云迦葉菩薩復白佛言世尊如是經典正法滅時等文是也增長非法者增貪嗔癡法時名為非法也經云一切聖人隱者佛法滅時一切聖人悉皆隱遁使人之濁者令濁人不濁也未得機便者機未宜糺宜和濁光使大法宣通廣行流布又四依菩薩皆先同後異示為破戒示為邪見示為所引皆取機便引接成熟入圓常已能引方息如此破戒者亦禮破等名破戒非謂四依作破戒事既釋持毀者此先述一段文意也須具二釋先為持毀釋次為開大小乘釋儲君也亦名東宮亦名副二生公曰稽古有行居然可宗但人未推故名稚小從此下能引所引破邪入正無常破常常破無常等皆須歷五時教所用法門未至法華涅槃入實以消童子等文栴陀羅者生公曰啈㥽為惡害智慧命經云墓者取也如樹者下品之人不能治破戒者但於中自生自死而已猶如於樹中品亦然作威等者守邏不令持戒善人得入名為作威作破戒住持之事名為作福七日繫皷者亮曰知諸比丘不可力制欲以律治僧若有罪者以七滅諍法溫命僧知素貴者素行高緊即梵行之家璽斯氏反夫國家禪位皆有禪書金箱玉璽求羯磨師者求持戒人為也半國者謂共知僧事譬半國也烏迴等者十誦律三誦卷第三云鬬諍事云何以三滅諍事滅隨以何住處有諍相言皆丘是事付闥利吒應受此事如法如毗尼如佛教滅者是事名滅若不能如法如毗尼如佛教斷是事者應捨付僧僧又不能斷者爾時僧應僧中立二烏迴鳩羅應羯磨差此人令斷是事烏迴鳩羅比丘有十事僧應差知諍來往處根本善知諍能分別諍知諍起因緣知諍義善滅諍滅已更不令起持戒清淨多聞多智僧應差此利吒烏迴二人皆依法依毗尼等以白二羯磨斷滅之故與此僧正僧都同也長髮慈也者亮曰髮生人頭准長為美命居德首以常為上大意亦同王大歡喜者此蹔歡喜不久破邪歸於正道不見至嫌者實行持戒者嗔也我捨家法者謂捨大應且赴小機作破戒眾生者先同惡法密示正法為其羯磨師也經云先王至藥者先王者栴陀羅王也本召師恃云有三十三天不死之藥許共食之所索童子童云破戒名下有常住妙藥猶未共食栴陀羅王即作畜不淨物有名文利養之解故云我實不知涉云前佛所有常住法名不死藥貯在經藏不同修學名未共令不惜破戒之眾者破之戒眾大機冥發故令持於破戒之眾五陰法中佛性任為開曉也經云聞王語者知其大機冥發也經云即持歸家者示五陰中本有秘藏故曰持歸依律苦切者未宜實相妙觀且依小乘律教苦到懺悔此即先用無常助圓正法推尋事理者先用無常事觀令建無常常等理中根悟等者將此王譬中下二根悟道不取王身入道為喻也經云猶如死人者邪見已破大機冥發故云如死經立本儲君下譬開權也師子御座者師子王所坐之處豈是野干所昇經云經理者經即始終理謂整理以始終整理邪徒令歸正徹分別決定者然小乘中犯重已更無悔處故名決定經云不失婆羅門法者不失婆羅門威儀法也經云其餘居士者中下品持戒人歎也經云若能驅遣者能善令其改邪入正故也經云什物者什者雜也亦聚也然經中正許畜八不淨物即是雜物也汙道者汙無漏道也汙威儀者彼善生優婆塞經具列其名一畜田宅二種殖根機三貯聚稻粟居壃求利四畜奴婢人民五畜養群畜六畜金銀錢寶七畜象牙諸寶大床綿褥氍緯八畜一切銅鐵釜鑊畜此八種能汙淨戒故云汙威儀也若乖此說者若不為令改惡懺悔入大能引之人先同後異若不爾者則有罪也經云以無憍慢者菩薩本無罪示同懺悔故云不名破戒經云覆相說者昔經中權說也經云如第二天者如三十二天奉釋也堤塘者戒如堤塘定慧如水若無四依出世令改惡從善則戒堤塘破壞定慧水盡堤常愁反妨也度嵇反塘也淋正是林字作林呼亦得今從所禁反也不懺則失者四依亦同其懺為引實行故爾我如綱者亮曰我是護戒是乘家之別事綱維既立則萬行斯舉如別記者如淨名疏中十門解釋經云有四種人者四依示同惡則內熟外生清淨持戒比丘內外俱熟內生惡比丘內外俱生譬凡愚執事者不識教納人為知事不簡僧之好惡一槩令其應供不能為他福田經云誦市者得亮曰市是貨易之所喻施主之家有彼相資之義分僧供養功由請者喻如賣也雜藥至不別者謂破戒者難別經云當依四法者應云昔日當依四法梁武者臥蒲蓆不喫荺蒻荺蒻與內相似故不食昔人無常者雖是釋昔一一皆與今經四法到辨只由昔人無常還稟無常之法不依於人則是不依於法餘三亦爾語若生著者語若在昔亦不名著以今大法望之故昔名著義體無著昔法下義則是真諦當分無著若望之即名為著若不是著何故二我於昔而不前進直至寶所今法體無著著由於人識著者昔無常生滅分別之識不能見性故名為著智解者昔能破四住煩惱名之為智不能見性智亦名著今約分別亦名為識即能見性為智解經云如是四法等者佛昔令依四種法不令依人令曰但令依人不云依法為依法是為依人是故請會通經云依法者明今昔無別法昔日依法則無其人今日之人亦無別法只昔法即是今法所以牒於昔法即是今日人法故云法即如來結還依智者智能知法了法淺深故須依智昔人既破者破即開也人法不二者如來即涅槃法性法性即如來只名字位中尚爾何況真位而有二耶若了悟者約開權釋何者尚了無常即當等何況人法不二而可除耶又非但昔法即是秘藏人亦即是如來歎德者經文語到應先云如是四人等方可云若言如來無常等經云是人至密語者此是相似解能以一妙音遍滿三千界故云及能說不為利養所轉者此人設得供養聞前人說如來無常終不信受隨前人轉經云是名定義者恐後人生疑故決定示之經云不依語也者昔語無體三寶故不依不羸劣即法身者法身即是金剛之身故無羸劣滿足即解脫者猶因圓果滿則能處處現身說法調伏眾生且偏對解脫據理滿足通餘二德生凡夫過者佛說權經凡夫不了生於取著綺餝等過故不可依又諸論者異道邪見語也綺餝者謂世俗無義語也貪求無厭者謂諸比丘順文邪命語也經云又復唱言等者謂謗法順情語也於飢饉世下依時謗戒語也是真智者分證真智也亦通名字即已上也經云隨其自心者開權顯實秘藏種智之心安住佛性無礙自在經云若言如來入法者若言如來化緣自住秘藏法中者即了義說也辨宗者辨前五雙宗也經云如是四依至證知者結如是四依應依止經云名曰光明下三寶具足光明即佛寶不羸即法寶如來即僧寶復是結二種者此明初文依義依法唯明於今不對於昔所以第三方結不依語歸於初文依義即是依義小依語今昔對意足結於第二不依人文歸於初文依法依人今昔相對意足只由結中二文相間致伎分為二三復由依法之文不別標章是故須云兩依共釋經云墮阿鼻者權法不能令眾生出於變易而令眾生墮三無為坑名為墮獄皆須二緣得畜者餘三事墮用一淨施必不得𨷂故云二緣又今經應具四緣方成了義縱除無檀越一事餘三必具皆須云為建立正法方得畜之澤州云一觀弟子有諸檀越重物即遮無則聽畜二雖無檀越豐時即遮儉時聽畜三雖儉時不為護法如來則遮為護聽畜四雖為護法不作淨施如來則遮淨施聽畜於此四中如來所遮名為說重如來所聽名為說輕如是四法所應依止障內外者肉眼見內天眼見外也經云即法性者謂法體也義者至不變者謂法性義也智者是佛智也如阿賴耶識在因名識至佛果位名大圓智了義者大乘所詮能詮俱名了義也邪正品就文為五一雙標次邪魔下雙釋三此品下示答分齊四依下略騰文旨五文為下正釋文次雙釋又二先釋邪次正者下釋正初文者先邪黨嫉正魔亂真道能惑始學人故宜辨其相從所詮以立名也重等惡因也四趣等惡果也邪俗者於二十五有因果上更起苦因苦果故名邪俗往昔行者若云如來往昔實苦行者是魔所說若云示同苦行為化眾生者是佛所說耶漸者者別人於信位中先分別俗入住破俗已入空住後非空而入假分別於假至十向後心方捨二邊求於中道故云分別歷別等也亦三昧魔至等者如華嚴新經離世間品云菩薩摩訶薩有十種魔一者除魔生諸取者故二者煩惱魔生雜染故三者業魔能障破故四者心魔起憍慢故五者死魔捨生處故六者天魔自憍縱故七者善根魔恒執所取故八者三昧魔久躭味故九者善知識魔起著心故十者菩提法智魔常不捨故捨故故云等也無所知有別教但中獨一清淨真如不具緣了依正不融名無知次釋正中言四邪已引今經證成出相狀竟但使翻邪即正不俟更引經文重示其相又四耶之體具其兩向即成二義何者據是闡提等邊即名邪惡據執正不令人出欲界邊即名執正餘三例然眾耶之本者邪惡是後三悉所觀之境故屬其本清昇者人天之善離四趣沉濁且生世善故曰清昇邪偏者能破六界因果名為真正邪漸者取其能倒實相中邊即名方正五釋文中經云應當依邪者如此四人能降四魔應當依邪為不可依此即問前起後也次上四依者次上四依品而未也為四部四果者魔變為四依像也內懷煞害者煞害菩提心也內挾邪謀者遮邏行人不令出界共生其天無漏五陰者魔能變為無漏五陰之相應以有漏五陰善五陰法性五陰無等等五陰而觀察之令魔偽不行二亂行者若說十方面各行七步即平呼若說昔苦行即去呼二聲並通言不生生者若言如來實生者是魔說若云如來為機緣故不生而生者是佛說釜鍑富音釜曰飲腹大有耳鍑曰開無耳誇秕音毗貌也謂以體柔人若作此毗訓和誇謂大言也六十四能者大論第九云四韋陀經中治病法鬪戰法星宿法祠天法歌儛論義難問法如是等六十四種世間伎藝淨飯王子廣學多聞若知此事不足為難然今經中從治身呪術下亦略列其相但數不足耳三十二相并業者相因相果合論成六十四經云十八或人者從呪術至種𦘕像是為十八或人之相經云犯突吉羅至八百萬歲者若目連問犯吉羅罪如四王天壽五百歲墮泥犁中今經如忉利天八百萬歲者只是大小兩乘被緣不同耳緣因云云者應以了了緣以緣資了共顯正性經云九部至夷邪者問意云如佛上說一切眾生有佛性者九部經中未曾聞說既不說有上說有者豈不犯波羅夷邪悟已應悔者責心悔也讚歎得罪者不應罪也大亦則遮者五大色中真赤色則遮寶法師云謂大莊嚴具足此又不足應言摩訶楞伽羅也四諦品就疏文為二一釋題二從文為下釋文初又三先示答文次述奪三今明此品下正釋次述中舊二先明今昔二說不同次舊又下明五時辨諦事理有異初又二先敘舊次今問下徵起以設難初文者僧宗曰四諦者慧所照境也自鹿菀至乎法華所說階級大有不同准此教圓備明常住妙因必資中道妙觀然非境無以辨智故舉四諦以明因相也此釋亦為今疏所破止在界內者破曰道滅能破界內如何四諦俱在界外者俱云外界是何三界外耶若云出變易三界外方可云善次破中云無量亦不出變易者多在別教地前三是有為等者苦集是有為有漏道是有為無漏滅是無為無漏既具有無專名有量其義不成猶有變易生死者既為變易生死所轉無為不成不無三相者不妨猶有苦集道也次辨五時為二先述次今問下破初云五時者不云華嚴復以般若在方等前如餘文破約理者破云方等般若中亦有新入得小益者豈非是事如何一向判屬於理故不可用入觀至絕相者始從四念處乃至世第一法等漸漸緣於無漏寂理而亡四諦之相次破中云已如前難者既未出變易何能見性故同前破若非有量者應云若非有量非無量何不出於中道之體既不出體驗無別理三正釋中佛性實相者此二皆遍一切處也能於四事者謂菩提即煩惱名集聖諦涅槃即生死名苦聖諦達煩惱即菩提名道聖諦達生死即涅槃名滅聖諦菩提是智果涅槃是斷果即無作四諦故云心喜說真諦即是明了實相也於不淨中者於九界不淨集諦中即是真智於斷滅中者於二乘滅諦即如來藏理如來出世無為說此者法華云唯以一大事因緣故出現於世即真證也覆相今開者昔覆今開也塗乳獲洗者昔無常塗常今開無常即是真常義如洗除無常之藥二釋文中但有次第等者唯滅諦章中有少不次第至文自見一即是四者一諦如來性也不解故苦者始從畜生乃至別教地前皆由不知如來境界唯苦無實即是俱苦而非諦經云復有不知下舉不知顯成於知即名苦諦一是苦非諦者凡夫但苦而無諦及不見佛性故云非實二是苦是諦者明二乘是論而非實未見佛性故三非苦非論者即菩薩句方用釋今品四真論經云當知是人至苦惱者必墮惡趣是三塗果輪轉生死是人天果增長諸結復起苦因多受苦惱復愛苦果亦可前是分段果後是變易果故云或果也經云有能知至二字者澤洲云知常是眼見聞常是耳見常是法常住是報住經云生天上者未有觀行近生於天後得解脫者近在初住遠在極果下三諦中皆爾澤洲云前是聞見故得生天方得證見故云解脫經云真是修苦者真修謂自證入多益謂化他經云若不知者此舉不知以顯於知經云不生真智者謂不生解集而有真智也經云以是因緣者亦由受不淨物因緣不見佛性輪轉二死等又不得生天者不得華報也及正解脫者不得涅槃報果也經云若能知至不異者始終不異事理不異因果不異如此知者方名聖論經云苦滅諦者應云苦集滅諦但舉苦果則知有因故不具說經云是我弟子者若不如是非我弟子經云佛法僧者一體三寶是所緣境而修道品於三寶境一一無不了知常住不變解脫是所趣亦爾即是因果俱常實結道滅者若將此文為總結四諦者於正釋初應分為二先正理次從真見不總結今例一諦皆有六文故不須開開亦無失四倒品就文為二先釋題次文為下正釋初又二先總釋次但倒下別釋初云況顯或義者引哀歎品中迴過還諸比丘釋成今品顯於倒惑之相故云況顯又上舉境以明智此明惑以顯解次別釋文自為六於中為二先標列次一者下釋於中又二先示相次先佛出下明起倒由初中云羅籠者無明自縛不得自在故云也見想取著者謂凡夫外道橫計身邊等見取著者謂邪求涅槃以非想為究竟狂者俱面俱盻二反疾跛也急也正體合作獧字與上字同之言眾多者舉心違理無非是例故曰眾多而說倒諦者從惑因緣而成倒從解因緣說而諦次明起由中又二先明由次佛初出下明設治之方初云執字亡旨者外人執常樂我淨但得其某名不得常等之理二乘執無常等名不知無常即樂我淨及即非常等理故云亡旨設次治中云通亘前後者前佛後佛皆先用無常治等離倒無諦者達生死道之法即涅槃等又達無常等使相成者由解倒故成諦由迷故成倒如經文自釋可見近論四品相成者意云雙用三品方成善業因故云正善具成就能作善業因則是三品為能成性品為所成能所合論故云四品如偏識人入者應須雙識人入如具知諦倒若只識人則成識正不識邪若但識入則如識邪不識正杭人者杭譬常譬諦人譬邪譬倒應了杭為人解人金杭是如了倒即諦方名具知次正釋中經云若有說言不修空寂得長壽者寶問云前文言不煞絕食等為長壽因今說修空為長壽因者何也答曰佛長壽因必須福慧雙修前文據福此文據慧各據一門不相違也承保四年夏五月一日書寫已了僧定深之本
