body:
  text: 將釋疏文大分為兩先通釋次別釋初又二先敘古盈縮不同次今分下明今師分節解釋初又二先敘次雖小山瑤者即湖州武康縣小山和寺矣關內憑者准法華疏等者等取廬山龍齊中佛經味道忘疲傳講此經但分一部下去盡經而為中小例分三段謂序所置會焉驗知安公非之也靈味者寺名即寶高起者從純陀品至設三十四問前是迦葉向家緣起從現病品去是答家餘勢若依注經所敘此經大致有四一從如是訖老少二人譬勸問二從多羅聚落迦葉已下發問三從佛讚迦葉已下答問四從憍陳如品訖經付屬流通問是一人科判從此所引不同矣婆藪者此云天親作涅槃論一卷分為七門地論師依之承用次結意中云蘭菊者夫節經文皆為引入第一義諦益已無焉能契理若順四悉各羡有開其分節以赴物宜牧女添水其事也流深等者此借大八門解釋如流深令今經佛性如深重分判自為五七七中初二可解三釋名運者明自行之道要藉利生利生之道故云待等運合宜也等覺已下諸類不同皆蒙聲光召動地駭其常情使大機啓發故云駭悟等緣牽曰召者上命下曰召下仰上曰請謂本地及法華已前莫非結緣之衆由有此緣故以聲光召之招謂喚也致由至也良由衆有涅槃之機故得使聲光喚諸請影嚮等衆至此𤘽尸扣佛成機今不用下仰於上以釋佛於下二明涅槃施為二先明自行滿次本無下明化他功成初云大機未堪說時未至名之為藏次化他為釋化意意云由機昔日不堪及云所以初用等毒塗者洗者開無常即正常耶同小今日方知亦同亦異又示為無常以破耶常又菩薩常即是正常皆是先同末知伺機下重說化意殷勤勸使無遣滯者使前機領無遺失純於淨常無常偏小之非充溢者自行內充化他外溢五十二衆咸集𤘽尸悉獲涅槃祕藏之益故云滿也然祕藏下三釋行初云淵凝者淵深也凝靜也衆生心性三德涅槃至深至靜本來具足若無五行焉能契之善巧方便者戒定慧三即善巧方便法也示現令前者示謂顯示令祕藏可見令前者令從初心終至後心皆顯現耳推請說懌音示悅也謂示為悟悅無病之相說三指一者行指雜華菩薩修行五行獲云無盡者此對外小等體歸法界故云無盡舉一弊諸等總一十八條勸菩諸法莫不皆依一佛云蔽諸然佛性下五明用中時唯惡悟時唯善然其理體用者然依非善非惡之體故能法界生善故曰彌滿囊括者五章如囊佛性如括囊之要者莫先於括法之要者無如佛性遍攝諸法又括結也梗略也概平也陳如五人者且指鹿苑說小中亦例者方等般若皆耶正雙用也四生起為二先正生起次無始下釋意初生起五章即是生起一部經意用由於義者謂求於用知由於義為求於義知由於行等次無始下釋意意云涅槃之體不當始終今立五章論始終者皆為涅槃而作耶亡者上至等覺惡方盡耶究竟亡今皆以能化所化相對釋之五通別用為後施行義三屬中一言也一事者謂先催供次聲催不咸令衆生同入祕緣宜普施常命等故教修行法也總者機也規矩如矩五行如規又淺行如矩深行依教修行行稱於理方圓有則欲顯於圓於二行雙依莫不皆名涅槃之行文多事顯者五行是因十德分果俱名為事入住分滿獲二十五三昧故云顯也別以一番者師子吼雖說六句並問佛性然其後五但為成於初問故也又通指句為一番也群萌者萬物牙始發者為萌今以一部之文得為遵利佛性可發之機故云群萌攝惡者善星也機耶者十仙耶徒也六引證文自分二初云大師子吼者諸菩薩如師子子集娑羅林啓發如來大師子王決定證一切衆生悉有佛性所以如來名大師子其自身中三德涅槃佛性之法二施之法即是我惠於汝汝又惠他名是佛理即體而用故也次佛性非五而五故得通證理悉是如來同行者亦是知識亦是垂迹時同行知識藏者發堀衆生諸覺寶藏以施當知般若至施者欲知智在說說即是施故以般若對施是五一行者謂次第五行一謂一行是如來行真正調直者真破僞正破耶直破紆曲不可傾動者涅槃佛性猶若虗空笠有僞耶紆曲之所能動碎者破也散者滅也只是能破滅結惑耳喻於金剛者若更轉喻者即以煩惱喻碎散金剛為拈羊龜甲所破若盤固金剛羊角等則不能亦可以羊角等喻於五行有佛性所以者佛性之理是涅槃教行所歸意旨之處名曰所以如世人趣向之處有其所以方可向之體用相由無佛性之體所以用不相即悉或通具三因性也七出異解初云說法偏據中前中後則違通漫彼經云第一年二滅若據彼說由屬機見深如二品通為用章若偏分引接今昔有緣者昔謂五十二衆亦不出今昔之人良由有緣蒙召必至略廣門者迦葉設三十四問前為略問廣答三十四問去為廣門行與功德至因中者十德是因中分果所以行與十德俱屬於因則不煩文者謂不煩開為二門地師者若准寶法師依世親菩薩論分為七分與今所引科目大同第一不思議神通返示分第二成就種性遣執分第五名離諸放逸入證分第六名慈光善巧住持分餘並同疏種性疑等者明純陀施食為顯發衆生三因佛性有可生可發之義名為種性兼破權除邪執故也正法實義者三德性為實義方便修成者方便安章者但破其用師子吼文十仙昔定是邪今方入於等相顯今用章之旨權實名方便門陳如品云通序別序者佛將說經起所說名為發起以此發起與難稟承佛化欲以所聞傳之末代先對時衆言如是法我從佛聞證成可信名為證信以此證信與傳經為由名證信序次顯立意者立如來所說宜在當時阿難所傳傳之末代對斯二位故云兩序又如來所為名如來序阿難所作名阿難序又如來序者名現在序阿難序者名未來序又如來序者名經前序阿難序者說為經後序教門者一部之文無非是教教即門也又今經與前四時不同因法華前權實不融今雖被於四機皆知常住又今經與法華有同有異何者法華一向明開權而實與法華同若即實而權用法華良由機別故使教門不同今文但具二悉初云三世道及也又諸經下勸信即為人悉阿塸二字不如不是對治悉合者以至處不可合釋故須權顯實及用權扶實機也會理也展轉相證者五義展轉相由類如逆順生起之相順而不惑者為令將來順教信理而無疑惑若言能傳等者又阿難所傳與佛說不異曰如言當於理曰是三藏意也稱機為如者別人入空與藏通共入中復與圓教同則以十行出假名為稱機事逆者次第行學故理順者教談中理故若信下判權實若法華玄中每於一義皆先約因緣分別次判次開今文判已即當於開但從文意所以不別立開文異則不異者同入祕藏故云不異詭者怪也果報紛雜者由果報相傾者巨傾細精傾粗映奪亦爾以凡夫眼看也二施至無差者純感勝身今昔差別以難如來歸身止息之所者佛性之理德歸法身住祕藏以衆不佛為一現在十方佛為一是同現佛也以結緣當機發起影響約六即佛配於八數也八方佛為八兼釋迦化主亦言九佛也邪惡不二者邪惡即是祕藏故不二也四衆非八佛者權實不同物機猶雜故非八佛初後優劣者次第淺深名為優劣但感人天五果未免無常生滅故曰遷移涇渭者涇清譬正渭譬邪低當嵇昴也惡魚也昔龜魚不同在水今日同在大涅槃水此證善惡用頂戴奉行者於一時聞已如典藏臣頂戴奉行行如來行也佛以佛所住者佛以大涅槃窟為住處還只說此以施時衆故云施與西海祕藏義者西海譬祕藏也如是總序三點者部部不出三點三點是教所以如是總聞屬於教故對般若又欲知智者稱機契理結纍永忘故對樂又聞佛性教住祕藏中合能淨三惑故表淨也同聞顯阿難領持無謬自在無礙故則淳傳聞則淡為成上句明非謬也數也夫數法皆後一為初此即三藏初俗諦所破法也真俗合一者別人先真次俗向後登地真俗方合三身四義者從勝應聞出劣應以對三藏故云釋迦牟尼數數現生數數現滅即此身也勝應對通報佛屬別法佛屬圓身本只三對機聞四經云佛在者謂久居曰住暫遊曰在如佛住靈山八年說法華經故言佛住王舍城等今佛最後在於雙林始從晨朝於中夜而說此經故云佛在簑蘇和反草名堪為雨衣也茅城者阿含經中名茅城此翻堅固者謂風霜不能改四時莫能遷以況法身金剛之質二死不能變三惑不能堅固似交讓者博物志曰安孝縣有樹枯者榮榮更枯號曰交讓之木今如貴與賤交以與交而無有二雖二樹鮮榮二樹枯悴表法樹今日教圓寄之雙也因茲八名一林興廢者謂無常生滅及名興廢此即兼於兩教二乘若見是發菩提心別兼通菩薩言願處者謂發通願別修定等者修三學填願故云等也慈愍示人者現身說四教法以示圓常佛性也力士表我者以顯法身自在有大我之力兼遺封我之患也吉河表淨者入洗滅罪表淨三惑也無屬表淨者其城堅固惡不能侵又其城無惡故可表淨無屬表常者若有所屬即是無常無常即常佛性體遍猶若虗空故可表常心安表樂者三十萬人共居無能動者故以安而表於樂色悅表淨者色淨故般若波羅蜜淨故以色悅表淨恆流表常者若有流不流則是無常此恆流不絶故可表常注經云河流奔浚以譬寄顯生死之中有佛性也金體不云出㶄浮金處水之淨者莫過涼表樂者凜身快意故可在以表於我東雙表常者略又雙茂者此雙言冠下三句而別即別而總法體無二以無二故故為二釋九佛中八佛者釋迦化主是能與八佛是所與之衆故云中之八佛私謂者意云若論同聞唯在通序今五十二並為聲光所召有權有實當機結緣悉皆具足所以五十二咸是同聞預示此意令知分齊當知二別者智及道也如為盲人者雖文舉七正辨處時二事無機不見故云如盲歎德者今經無別歎德文所以大字當於歎德通四圍陀者一讚誦二祭祀三歌詠四攘灾一圍陀有三十二萬偈合有一百二十八偈一千七百卷即是外道圍陀內明三藏故得多名學無學人者前二教佛亦屬無學也七方便者人天及兩教二乘為四并三教菩薩為七又兩教為三於畢定衆者為開權顯實也不仰者不仰觀星宿等不下作通國使命等不維謂不怖無常狼者大論云以無是以生滅慧觀五陰念念無常如以狼者以無生慧達藏中四法皆如幻化以資慧命知惡非惡者達壞空也亦無知者能觀亦空陰怖者報障破也一切諸法者以實相慧達前三教淨命持出怖魔等即是法界常樂具足故云悉有破戒等者如下金剛身品中破戒亦名雜僧以善惡無作共成此人故名雜僧但自持戒不知他事名愚癡僧暖等是有羞者此約尅體簡若通取者如圓教初以聞圓即屬有羞餘三教例爾復有四義者真實即發起影響二衆有羞即是當機結緣二衆又真實兼三衆有羞唯結緣以六根淨位謂結緣或為當機故爾或但人等者只是或數數人為數或數人法空為數即藏通二教意或數法門即別六法門也或數實相即圓教也從也圍繞者圍謂住儀繞謂行以三業恭敬者一一皆有威儀動對四教可知正是召請者以序而立正是之言臨機者機垂啓之時故道者中時表中道圓常涅槃法也月滿之時者月能虧盈功勝於日故以滿月為表僧亮曰二月是春和之中節異乎冬夏寒暑偏也昔說苦空如彼之偏今既二理雙顯故取表於中和不待不過者非二月前非佛滅後正是二月十五日不待不過又機未熟而化名不待熟而化名不過臨赴之時者此以能赴釋臨謂垂滅曰臨晨朝出聲中夜當滅去滅不遙故曰臨也所以唱涅槃而赴機發之衆以佛神力者以由用也即用如意身通無謀而運大音普告又亦得云佛為本神力為末又空慧下約教釋空慧為本屬前二教佛出聲種智別佛實相圓佛又大音聲者一覺遠故大二普告故大三說大事故大此亦堪難者今有據難於前師其言當理四生者四生對三乘此二屬前兩教橫之頂者此三藏中俗諦意又三頂下屬後別圓則應無二者當現著入圓常故曰無二歎令崇仰者來三號遍攝諸法益衆生故令崇仰崇者邇雅云重也高也允同者允合也明諸佛皆從如中而來所以釋迦允同諸佛又諸佛皆具十號釋迦亦然是故允同令生尊仰是為世父者世父能生育我是可尊仰佛為出世之父能生育法身故可尊仰是為世主能榮我便業有始終佛是出世之主能榮我偏圓善業師義可見三意大體只是能令我等破惡生善得入祕藏無親合無父無宗仰合無師本父君師者此三皆是我本時結緣父君師中間調熟今日度脫莫不皆由此三憐者猶憐愛故愛故愛故能與出世之樂愍者猶愍傷故能拔二死等苦三號者主為萬民所歸父為子之所歸師為徒屬所作歸依為世間舍者如世人得舍悅樂所謂慈能與樂如得好舍悲能拔心則喜不擇精粗謂為捨相欲涅槃者佛若在世為主親師故須興問節節明四義者謂一一文須約四教者明也亦旦也涅槃光力也面門者門謂遊之出入今面門放光表佛性遊之而出佉注曰口出其光以表最極妙說之相經云其明雜色者若分經文應先舉光體故云雜色次青黃下示光之相隨自意者一言一行皆契祕藏故云自也隨他意者佛性之理隨物機宜立種種名遍在諸教名為隨他正應表此者正表十界衆生皆入大涅槃海名大身衆生所居濟六道者安置六道衆生於大涅槃祕密藏中濟之大也淨六根者淨似真二位六根也三千大千者如大論中說千四天下合之為一名小千世界數小至千復合為一名為中千數中成至千復合為一名為大千此三千世界名世界剎同時壞故合為一三業可知者古人將三障三善通為一段故云可知經云見聞是已者見光聞聲也三業者有人雖見聞而心不憂惱雖舉聲而不啼哭雖手拍頭而不捶𮌎不成三業應先舉不成而顯相成也經云爾時大地者正當聲光之時即大地動故也互相依者無明為本如地見愛是枝末如水依地癡愛者癡即無明愛即愛見但略列二起涌動者新云動踊震擊吼𪹼今用舊釋輕揚不安名動自下升高名起磷壠凹凸名踊六方踊沒亦名踊隱隱有聲名震砰磕發饗名吼令物覺悟名覺新云擊如打搏𪹼若火聲六動者入胎出胎出家成道轉法輪入滅一一又有三謂動遍動等遍動直動為動四天下動為遍動大千動為等遍動餘五亦然合十八動即表淨十八界若淨六根一有三謂根識境三或復一時者餘經三或前後今則一時裁抑者今大衆應須裁量裁斷如來放光為作何事為說法益我為復當入涅槃故云裁也抑者忍也止也應抑止愁惱大劫者八十增減也今賢劫中至第十五減中有九百九十四佛一時出興若請大劫則妨此也善業則竭者偏小善業則有竭盡故也展轉釋成愁苦者若失主則失親師則失餘二也有事者逐形迹親疏聲聞形出俗網迹近如來證經為親故前列也天人形乖服異迹非侍奉證經為疏故後列也菩薩形不撿節迹無定處既不同俗復異於僧處季孟之間故居中仲有表者聲聞欣涅槃天人著生死各有所偏菩薩不欣著居求宗故在兩間又聲聞表真菩薩表中雜衆表假又事解似因緣表解侵約教駭令後問者外來衆則機身俱到佛邊衆但召其機駭動令發故須召之又從多者此解劣前解正時有無量者正是大聲放光動地之時故也尊讓兩盈者故論語云回也視余如父余也視回如弟謂回如弟謂回自處己如子尊夫子如父夫子讓而不受為父但如其兄處回如弟故今兩盈而目弟子一事又鈔中云從我生解如子學我後如弟此亦目於一人矣美其德業而不在於年汝能出家者若不出家當為魔王舊其宮殿攝其徒屬故令出家蠲三障等者上文先蠲三障次生三善殘習者此是世界意斷不斷異楷模者生善別惑者治其別惑即對治佛法界即第一義教教皆具四悉故今約四教分別心得自在者大論云心得好解脫即俱解脫人慧得好解脫即慧解脫人由未不生以有退故故今不歎不生者生是苦本惑是生因羅漢斷三界惑苦果不生故不生又煩惱因盡所期已畢故云已辦又得盡智無生智究竟也經云離常住處等者西國每於晨朝先嚼楊枝及軟口皆在隱併之處不在住房波羅奢者梵本云雙林間佛圓寂日人天下淚地盡皆成泥哭者身邊面如華樹簡非淺近者化城之空名為淺近今是畢竟空涅槃空故非淺近僧亮曰諸羅漢知佛是常今欲請佛發明常教也此經明常樂我淨無二十五有故名第一義空問極者極在佛性無過此也經云為諸衆生者由為地所動衆生機動故得為奉地動召玄相領悟者明佛有三召意令蠲三障生三善顯發密教使不斷絶令生調恨所以時衆一一皆順如來三召之意即是玄相領悟之相尼姨女者尼是西方名姨女是此方之稱是三召者經云亦於晨朝下奉光召舉身毛下順光召顯發下順聲召為諸衆生調伏下順動召一段經文三意具足賢聖人中者即前三教賢聖人中之龍以示為此二位中上首也因果一雙者從而常修習下明修因得自在力下是得果此但釋成前意故今不用人多識者河近城故多人識即世界也得福生善八河中大者棄小欣大及人洗滅罪並屬對治是佛生處無非實理即第一義菩薩十義者論用衍斥藏能所合明四教菩薩義足今亦須一一約教四教菩薩以釋一化衆生者前二教但度六法界生等別菩薩次第度十界生等圓菩薩則遍法界度生故華嚴云菩薩發心不為一衆生乃為法界衆生發菩提心即當圓意二盡供養一切諸佛者若小乘二十部中亦有許十方佛者亦得云供養一切諸佛三盡淨一切佛土者為一切衆生取土衆生得佛不同故須盡淨四盡持一切佛法者且約自行以釋五盡令不斷者常作繼嗣傳燈故六盡分別者法界佛土高下差別不同說法亦偏圓頓漸不等衆生為用何土而得種熟脫三故須分別七盡知者諸佛因何法相開而為弟子八盡知衆生心者分別十法界衆生心差別及三無差別九盡知斷者自既斷煩惱必遍令法界衆生斷諸煩惱十盡知根者始從五戒十善乃至四教根性皆知今文云淨佛土者依於寂光淨他受用等三土又此十義須逆順二種生起以顯菩薩十事相由一大莊嚴者以無緣慈悲拔苦與樂即是莊嚴二捨一切者謂身命財貴賤約依報內外者己身為內妻子為外四隨堪任者與人天善乃至偏小等然後皆使住大涅槃五不得彼我者彼即所度機我即能度心亦不釋上彼我七無雜心者偏小之心而行六度皆名雜染非清淨心何以故不回向無上菩提趣大涅槃故八世間所作事者菩薩入重玄門倒修凡事即其意也海德如大集中者彼經第五云爾時世尊在欲色二界中間大寶坊中與諸大衆圍繞說法是時三千大千世界大水盈滿猶如大海然諸世界國邑舍宅山林木上至色界無所嬈害悉見如故爾時水中出生無量分陀利華青琉璃莖真金為葉等爾時大衆各各自見坐此華上其華爾時出大光明遍照十方無量世界爾時大衆白佛言世尊何因緣故三千大千世界滿中大水猶如大海佛告彌勒下方過於三千大千世界微塵等國有一世界名寶莊嚴其土有佛號海智神通如來彼有菩薩名曰海德欲來至此大寶坊中故先現此瑞相云云今云海德者即彼海慧但名異耳舉八十種法門者彼經第三十一云佛告舍利弗東方去此度十恆沙微塵等世界名曰不瞬是中有佛號曰普賢如來彼有菩薩名無盡意時舍利弗語無盡意言唯願仁者當說菩薩般若波羅蜜如諸菩薩所得無盡善男子般若波羅蜜云何行云何入無盡意言如聞修行善入思惟舍利弗言云何如聞彼行無盡意言聞者具八十行所謂欲修行順心行畢竟心行常發起行親近善友行無憍慢行不放逸行恭敬行隨順教行從善語行數往師所行至心聽惡思惟行不亂心行勤進心行生實想行起藥想行除諸病行乃至得一切佛法行廣如經說善入思惟者具三十二相謂善入受持定善入分別慧善入心柔和善入身狥行等云云若依法華疏引大品十八空明空無盡大集十八無盡門明假無盡淨名云夫無盡者非盡非無盡即中道無盡者境也意者智也智契於境境智合稱故言無盡意所謂法也者既云敬重大乘乎是從因至果之法今云理法者約因果所乘之體即是佛師故便敬重言無過般若者此即實相般若是所敬之理也悉皆安住者下文云安是諸子今釋於住故云安住如函大者稱理而解故以函為喻日割三兩者如下經文說至此如海者至第十地也經云一切世間者謂十界五陰衆生前世間皆令安置祕藏中也戒是罪垢對治者自持破惡令他破惡也經云解未解者若衆生為惑所縛為應佳買反若衆生未解集諦令解集諦應鮭買反二義並通小般若者金剛般若經也此家即為有佛者只此知常住人即當於佛大品多用者以無緣慈悲以修於度品故得能嚴法身六度福德者六度下化屬於福德自行上求屬於智慧而成二嚴次結文福智亦經云方便密教者此是同體之權善巧方便方便即密也非世所知者非世算法所知故以恆河而為其量經云受持五戒者亦應云八戒優婆塞唐三藏云梵名塢波索迦此云近事男受五戒者威儀具足即堪近事出家之人故名近事男但是文略威儀具足者若粗若細皆悉無犯方名具足離欲二衆者亦云梵行優婆塞等若俗法不虧者由有正妻也加復八齊者以五戒不制過中食謂持五戒復持八戒也直三歸者但標心受三歸為翻邪向正而已志求涅槃是小分者但至化城而已若有為衆生者出假菩薩常以大悲拔苦法藥授人恆與戒俱者行於世禮而復受持五戒故云也恆與無常俱者於無常壞境如幻化則成通教但略不云舉足下足者以釋威儀謂四威儀皆具佛法也問至若此者優婆塞既有無分等聲聞菩薩復有不耶四善根是無分者由未得果故也初果是少分者若約三藏菩薩為四分者三祇百劫以為四分於義無失但不得取至樹下斷結時為滿分斷結即成佛故也苦斷塵沙者若據被機意說三乘之人在方等般若時已斷塵沙得少分名今約安位開權彰灼顯露唯至法華方得少分等名通別二教皆須以前教得入後教為用權相例二乘可知通教不云二乘者例同三藏故不別出通教八地是滿分也此是菩薩位滿別圓二教皆爾以等覺位亦云等覺佛故且不論進取亦得無分佛者理即等佛也一一法門至本迹者地住已上皆有實本能垂迹化而引實行若地住前皆是實人為權所引例一惡法者若約惡為四分者若惡冥伏在身名無分一業作惡為多分三業俱作為滿分小菩薩所作者或依根本禪或依無漏或依俗諦三昧而起神通名小菩薩此乃初教者昔鹿苑所用也是六行觀者以勝三修破劣三修為六文中云淨者相從釋耳聲聞者聲者教也小乘鈍根餐聲悟解故號聲聞緣覺者於緣緣悟解故名緣覺前來未說者指第一卷末應說也比丘不然者反質並也比丘昔日已得羅漢既無將後歎前之文優婆塞衆豈獨爾耶病去藥亡者能治所治即是非常無常大涅槃理體故也二元不稟等者此是方等般若中解圓行漸以大涅槃心修人今經中亦具此人及常觀涅槃行道之人二種行相修有兩種者初無常治常次常治無常推一是前教者更非前古今人所解云無常破常在昔常破無常在今病治俱捨者達常無常等即非常非無常中邊俱寂圓契涅槃妙理方名深樂一一句皆爾又此三釋皆約開權是故一一文後皆云聞常住藥破無常等病具此德行者具如來行及雙遊德引向涅槃者引入今大涅槃也尚無一種者涅槃理尚不當一何況二三無所軌者軌則也以實人軌於權人之法進入涅槃名之為軌大涅槃為苦者證大涅槃住首楞嚴遍法界化義如苦名之為門者藥為病門經云實不實者約諦釋歸依非歸依者約三寶釋衆生非衆生者約見性不見性釋見性方名非衆生恆非恆者只是約常無常釋安非安者約證不證釋為無為者約漏無漏釋斷不斷者約智德釋涅槃非涅槃者約斷德增上非增上者約位釋若澤洲疏云略舉六種初苦樂等是以修門觀生死法無常苦等觀涅槃法常樂淨我二實不實二諦門真諦為實世諦不實三歸非歸是折猒門歸向三寶名歸依皆離邪法名非歸依四衆生非衆生者假實門五陰非生所成假人名為衆生五恆非恆者因果門涅槃是恆生死非恆安與非安是因行門善行是安惡行非安亦可無漏聖是安有漏非安六為無為是四諦門有為是苦色法心法非色心非色心法是有為也無為非苦相對故來虗空數滅非數滅是無為斷者是集可斷名不斷非集相對故來涅槃是滅非涅槃者對相故來增上是道以殊勝故非增上者相對故來作此釋者殊乖對治之旨應如今師所釋一一互為藥病通入中道等藉財通法者因獻供得聞圓常法故也又出家法施在家財施施具九事財施有三謂時物重物如法物心亦有三謂先心歡喜施時施已無悔地亦有三謂不動無相無量定闍毗者以舍利利益諸國即是因燒得不燒所謂非常非無常亦是使法不斷絶奉召辦香闍毗意在於此因食得不食亦然附要附也優鉢羅華者舊云憂曇鉢羅此云靈瑞琰師云譯為青色拘物頭色赤波頭摩色不定不正似菖𮑱華分陀利華鮮白生水中曼陀羅是天華中國亦有其色不定如赤而黃如青而紫如緑而絳種種色變憍奢耶者蠶繭所作東天竺名烏陀粳米欲熟葉則變為蟲蟲即食米人取蒸以成綿如此絲綿名摩呵跋多此之大衣甚貴芻摩者粗布衣聲論云紵衣名轅猿音𨍮隔音車枙名也經云八功德水者稱淨土經云一澄淨二清冷三甘美四輕軟五潤六安和七飲時除飢渴八飲已長養諸根四大成實論云一輕二冷三暖是觸四美是味五清淨是色六不𭊴是香七飲時調適八飲已無患是水之用經云一苦等者苦無我味酢為苦味甘為樂味辛為我味醎無常味淡為常味此表六行雙遊為對治門三德者輕軟自在表解脫德淨潔能滌穢表般若德如法稱理表法身德所謂六行互治藥病俱亡即契非常非無常涅槃祕藏也迦陵伽衣細滑衣也又云鳥毛衣欽婆羅衣者善見律云此衣有二種一髮欽婆羅織人髮作二毛欽婆羅織犀牛尾作亦成順召之文者各各下順光召復相謂下順聲召諸優婆下順動召優婆姨者唐三藏云塢婆斯迦此云近事女若有俗女如受持五戒方堪承事出家之人壽德者正由有德而獲常壽三十二卵者金藏經云毗舍佉母生三十二卵一卵生一子一人力歒千人云云護正法之教者護正法教以填其願弘誓緣由者良以百千衆生有可度機為菩薩弘誓之由從堪任下是第三第四二弘誓現女身即當第一第二弘誓其文雖略四弘意足大局者太淺局而無其旨也太奢漫也捲巨圓反又居圓反謂為五陰果報捲局如籠檻繫閇不能得出至無上菩提五種不淨者今經中略舉三種是身臰穢即種子不淨現在父母精血為種過去煩惱結業為種大論偈曰是身種不淨非是妙寶物不從白淨生父母耶想憶念風吹淫欲之火業力因緣識託種子在赤白精中二住處不淨者在母腹中生藏之下熟藏之上安置己體大論云生處不淨偈曰是身為臰穢不從華開生亦不從苫蔔又不出寶山但從穢道出三自相不淨者衣服澡浴種種華香飴以上饌衆妙美味須臾之間皆為不淨彼命衣天衣食天食以身性故三十六物共成己身如論偈曰地水火風質皆變成不淨傾海洗此身不能令香潔四自性不淨者大小便道目淚涕唾常流不息如論偈曰種種不淨物充滿於身內常流出不止如漏囊盛物五究竟不淨者如論偈曰審諦觀此身終必歸死處難語無反復背恩如小兒經云伊蘭者應云麻也粗細兩觀者從是身無常念念下是細觀從是身易壞下六是一期觀經云寧以牛跡者寧信牛跡盛大海水不能說得此身過患大地譬亦爾過患彌廣者一一棗皆是一過患破一過患得一切德所破既多功德亦廣內外推求者三假四句推撿內心外塵以成二空釋論云二乘等者舉昔小劣顯今菩薩勝與修多羅合者雖是事觀由與教合皆非徒然不動本地者不動本地無作四弘願也可毀事迹以為利他故須呵毀獻供敬儀者如道結成順召之文然今文略但先順聲召次轉如是下順動召三諸離車下順光召其相皆略梨昌者梨昌子亦云彌離子七多羅樹者一多羅樹去地七刃一刃七尺一樹合有四十九尺七樹合有三百四十三尺大臣長者者身為大臣復是長者是故雙標寡無夫者嬪正當妃者淑未嫁堪紹妃者淑殊六反善也說清湛也報得天眼者若無天眼何能諦觀見於如來當般涅槃故知是用天眼見也增數衆者今文列衆權人多者或一人引多人或多人引一人等經云陀那婆王者此名施有是修羅種子類不損有情名施有也媱音姚美好色媱囊也媱五䍃反身長好貌漢武帝夫人名媱娥媱為正經云白濕王者有解云地神名約地體相為名也經云作清涼者而垂化下經云二十恆象王中敬重大乘等即是奉召之相一一皆具三召但諸文存略耆婆鳥應云命命鳥潤浮提是一邊者指前文已集之衆也無量世界是一邊者指後無邊身菩薩衆也後經云東方去此無量無數阿僧祇恆河沙微塵等世界是也其間是中間者是彼無量阿僧祇恆河沙等世界中間人天也此結經名衆故指中間二字以為衆相經云一切皆集者指前諸衆也應赦細戒者十誦律第一序分初云長老阿難偏袒右肩長跪叉手白大德摩訶迦葉我面從佛聞受是語佛言我般涅槃後若僧一心和合籌量放捨微細戒迦葉言何名微細戒心和合放捨阿難答大不德問迦葉言如應當了問何名微細戒僧一心和合放捨汝若不問佛汝得突吉羅罪汝當如法懺悔莫覆藏阿難答言我不輕戒故不問是時佛欲滅度我愁悶故不問乃至外道所譏等如疏諸比丘不知何者是微細戒如是言非獨突吉羅更有四波羅提舍尼亦是微細戒有比丘不知何者是微細戒作如是言非獨突吉羅四波羅提舍尼十波夜提三十尼薩耆二不定十三僧伽波尸娑亦是或有比丘但受持四戒作如是言餘殘戒放捨以是故我等一心集會籌量不聽捨微細戒我等隨佛戒故若准今經菩薩極重等持復無捨義迦葉若來者若來親自見佛佛許其捨寧得違佛故云也四天上下者雖云其天應用三天下等人以消中間之衆則以人為一山神為一海神為一河神為一合為四衆但經文迮海河但為一段又復應知五十二衆但是文略而已若細開則八部為八色界為四十方為十合成六十九衆盈縮悉通八部中文𨷂藥叉准例應有東弗西瞿者亦應北云單越何緣不至相傳者西域記亦作此說經云占婆華者即占匐華釋論第十黃華其林變白者僧亮曰貪生愛壽者以佛滅為苦今明滅非作法乃息僞反真也五色之中白是真實自然之色不可染成借事表理也悲近者已集者悲故云皆悉悲滅等此林榮茂者明此林昔日枯在鹿菀榮在方等般若已為當之先兆來至法華涅槃開權顯實入祕密藏所以枯榮一時俱變即表非枯非榮矣而現生滅者生謂榮滅即枯此皆涅槃之用上達其本等者下士謂二乘中士即方等般若中人今悲此子令同上達住大涅槃故也虗空堂閣者僧亮曰今說涅槃無一切有故名為空希有常樂萬德如虗空中有堂閣也此釋自是一見不復居御者御者坐也謂堂本人居以御物合如來應謝如堂無人居以御物譬衆生無訓導之主堂本地架者只是堂本依地而立不墮者譬如來緣謝入滅不復應世自住祕藏之中也是其有等者無表鹿菀有表方等般若收歸非空非有表法華涅槃入圓常佛性悲於中下令同上達也如堂高舉者如佛應謝不處於世也語其利益者故法華云應以如來滅度而度脫之聞見聲光者具足應云覺地動經云及三十三天者更重舉君臣耳開思藏下者若據衆生業報及無機感佛尚不能轉魔是何人而能赦者驗知皆是大權所為經云是呪能令諸失心者歎呪功能復說已自為說以勸受持或是失大乘心者或是狂亂者寧得好呪者此從迹問若據魔廣讚及自能發心驗是先佛之法如淨名經云十方世界作魔王者多是住不可思議解脫菩薩信之於此矣僧宗曰若能窮達其旨經之與呪意何所在但物心難悟以理從易故威逼呪但魔無法助化說呪以弘道也還奉國王者王國內得當還奉王佛法中得還奉於佛呪是密語者問呪既不可翻西方人既解梵語應解密意他答亦只是解其言而亦未必解其意若一向解者若一向作事解何能令人得道諸煩惱是鬼名者此約初解如識煩惱煩惱不能障三德內外三界煩惱不同即世界義無明是鬼王者若識無明鬼王則三惑皆伏即生善義善能下對治第一義諦者智冥中理無明頓破猶如王勑後一通者四悉是佛遍施之法所以佛勑遍通前四十地菩薩者如華嚴中以十王配十地即其意也得為大千之主者此是三千大千世界中心所以梵王是大千主言領小千者非大千中心此義違經論香飯奉佛此光召者此光觸彼彼飯氣觸此光飯同是一觸二俱無相體不可得又前諸獻供佛皆不受亦對順光召此佛不受故得對光經云威德悉滅者除能引之衆及深位菩薩住前當機結緣二衆威德皆滅首羅驚怖者首羅住深禪定本不合驚怖今德皆滅今為光動致斯驚怖焉更疑問明此菩薩示不思議者從本等法身起應示現經云唯深至能見者若蒙佛加下地亦見今明自力是以除之例餘方者應云例餘九方悉爾譬如帶饒身邊者此取任運能見為譬裏而非裏者鏡在身邊故云非裏身影在內故云而裏惋敬歎也鳥段反集不集俱不可思議者俱是涅槃之力故爾慈不慈者亦是涅槃之力又簡闡提者並是抑挫之辭令其發心明惡不定惡所以俱不可思議總有九瑞者初能召中三謂聲光動次悲近中三謂林白堂空池華後此衆見彼衆有三聞彼佛說此佛入涅槃是聲瑞覺地動地動瑞見如鏡之光光瑞令成九也及風者風是動相故對地經云還從口入者法瑤曰明化緣周畢表涅槃之想想有三種一明衆生心淨二國土淨三收光入口收光入口止教之相衆生心淨表化周畢國土淨明行畢如此釋者表相未明令知同異耳第二卷釋純陀品就文為三初通釋品次此訖衆問下開章別釋三初獻供下入文正釋初為二先標列章門次初意下正釋於中文自為三初中云開破今昔者破昔執權之人如劣三修破今執邪之人如諸耶外等開者於今昔二種之人顯於圓常佛性於義則密者大意不出破執明常所以於義則密於文則疏者但題壽命豈能顯於三品所明從人從事等異是故於文則疏於文則密者純陀從人哀歎等從事三相軀分於文則密從題辨常其理難顯是故於義則疏隨前人者謂純陀也隨後事者即哀歎品破昔劣三修今勝三故云則施常修次德行中文為三先明其異德次問純陀下明其讓德三問何故下釋疑初中云二恆數者是二恆優婆塞中一人也時衆三請者唯優婆塞衆及魔波旬并無邊身菩薩有三請之言因受大會者佛自受純陀供化身受大衆供因食開常者如下巧興五難善覆有為等自請住者住世一劫若減一劫等騰衆請者如經云一切諸衆生悉生大苦惱以知佛世尊今欲入涅槃金口歎者讚言善哉善哉希有純陀汝今具足檀波羅蜜大衆歎者經云南無純陀南無純陀而為我等之所瞻作即其文也當徒問答者與佛問答名曰當徒往昔誓願者下文云於迦葉佛時發願願於釋迦如來涅槃之日我當最後而設供養次明讓德為三先興問答為解釋之端次舊明下出舊解三今依下今師解初云何不先辦供而後請受何故先請已方辦供耶三今解中以少粗者八斛四斗為少但是粳糧曰粗以同類者謂與其同類十五人俱也城傍者純陀在城內住名之曰傍三釋疑為三先問次答三是佛下結意初問云昔默今默者昔即法華前阿含經中最多默受今即序中默然不受次答自為通別二解初通中云破惡得道者默受默不受皆為破惡惡破入理即第一義故也次別釋中云時衆無奇等者謂無十妙之奇特無圓常佛性之機無感勝上開顯之緣故也後供息心者猶佛默不言則後供續續而至皆謂如來不受他供應受我供若發言不受則後供皆息顯無常無勝治力者昔無常但能治邪常今日常能治無常無常即常方名勝治三結意云略言四者此即開顯四悉也三釋名為三初略釋名次然妙下釋義三純陀大士下結略指廣以示義同初云子純者此因梵文應云純子先立嘉名者嘉善也謂先立善名為最後聞常見性之先兆也次釋義中云淵竪深也博橫也所謂妙義深廣量同法界故非言說可盡又此十與法華十妙意同所謂自行因果化他能所故以十妙歎之心如佛心者佛心是覺覺即智解故名智妙檀妙者屬行妙也德妙者是乘妙始辦供等者下文云純陀去後未久之間其地忽然六種震動說十三偈者即第十經大衆問品初正獻食時但有佛說十三偈云假使烏與梟同共一樹棲等大衆說偈不來偈雖不來獻時已說故今指之以彰通妙田妙者是勝眷屬三指廣中云若依經者依今大涅槃經也次別釋文為二先談大意次此品下正開章別解初云此土雜類衆者從二恆已下衆是得作此說者第一疏初通別釋於五章所謂即別而通今是即通而別故注云云次開章為三一先列章門以示文意次生起下生起四章三通別下解釋四章初開章者曇讖曰此一品有四段一因施以明常二因大衆喜慶以明常三因文殊與純陀論義以明常四因催供以明常此與今四段意同且共置之者雙亡有無冥於中道故云開非有等次生起中云若置非求是者若於有為無為外求非常非無常但成別教義此是成非若有無即是非有無方成圓是故云即非是是即是而非者即常無常無常是常家之用所以示現涅槃而催其施義當非矣第二三者如下文三度催供也是非俱非者二俱無相即寂滅樂事窮者四章是事由事寂故其理則亡故云理盡三解釋中為四先述意次今三下釋三如是下融通四又此下成前起後初如文釋中云經論所害者若以常破無常等但是經論中相破之法非於圓融絶待正意故云所害還成待者常待無常待常常還成待對之法二施果報者常即無常無常即常非即常非無常故無差別四成前起後中云却鄣生善者上文先蠲三鄣次生三善成歸佛所者上經云當共往詣拘尸那城力士生處至如來所等所至到處者如來以大涅槃祕藏是所至所到之處且共置之即解脫德者若非證於解脫焉能置之三入文解釋中云優婆塞者法瑤曰應迹斯下影響大聖扣發至高之理此即三讓者此是奇特釋經非同常見大匠子則貴者子者男子之通稱也是都料大匠最貴也義自滿足者今文正意為請佛受供以財讓法為自行德只一行半經十議義足所以依經釋出其相三賢十聖者別教地前與而為論入空出假亦得分果若仁王經專證於圓今且傍通別教經云捨身威儀者正以捨坐儀謂廢工巧之事業更起崇法之恭貌道威儀者藏二乘威儀兼三乘共住法門威儀者別教也佛儀者圓也冠劒等者王至佛所應先下車次脫履乃至冠若不脫冠猶有王威表其有慢故須脫之單縫者單縫袈裟被著便易以表淺法天冠天衣者天在人中得道猶著天服故須脫之生忍法忍等者伏順二忍為生忍在地前無生寂滅為法忍在地上若大論第十五云何名生法忍忍諸恭敬供養衆生及諸嗔惱淫欲之人是名生忍忍其供養恭敬法及嗔惱淫欲法是為法忍此即附事以明二忍別教初心先修此二是故引之服道服者二乘也法門者別也即俗服者圓也此約開權釋權化易行者袒謂顯露權是淺近之法物宜易受故云也袒實覆權者此且寄喻示廢權顯實之相即廢即開方是文旨膝即常行者此約開權圓常之行契大涅槃祕藏實理以釋諸教諸味者前二教真為實俗為權別圓二教皆以中為實真俗為權又三為權圓為實以教約味其相可知悲感者此下四釋次第對四悉可見以我之頂者謂頂是已尊足是佛卑以尊接卑顯敬之極附事釋也自他求度者自居未足他衆全無故云自他求度智斷具足者此即常住智斷一體法寶無供之衆者此即果地三寶本是受供之人體三寶亦爾供無所供者若無無供之衆供復供誰為度無量者何故請佛受供即標出所為之意為度無量諸衆生故故請佛受如此自他者我若得主親師能為他舟航謂佛為我舟航我為他舟航故也無主是失佛者佛是法王能榮能益無親是失法者親以法財覆育於子無救是失僧者僧能示導是道非道忠無所護者主是獻忠誠處若無於主忠無所獻孝無所歸者親是孝子歸心之處既無於親孝無所歸無趣如後釋既不為主護者佛是能護榮益於我處又無主可護者佛是我所護以求於榮祿若得入無生忍位方名為榮既入位已萬德法財一切善業以嚴法身自行他悉皆備足名之為祿由失主故榮祿俱無故名為貧既無親可歸者佛以平等法身大涅槃藏為生所歸之處由佛去世生無所歸親去不歸者由親不歸則法身慧命不生法既不生則失無緣常住之慈故名為窮無師可趣者師之妙解本訓誘於生是我生德之處由失於師解無歸趣故云無訓又師不示趣者師若在世則說教示導既失於師則無教可稟導利自他故云無訓無成者謂師能訓導令解行圓滿既無於教行無可依焉得從因而至極果故云無成每於一句皆二義者約感應道交以釋求佛一體者正令求己身中一體三寶也即釋所求者若受我供一體方滿三求必遂即釋所求意也唯是專義求受供故故曰唯願食竟取滅名後涅槃四族姓者如此土崔盧李鄭之類剎利者聲論云應言剎底利翻為王種婆羅門釋論云淨行善見毗婆沙中云淨行正音婆羅摩耶毗舍依放光經謂田家首陀放光經謂工巧於義應云下賤方便菩薩根性者若圓人未破無明由屬方便根性今則尅體簡之未聞圓常教者皆名方便菩薩根性讓於已成佛法界圓人故也煩惱所覆者應云良由法性變為三道今且順方便教立名云覆蔽耳或酢等四者或酢如剎利或醎如婆羅門或甜如毗舍或苦如首陀隨文對四亦應無失亡家亡國者無主故亡國無親故亡家應更云無師故亡其訓導外則遠離三寶者由遠相從三寶自身一體三寶則失言遠至者只由惡隔善名遠又不能達即無常無常即常即非常非無常名為遠至道生曰去已所封入佛化澤州云生死為此國佛果為他國即是發菩提心求出生死名遠至他國此二釋却以入佛化及向菩提為殊背經意義說為無者只以不顯名之曰無緣性不顯者緣因若顯則萬德祿成四性等異者舉九法界異請佛法界不異始從人天者人以五戒善除四趣惡天以十善除人趣惡然三佛性者前法說中明通失三性次譬說中明別請三性故云通別又修性一一各三為通修性各異為別又理性具三為通修二性一為別雖有此通別不同然只即三而一即一而三即非三非一而三而一故云非通非別自他內外者內即自身一體外即請於佛三及以自他以顯一如無二長壽金剛者若不開常何得談於長壽既說長壽即是金剛不壞之身所以後品得起皆由攝今純陀品中佛性而起故云次第相躡廣顯佛性者只是廣顯此品佛性也緣因少分者良由未有了因了於緣因故使二乘等善但是緣因少分而已故下文云正為求了即此意也施常命等者命等在內故屬正性貧之與者二事相因故無前後雖少不同者七方便人雖深淺少殊貧常義等故離也身口七支者除身三耶離口四過是其七也就一體合者專就一人身上合經云甘露法雨者法雨語通通於權實加之甘露以表純圓智秀曰施心為種子應有下種之譬文略故爾拯者濟也因說廣濟名之為拯歷別四性者謂亦是拯及九法界衆生故云歷別如來大衆者應云充足如來及以大衆所設既少冀憑威神普充大衆衆多而供足者多入一也供少而周多者一入多也是則非多非少故云不思議不思議者一以心普故二為文殊等加持故我今無主等者國以主為覆護家以親為歸依智以師為開曉世無聖人誰為救拔事三如一者故論語曰非父母無以生非師長無以成非君主無以榮人生在三事之如一國安所以家安家安所以行李今世尊是即三而一乃視一切如羅睺羅純陀是即一而三所以事三如一故云願垂矜愍事火即師者外道師事火弟子稟師亦爾乃以事火當於師義奉釋即主義者釋是天主所以奉主如釋四種菩薩者此約開權以釋所以四種菩薩皆是祕藏之機繞佛寶山以純檀林及師子子繞純檀林及師子王祕藏三學故為世所崇仰喻戒定慧者佛月清涼可以喻戒佛山安固無動可以喻定檀林枝葉繁茂可以喻慧師子震吼能令衆獸皆伏可以喻慧分別湯相決定說於一切衆生悉有佛性如來一身者只猶世人名神為智人故佛一身遍令其解所謂遍知一切智人以破邪智人也不以色身為佛者魔亦能示現故一切種智者非但從智慧具足得名亦是種別而知令他種別而解故名一切種智自既丈夫者佛是丈夫中王故能調他丈夫七百僧祇者首楞嚴下卷云堅首菩薩白佛言世尊佛壽幾何何時入滅佛告堅首東方去此三萬二千佛土國名莊嚴佛號照明莊嚴自在王十號具足今現說法如彼佛所有壽量我壽亦爾又問彼佛壽命幾何佛言汝自往問彼自當答堅首承佛神力乃至答言如釋迦我亦如是汝欲知者我壽七百阿僧祇劫釋迦亦爾偏擲至一句者無生七百二種也二途俱失者俱失於常何者涅槃破病是待對法猶屬無常失於三點圓常佛性楞嚴亦爾以非常非無常方是正體他無相即致成俱失楞伽三佛者彼經第一云化佛者隨機赴感名之為化酬其往因名之為報此是他受用報即勝應身也本覺顯照名為智慧此是大智圓明稱於如如即自受用報身也理體無二故曰如如此即平等法身也以化身從應身流出故今但云三佛也失其正旨者般若失種智方等失三軌法華失一乘此皆諸經正意也以當現常者地人云涅槃明當常現常破於無常亦是待對之法故同前壞見法生者只是即知法不滅見法滅者即知法不生不生不滅病去藥亡若不達不生不滅還成斷常二見何者若常破無常即成常見若無常破常即成斷見無所間然者謂法無彼此體本相即何者常即無常無常即常即非常非無常無相破之失方名無間指非常至正體者指常無常外兩非為體非非今經常是所不用心首者常是諸經之心名為心首群聖之窟宅者常是諸佛菩薩及七方便人所依名為窟宅若嶷然常者亦常無常外常故今所不用常立諸法者若法華中即以實相因果為事此經即以祕藏因果體具諸法為事何者修常因獲常果是則因收萬善果攝萬德故名常立諸法常無師弟者常理不當師之與弟猶諸佛皆師此法致師弟名生淨是正法者佛性真正無諸邪染故名法二鳥雙遊者佛性無二之體有於常無常二用何者用無常治常常即無常用常治無常無常即常雙遊並息致極方止即點常體有雙照之用故曰雙遊四悉無礙者一悉即具餘三名為無礙常亦寂下出無礙相間隔即世界寂絶即第一義出生即為人佛性雄猛者衆生佛性雖在四趣及七方便無能摧滅令其改變終不可毀名為雄猛三世有法者用此一句亡於當現皆不可得是故引之開發慧眼者開二乘慧眼即佛慧眼也通別無常者猶昔未見中理所以俱屬無常開境界性者四趣惡五陰性境界性即是常住不動菩提之果故云即開果性也何人者七方便人何法者七方便所修四諦等何教者七方便能詮教法何行者七方便行位權用也何法不是非常等者無常即非常非無常常法亦爾竪徹祕藏橫攝七方便皆入非常非無常之理無邊等者橫即竪故無邊竪即橫故無底以表橫竪不二也充滿法界者即非橫竪也具攝因果者謂覽常因而成常果故也以非色為色者以九法界無常非色即真善妙即色命意密者命屬於內由意而立故命屬意開初亦爾者此約大機所見非但涅槃開常佛初成道即說於常所以八萬諸天便獲大道但小機自見於小耳常法印者諸法皆稱理方名法印行常者實相之檀故屬於行教常者初後俱轉法輪故屬於教人常者佛是常人以常人法施於常機故云必有法常者所護理境法也皆不食者此約大緣所見以答如來久雖食想為衆生故初後皆受皆食皆斷煩惱者即無煩惱身楞嚴下證中間常如即必竟空釋論證實相般若常如胎中子作用雖未同文性豈得異衆生及佛亦復如是六即者相似已前名現常分證已後名當常衆生無始本有此常即屬過去如此明常不同古人分擘以釋阿耨菩提者阿之言無耨多羅言上三之言正藐之言真三復名正菩提名道謂無上正道也法理具足者法謂圓常教法理謂祕藏常理如此教理方名具足經云有二果報無差者先受施者入於祕藏後受施者亦入祕藏故云無差依而行施者依於常理而行檀施令他得常方名檀足總非者現見初劣後勝云何而言二施無差故云不然具度眼等者以天眼與肉眼但是粗細小異所見大同故略不云天眼但斥不見三諦之眼故云爾未得佛眼法眼慧眼也得五果等者得不受食無世間五果此約小乘所見經中但云得命等不云得常命等驗於無常定知是將有漏五果為難得命者得報命也得安者五蔭安也得辨者得世智能說法也色力可解四後難至目者若例初文具化他者應云亦未能令衆生具足是天中下三難皆例此說消化者音華經云不食純陀意云若有食有消則有五果既云不食不消則無五果若無五果即成大小差別云何而言無差別耶芰角者奇寄反謂䔖菱言芰角者只是落角難耳將小初難大後即當落角勢若將大初難小後亦成芰角文中無此勢若將小初難大初則成並難大小二後相並亦爾眷屬菩薩者此即往日同行知識為眷屬實是分身教權未說且云眷屬成於應者勝應佛也百億國中即劣應如小所見乳糜與光明永異者華臺佛但以此光明入頂為食則是頂食故不同也搆差別難者五難皆是差別難也涇渭晈然者純陀所見初濁後清大緣所見初後俱清故云不二祥草者如此土茅草內有煩惱者居伏惑位是煩惱身是後邊身者從無始來至今日已前行菩薩道皆未免生死今日是最後之身入滅已不更再受名後邊身能五益他者還以有漏五果而益於他久具智斷者如法華壽量所明久成之相也成初受等者謂大緣見後滅入涅槃也豈可以劣見者前文云將大緣之後竝小緣之初今云以劣初難勝後正當難勢身有離合者正明大小各自有離合何者小離後邊出無常大有離合者然前難中大則有五以金剛為能喻佛答文中大則有六亦以金剛為能喻是則離有五六合但四五純陀既不見四身亦不見能譬金剛身也正言後邊至同者經中但列後邊身正言無常與後邊同是故合之但列三身唯五無四者唯見大五無於小四然疏中初常住之身即是經中常身破於雜食之身次非煩惱身即是法身破煩惱身即是合無煩惱身并猶如金剛故非無常身五身具足故云唯五無四又若據雙非釋者初非食不食即常身則合非無常非後邊身非煩惱非不煩惱及非法非非法並屬法身非金剛但是能喻是則離有五六合唯三身如經所引又若大破小者合非無常身半句入後邊身合非金剛身半句入常身則成以大五破小四亦名以大六對破小四若約雙非則大小俱六開合適宜故作四作五等玄而復玄者作四作五即是一玄非四非五復是一玄又常破無常又是一玄復舉九本而非迹權又是一玄本迹俱不思議故云二施等無差別入金剛定者等覺菩薩入金剛喻定破最後品登妙覺位明見佛性者最後究竟了了分明而見名之為明智斷無殊者謂初後俱得智斷故云無殊但初後時異耳是人中天者輪王是人中上勝即飛行皇帝故讚為天天有五種一是世天大論云名假號天謂人王名為天子二生天從四天王乃至非想三淨天從須陀洹乃至辟支佛四義天從初地已上乃至法雲諸菩薩解空義五第一義天諸佛如來見性窮極名第一義佛於如是五天之中最為上天名天中天但有捨財者俱舍頌云但由悲普施被折身無忿讚歎底沙佛次無上菩提六波羅蜜多於如是四位一二又一二如次修圓滿悲心普施一切物乃至身命都無戀著施滿被折身乃至無見如芥子許心無小忿忍滿不起身悟二業加報名戒滿遇見底沙如來火光三昧心生歡喜專注翹誠忘下一足合掌瞻仰經七晝夜以妙伽陀讚歎底沙佛語曰天地此界多聞室等名精進滿戒攝忍慧攝靜慮唯禪定般若復金剛座方得圓滿故頌中云次無上菩提婆沙云此等所說皆依一時一行增上說為圓滿如實義者得盡智時四波羅蜜方得圓滿次無上菩提位成就定慧二波羅蜜釋迦菩薩菩提樹下無漏觀至第三十三心獲金剛三昧名禪定波羅蜜成就至第三十四心獲盡智時具足種智名般若波羅蜜成就但名行事六度未見法界之檀故云無理檀也先已通達者本地久成示在迹中猶居菩薩位若廣說法要在八相成佛故云菩薩爾時分得佛眼者在菩薩位時已分得佛眼也我實不食者法瑤曰明菩薩實不受用迹示受用今入涅槃亦是迹受二受俱迹非等如何不判大小初後之見但云俱迹則大小不分今所不用受乳糜者昔有二女長名難陀小名難陀波羅共牧千牛於一時中搆千牛乳用飲百頭復搆百頭用飲十頭搆用飲一頭搆一牛乳煮以為糜糜在空中七尺而沸女見奇異不敢自食用上樹神佛在樹下二女不知到已遇見遂即奉獻故云小緣初見口受也若爾者難意既云去復云住既云住後云去如此去住於物何益耶亦去亦住者亦去應身去法身住非住可可解得大名利者因受純陀供則普受大會供利豈過此五果當先者在一切人先得五果也俱足故者德滿足利滿足名滿足名與法合者與一切種智理境檀波羅蜜法身合也名與佛合者與一切智般若合也名與僧合者與道種智解脫合也歎其得主者猶如忠臣心契主意歎其得師能生解故歎其得親者天性體同如羅此正顯純陀體具主親師三不滅也超第六天者梵王初請佛轉法輪純陀後請得受所供故與梵等經云純陀歡喜者喜有三意一以佛受供故喜二以檀既成入聖流故喜三為衆人所歎故喜佛不染世法者以無染人說無染法故歎聞難無主親師者主在則調御我親在能覆育我師在能開導我令三圓開發三德增長失此增長致生苦惱智度益者實智益也雲起得清涼者從真起應如空中無雲忽然起雲復能清涼於他故譬權智益物撥亂反正者曰同邪魔軍震動惱亂行人今蒙佛日照煩惱寂滅達魔界如即佛界如譬如聖君撥亂世以登正位故云反正展轉相依者從前向後由具前後置供三種無佛者謂生在人中得無上利聞法復難此三與衆人共由為易聞故不重述經云汝今純陀者汝字獨呼汝即是人身難故須獨呼又障他人者由汝獻供佛則普受諸供汝若請住無最後供致成障他汝自鉾盾者請佛久住復欲獻供滿最後檀則成自言而相鉾盾至存者法身常存如何請住彌亡者機息入滅云何請住至亡者法身常寂彌存者機興則遍法界應非存非亡者雙樹中間入滅以表之即住等亦爾文意大鉾只是常存常滅常滅常存以一唱滅三諦具足言之者訥者以存亡之體即是法界故非言能言之而存己者為物宜然取之者失者若遍取無常即失於常若取於常則失非常非無常大涅槃理故不可取也六種云云者六即明知純陀是分證十住六不知上故請住也而抑於高者抑純陀之高息下人之望經云諸行性相者性生性滅性不可請應物所宜何可請哉又性語其內即以遷流潛謝為質相語其外取百年終滅為義隱顯者用無常為隱用常為顯唱滅為隱言住為顯能常者榮遍一切處能無常者生滅宛然他境界者由現無常故成他境豈定自他者應云豈定自定他能作即自即他耶若用無常者無常自滅何須請住故舉二用者體是非常非無常若消此文應用上佛境界何常用而成相下則是即體而論用故曰二用經云三界皆無常者釋成上苦只由無常性經云可壞法流轉者此舉無常顯成空義無我觀者我以自在為義既為老病等所侵煩惱所纏驗知無我經云根本無義利者種子不淨為一切不淨根本如瑞應者下第九疏中釋此彼之彼岸者三界生死為此岸三乘真諦為彼岸又三乘為此岸出假慈悲為彼岸又出假為此岸入中為彼岸又次第三諦為此岸圓融三諦為彼岸故云度非此非彼也三諦一諦者此約即用而體一一皆約體用相即以釋非一非三者體用雙泯而三而一者體用雙照三諦皆空者俱冥法界乃至者應云一假一切假假即法界但有名字云何請住一中一切中者中即法界平等無二不當去住復云請住離欲一偈者既云思惟豈非假也六難由佛者得人身由五界界由佛說而有故大論云若能持於釋迦文佛在汝家中餘五例然故云由佛從於用生者聞佛說非常非無常即體之用故謝於佛慳結漏斷者分除三惑也喻於智斷者龍是水中力大喻定從斷受名象是陸中力等拔淵泉之下等者我是城中工巧之賤名拔淵泉之下得入住地名處雲霄之上能生物善者生常住大善也大衆苦至者五十二衆悉皆三請名為苦至亦無變吐者衆生不猒佛佛不猒衆生故用無變吐喻之聖言巧密者稱機故巧於一言音赴斯二說名密為無為是傍者獻供本意為求非有非無實理所以為無為是傍是其權巧者執有專為顯非有非無執無亦為顯非有非無俱適物宜名為權巧四悉意者初釋名為三又次第對四悉可解後當廣說者哀歎品中廣說非常非無常舉是顯非者廣舉非常非常非無常之是顯二人所執非約斯事理者二用屬事非常非無常屬理也有者無無者此牒前難家云純陀是有辭也何者汝言純陀是有者是義不然純陀之無能無文殊之無以能無故純陀之無還成常住之無故云還得是無文殊之無既為所無此無反成於有如何却難純陀應是有耶又若直出文勢應云文殊之有無純陀之無所以文殊之無還得是昔教之無不應將昔以難於今令無成有二解並通於深無損者於文殊非常非無常而無損減勝負雙捨者減會中道各執二用者於執常人知常即無常執無常人知無常即常皆為顯非常非無常正體名俱是俱非可見各有一是一非者所執之體是因名為是猶偏執常則失無常執無常則失常故或各有一是一非應如是學者觀諸行性相無常為正空三昧方便故勸其字群有勞纍者三界生死勞纍群有車輪譬苦三界輪轉上升下沉念念遷謝故以譬苦經云同於諸行者無常行也若同諸行則非法王佛以萬行圓滿為三界尊豈可同諸行耶丈夫譬剛者正也直也謂譬中道正直理也寓虞句反奇發心已去者發心謂名字已上未足者遠未足謂等覺近未足謂地住已上無常住五果者五果為身所依如舍為人所依猶未有行故無五果如無居家理無智斷者理性雖未有智斷之用而有解脫之性故云義也乞丐者割音又蓋音前勝也素絲易染者於名字慈中而求靜慧猶如素絲則易染觀行相似法也薄知名數者名字即人薄知即權而實即實而權即非權非實方實隅權但名竪達權實故也逆旅者道傍之屋名為客舍為逆國國迸散之旅所居暮合朝散矣又逆者迎也客舍是迎賓旅所居之處名曰逆旅貪者求物者雖貪貪不能得故喻如空聚焚灼愍之者有觀智者能達惡賊如有智人愍於遇者矣通名解說者觀行之人但能為他略說於慈又但是依教而修得解說名寄生一子者法瑤曰解託陰生曰寄真而無二曰一慈說已彰者能以一妙音遍滿三千界隨意即能至名為以彰慈悉倚伏者相似慈成能破通惑名倚別惑被伏名伏今言悉者通惑雖除別惑全在約圓伏邊故名為悉更互強弱者能破通惑但慈為強未破無明真解未發似慈則弱名曰更互言抱兒者抱觀行兒也向涅槃城者向大涅槃城也遇惡風雨者生公曰五欲如風雨諸結如塞若惡友如蚊虻此解太淺蚊虻蜂螫者螫案琰法師經音云螫別是一蟲名若作釋音此是蟲用所以即是一蟲名者先舉四蟲蚊虻蜂螫後以毒蟲二字來結故云之所唼食即出其用羅睺和上亦作螫讀外業鄣者外惡業塵助於內業故名外塵而為外鄣水漂妙反慈念功德者猶修圓三慈功德得入初住故也偏運者不應偏修觀念耳經云不同諸行者明如來不同諸行以常住故不應言同經云未有慧眼者未有佛慧眼也經云如來正法者祕藏理法名之為正廣有所破者一一文皆破昔三教屬偏非正誰非慧眼非正理故注云云不許偏說者以未知機只可但以大乘法答令至一切種智通論前後者相似已下皆能隨分偏圓二說後見機理者分真已上也具有無者分真已上具雙非雙照二用者方名無為所謂達常即無常等乃名圓說亦是見第一義機者善分事理故對二悉經云當言如來同無為者所謂同於涅槃無為亦是同法性無為也理寂而照者法身體安名為理寂解脫順緣名無繫縛無照而照無明即明此是理性三因性具寂照之解始末兩間者中間四即俱名中路生死拘逼者不出三界名拘輪六道名逼又為生死拘煩惱逼謙卑請益者始入名字未有觀道名曰謙卑順理求於觀行相似等解名為請益無明所厭者為粗無明所覆也言卒起者無常是本無今有之法故名卒起又燒自身亦名卒起鄰真為悟者既得似解知必入真故云悟也但在白法者似位能破六道之黑名白分真已上名非白非黑法也衣纏身者觀達於境如衣纏身顯其所離者究竟觀成二死三惑永盡故云常生安樂經云持戒比丘等者意云汝是持具足戒比丘何以同於小見即是妄語明有罪因死入地獄彰有罪果此文三十二相合云僧宗曰結果報也忉利天有三十二臣譬表三十二相八十反者譬八十種好也大梵王者梵名涅槃王即佛也亦合主者爾八十下舉例合也既以此文三十二相合主應云若爾下例合八十種好合上八十反十八不共法合上輪王又今下以好例十八悉不與下地共也初如文者一讚其說當二讚其領當故雙云善哉經云十八不共法者大論二十六云佛於無量阿僧祇劫來常用戒定智慧以修身口清淨二無失三念無失佛於四念處心長夜善修故善修諸深禪定心不散亂得一切意業隨智慧行名念無失四無異想佛於一切衆生無分別無遠近無異想平等普度心無簡擇名無異想五無不定心定名一心佛於諸法實相中不退不失名無不定心六無不知已捨衆生有三受苦衆生嗔樂受生愛不苦樂受生癡佛於三種受苦受中知苦受生苦住苦滅樂受中知樂受生樂受生樂住樂滅不苦樂中知生時住時滅時四威儀恆在定名無不知已捨七欲無減佛知善法恩故雖具衆善而常欲集諸善法欲度一切名欲無減八精進無減佛身心二種精進慈悲度人未曾休息安住寂滅不增不減名精進無減九念無減佛於三世諸法一切智慧相應故滿足無減故名念無減十慧無減佛得一切智慧十力四無所畏四無礙智成就圓極名慧無減十一解脫無減佛具二種解脫一有為解脫謂無漏智慧相應二無為解脫謂一切煩惱都盡無餘名解脫無減十二解脫知見無減佛於諸解脫中知見了了分明智慧無量無邊名解脫知見無減十三十四十五佛一切身業一切口業一切意業隨智慧行佛一切身口意業智慧為本得無礙智說不可盡無不利益一切衆生三業寂靜亦名三不護十六智慧知過去世無礙佛智慧照知過去世盡過去際所有一切若衆生法若非衆生法悉遍知無礙十七智慧知未來世無礙佛智慧知未來世無礙佛智慧照未來世盡未來際所有一切若衆生法若非衆生法悉遍知無礙十八智慧知現在世無礙佛智慧照現在世盡現在際所有一切若衆生法若非衆生法悉遍知無礙言行相應者純陀住十住地如行而說故云相應正見正知者正見屬定正知屬慧猶內具定慧致能外用定慧益地故云正護正說常住因緣者修行常住之因緣也止一言呵勸者上文殊但以先呵次歡耳聖人但說己法者純陀住十住地說自證法名為己法若未親證說者名說他法妨於大後者妨礙也遮也斷也明純陀用小初而難大後如來廣答二施無差及文殊與純陀互執不契圓旨衆共置之如此之惑正為遮斷後來執小初以難大後及將大後以破小初之徒息於此見令知二施果報無差乃是雜衆者意云此是法華後更說般若洮伏之人來至涅槃會者名為新衆汝勸我覆等者是則文殊覆實而用權純陀覆權而用實不能盡其用者此有即體而用故不可盡不能罄其極者此無即體量同法界言語道斷故無能竭言所不洎者即體而用言不及於有即用而體言不及於無第一義置者此即泯用皈體名第一義何者如來涅槃非有無所測故且置之莫知其正者其正者達者則知互執皆為顯非權非實涅槃正體迷者不達互執之旨故云莫知為人置者獻供為生物善故屬為人又澤州云正其論之暫停非永故言且置經云根本種子者檀是法身種子時物是檀種子理涉貪者意云大衆不涅槃復不須食二並不須應是自貪故也文殊同他見者同諸獻食人見也印其呵者印其呵當也蒙佛悅可者文殊意云汝說無為蒙佛悅可我說有為亦應悅可既不悅我則是如來有愛憎心故偏悅即作伏竝者初並云如來悅於汝不合悅衆生衆生既被悅於我何不悅次並云如來既悅生理應悅於我於我既不悅如何得汝據此悅皆偏圓悅言無旨即是伏並之相經云汝不應至悅可者純陀意云我是說契機理如來悅可於我非謂如來有愛憎心偏悅於我經云俱行顛倒者非但汝說有是倒我說無之是倒何以故謂有悅可是愛憎故故云俱行譬顯如文者寄喻顯過明世人有愛念故雖復行化饒益他人若竟不竟忽然放捨還益所親佛無此念故對過彰離普淨悅可者等視名普無到曰淨冶城等者冶城兩譬皆是下不知上此釋為得雲根約法身義稍可用餘皆不可則言盡等者言盡故不可思議窮故不可思諸瑞者指第一卷中九瑞扶上化下者稱佛教名扶上合機宜名化下經云非無因緣者一令催供二必入涅槃即是因緣未諾者良由悲塞未暇發言故云未諾止亂者應思法利如何啼哭悲無所益亂心迷道非行者所宜當觀其身釋無益之旨六譬空者此六悉皆磨滅故空三譬無常者體皆無堅念念滅故三譬不淨者取已熟壞果段段肉悉皆爛壞故以為喻兩譬無我者織盡由經上必須下皆不自在以喻無我經云猶雜食者苦空無常等五法利合食則煞法身慧命故當觀等經云諸佛法爾者化儀之法應謝必滅故云法爾經云至是處者皆至小涅槃處及大涅槃處也涅槃者知化佛滅名知涅槃知真常存名非涅槃又現在不知如來化滅故云不能思量如來涅槃亦不知佛真身常住名非涅槃携友共辦者道慧記曰純陀迹未善解設供之法故携文殊而去又朋友者同處師門曰朋同執一志為友綢繆寒濕熱䦚飢飽相知者也承保四年四月二十八日以華林房本書寫已了以同五月七日一校了
