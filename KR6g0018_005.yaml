body:
  text: 聖行品初文為二一釋題二就文為三下入文解釋初文自為四初次第者又二先序舊次今明下正釋初又二先序舊次義皆下破初云前略廣門等者純陀哀歎二品為略門何者純陀以無常難常如來略答因施獲五事常果哀歎品中以勝斥劣而獲常樂我淨所以二品俱名為果從長壽已下為廣門十德聚功者聚集十功德在初地已上專為獎勸行人令其慕果行因耳五行明有行者破云為是二乘行為是菩薩行名有行耶十德明空行者破云為是何教空行為地前為住前空行耶又有深州云聖行品者上來第一顯行由序下正辨行行別有三初盡十德明其隨緣造修之行二師子一品明其捨相入證之行三後迦葉品辨證實成果之行亦名證實起用之行隨緣造修外國名準法修成分捨相入證外國名難諸放逸入證分證實成果外國名慈光善巧住持分名雖別異其義不殊破曰造修之時豈不捨相及證果耶此用他師之義如第一卷初已破次破中前明圓極之果者且破因果不相應也圓果即指前涅槃果也五行是因者破云五行若只是因但成次第五行而失圓故云不應言佛之所行破十德亦爾十德非極者十德但是分果而已開空法道者聖行是開初地已上畢竟空法之因不可定言唯是有耶天行是第一義理者天然第一義空理是則五行皆空如何判云並是有耶嬰兒行不來不去者若定來定去不名如來之行以稱理起用故來無自性豈非住畢竟空耶密語亦爾為皆痛非聲聞緣覺所知以聞一句半句見少佛性者半句謂常住二字及一經於耳既云見少性即是妙有豈獨空耶次正釋中上因食等者上催供受食以明涅槃不食施即是教故令依教行行所以五法名之為行不病故體顯者應云見性故體顯即涅槃義付囑焚身者此明後分流通意也次釋名中云聖者具足應云聖行者真不知俗者別人十住入空時非不知所破六法界能緣生之俗但不知十行出假之俗一智一切智者行是所行智是能導所以智行雙辨法華云佛子行道者彼即開權顯實佛子人多從通者世人見經中有聖行等只作一途通釋而已不知經具別圓二意涉有同塵者從初發心即以大慈悲熏心在二十五有而能拔苦與樂自行無染化他不著故塵不能染所治立名者示為病行以破他病故也就圓人立名者如來是圓滿人也不住名行者自行未極不住分果以分得故不著他化亦然所以自他俱名為行五行一行者以五一並釋故爾三枝本中云乘理自進者若云教乘行乘則在住前初住已上方乘理乘依理進修名為天行餘之四行亦復如是者依天然理修戒定慧名聖行從始至終慈悲具足名聖梵行由聖行故證天然理名聖天行自除己惡令他除惡即聖病行生己善生他善即聖嬰兒行餘三行具五例爾不可一向者五行皆具通別二義束散者只是總別耳上能束散於下者破意若云一五相即束散自在佛能示之菩薩因人豈能爾耶今文正明別圓二行從因至果但云一即五為舒五百一為卷束散而已於行人有何益四説不説中云不逾一理者謂不逾法界天然一理如普賢門法界品彌勒樓閣等即其相也天之行者依天起行名天之行行即天故者由證天然之理任運契極當體得名名行即天為天修行者住前修行為顯天然之理故名天行因天行進者初住已上無功用行自然流入薩婆若海故云因天行進遠指於天者別人初心即遠期初地已上天然之理而修次第五行亦得名為天行有通有別者住前及別遠指名通行住地已上名別行道後自彰者若菩薩所為通地住已上如來示現則在妙覺證後究竟能為故名道復後澤州云病行一種一向不論何者是乎有人釋言前品所論五種之人有病行處是其病行彼是聲聞緣覺病行何關菩薩又前所論離病之行今此所教治病之行與前人大別何得指前又前品中未標五行以何義故預説病行判無斯理梵行品末闍王懺罪治病之法應是病行故下文中世王煞父即是心病身瘡增劇是其身病佛放慈光治其身病為説妙法除其心病治此兩病故名病行問若彼兼論病行何故偏名梵行品耶答此例亦多如上如來性品之中具明多法題章偏名如來性品但經立品差別種種或有從初或後就後或有據中或復當相非可一定涉公云應取前品如來現病品以為菩薩所學正行是病行也下文所説皆是應現故於下文更不再出如嬰兒行現同嬰兒如病行示同有病依此及以今師判釋故知澤洲未曉病行之義却將能治之法以為病行殊背經文先標次第者今專以次第顯不次第所皆先釋次第次釋不次第澤州云初先勸學五行復有一行謂如來行下辨所依依佛行法經云專心思惟者思由教起故言是大涅槃經專思五行即因人者一行是如來因時所行之行故云因人即因而果者因用果法也即以涅槃為行者以大涅槃心從始至終常觀涅槃行道故云以涅槃為行雙釋戒行等者以次第五行及一心五行一一文皆相次而釋先釋次第竟次即釋一心雙雙並科故云雙也一建心者要期建志猒欣上若從聲聞者一佛滅後四依為聲聞二例如大品佛在世加諸聲聞説摩訶般若此經亦應然然終取四依義強遇瞻病者此用大論文欣厭者欣涅槃厭居家等經云復有方等者更別出前人所行之法故云復有經云妻子等者是縛著緣舍宅等是鬪諍緣珍寶等是放逸緣奴僕等是憍慢緣象馬等是煞害緣又出家功德經云若放男女若放人民若放奴婢若自己身出家入道功德無量無邊假使起七寶塔高至三十三天所得功德不如出家何以故塔有毀壞故若自出家及以放人展轉示導一切衆生永劫無窮慧眼之性歷劫無壞無窮無盡畢成佛道第二立行者若不立行建心徒施終無得果之期四重等者律中五篇者一夷二殘三提四提舍尼五吉羅若開為六聚者偷蘭遮聚此聚為因故三則居第三若開七聚此聚為果故五在提舍尼下居吉羅篇上吉羅却為他方便故云為辨成他他成故爾開吉羅為身惡作口惡説即七聚也今經以大涅槃以修戒所以五篇次第不同於律經云譬如等者有人喻菩薩常持喻戒大海喻生死羅剎喻諸煩惱心經云汝寧煞我者寧煞我陰身也捨墮經宿懺者先捨衣竟經一宿已明日方懺今時多分當日捨衣當日即懺云云止觀第四者彼明犯戒不出愛見二種懺悔亦爾經云則為具足五支者只於前律儀一盜一淫等上以大涅槃心持則具五支故云堅持根本者謂四重由此能為道定根本若此具足復由五八以為根本經云前後眷屬者十三僧殘列在重後為後眷屬所言餘者捨墮已下及諸經所制皆名餘戒何故爾良猶菩薩於律儀上用大涅槃心修行戒行以二方便皆為防護根本名遠資成所以前後俱屬方便經云非諸覺者即是不雜定共戒也戒體是覺離惡覺故名覺清淨即通指欲散俱名惡覺與色定俱故名定共經云護持正念者即四念處道共戒也種種方便令入無漏故名護持初離耶見故名正念無諸見穢故名清淨從相似來通屬此戒小乘從燸等乃至羅漢通名道共經云回向者佛共持非諸凡小之所能持回己與他回因向果至此方得名為具足前後眷屬至起者若律中欲趣淫境初起心時結吉羅罪身口進趣時結輕蘭至彼摩解結重蘭至並為四重前方便成事即結夷後更起慶快心為後方便結吉羅第二方便亦爾下三篇唯二方便輕吉重吉若正罪成方便則謝若果蘭者名獨頭蘭謂用人皮石鉢貫下部嗔心裂破三衣即結輕果蘭若破僧等則結重果蘭今文則以偷蘭遮為前眷屬此語因蘭能為重罪前方便故性重為本者謂不待佛制性是善惡名為性重若不持性戒煞生須償命而障聖果改須等持澤州云根本業清淨者離根本不善業道戒如不盜不妄語等是前後眷屬者業道前後方便也非諸惡覺者離八惡覺一欲二恚三惱四親里五國土六不死七輕慢八族姓是也護持正念者謂修六念助成戒行回向者用戒求佛也此亦未能異前五篇並律儀戒攝也與理相應者以大涅槃心念念與理相應故名理戒正令凡人行之經云拘執茸衣者四分律云世尊初夜行道有一老比丘欲得世尊臥去世尊至中夜不臥此比丘即被細黑毛毯於中坐以怖世尊世尊種種呵責經云根子等者十誦律二誦卷第四云根子者謂藕羅蔔蕪菁舍樓樓偷樓樓如是比種根生物莖種子者謂石留蒲桃楊柳沙勒如是比種莖生物節種子者謂甘蔗竹細竹如是比種節生物自落種子謂蓼阿修慮波修盧修伽羅菩提那如是比自零落生物實種子謂稻麻麥大豆小豆偏豆如是比種子生物若比丘根種子中根種子想生中生想若自斷自教破破自燒波逸提波逸提此云煮燒覆鄣若不生悔過能障礙道餘四種子例然然今經中所列子子即稻麻等也唯有子名全不同此由外道耶計言五生種悉有壽命嫌沙門釋子無慈斷命佛護彼意制諸比丘不許壞生種子故得名為息世譏嫌戒象薦者以象毛為薦馬尾編織為薦席也丹枕者古人練丹為枕欲求長生枕之而臥也拍毱巨六反毛為丸以踏戲者也編𢍉連反塞蘇代反如法疏記此起近者起曹子建爪鏡者以藥塗爪呪之能見吉凶經云護持禁戒者大論名不缺持於性戒乃至四重清淨守護如愛明珠若毀犯者如器已缺無所堪用佛法邊人非沙門釋子失比丘法得清淨戒即論中不破戒謂持十三無有破損若毀犯者如器被裂善戒即論中不穿持波夜提等若有毀犯如器穿漏不能受道不缺戒即論中不雜戒論取缺壞不住故對根本經取微有缺損故對不雜釋曰雖持律儀念破戒事名之為雜定共持心欲念不起故名不雜不析戒即論中隨道戒無著戒隨順諦理能破見惑無著者即是見真成聖於思惟惑無所染著此兩約真諦持戒也大乘戒者即論中智所讚戒不退戒隨順戒即論中自在戒則約菩薩化他為佛所讚於世間中而得自在是約俗諦論持戒也畢竟戒即論中隨定戒具足戒即論中具足戒此兩戒是隨即首楞嚴定不起滅定現諸威儀示十法界像導利衆生雖威儀起動而任運常靜故名隨定中道之戒無戒不備故名具足此是持中道第一義諦戒也彼此窮底者因心即轍實相法界之理果心亦爾故云窮底若論報因者從初發心為無上菩提而修行者名為報因遠證涅槃果名為報果又總於習因習果俱名報因遠感大涅槃果名為報果習因者地住前為習因入住分證法身名習果又真因所習亦名習因感大菩提極果常住法身名為習果或九或十如法華玄文釋今不近不遠者不近非天不遠非極果即初地住為習果證道同處者一取同破一品無明二以圓融別故同在初地行以自在者別人十行出假名自在無所畏地者初地離五怖畏於雙義便者作別圓二種釋於經文便俗諦中善果者正當俗諦體俗諦中惡果者此惡為俗所破生死善惡者牒前俗諦是有邊涅槃人法牒前涅槃諦是空邊不為此二所動等三障皆除者分段變易二種三障故云皆除七財等者聞者十地聽法雲持雨十方佛説法一時能持故名聞也信者深信堅固猶若金剛即圓因也戒者十地所得涅槃戒經云唯佛一人具淨戒餘人皆名汙戒者定者即首楞嚴等定進者念念深入薩婆若海捨者常行捨行慚愧者菩薩見佛性了了故慚第一義天諸佛是無上行人愧此勝人名為愧人開善釋定行等者破意者念處屬慧只是俱解脫人雙修而發定果非謂修定聖行人專作四念處觀應用八定者謂反並破也既非根本者非單根本禪以持勝是亦有漏亦無漏禪此持勝發者一知息入二知息出謂入至臍出鼻照之不亂知入輕出重入粗出細入滑細出澀入冷出暖三知息長短大論五十三云如旋師旋師弟子知繩長短四知息遍身知來無所從去無所至入不積聚出不分散若約根本禪是粗細住五除諸身行若約根本是未到地八解解身開倉心眼即見三十六物肝如淥豆心如赤豆腎如烏豆脾如栗大小腸道更相應通血脈灌注如江河流內有十二物脾腎心肺肝膽腸胃生熟赤白淡中有十二肪膏腦膜骨髓皮肉筋脈膿血外有十二髮毛爪齒哆無支反淚涕唾垢汗便利故頌云外現三四醜身器二六成中含十二穢而出入息統致其聞不淨無常苦空無我一切身行皆休終不為身而造諸惡是名除諸身行若對道品是身念處若對根本心眼初開是覺支分別三十六物無謬是觀支六心受喜對支今喜不隱沒無垢味即法喜也七心受樂者非受樂知樂中三受皆苦無樂名樂支八受諸心行是一心支知衆心是一心不同根本計實一心也此三對受念處九心作喜前喜從三十六物生此真就心作喜對二禪十心作攝得入一心持勝有觀慧恆攝喜心十一心作解脫對三禪特勝有觀慧則無愛味故言解脫此三對心念處十二觀無常對第四禪十三從觀出散對空處滅三種色如鳥出籠故言緣空言散雖緣空亦有觀慧十四觀離欲對識處緣空多則散散名為欲特勝觀慧離是散心十五觀滅對無有處特勝有觀慧觀識若多若少皆無十六觀棄捨對非想非非想處辨識處及無所有處更有妙定名為非想非非想凡夫妄謂涅槃佛弟子知其離粗煩惱而有細煩惱而無愛味故稱淨禪皆名法念處然今經中據大體為言亦不具於十六經云誰有是我者徵責我體於前所觀不淨物中阿誰是我我為屬誰者責我所屬於前不淨物中繫屬阿誰住在何處者徵我所在誰屬於我者責法屬我物破色即是我次破色是我所三破色中之我中之色八背捨觀者然經中且約大體而説不盡具八背者猒下地及自地淨潔五欲捨者捨離著心故名背捨八背捨相如下經自釋除却皮肉者觀心速疾故言除却皮肉即修相也唯觀白骨證相者除却皮肉唯觀於骨即是捨相此似九相者善壞法人修九想觀一脹想二壞相三血塗相四膿爛想五青淤想六噉想七散想八骨想九燒想此人但求斷苦燒滅骨人急取無學不欣事觀今菩薩以大涅槃心從不同於小亦有其義者由觀力故諸禪互發復似勝處觀者一內有色外觀色若多若少約依正二報一尸為少二尸為多一衣一食一山一河為少等二若好若醜者善業端正為好惡業鄙陋為醜乃至依正俱醜骨人所放八色為好又八色亦醜被練為好好醜皆不淨此兩初禪攝三若內無色相外觀色若多若少若好醜勝知勝見內滅骨人外有八色又有依正多少好醜如前説四勝知見者此心勝色為色所縛心能轉色故言勝見者淨不淨等皆於己心自在觀解成就故言勝知此兩二禪攝復四勝處在四禪中成就三禪樂多不能轉變就聲聞法如此於菩薩法禪禪轉變大論云青黃赤白此從實法瓔珞云地水火風此從修名互得相攝此四勝處內外色盡但有八色唯有多少轉變無有好醜轉變見已即問者若少背捨觀成雖有先而無佛既問於佛撿是大涅槃心修念處能斷結者從念入四如意足方得斷名此即調停道品也法忍者達此法名法忍忍此法故名法忍出經者誤者他云此文應在戒聖行文後定能見機者此師意云得法身方能見機為毀戒事圓定意者此文正明修首楞嚴相似之定即戒而定即定而毀正明此意得破戒不者寶亮自初依人雖復信根永立惡未得真解欲為利益之道得破戒不解言菩薩寧當自墮地獄不令衆生退菩提心以此因緣可得破戒而不名犯即散而靜者散謂戒也靜即定也又今文觀行位中亦能為之即是觀行住首楞嚴經云頗有因緣得破戒不者忽有利他因緣得破戒不此是約未知機位而設此問經云何者是耶何者是得毀戒之相願佛為我指事説之經云有菩薩知以破戒者知是知機若論知機須在出假位若論實無愛喜之心專為護法凡不知機亦得為之今文通於觀行已上方可為破戒事事爽理順者於道理之也經云仙豫者若據如前文云我寧一劫若減一劫墮地獄由在凡位行菩薩行以行煞故施其五百劫壽只由婆羅門至地獄時有於三念得生甘露鼓國自身不隨𮜼在凡位雖然此利不可一向經云安施已訖者乘事供養已訖經云令人同於虗空者意云大乘無有實録同於虗無開四為十六者如一諦皆四謂是苦苦因苦盡苦對之是四四一十六也大有所關者今家明四諦等遍於四教四門四教四門四悉明諦不同又遍五味五味之中被機增減顯密不同八教盈縮具如法華玄所明今一往對三藏者且約初用生滅四諦義與藏同名為一往若二往者今經以大涅槃心修行四諦非令同藏對別緣説一實諦者一實是別人發心所期故以一實對別合智無所有者只是能所皆空非境非智者雙非小乘境智也非漏者非我苦集非無漏者非小乘道滅道諦是有為無漏滅諦是無為無漏非因非果者苦集是世間因果道滅是出世因果今非此等因果故云也能所合者無作四諦是所趣前三是能趣又前三是能入無作慧是所入又若為實施權實為能出前三為所出若開權顯實能即是所故曰合論略又六者澤州釋四聖諦略以七門分別一辨諦異二釋諦名三諦體四明次第五宗計不同六常無常七漏無漏初辨諦異者諦觀有二一有作修二無作修有作修者自共相觀對分段生死苦苦因苦滅及滅苦道修四諦也無作修者謂無生觀對變易生死苦苦因苦滅苦道説無作四諦也第二釋名者有作四諦取其諦相而觀名有作四諦無作四諦不取諦相不作相觀名無作四諦就有作中總名四諦者聖是能證諦是所證聖之諦故名為聖諦總名四聖諦者是帶數釋也別名者逼迫名苦或無常故苦或違聖心故苦苦即是諦名為苦諦持業釋也或苦是法諦是苦下行相苦之諦故名為苦諦依主釋也集諦者招集苦故云為集集即是諦名為集諦持業釋也或集是苦因諦是集行相集之諦故名為集諦依主釋也滅諦者息三毒火故名滅滅即是名諦為滅諦持業釋也道諦者涅槃城路故名為道道即是諦持業釋也無作四諦唯同此釋第三出體者依對治論云苦諦者謂諸有漏法有情世間及器世間俱名苦諦也苦集諦者謂諸煩惱及煩惱所生諸業俱名集諦也滅諦者真如境上滅五住煩惱滅二種生死是滅諦也道諦者修道究竟道也第四次第者略有三種一言説次第如四正勤雖是同時遂使前後宣説不同第二修觀次第如念處先觀身次觀受後觀心最後觀法由此説身受心法第三入觀次第即如入見道去先觀苦果令生猒慧即是苦諦次觀苦因令其斷即是集諦後觀苦滅令欣趣證即是滅諦最後令觀滅苦之道令其修習即是道諦由觀行中如是觀察苦集滅道所以教門如是次第第五宗計不同者小乘宗中説佛如來王宮生身是其有漏善業所感為他煩惱之繫縛如無比女見佛生貪央掘魔等見佛生嗔增煩惱漏名為有漏由此佛身約苦空無常無我四行相解大乘中説佛王宮生是佛化身依本願力衆生善根力依法身現法如如如如智二種法身之妙用也體是無漏道諦所攝若依金光明經攝論等説如來報身是凝然常無有變易是無作道諦解脫涅槃即如來身亦名滅由此聲聞觀苦無常無我不淨名為顛倒準此有作道諦定是無常無作道諦亦有常住第六明常無常有作四諦三是無常滅諦是常無作四諦苦集無常滅諦是常道諦有常無常在佛即常涅槃無常第七漏無漏者有作四諦苦集唯有漏滅道唯無漏無作四諦苦集二諦通漏無漏三界煩惱所不能繫故是無漏無明住地變易未盡故是有漏滅道二諦唯是無漏此依法相宗釋法華玄文第三卷初已廣破訖若消今經殊不相應故具録之令知同異耳制立者制名立法也生死盡者且盡分段也又息苦心集名寂滅經云道是大乘相者今經以大涅槃心修於生滅無生此即用三藏法非三藏中人所以三藏名為一往釋用者亦名功用亦名作用二釋並通現相者寶亮曰粗著易為現相因謝果起轉因得果為轉相果報顯現者三苦八苦相彰可見名為顯現因相微隱者念念之中業相集續名為轉變集續成就而相難識為名微隱見著知微者見現在知從過去一念無明習集因心起從微至著者見現在一念起煩惱而成作業必招苦果皆據現事者謂三苦八苦也兩心轉變者由業招果從果起業習續不斷名為兩心又只業力念習續名為兩心六胞增長者若云五胞謂二手二足及頭六者兩耳兩眼口鼻又頭等六分也種類者身之種類也年疾增長者年增長疾增長也雜病者一身常有三五種病名為雜病從外入者增加舊病名為客病經云惡對者對來無避處也經云時節代謝者病時若至不由於人要當受之代謝者今日不病明日必來又今年不病明年必至病為死因代謝必然經云放逸破戒者前是約事故更約心法修行以釋諸文皆爾二因互別者一人好施而煞生雖有財而命短一人如放生而慳尅雖長命而貧乏無復善根慧命者無出世善根財斷常住慧命經云盛陰苦者若後總七苦名為五盛以五陰能盛前七若別有體者正約報陰名五盛陰方便五陰非苦體者從於報陰上起於善惡即為方便五陰今五盛陰苦專約報陰為體今別出此體者此之報陰不常有於餘七無餘七苦即為五盛陰苦經云觀於初生者以見初入胎時無常生滅等即是過患如譬生果者世間生死果也有多榮華者無論貴賤而皆自謂以為榮樂菩薩撿責者汝從何處而來為自生等耶生果對智者我乘來也經云各隨意云者任生自還生任死自還死故云各隨意云經云還其所至者明此生死本具迷真起妄今為菩薩觀智撿責返妄歸於小乘大乘真諦所止此是三藏菩薩觀智撿責未是歸於大乘心已還凡夫乏善者世善出世善俱乏撿讓凡心者此是生境自述我先以被菩薩所驅今亦欲凡心欣於聖知凡夫苦欲受之而不肯離即是讓於凡心不欲受之初欲修般若者三祇菩薩修般若也有生天果者應云有人天果深行呵責者通於八人見地已上菩薩呵三祇菩薩實有此事者實有生死事也相續常者凡夫橫計相似相續之壽大庾小庾者音愈梁朝時人父名庾堅子庾信信為候景捉去為奴經十年始得歸歸父子相見例如責滅者生住異滅之滅也初地菩薩未免生死者此約悲增菩薩以釋悲增菩薩入七地方斷分段生死尚不能生死者明此菩薩達生死即涅槃故生死何能等者明道涅槃能非生死故磐時者磐廣也時高也生死碎散金剛不能壞住大涅槃菩薩金剛有十句者以世人不知及保著者多故須十句傷痛乏善法者謂乏世間善法其路無窮者生已歸死死已復生轉回無際故曰無窮十二時者晝夜冥冥往而無返以內昏故者唯有無明而無智慧必有來處者乘業而來也因中説果者樂是苦因由樂壞故苦名為因中説果眴疏者淨名疏引大論云天眼下眴上眴今復是一文立毛魏王珠者如春秋中齊威王二十四年魏王問齊王曰王之有寶乎答無魏王曰寡人國雖爾乃有徑寸之璣十枚照車前後各十二乘何以萬乘之國而無寶乎威王曰寡人之謂寶與王寶異有臣如檀子等各守一隅則使楚趙燕等不敢輒前若守竊盜則路不拾遺以此為將則照千里豈真十二乘車耶王慚而去即其事也帶中者珠在衣帶中也此各為時所重者只為緣不同何可會通䇿音策今昔義乖者昔説五陰之上有於樂及不苦樂今日何故説言五陰唯苦無樂即是相乖觀師分為二者今家用他分文應云文為二先作難次答總非者五盛陰中有於樂受何故一向唯苦故云不然同據樂緣者既云色等能為樂緣樂體樂因何故但云唯苦無樂耶經云若有求者應云求苦不得容可純苦求者皆得如何説言唯苦無樂經云有人能修行等者修即不離五陰即是五陰有樂何故説無樂耶今具舉六根者如樹提伽於人中受天報故知六根所對不無樂也經云持戒則為樂等者難意者諸樂皆不離五陰世尊何故説五陰無樂重結小乘者二乘菩薩皆由昔日觀陰而得於樂今日何故説云唯有於苦歎其所問者由汝問故則知我昔是隨他意語今是隨自意語汝若不問衆生不知所以歎之五難玄解者但答衆生於下苦中橫生樂相既云橫生樂緣樂體樂因皆是橫生想耳不復相違者昔但隨他説有於樂若隨自意今昔俱苦故不相違還難佛解者難佛説壞苦中有樂受之義佛意以輕為下者佛則通以人中已上五盛陰壞苦中輕微為下只猶昔日隨順衆生説有於樂實是衆生橫計樂想迦葉則將三途尤重為下苦應有樂想為難此即名為以重為下苦三途之中應有樂想者迦葉謬領意者下苦實無於樂世尊何故説有若言者則是錯説所以更倒並之據事難者如人應受千罰初一下竟應已是樂若不是樂何故説言於下苦而有樂想世尊答之義則不然如人應受千罰初一下竟餘者盡放名為於下苦中而生樂想汝言初一下竟是樂想者是橫計耳汝何謬領者前領既謬倒並亦非但然其千罰之難是汝橫計餘二並亦然故不答之是得意領者前若不領佛不應述驗其佛述知此是領道理如然者今是隨自意説今昔俱苦道理定然點三受者點謂點示也單點者一苦對一受也無常所侵者念念遷流即是行苦並皆諍論者若不達隨他説自今昔起緣之説但計有無只增諍論更餝其辭者更廣前問疑從諸佛世尊久於無量下是飾辭之相以求答佛果生因者謂緣因也佛果了因者以了了緣菩提方不同古人一向無緣經云能為樂因者隨情之樂因也緣既不定世間之物能為苦樂二緣不可定執故云也經云菩薩能知是苦因樂因者菩薩解苦無苦而為樂因也聖行品中經云是陰因緣者謂六因緣也繫地之惑者愛為九地之惑華嚴云等者上半明苦諦何者由達業煩惱之因不生不滅苦果之諦本自無生此即無生之苦諦故云無所住也無明下明集諦無明之體實無彼此亦無去來故云無所行而復十界衆生無不具足故名平等行世間此即無生之集又十二緣等者達十二因緣不生不滅一切衆生等有方名集諦若十二因緣下明凡夫是集非諦是愛陰身者從陰起愛而成作業還感未來果即是還受陰身經云堪忍專著者忍謂忍受愛著不捨故云專著經云業因緣愛者宿業故起愛隨所習也煩惱因緣愛者如人多嗔常愛兵器苦因緣愛者如人遇病愛針灸也為脫重苦者如於下苦橫生樂想是經云分別挍計者耶推橫計遍一切境而生愛著故名無邊菩薩對二乘簡者此是大涅槃地住已前菩薩若復隨情至俗者此約出假故得俗名四經者緣起經説業能莊世隨業受報論義説憍慢心故流轉生死俱舍論云解為何義頌云解六三和生謂眼相應斛乃至意識相應解解對雖一據識分六三和生者釋解義也謂根境識三和合所生能有解對致令外解熾然流轉緣此識心下釋無明為因可知四識住者俱舍疏云如經言識隨色住識隨受住識隨想住識隨行住四是所住識是能住故名四識住也經云諸因緣者指前憍慢等非不為苦因要因於愛以為根本經云大臣眷屬者譬前文業及憍慢等經云拔舍利弗無上根本者如大論云身子施眼為他腳蹈以愛眼故退菩提心住二乘道名拔根本此一亦名販聖非全屬凡四諦中間者生滅四諦中間也妄生死用無生慧忘前生滅苦集即成無生苦集忘涅槃者以無生慧忘生滅道滅即成無上道滅第二三四者無生無量無作三番皆以前生滅四諦為境故於此中斷簡若見有苦下出生滅相既解苦下達生滅即無生集從苦生者先舉生滅集相既解苦下達生滅集即無生集諦滅本不然即生也謂滅本無生也二邊無生者從世間下出二邊相生滅苦集為有邊生滅道滅為空邊故云出世因果亦復如不生其意無量者謂於生滅四諦而達無量無作此之四種遍於五時增減隨機盈縮不等來至今經皆以大涅槃心修成歸真實圓常性海故云也出第三番者亦只於生滅無生即達無量無作二番之相為下文廣釋故不委論舊本者謝公未治本也此於二乘等者此即凡夫於二乘與之同有諦奪之凡位但有苦而無諦唯二乘與菩薩道滅者藏菩薩同二乘修觀但簡二乘則兼菩薩故別出通教不云二乘者二乘同菩薩修觀但讚菩薩之勝則兼二乘亦不別出斷章門者謂能斷也離章門者三藏滅諦從所離苦集得名也菩薩具知德者菩薩具於智斷二德方名滅諦而復四等四德俱備故注云云常無常者常即耶常無常治常即喻明也又粗細之物者世間因果善法為粗出世因果善法為細經云常等者初法相分別生死之法無常有為涅槃之法常而無為又苦集有為喻暗滅道如燈喻明二生非生物非物約依正分別衆生正報物是依報謂有苦集名衆生有滅道諦名非衆生於依計實有名為物觀為無常苦等名非物三苦樂及煩惱等約因果分別物苦樂等是其生死涅槃之果次煩惱及業即是苦集為生死因非煩惱及非業即是道滅為涅槃因也四實非實等理行分別真諦名實世諦不實是其理也乘非乘者三乘是乘謂道滅世善非乘即人天乘皆是其行也五知無知等智諦分別聖慧是知即道諦智凡諦無知即苦集智陀羅驃主諦求那依諦也又陀羅驃者外道道謂諦真實王義非陀羅驃者今道諦不同外道驃也求那亦然六見非見等約根境分別見謂慧眼非見謂凡夫肉眼色謂苦集之境非色謂滅道之境七道非道等約行解分別道謂道品之行非道謂凡夫外道所行解謂出世智解以導行非解謂苦集世間智解不能導行也一一皆須合於譬中暗及燈明也莊嚴至功德等者等取是依義即俗諦也經云如是等經者指前十四經也經云文雖錯謬者以昔望今今則錯謬以今望昔昔則錯謬如來久離不應爾耶欲問者汝若不作如是問不知道品名異而體同因此能破未來衆生疑網所以歎之會齊故理同者一十四經悉是道者但是隨機別説莫非並是能治治於所治因果契滅理故云理同經云水不在例者水名雖多而道品水體唯是一故云不例經云隨良醫教者隨八正道教也云無量水名者水名雖異與本道品水一經云然不離金者不離八正道金也經云復説三種者若小乘中見道八忍是見非智推求名見決斷名智盡無生智是智非見於境決斷故得名智是息求心非推求性故不名見釋法名慧是一切道體此三同慧心也經云身證者於彼那含羅漢人中得滅定者説為身證經云三正念者謂得供不高逢毀不下不供不毀亦不生癡經云木火者所燒雖殊能燒只一道品火經云以是義故至道分者昔隨物欣好他緣不同道品之名亦復非一今會異入同莫非一八正道亦有施開之意無量無量者一一諦皆具恆沙佛法故名無量無量會通四諦者即古人料簡文意云前四諦體狹今演狹令廣諦無別體今即破之經中自云非是聲聞緣覺所知如何會得同耶攝法一盡不盡者前攝不盡今方得盡破云文雖若是為是何教盡不盡耶故今不用名同義異者大小四諦名同而有量無量義異又通同三藏是有作者其觀雖巧所破苦集所證道滅與藏不殊為此義故同名有作經云安隱快樂者令他因此得入涅槃藏方名安隱經云唱言不説者若不説者應有五諦就四人判者中智二人謂聲聞緣覺上智二人謂菩薩佛無量法門至眷屬者四四一十六門道品不同門門四悉一一皆具知病識等藥法而嚴無量名為眷屬得解脫時者解脫正是滅理涅槃既有解脫法身般若悉具言無量解脫者十六門解脫不同名稱同異者四諦名同十法界六法界四諦相異蓋人天善者一切衆生常為三途陰蓋人天之蓋多在三途少得人天菩薩陰等者菩薩陰為能蓋不令至生死涅槃菩薩陰雙是者自行雙照苦樂化他亦然名為雙是佛陰雙非者若事若理無非法界又非於真法愛名為雙非明根入戒等先眼根於塵不起貪名戒於違順塵不起愛恚名忍眼根所觀諸塵念念常與諸波羅蜜相應名進覩塵時了塵空寂不為塵所動名禪眼見色時分別十法界苦樂差別不同皆令會入平等法界名般若餘十一入一一皆具六度例爾諸經至平等者無非法界故名平等如央掘經云眼為寂靜門等菩薩之入入亦樂亦苦門者自證入空故樂化他入假故苦諸佛之入者苦樂無非法界故菩薩眼界性分等者見色空時不能即假見假時不能即事中雙照雙非壞善壞定者壞世善及壞欲定色定等二乘之色壞因等者壞二十五有因果也菩薩之色者壞二十五有有及壞二乘空無漏云云者二果陰欲愛六品覺無漏三果除欲愛九品覺無漏乃至支佛皆爾故注云云即覺不覺等者此即一體三寶覺即佛不覺即法雙非即一體僧與法界理和故又知識是分別者二乘但知六識而不知七八等識飲苦苦果也食毒集因也六道之愛至因緣者六道展轉相生常受後有無等等色者近而言之地住已上名無等等色遠則等覺名無等等色謂法身妙有之色無與等者初住已上菩薩能等此色故名無等等色差已還生者六道之中雖暫破得四趣受人天報人天報謝還墮三途又外道用世智斷下八地惑後還墮落名為差已還生灰斷不起者沉空滯寂不能出假名為不起六道之道離善之惡等者人天與四趣更互輪回故爾動見修道品等者若觀生死身不淨乃至觀心無常破折諸見彼於道品是名見動而修道品即三藏意也若體達諸見如幻如化即空而行道品者是名於見不動而修道品通教意也若初修不淨後修於淨乃至初修無常後修於常此即亦動亦不動諸見而修四榮道品即別教意也若即不淨即修非淨非不淨雙照淨不淨乃至即無常修非常非無常此即非枯非榮於其中間入般涅槃也故今經云從初發心常觀涅槃行道具百句解脫名百斤金煩惱即菩提名首楞嚴三昧修治於心猶如虗空亦名王三昧此即非動非不動諸見善修道品即圓教意也故四念處文云只一剎那心即是因緣生法因緣心生滅即是三藏三十七品因緣心空是通三十七品因緣心假是別三十七品因緣心中非空非假即圓三十七品只是一念若橫無邊際若竪無窮盡三諦源故云一切諸法即是佛道三法印者俱舍論云聲聞經法相理弱故須三印治破愛觀無常治破見觀無我若入苦忍真明俱得寂滅又無常等二印是能趣行寂滅涅槃是所趣果又地持菩提分品説一切行無常一切行苦一切法無我涅槃寂滅二印印生死一印印涅槃生死以無常為初印無我為後印此即合四為三也大乘唯一實相印世間人者此例甚多護時人意故不彰其名十六諦者苦空無常無我等十六行相唯無我一種等者因時觀無我證真亦只觀無我故云通於真俗餘苦空不淨三皆屬俗又是三法即者俱證真諦何者若不得無無三印二諦慧者應知前無生等四諦皆以生滅四諦為本而於生滅即達無生無量無作三種四諦今七重二諦則以通教二諦為本生滅攝入於通何名只緣通真有別圓機起則以別圓二中接之所以後之五重皆以通教為本一有空者有俗空真謂色即是空空即是色故指大品二虗實者虗俗實真也三世流布者世俗也觀流布不可得真也四相續者俗也相續破真也五相待者俗也待破真也六因生者因生即因成假因生俗也無自性真也謂從緣生故假無自性故空古人皆爾尚不成通何況別圓耶一凡聖下二諦例前釋但是名異親疏者真親俗疏從俗取真者破緣生俗取於真也開善云二諦至為體者應問何教以中為體何教不以中為體耶但是不相等者明古人辨諦但得不相即二諦不得相即二諦仁王至二角者此斤三藏二諦合四諦為二者應問是何教開合非一者謂七重二諦是又開五時增減不同又如前無量無量等互現其文者此明結集家加於如其無者之文更互相顯出其難意何者本只問其互相有不便成斷常者定有墮常見定無墮斷見二諦相即者真即俗故不斷俗即真故不常經云世諦即第一義諦者澤洲疏記云從緣生故名世諦無自性故則第一義諦其體不別義開兩門故得相即如此釋者二諦不分如止觀記已廣破之真在俗中者應更云俗在真中則失俗則有轉月者理實唯一為緣説二以為七重如隨醉人名相稍別者只是不作實有為俗實有滅為真二幻有為俗幻有即空為真等名又為實順權其名雖異開權顯實唯一實諦良由菩薩住大涅槃見佛性理故可會之通冠下七者用世出世二人冠下七文隨情智對二諦者謂真俗俱為俗名為隨情真俗俱為真名為隨智即二諦之相今文反此者今明俗如幻化等但是虗名而復相即不同古人真是虗名故云返此不能即色而空者此屬生滅之真不應判屬通真經云我衆生等者觀十六知見皆如幻化名為幻俗苦集滅道是第一義者藏通道滅於別教人全是苦集并別道滅合為中諦故云解苦無苦而有真諦即其意也單中者此即具法圓中以接於通又云世法五種者俗諦文廣者明於接入後教已却照前俗滅成無量之俗及不思議俗所以廣示俗諦之相良由此也法譬互舉者前別接通俗諦一向舉譬以顯俗今文一向舉法以顯俗雖法譬互彰同顯一幻俗諦而已心無顛倒者雙破八倒方見真實今文云單中者且據經中但云如實之言及讓後圓為勝一往云單又此之如實即圓中也有作無生者通無別俗只於生滅之俗達如幻化所以雙指下一實者為下圓真與此不別故但指之又今真全同下圓真又證與圓同下故得指下以兩始等者謂幻有是兩終者幻有即空是言始終者初觀治為始證真名終復俗如向者應用若局還源江河則異來消此文如法華玄文第三説義推自成者文中但云八苦為俗不云通界內外今以義推通教道滅若於界外全是八苦只此八苦攝一切法名為復俗猶是單俗者此則一往讓於獨圓之俗為單又據現文但云八苦義當通俗即當圓接通義應縱容二釋一人多能以譬圓俗者一人即多能多能即一人故可以譬圓俗一切悉入此中者圓融二諦融前七重二諦悉同一故名悉入經云依因父母者此是為譬作譬以相成顯一實諦者應知今文一實唯在真因及與極果前文無量中實諦及七重後圓從前傳傳而入於實即是從賢而入於聖今文中一一皆云如來非苦等驗知今實唯在真因及與極果明矣束四為二等者苦集為俗道滅為真其義則便若為三者以道為真滅為中義稍不便故不開之若法華玄中亦於二開三此且一往而説一苦滅諦者他引勝鬘中以三諦為俗滅諦為真言苦滅者苦家之滅名苦滅諦除妄顯梨耶者以梨耶中有染淨二種子妄或為能覆謂苦集淨分為所覆除於妄或淨分則顯名為實諦中假師者多是三論師以斷常為能覆此當別義興皇悉不用者實諦無能所故不用諸師所釋法性遠離者此即究竟離虗妄無染如虗空證實諦也文顯一實者意明今文不是隨緣異説專明真因極果實諦其文分明經云所言實諦其義云何者一實之諦為通權實為不通耶我今不解願佛為説亦可信約行者文中具有境智人教體唯闕約行謂依實諦而破虗妄即屬於行據人者既云大乘必有能乘之人謂文殊法王子等今文唯在果人所乘約因體者一道清淨是因義此舉從因至果之法先領問者從若真實至空佛性是領從若如是下問取教為實滅者一實之教為能滅滅昔四諦名為實滅取理為滅實者依一實理能滅昔教之實故名滅實非苦者非境者將如來虗空佛性一一皆非生滅四諦等以顯一實故云非也隱名佛性者夫如來者乘如實道來成正覺方曰如來性以據內名之為隱又衆生但理其於果性所以稱隱不得顯名虗空取隱顯不二者虗譬顯隱理同故云不二釋兩章者四諦之文一一皆先舉昔苦等次舉今教一實即云如來非苦等故云次釋諦實皆如文經云是可斷相者昔教皆由斷煩惱得真實所以今皆非之方成今經云諸佛所得至實諦者先舉諸佛以顯二乘非實與下如來無別初結三法等者如來虗空佛性此三異昔四諦故云更結是非經云不名為諦者不名二乘四諦也經云苦者等者等二乘四諦非樂又應云苦因者有為有漏無樂如來非有為非有漏湛然安樂是實非諦非諦者非二乘四諦苦盡苦對亦爾虗空佛性亦如是對問非虗非實等者更作非虗非實等對二乘簡出如來是實是諦二乘審知是苦者知是苦諦也又與則當教名實奪則俱無又應更以二乘實問如來等進退兩望者攝為進不攝名退經云皆入苦諦者苦諦攝一切天魔外道等故云皆入二事可見者諦衆生及二乘也知是約行者文云所斷除故故名實諦驗此是約行壞佛集諦者彼但計冥初冥然自有不云從愛因緣所生由此橫計不名集諦故也壞佛苦諦者不知此身從業力因緣所生但計衆塵所成不名苦諦故云也此起橫計等者既是橫計自謂涅槃等不云與佛同所以不能壞佛道滅二十五諦者如下陳如品中辨六諦者衛世師此云無勝以六諦為宗一陀驃諦此云主諦謂五大及時方神意此九為萬物所依故名為主二求那諦此云依諦謂色等五塵一異離合數量好醜愚智愛憎苦樂勤墮此二十依前九法故名依諦三羯磨諦此云作諦謂俯仰屈申出入去來等故名為作四摩若諦此云總相諦謂收萬法為一大有故名總諦五毗尸沙諦此云別相諦謂森羅萬像各各不同故名別相六摩婆夜諦謂塵成瓶不相妨礙經云誦一阿含乃至三四者涉云梵云阿含此云傳也所説義至後也故天竺正音云阿笈摩舊云阿含者訛略也言四含者謂增一明人天因果長破邪見中明真寂深義雜明禪定據形相者如瓶以衆塵所成故常衆縷成衣衆木成車既能有所成故知是常如負責者若不常者初得財已後不應索後既有索驗知是常餘皆例淨器者身器也伴類者同類者為伴異類者為非伴聖行品下廣破計常者外人多保於常故須廣破廣破計我者外人計我自在我常最重故廣破之經云我觀諸行者外人一切諸行既從緣生生已還滅滅已還生故知悉皆無常法塵對意者外人因於韋陀等曲説有自然而意地起計則成法塵對意起計經云佛性無生者佛性不屬外計故云無生若有生即有滅滅已還滅生即是斷常也無去無來者定計去屬斷計來屬常佛性不屬去來以不遷動故非過去等佛性不屬外計三世所攝以不流變故非因所作者非外人計因父母等所生非無因作者非外人計自然生非作者非外人邪計所作非作者者非外人所計宰主我也非相者非外人計我從微塵世性生非無相者非外人計我斷滅也非有名者外人但有常樂等名非無名者計斷也非名者非外人所四陰也非色者非外人所計色是我也非長非短者非外人計色滅為短神不滅為長何者一死已後更不復生只是計斷常耳佛性非此二計然諸計雖即不同不出斷常二見舉是對非者舉佛性是對外人所計諸句悉非經云不見佛性如來者應更云及真僧即是不見一體三寶總有三聚者經中但云色心何以將非色非心聚以釋故今不用無作無漏者中道無漏也小乘未見佛性但是有漏想等者等取受行二無教色者無表色也四大五色者無表色及四大色為五也識不應獨緣者六根清淨人六根互用若只能獨緣一境則是無常經云尚不得觀無常時尚不能觀苦等況能觀常樂我淨既不能觀驗是無常如何計常聖心異者佛意云我真常法中尚有三人差別於事由是無常汝云何一向計常凡夫心異者佛意云非但我真常有於差別只汝法中三人自別如何一向計常味異者滋味異也力異者初説堪胎時未有坦任造作之力壯年有幹用之力老時其力衰耗運動不御故名力異懷合者謂此陰滅彼陰滅此陰生等是四倒品中者以第七卷有三品耶正四諦四倒依河西觀師所指其文處中為便圓慧行者前七重二諦及一實諦並且順次第意以釋則七二諦後圓及一實諦向後方修登地方證證則固圓即是以次第顯不次第所以今文始修明於圓慧若依玄文地前非不修圓登地非無有別則前次第文通於別圓二釋破前分別心者此與前師意亦不異尚無破著者前既無破著之文此不應致破著之語發起者文殊為發起者意令如來示圓常理故先發起不般示圓慧者以衆生不般故佛不曾般又佛身佛性皆同虗空故不般又圓理無般即法界故又若云般者無始已般非始今日又般即不般不般即般故不般不更示圓慧者異之與同理無二故故云不更又昔若曾般意則今成更昔實未入何故云更次示真理者如來佛性同於虗空體即法界無有變易理體無般即是示其真理無般橫歷諸事者七無優劣約事以破故得橫名非果者經云我成菩提乃至如來終不作如是計此即是果言非果者昔未曾云得菩提今日亦不曾云轉於法輪衆生即法界故不更轉經云我即是法者法即法性法也從若有人下分果也非因者從信是我所下是初因從檀波羅蜜下是滅諦因從四念處下是道諦因非轉者從如來終不作下是非生者從如因眼下是非出者從因酪下是非作者從如因子下是非造者從因鼓下是生與出大同小異文相可見作造亦爾即事而理者果等是生法生即是無故云常住常住即理也竪結者於前七事一一雙非皆轍常住法界故名竪也文闕轉法輪一法有為法是前因果也異故不更者喻云如人從張家向王家名為異謂昔説小今説大八異皆爾故云不更同故不更者昔轉法輪今亦轉法輪故云同也又大小理無二故同又實理無二故同又從得道來常説小大之法何故讚云更轉法輪如從王家至於王家又異故不更者約事以説正令即事而達理為是義故名為事異而理同又同故則是事同而理有同有異云云德異者行德異也今總言之者然今經中但八萬天人得果不云五人然此列五人與法華疏不同彼云一㸸鄰二頞亦濕亦云阿説示亦云馬星三跋提亦云摩呵男四十力迦葉五拘利太子跋提與摩男只是一人耳生善滅惡者初亦雙生善滅惡及偏滅惡偏生善今亦爾故云不更生善者從已調伏者令生善文是領解發迹者經中發起迹在前領解居後疏家從便名文前佛復宗等者從爾時世尊告迦葉下文是也如來別結者別結唯在於佛名為聖行所以迦葉更問若唯在佛菩薩二乘永無修行如何得至大涅槃耶得有修義者不必盡得有別圓機起者即能修之故云也世尊之所行者此正指盡文有一行是如來行但今文語略下地況上地以初地況於二地乃至等覺自在王地者如下文云欲吹壞須彌山王等通道疾利者斷煩惱已得神通疾利自在受生故名無畏何不二地等者不動堪忍二地既是戒定二行之果何故戒定二果但在初地而不通至法雲耶只是一地者戒定慧三同在初地故也自在往生者但是此地之同不應更開者不應更開無畏法雲二地釋地義者義是行之所至所依之體地經合者釋華嚴十地經亦名地論在名小異者今文不活惡名與彼異又此五怖之文一一皆離界內外二處惡名二死等方稱初地菩薩之德最後外道天魔亦須通界內外無不活畏者世人貪求資生之具長養身命若不得者命則不活菩薩已得入於初地不須資具故無此畏無死畏者已離二死畏故無惡道者已破三障惡道畏故無惡名者無惡名穢稱畏故無死畏者死是無常已無二死故常無不活者須資具則苦惡道是苦處既離此二故樂無惡名至淨者惡名穢稱是不淨無界內外二處惡名故淨無大衆至我者自在能摧伏他故云即我經云住無畏地至壞二十五有者楞伽經云菩薩入初地時得是三昧故破諸有一諦三諦者應更云三諦即一諦即非三諦非一諦而為其體二十五無非是王者二十五三昧皆以三諦四德為體所以最後用常樂我淨為名令知二十五三昧皆具四德明矣本法功德者修聖行及梵行帶天行理而修故云即修三諦三昧結行成者見思破真諦三昧成塵沙破俗諦三昧無明破中道第一義諦三昧成令他破有者令他破惡業見思塵沙無明分段變易二處因果故云菩薩得二十五三昧壞二十五有即其文也散合十方者散一身為十界身合十界身為一身依報亦爾等中者觀此答辭只是一語而已未成答問問何故不等但云等不等答其理不顯故今不用興皇所釋今亦不用即竪云云者今家所釋一一地中皆具其車高廣高廣不二名之為等而復遊於四方約事不等方答問旨故注云云經論聖行者經是詮戒定慧聖行之教是故歎之無畏地之體用者德即內體威即外用母能生子者喻從一實出諸權教今皆開顯同歸此典所以此教可尊可崇就自行者聖行正是菩薩自行入於地住之法專屬自行後病兒三行方屬化他所以藏王約自行歎述如文者如汝所説方等經典能生諸佛菩提我意亦爾故先述之開善謂譬五時者文為三一先述開善等四師之解二從義皆不然下次第破三從今但下正釋初云般若是因者古人意謂般若明空蕩相故屬於理今即破之因果屬事如何是理即了修多羅者若不學十二部經則不能了由學故了知諸法本者由學修多羅即知修多羅是諸法本由達法本則識方等之法由達方等而生智解由智解故見於佛性涅槃通於小大者十二部有通有別今唯別在於大如何一向屬別修多羅又通者修多羅亦有別今別在大如何專在於小一句佛性者合前之少句也次破中云邯鄲學步者莊子外篇第十七云壽陵餘子聞趙國邯鄲徒步徐行遂往學之不得又失其故行矣直逋匐而歸古人亦爾學今五時判教不成而復自違已立五時次第即當兩無所獲三正釋中云窮畜極妙者明今家約五行一行次第五行自淺至深畢於醍醐不次第實亦極醍醐以五行合五時亦顯醍醐極味約經文次第對五時亦彰今經醍醐極妙之説所以來述而歎之一慧一切慧等者四諦慧二諦等慧皆法界故云成醍醐人中間諸法者如來在初醍醐居後中間四味亦爾如雪山有草名曰忍辱牛若食者即出醍醐是則中間乳酪等無非醍醐即人法無二方名圓行五行之實者次第五行與一實行一而無二二義皆成者謂次第及一實一一義皆成也若望一期教者應知若約五行歎不失五時教若約五時教亦不失五行教行相顯彌益歎述之美許其通學者如勸學品許三乘同學摩訶般若又大品中二乘若能發菩提心我皆隨喜即其文也與涅槃同者此經自指八千聲聞於法華得受記莂如秋收冬藏更無所作大師稱此經為捃拾之經良由此也法華以為極唱者即以法華為第五時醍醐所以二經進退咸同一味戒聖行至義同者以無作戒聖行一正一作無非法界與華嚴圓頓義同故以戒對初味餘四味可見經云竊者內心私竊思念而不彰言自誓為四者即四攝也初正報等是利行二依報財力等即布施攝六度四等檀為其首三誓以智力者愛語也四誓於同好者同事也記超越行者超三教菩薩所成故云大菩薩前經云亦不聞有如來出世者雖不聞如來及大乘經名而內心思惟發於宿習見於常樂我淨福慧者戒慧二行也大仙者此天子所見正信云此菩薩何必求帝處唯為菩提處耳帝釋重此天子稱為大仙前説偈由屬耶故不美之次合三誡者三文次第合燒打磨一説半偈試者表初聞生滅聖行知非究竟所以見可畏身不怖如菩薩聞後三教聖行不怖所以捨身求之聞後半偈即表次第滅不次第滅三聖行證今之意住法不顯者只是住法不能顯得無常是故略之無住之常者應答云有無住著圓常也所説空義者消經中開空法道文經云開空法道者聖行品初用開空法道破古正用此文生滅生已等者意云生是約證得無生已方名為樂故云寂滅生也即生是滅即滅是生方名真樂作此説者為復得不答任我自在無方之答即得若消偈意須依寂滅為樂第八卷梵行品就文為二一釋題二文為二下入文解釋初又二一敘舊二今言下正釋初又二先正敘次義皆不然下略非初云三品者戒定慧三也説四諦至天道者此師意者今文不是唯修四無量心生於梵天正是修於四諦開第一義天之道名轉法輪為梵天道若破諸師皆用今家三淨意破無不必壞破用四諦者説生滅四諦法輪但是梵天小因今梵行得入地住故不可也又師言下只緣四心是十二門但成根本定故云不可用道通凡聖者破云聖行豈不通凡聖耶次破中云尚存因果者今大涅槃淨諸因果方名梵行若存因果梵行不成是誰梵行者既非今經梵行為是人天為是二乘梵行耶今言梵者下二正釋意云從初持戒等即以大慈悲心薰於三學得入初地方名梵行分滿以三諦慈為體故不同他所判又今立三淨者淨淨即畢竟空何者以大涅槃慈淨二乘真諦故名淨淨又不淨淨即俗諦淨於二乘等不淨令淨由未具俗諦恆沙三昧故名不淨雙非即淨二邊以顯中道七善者即是能知能解之法謂能知法能知義等四心是所行之法用於圓解而修施行下持戒修背捨等定次慧及六念法皆是策進梵行之法以梵行與聖行二行並行自行化他從始至終不得相離所以俱至初地初住同結一果非因非果者非聖行也非他非他者非梵行也非染非淨者涅槃無染能淨不淨故名非淨又非前出假故非染非前淨淨故非淨又淨淨不淨淨為能入能趣行中道為所入所趣所依之體慈若有無者若定有定無即二乘慈若於有無即具雙非及即一而三即三而一方是今慈經云住七善法者具足應云住七善法四心及持戒等法略列七善而已正是化他者梵行以慈為本所以化他為正舊云無翻者應如今家法華玄中有翻無翻各具五義不可一向言五義者一法本亦云出生二微發亦云顯示三涌泉四繩墨五結鬘如彼廣釋或云契經者契緣契事契義五義皆三方稱大體但云正翻此亦未可偈頌長行者偈頌修多羅自頌長行修多羅故云祇夜頌修多羅經云利根衆生者長行廣説為鈍根人經云彌勒者經中從別疏文從通故云授六道等記聖説示人名為授行因得果號為記不等句者偈與長行局不相等頌於長行文相不等名不等頌除別相者除長行別相修多羅無問自説者不因𧫎啓而自宣唱也因緣經者藉現事因緣而有宣説也此偈出法句者法句經上卷云莫輕小惡以為無殃水渧雖微漸盈大器凡罪充滿從小積成莫輕小善以為無福水渧雖微漸渧大器凡福充滿從纖纖積今經略引一偈以示因緣之相故指彼廣論云是經名因緣經者成論第一十二部品云尼陀那者是經名因緣經所以者何諸佛賢聖所説法要有因緣此諸經緣或在修多羅中或在餘處是名尼陀那阿波陀耶者本末次第説是也如經中説智者言説則有次第有議有解不合散亂是名阿波陀那譬喻經者立喻顯法名為譬喻本事者宣説他人往古之事名為本事各有封印者諸佛所説別也合第九為本生者即是合第八入第九以第八本事屬生故合為一若開者生即已生處及受身等事即所行之事亦名説他人事故分別二方廣者理正名方包富名廣又竪徹如理名方橫周法界為廣教從理顯名方廣經亦云解義者作解釋義呼大乘中沒解義者但論義不名解義空平等者解真諦義又於一句下解俗諦義又解下解中道義布施者即是化他者還將前自行以化他經云知足者謂不令過分常使四儀與大涅槃心相應方名知足又飲食等於外知足行住等於內知足又行住坐臥身業知足睡之與悟意業知足語之與默口業知足如曾子至省者注馬融曰省視也曾子言我生平戒慎每一日中三過自觀察我身無過失然經中總有十句前五知己五品善根後五知己三業所作去來身業正念善行意業正念離惡善行修善問答口業少用意者意業知機方施身口今不云者意業隱密故且略之迭為尊卑者菩薩自行化他皆令於卑而至尊極方名知衆圓七善者以大涅槃無緣慈心修於七善生三諦善滅三惑二死惡方稱譬旨第二明四無量心者前七善屬解四心屬行以偏圓解導偏圓行故名梵行我心一相者一大涅槃無緣慈心平等而觀名為一相皆同有三者慈等四心一一皆緣生等三慈但為一義者只成一慈無量心故云緣心無別若知衆生至一樂者令衆生得如來樂上緣於佛以無緣慈悲上求下化方名緣境心遍成論人云三空者彼於三空而無三體空於法空名平等空與今三非類反常不定者反於尋常平道説法之式貴在物益故名反常經云或説一法者十二因緣是有為法也經云因緣及果者過去二因攝現在三因現在五果攝未來二果文中一一皆具十二因緣約於三世二因五果三因二果相望説之四種者無明行收二世因謂煩惱業生即現在五果老即未來二果謂苦也經云如城經者茅城及稻稈經廣明十二因緣是故指之經云除無明行識者無明行已墮過去初託胎識昧劣故皆除之反常不定者然經中有十二對初之四對約治破執分別謂計無常者説常治之若計常者説無常治之餘三對例此隨機宣説唯益是從次下兩對約依正分別於非衆生者就正報説如來體真常住名非衆生佛隨物欣好説為衆生故云衆生無上者佛是於實衆生者以見佛性名非衆生又生死凡夫實是衆生佛破我人説非衆生非物説物者就依報説也初於理本無青黃赤白等相如來隨俗宣説為物者就理而觀體如幻化次下兩對就諦境分別非實説實者世諦五陰虗假無常名為非實如來於中説為真常佛性名為説實實説非實者佛性真常是實隨妄流轉説為生死世諦名説非實非境説境者三界虗妄名為非境以智照達無非法界名為説境境説非境者謂隨心妄取以乘凡夫雖得少分未見佛性説為非境次下兩對約十二因緣分別非生説生者先觀生支起老病死次第逆推乃至最後觀無明謂於理非生隨俗説生生説非生者謂達生即無生故云非生越其中間十支故云乃至次下兩對約境行分別色説非色者全色是心故非色説色者全心是色故非道説道者二乘所行且説為道而未究竟説為非道此且一往對之然一一句皆先將凡夫對二乘以論是非次將二乘對菩薩辨於是非方顯反常之旨作僕使者淨名云見須給事者為之作僮僕既悅可其意後令發道心經云體性有四者明其四心主質體異不可改慈為悲改捨為喜是故有四慈得遍淨者大論第二十云問曰佛説四無量功德慈心好修善修福極遍淨天悲心好修善修福極虗空處喜心好修善修福極識處捨心好修福極無所有處云何言慈果報應生梵天上答曰諸佛法不可思議隨衆生應度者如此説又三界中遍淨最為樂故言福極遍淨復次慈定起第三禪易從悲定起回向空處易從淨復次從慈定起回向第三禪易從悲定起回向處易從喜定起入滅處易從捨定起入無所有處易復次初禪有覺觀分別修悲易喜支修喜易樂支修慈易一心支修捨易復次初禪修悲易二禪修喜易三禪修悲易四禪修捨易此即修四無量定之處所也然今文中但列一文而已或言器是境者他人釋也雖有兩人者見愛二人著見之人有利有鈍著愛亦爾故須具四何得唯二與其三樂者有人云與不可得樂有人云與四天下樂又云與梵天樂又云與天上樂有人云與三界樂今文先與人天中上妙樂後與三諦大涅槃樂於三親中與三品樂者皆與上樂中人三品皆與中樂然九品樂皆前品淺向後漸漸深成就時方得無二以未宜頓與故爾直取三品樂與九種境者人有九種樂有二十七品何者如初入觀時上親併得三樂中親已得下中二樂下親唯得下樂所以第二入觀中親與其上樂下親與其中樂第三入觀下親方得上樂文中中人三品但出下中三品中上中中例然惡入亦但出上怨中怨下怨例爾略有四番者經中三親為一番怨有三番合為四番經云世尊何緣菩薩等者菩薩得自如是廣大無量慈心不名大慈者何耶又如大論云與一天下人樂名廣與四天下人樂名大與十方衆生樂名無量初文唱者由次第心修所以難成或強慈弱者別人次第斷惑地前菩薩尚未成衆生緣慈何況圓頓故名慈弱第二顯大者一一文皆約地住菩薩所得四心以釋方稱文旨經云菩薩住於初地者當知前次第慈未入初地故非大慈若入初地與圓同證故次文云初住菩薩方名大慈別圓證同是故並列但見實相等者闡提雖不是菩薩大怨而違佛法名為大惡圓修菩薩以一心三慈始從名字位已上但見心佛衆生三無差別同一涅槃乃至至最後一品無明而常與拔方名不見其過三結如文者一心三慈而為與拔乃各不見其過如此之慈方名大慈捨中亦二者應先云喜但是文略見前人實意離苦故喜得樂亦然見他究竟離苦故捨得樂亦然是為喜捨皆具二義如經自釋然經中慈悲二文慈則舉拔苦以顯與樂悲則舉與樂以顯拔苦故云亦拔苦等經云無所擁護者若衆生未得樂菩薩常擁護之今既得究竟樂無所擁護方名大捨經云自捨己樂下將己所證施於他人令他如己為大捨六度本者以一心三慈為無作六度本達施等五無非法界方名具足自相本者只自行次第達世無量見禪實相成一心三慈名大無量開善謂為實觀者他見作遮難即名為實觀今不用此釋奪難者從除無利益至者是奪實無下難假想觀者出大品經大論廣釋縱難者若非至樂者縱也彼諸下難遮難者遮意者恐世尊答云因中但願與之實未得樂即遮云若當真實不得樂者何名行慈次如佛下難次第若不實下結難先歎其遮者汝是下位能於我前無所畏懼而遮行慈無有利益真是勇猛故以歎之經云而願與彼樂者大論中問菩薩行慈所有功德與衆生共既與衆生菩薩將何以成無上菩提答菩薩因時但是普欲與之至果方能遍與何故云願與彼樂經云聖種性者同如來種性也經云不及修一慈者不及一衆生緣慈何況法緣無緣耶聲聞假想之非者二乘未得真實所行之慈但名假想經云云何知耶者云何知如來行慈不是虗妄但能令見者他云非究竟轉但令暫時見轉如此説者違今經文不可依用一師云者即是大師之解當知衆生有非衆生者良由衆生依正不二故得互轉皆是實轉此為定説能令衆生至是者只緣衆生本來依正不二而二二而不二同一菩提三無差別故可令轉然外道尚能變身為石至於劫盡況證真實涅槃而不永轉耶不自覺知者實轉衆生為非衆生宛然不改轉非情為有情亦爾況復慈即如來者辨果法無二慈即佛性辨果性全在衆生正報佛性即諸法辨果性全依報是經云當知菩薩四無量心者一心三慈名實思惟但是功德者四心但是梵福即是義故但能伏惑不名為斷即是般若者一心三智圓斷諸惑不同古人所判能為三乘善本者一心三慈本具人天等善何況三乘耶經云必定回向者五度是緣因般若是了因方成回向如大論云回向心猶如熱鑿一切到者無不燋滅回向心亦爾一毫善根無不施於衆生安置菩提道中以究竟四心而回向之故得為下八事之本故名為總經云不生憍慢者謂於受者及他人所不起憍慢不望反報者謂不望前人現在反報不誑他者以其實物如實施與經云凡行施時者修無緣時菩薩施相三事皆忘故云不見等持戒可施不持不施是田可施知識可施是法器可施吉日可施是處者清淨僧藍可施飢即施豐不施如是簡者皆非菩薩慳起者由人觀故所以慳起澤州云箭喻乞人由彼乞求發其慳病名被毒箭諸佛菩薩親益其人名為眷屬為令其人破離慳病安住善法名欲令安隱謗聞求施法名為命醫教依施法發遣求者名為拔箭取相分別者分別何人可施何人不可施何等箭者此是慳心中分別施物仍將箭譬分別亦不違前鏃將木反又七奏反今依初反凡有八重者華嚴中雖有一百四十皆是單願應用今經於一願上具衆多願成彼一願使如此廣方名等慈故今經中云布施食時等經云凡所施食者菩薩因施食得出世大涅槃食良由堅發誓願所致經云八味水者謂大涅槃河具足八味一者常二者恆三者安四清涼五不老六不死七無垢八快樂經云得一甜味等者如四相品初云説苦酢味無常醎味無我苦味樂為恬味我為辛味常為淡味煩惱為薪智慧為火以是因緣成涅槃食明涅槃無苦唯樂故云無六差別經云施車乘者因動得不動即是從因運至於果故云金剛坐乘等經云與衆生共者因時願與果時方共如大論説面各四寸者如來著衣離身四寸大集至見作戒非者二乘是住戒不見戒法界故成非也經云施床敷者因施世所依得出世所依三德祕藏佛臥之床經云施燈者因施世燈明得出世一心三智普照法界大明即是三乘者前二教三乘也無緣大慈體具權實故得為三乘本不淨與出入息者即五停心觀也一者多嗔衆生教修慈悲觀三者愚癡衆生教修十二因緣觀四者思覺衆生教修數息觀五者著我衆生教修界分別觀雖有五門然其要者有二種一者不淨觀二者數息觀故俱舍論云入修要二門不淨觀數息貪尋增上者如次第修即其義也今言二甘露門者不淨觀數息觀是涅槃門之要故但舉二又前二教為甘露門後二教是中道甘露經云無常生滅者澤州云無常生滅是總相法念處觀四念處是別相謂觀身不淨觀受是苦觀心無常觀法無我色苦等者澤州云且約色陰説餘四陰類色可知彼亦但列名而不解釋後分判名利云依如毗曇前四在於四善根乃至見道後三在修道若依成實此七同在聞思位中三觀處者依毗曇觀陰界入名三觀處此觀在於總相念處若依成論觀法無常苦與無我名三觀處此觀在於四善根中經云八解脫如下二十八經中廣説無諍有三解者並不出小乘未免於諍故今不用空解明者如須菩提觀空解明經云及諸神通者謂如意身通天眼天耳宿命漏盡故云諸也有無並觀者並觀是有無如何名為非有非無耶中論云者引證三諦融即也假名四句者達有即空中無即假中有無即雙亡雙非即雙照皆但有名字四悉因緣適時逗物令物入實故非戲論附庸國者小國附大國也俱會一圓者次與不次俱會一圓以為尊極承保四年五月六日以華林房本書寫已了
