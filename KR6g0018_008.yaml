body:
  text: 師子吼品四經云若有父母者外人意云由汝無父母却他父母為己眷屬文中二釋初即却他父母兒二正却他父母經云敢者果也謂果已許之如賢愚經者彼經第二降六師一時佛在王舍城竹園之中時洴沙王已得初果信敬之心倍復隆厚常設上妙四事供養佛及比丘僧樂人同善有六師富蘭那等先素出世邪見倒説誑惑民庶迷冥之徒信服耶教王即嚴賀往至佛所以事白佛六師紛紜欲得講術以理奇語其意不息唯願世尊現其神力化他耶惡爾乃從善因使我曹得覩其變佛告瓶沙我自知時於時如來及與衆僧從王舍城往毗舍離六師之徒覺張唱言久知瞿曇智術單淺諸人猶豫不信我言尅期桷術自省不如默然逃去至毗舍離諸六師輩貢高轉盛各共相率當必追窮求捔神力佛與衆僧至㸸王名優填將諸羣臣亦來奉迎等佛復與諸比丘至越祇國王名純真陀羅亦如前迎等佛復與衆僧即向特叉尸利國王名因陀婆彌等佛復捨去往波羅捺王名梵摩達等佛復捨去往迦毗羅衛國瓶沙王等諸國人民亘川滿野逐趣舍衛六師等到見彼斯匿具自陳説本末情事欲與瞿曇決捔神力臨期逃避不可要勒今與天衆逐至王國大臣當使與我等決於臘月一日佛在試場波斯匿王是日設食清晨躬手授佛楊枝佛受嚼竟擲殘著地墮地便正蓊而起根莖勇出高五百由旬枝葉雲布周匝亦爾漸復生華大如車輪遂復有果大五升瓶根莖枝葉純是七寶食其果者美踰甘露香氣四塞聞者情悅香風來吹更相棠觸枝葉皆出和雅之音一切人民覩茲樹變仰敬之心住益純厚佛乃説法應適其意心皆開解志求佛者得果生天致甚衆多二日優填王請佛於時如來化其兩邊成兩寶山嚴顯可覩衆寶雜合五色暉耀若于種樹行列山上華果茂盛出微妙香山頂又有成熟粳米滑美百味甘之附口人民之類自恣而食食已懷悅仰慕逐深佛便稱適為説妙法各得領解三日純真陀羅請佛供養奉佛淨水俟以濼漱佛吐其水化成寶池周匝四邊各二百里純以七寶共相間雜其池中水八德具足水底遍滿七寶之沙八種蓮華大如車輪青黃赤白紅緑紫雜香氣紛馥大會覩此皆稱歎佛無量功德隨衆心方便説法各得開解四日因陀婆彌王請佛佛於是日令其寶池四面自然有八渠流還相灌注自然回轉水流有聲其聲清妙皆説諸法五根五力七覺八道三明六通六度四等一切聞覩心皆開解五日梵摩達王請佛供養佛於日口中放光金色赫奕遍大千土光明所觸一切衆生三毒五陰皆自然息身心快樂便為説法各得開解六日諸律昌輩請佛佛於是日普令大會一切衆生心心相知各各一人知一切心所念善惡佛便為説若于妙法皆得開解七日釋衆請佛佛於是日化諸會者悉令自觀為轉輪王七寶千子諸王臣民喜度無量佛為説法適悅其意八日受帝釋請為佛作師子座如來升座帝釋侍左梵王侍右衆會切靜然坐定佛徐伸辟以手按坐欻然有大聲如象鳴吼應時即有五大神鬼權滅𣏞枻六師驚怖奔突而走慙此重辱投河而死四分律云斯尼外道波梨子等自繫而死六師徒類九億人衆皆來歸佛求為弟子佛言善來比丘鬚髮自落法衣在身皆成沙門佛為説法示其法要漏盡結消得羅漢九日梵王請佛佛自化身高至梵天成嚴高顯十日四天王請佛爾時世尊普令大衆見佛色身遍諸天中一日須達請佛佛於是日於高座上自隱其身寂滅不見但放光明出柔濡音分別演暢諸法之要在會之人聞法解悟十二日質多居士請佛供養佛於此日入慈三昧出金色光遍照大千光觸衆生三毒心息十三日純真陀羅王請佛供養佛於是日身升高座放於齊光分作雨奇離身七刃頭各有華上有化佛如佛不異十四日優填王請佛華散佛上變其華作千二百五十七寶高車高至梵天諸高車中皆有佛身放大光明遍三千土衆會覩率喜敬交懷佛為説法皆發大心十五日萍沙王請佛佛預敕王唯須食具王但嚴辨器物極令饒多食時已到諸器悉滿甘膳百味普令衆會飽足有餘食已身心自然安樂其外道至未信伏者此是大權所為為婆枳城機緣欲熟故未受化遂至於彼枳佛而來以共熟之經云得須陀洹至羅漢果者為破邪外先得小果經云菴羅女者是女妹麗端正恐諸比丘見已生念故教比丘觀於念處以破貪欲等十六智知見中一者是彼十六中第九我見謂橫計五陰名之為我人在向中者謂扄也百論亦稱為向即是牖孔中見外此是一識外道所計彼作二種破一作不遍破二作但見外物不見自內根以破藉諸因緣者經中眼見闕一空緣俱有四緣餘五根俱用四緣經云所見真實者凡所見色了從緣生實無有我方名真實或云別部者他人云外道中別部所計也善惡自在者應善惡自然而有經云則非空也者佛所説空不同於我所計空也趣取一事者他意云趣爾舉一事為首表四方皆足表應化身滅者本從法身起應今化緣畢攝迹歸本故以枯乾表之應有所以者為衆生緣宜不同而以雙樹表於枯榮令達非枯非榮即其所以大自在天者以外人計邪常樂我淨佛以四雙而表破之西方行佛教者西天竺也此中衆生者在雙樹會機熟衆生也其棠樹者甘棠謂秋小梨樹也昔周武王弟邵公名奭𬻻輔王政恐孤寡單弱之人不能仁官府申公訴邵公恆出郊外止此樹下聽斷人訟以理清平上下無怨風化大行其後邵公雖亡民敬其樹不敢犯之歌詠之聲千載不絶故云在以甘棠去而益詠不云得佛未見所出法身亦爾者未得度者作得度因緣衆生悅時等者四悉意也各有前後者一時有四月二為前二為後也二法身者真法身即平等等法身應法身即五分法身俱為照世者俱為破除世間衆生暗冥也四德者此釋為正如來身密自在者非生現生非滅現滅隨感而現故云自在初本等者不云真應立本迹名者真應則迹中具有若云本迹其義則遍何者非生現生從本垂迹非滅現滅攝迹歸本故立此名經云無虧盈者衆生機未息而唱滅者名虧衆生機息不唱滅者名盈又為未得度者作得度因緣又遠被未來當當之益今此唱滅稱適機宜故以滿月無虧無盈而以表之言莊嚴者非但以法嚴樹由人得法故以人嚴若無人嚴樹不端美具德者具四德也具行者自行滿也多知者知十二部經也多見者皆見佛性也巧示者正其文句等巧説者為人解脫等皆於己身具上諸法方堪莊嚴雙樹經云從佛所聞者六人皆須約雙非二邊以釋所謂非二邊天眼非二邊少欲非二邊聖行空等經云大智者照窮橫竪也利智者照事速也疾智知境速也解脫智者離諸障也深智者照窮於理也橫智者於義博通也無邊智者窮佛教海也無勝智者高出餘人也實智者無顛倒也或是略説等者四悉所宜也對上六師者六師計邪常等四以六正破其六邪令歸正轍入大涅槃又六人莊嚴雙樹者經歷五時在枯在榮來至今經方能究竟莊嚴非枯非榮所以同於如來能嚴身子至不憂者以得非枯非榮故不可作小乘解釋初雖非正難者然經文意但是請常住此莊嚴雙樹利益衆生若入涅槃衆生無益為此義故復當於問經云性無住住者只此身本性無住今亦無住故云無住住經云如來已斷一切色縛者色如幻住如幻去如幻衆生機緣如幻云何請經云住名憍慢者汝今請住則同二乘凡夫是憍慢人妙體非有者從諸聖至楞嚴定專約法體從又無住者名處非處下約用衆生有機則住名為是處無機若住名為非處從又無住者名修四念處下約因明無住對前即是因果俱無住也從又無住者名無邊下重約法體明無住十地窮學者此釋無意故今不用相續道中者從十地去念念相續也經云譬如虗空者前法文中因果及用皆如虗空故以虗空為喻反以著別簡空者經中明若有惡得善報善得惡報等容可請住世無此理云何請住恐是六地者通教六地也經云以真女身者此簡現在不捨女身得菩提若有此事可言請住經云為欲度脫下明四悉益物初云未種善根令得種故有世界意已種下為人意已熟下第一義意輕賤善法下對治意為與文殊下復是世界以文殊純陀迦葉並是發起之衆共熟未熟為欲教化下復是生善為觀不共下復是第一義為欲呵責下復是對治為令衆生尊重下復是生善時時調均者如是時中宜修即照而寂如是時中宜修即寂而照如是時中宜修寂照均調即是捨相如是修者方名調均初本中者一切衆生有根本禪等定本自有之非始今有故云初據本有取造事心專者河西意取專心在一境名為三昧如修初禪心專緣初禪名為造事此約初禪等釋非謂猶是問境之一者簡今定體非前間家唯緣一境之定今明員定乃是即寂而照即照而寂故得名一切智以定一於一切者此是同體即寂而照故名一切等乃取善修者今是中道同體定慧修得員極之善乃名善修之定先答其慧相者此是即寂而照故云以住如是等答其捨相者定慧均調即是捨相捨相即中道體也門戶入住出相者若小乘根本四禪等但是世間九定調心入禪住禪出定門戶次第不能即寂而照故云正作乃至不作照知捨體二事者即照而寂名三昧即寂而照名智慧方名平等即空即假即中者即照而寂名空即寂而照名假寂照不二即中道捨相經云奢摩他下有五釋初能滅昏煩二能調不調三能滅喧四能離五欲五能滅濁經云退者謂下品淨定喜為下地煩惱所敗名退分非是已退又為自地煩惱所雜亦名退分中品淨定堅守自地不為下地煩惱所敗又不為自地煩惱所陵雜名為住分上品淨定能厭自地欣求上靜名為勝分能作大益是決定分有漏心中學觀諦理趣向聖道名作決定分能生聖道名大益百論云達分三昧者文誤此達分三昧在成論彼論第一賢聖品云阿羅漢者九種退相守相死相住相可進相不壞相慧解脫相俱解脫相不退相最鈍根者名退相退失三昧無漏智慧不能現前守相者根小勝故若護三昧則不退失死相者根又小勝深厭諸有是人不能得三昧故無漏智慧難得現前設得喜失故求死也住相者若得三昧不進不退進相者若得三昧轉深增益不壞相者得三昧已種種因緣不能敗壞是人住存達分三昧慧最利故善取三昧入住起相故不可壞因滅盡定故有二人先由慧力解脫惑障又得滅定解脫定障名俱解脫唯唯由慧力於煩惱障得解脫未離定障名慧解脫不退相者所有功德盡無退失如是九種名無學人此達分三昧正當第六明矣經云一無食三昧者是初禪離揣食寶法師云是未至定厭段食名無食三昧無過三昧者亦是初禪離欲界惡身意清淨者是二禪離六識中覺觀粗動名身清淨內淨一處名為一心因果俱樂者是三禪修因招果唯樂受相應名為俱樂常念三昧者是四禪已上唯一捨受相應無喜樂受故名常念經云觀骨三昧者即不淨觀治貪慈三昧者慈悲觀治嗔也十二因緣者即緣生觀治癡也阿那波那者即數息觀治散亂也念覺者即是記時尋伺十八界性差別求我頗得即無我觀已上是五停心觀即菩提方便觀也觀生滅者即無常觀也然今疏中依河西所釋則深諸三昧既通凡夫二乘菩薩所得深淺皆通異體非者定慧均等體非異故即名為捨但略不論師子吼品五定慧相資者此即合行相資通於觀行等位故置相資之名何者以法互資名為相資法體無二名為相即文意正在相即經云若毗婆舍等者然師子吼約法二法體異為問何者定伏慧斷如佛上説何故而言定慧無二佛答但云毗婆舍那不云奢摩他者意云慧尚不可得何況有定故不説之亦非破問者此問當理故不非人但非佛昔日權教不融之説餘例可知者謂藏通也非破外之間邪者間闌也故肇中論序云百論治外以間邪斯文袪內以流滯外無所用故名為間亦是佛法外間法也經云有智慧時則無煩惱者全惑是智故無所破全智是惑復無能破此專約觀行已上照惑體同以釋故云一論體同其猶水火者水火性異怨賊性異祈於異處者祈求也渠希反異處即圓融相即法也者虎文也謂文彩分明炳亦明也經云誰有智慧者誰謂宰主也虗己忌物者唯有圓人忘泯能所也經云凡夫衆生則應能破者凡夫無智故也經云物念應破者初修觀觀煩惱即是究竟破初既不破後亦不破經云若初到便破者意云若初到即破者此不名破何以故初心但名為伏驗知初到不名為破若初念不能者只緣念體是一初既不能後念焉勝故皆無破以別人於法界外立其能所故須非之今明圓融無破而破破而無破惑智相即體本無二六即甄之以論破耳是缺減義者雖有衆盲與一盲無別若一智不能多智亦爾所以一多俱名缺減此屬前三教有能所故也智性自斷者智性本自是能斷煩惱亦本自是所斷經云毗婆舍那決定者此奪別人智慧決不能被法界煩惱性故下疏云此奪智慧無斷惑之功即其證也智是性滅者慧性自念念滅也經云一性滅者體性自是寂滅二畢竟滅者斷惑得滅名畢竟滅方所者方由法也妙能斷惑者即惑是智如全氷是水方名妙破在危而安者體生死即涅槃故處損能益者達煩惱即菩提也經云執急即斷者都管反釜為鍚者以甘土為鍋鍊金銀用之非釜鍋也無名而名者三三昧名同小乘故用無名而名以簡異也定即有門者體散即寂故屬有門慧空門者慧能蕩相故屬空門兩亦門者十二部經雙詮空有又除惑故名亦有證實故名亦無化他四悉者宜修定者功用有門宜修慧者巧用空門等即是化他之相十二法為問者問此十二法為是涅槃為非涅槃若其是者為何同異故更問起經云無因緣故名無生者涅槃不屬因緣下諸法例爾經云一信心具足下具明親近善友等四法此文稍廣第一二三並是近善友心須有信戒品清淨七八屬聽開正法五者精進屬如説修行四六九十屬思惟其義經云實語者不妄語也妙語者不惡口也時語者合時善言不兩舌也真語者不綺語也語端者託佛告純陀之言以為問端經云如法句偈者十誦律説有一金鏘從地而出欲鏘佛足佛作神通上升虗空至色究竟鏘亦不捨佛便入海鏘亦隨遂潛入須彌鏘還遂入周遍十方處處逃避恆不捨還復本生鏘乃傷足因説此偈開權者作決定説且順權機此是施開之開也惡業不定者惡因故為善何用修於梵行求涅槃耶人定之過者以業在人定則有過恐物情疑者如諸小乘經中見如來金鏘馬麥等報猶謂佛實有報所以今經釋疑但為衆生而非實也經云現世報者是過去世現在報也不能具説者如首楞嚴經云佛告堅意云何於一念中行於六度答曰是菩薩一切悉捨心無貪著名檀心善寂滅畢竟無惡名尸知法盡相於諸塵中而無所傷名羼提勤觀釋心能知離相名毗梨耶畢竟善寂調伏其心名禪那知心無心通達心相名般若此即圓教菩薩六度也然事六度若無牙嚴尚不名密況復理耶何者如檀無戒不生善道無忍感報卑陋無進形質尫微無禪便成散善無智不了無常猶如富人餘事並闕餘五無五唯説可知一度須五莊嚴各各助行有力故也如止觀第二廣明牙劓嚴之相故云不能具劓魚器反截也刖五割反絶也菩薩斷一切惑無生後報者若據初得無生忍望於妙覺由有生後今且約得無生忍邊名為現報即指應身者此解不及約法身以釋此業難成者為修一相非一生即得故無現報結不定為得者謂得涅槃也經云眷屬多者六度道品多雖有小惡業不能遮障下諸譬例如此釋經云一則有目者行解具足方得入清淨池經云一則多食説過去善厚今雖少惡無如之何應是輻軸者若據經云則不移處此第二解當戒慧二事者慧攝於定由慧破惑其心則靜但合為二入住出三相者謂修善入出住百千三昧也無生住等者三相是因緣生法虗假不實猶照達即無生等梵行中具三法者梵行雖以慈悲為本若無戒防三障慧蕩三惑定安其心不名淨行經云作十惡等者十善翻十惡十善通深淺為諸教本故經云不修身我至見等者約見修二道以論三學天口者以火供養天願天細受故名天口經云衣食之恩者故大論云是身難御無返復背恩如小兒故云都不憶念經云則能懷身者若造重業則懷常身法身經云不耐飢渴者若不修三學不能耐此經云菩薩至身寂者菩薩專以身戒心慧等而為安樂不樂生死身寂經云馳食蜜至草者涉公云外國有草狀如苟𣏌其刺蜜猶如甘露馳貪蜜味而受刺刺乃至於死不顧刺也絍音任四大和合者猶四大成六根致有假名實法之異故名二身經云若見戒者見有戒體防止戒相修時名因成時名果聖上凡下多戒名聚總一別二自此他彼息過多滅戒等準前可知經云若見慧者見慧體體謂慧安覺知慧相餘準前數師子吼品六那有六道差別者若有六道差別應有六道佛性不能吸得菩提者既有佛性任運自得菩提用修道先領旨者如佛所説業若不定得亦不定者我今已領又一切衆生悉有佛性要當修習八聖道者方得見性我今領此經云何因緣故者問意者一切衆生既有佛性因聖道緣何故不盡得是涅槃邪世尊若一切下重難一牒經者牒現病品經正取若不遇不聞為難盛備手足者備緣了也凡説六河者雖六不同唯是一河若不修道品則是生死河若修道品即是涅槃河故知只是一河佛性亦爾修者得見即是涅槃不修不見即是生死故云生死論得下五例然七淨華者準淨名疏云戒淨者正語業命心淨者正精進念定見淨者正思惟斷疑淨者是見道知道非道淨者亦名分別淨道迹知見淨者亦名行淨此二是修道道迹智斷淨名涅槃淨即無學道若約教者別圓須用同體見思以釋今言求因者約華以表修因也遊諸覺華者遊於果地七覺華也非然別者達生死即涅槃非然現在無信者不信出世因果也將五而退者若入𤏙位則得不退名為將立所以念處名為而退今生不修者由過去善深今生暫發菩提心觀於念處遇緣而退名不習浮昔日經沒者今入內凡方得不沒四方者須陀洹對東方餘三果次第配三方不知大乘出處者不見佛性名不知出處正當今文經云即去者度河而去也從其心邊者從其度衆生心邊故云心安生死經云即名五大者外人計四大及虗空大此五和合共成一身故云五陰即五大經云一闡提至六因緣者正斷一體三寶及斷世出世二種因果名一闡提上座他者謂賢聖衆中耆年雖多而僧數少名上座摩訶僧祇此云大衆以因賊住比丘名為大天未出家前犯三逆罪謂煞父煞母煞阿羅漢造三罪已深生憂悔欲求滅罪因即家便能讀誦三藏然其衆內耆年雖少而衆數多名大衆部大集經亦預指五部者大集第二十七云我涅槃後我諸弟子受持如來十二部經書寫讀誦顛倒解義顛倒宣説所以説故覆隱法藏名曇摩毱多此云法蜜部經云覆即是密義或云法藏藏即密義法名四分纏言而復讀誦書寫外典受有三世及以內外破懷外道善能論義説一切性悉得受戒凡所問難悉能答對是故名為薩婆帝婆此部三世有實三性悉得受戒法名十誦經言説無有我及以受者轉諸煩惱猶如死尸數論外道執有實受用塵境名為受者轉猶捨也喻死尸此名迦葉毗名重空觀法名解脫此有戒本相同五分纏言不作地相水火風相虗空識相名彌沙塞此言著有無觀法名五分經言皆説有我不説空相猶如小兒名為婆蹉富羅婆蹉此番為犢富羅此翻為子正是犢子部此部計我非是即蘊亦不離蘊而有實我律本不來經言廣博遍攬五部經書是故名為摩訶僧祇此云大衆此有其律首疏云總別有其六部僧祇是總前五別此僧祇部衆僧行解虗通不生偏執遍順五見以通行故故知是總鈔文云僧祇是根本部餘是五部明知有六也宗輪云至第二百年流出三部一假説部二説出世部三雞胤部言一説者真諦云此部執世出世法無有實體但一假名名一説部二説出世者此部明世間法從顛倒生皆是虗妄故非實有悉是假名出世之法不從到起有道果二空二空智亦真實實境能生真境智智能通真實境故是實有也三雞胤者上古有仙染雞生子是此之族文殊問經云是律主姓次第二百年大衆部中復出一部名多聞部真諦云具足誦出淺義深義深義者即大乘義名多聞部次第二百年大衆部中復出一部名説假部大乘基云此部所説世法有假有實次第二百年滿有一出家外道捨邪歸正亦名大天非造逆大天他於大衆部出家受戒多聞精進居制多山與彼部僧重詳五事因茲率諍分為三部一制多山者此云靈廟謂初生成道轉法涅槃四處皆有靈廟供養故也二西山住部制多山西名西山住三北山住部制多山北名北山住本來別説合成九部二上座部至三百年初迦多衍尼子於上座出家盛弘一味法少弘經律既卒部旨遂分為兩部一説一切有部者有二一有為三世二無為離世即虗空擇滅非擇滅其體皆有名一切有亦名説因部謂此部立義廣出所因也二上座部轉名雪山部上座弟子本弘經教説因部起多弘對法既間義理能伏上座上座部弱遂移入雪山避之從所住處為名也次第三百年從説一切有部流出一部名犢子部上古有仙染犢生子自後仙種皆云犢子即婆羅門姓次第三百年從犢子部流出四部一法上部有法可上故名法上二賢胄部賢者主之名胄者苗裔之義是阿羅漢之苗裔故言賢胄三正量部謂權刊定名之為量量無耶謬故言正也四蜜林山部即近林翁繁蜜部主君此從所居為名也次第三百年從説一切有部復出一部名化地部部主昔作國王化霑地上人鹿後捨國出家從本為名名化他部次第三百年從化地部流出一部名法藏部或名法蜜經及真諦名法護部此羅漢是目連弟子目連滅從法護習師所説以為五藏一經藏二律藏三論四呪藏五菩薩藏化他部中有同其所立五藏者別為一部名法護部次至三百年未從説一切有部流出一部名飲光部梵云迦葉波此云飲光迦葉是性上古有仙人身光極盛飲弊餘光令不現故此部主是彼苗裔也至四百年初從説一切有部復出一部名經量部此師唯依經為正量不依律乃及對法凡所解義以經為證此從部主為名也本末別成十一部辨前大衆九部合二十部也經云信施等者亦信一體三寶及善惡因果等若作別義者別教在昔十行方能為他廣宣流布回向後心方見佛性常恆無變者即被接人未至今經皆知當住即今經中通教三乘共恆之人此位與四教內凡共故云小大兩位俱在其中故須達退二釋三乘初業者彼屬方等部敘昔退大之後及以中間不愚於小今經顯露聞常權取小果為蘇息故與今經三乘非例多有所關於小大及五時八教來至今經並知常住權取四位之果以為蘇息不可尅定判之又此合文從第二人去先牒初人行法次出第二人行相第三人則先牒初二人次修習智慧下出第三人行相第四人先牒前三人次修習智慧下示第四人行相第五人先牒前四人次修習智慧下示第五人行相第六人先牒前五人行相次習下示第六人行相第七人先牒前六人次修下示第七人行相經云住大高山者前菩薩但至因行淺處今住極位高大之山驗此而論是佛位也故分四人者聖位分四四果為一支佛菩薩佛為四也既具兩文者通別二文也欲令吸取者石不動而鐵自來名之為吸衆生亦爾既具佛性不修無作道品而菩提自證義當吸取經云雖是有法者自然報法也經云不修道者不修無作道品焉能見性此地般若現前者古人將十波羅蜜竪對十地所以般若對第六現前地即是當者謂常計也彼作彼受者應云非彼作彼受也吸芥者吸草芥也異法出生者由無作道品因緣生常樂我淨由惡業因緣生二十五有因果正言一因一緣所生無非異法又由道品因緣三惑滅佛性生又只是常無常等因緣各異名為果法藿呼郭反廣雅云豆角謂之莢其葉謂之藿經云有佛者十二因緣本性自有不由佛出方乃有之經云十二因緣無定住處者三道即三德佛性故無定處經云法界法入答者十八界十二入五陰之法皆是因證所得無非法性所以皆云法也無的一業者無的別修一業為地大作因火大等亦爾雖無別因而復四大力用𡋕等而復各不相似佛性亦爾者修無作道品因緣成熟佛性即顯故云時至即現即離兩句者即故存離故亡若取六法等者單若計六法各是佛性即同衆盲也取不即不離者不即故俱理而已不離故修道品必得如王大臣有智慧也廣歷諸法者何但十二因緣即是佛性四諦道品等法悉然或言常遍者計我大色小色在我中或言芥子者此計色大我小也亦破即離者無我破即無無我破離皆是假名者我與無我皆因緣所成虗假不實但有假名不同開善所立無體有用等衆生亦應得者當名得也經云一子地者佛是究竟一子地也知物根緣者知病識藥應病授藥等別有名教者諸經中有此名數也十二因緣是觀智者但是因因性也別有所出者如今經觀十二因緣智四教不同謂下中上上上智及四教大本中淨名疏中廣釋故注云云經云頂三昧者極位菩薩所得故受頂名經云一切衆生至而不能知者未來當得菩提即是不可思議經云大涅槃至不思議者此經能説佛性名不可思議𢇲美皮涉公云和類又述音𢇲粟也黎洛嵇反經云順風而行者波濤鼓激令大海漸深也那作單解者但作橫竪不二三諦相即亡雙照皆不可思議方稱經旨那只作竪深之解第十三卷迦葉品初釋疏為二先釋題次就文下解釋初又三先略明立名之由次開善下述古釋三今明下示章意初云善始等者前發三十四問其義談廣名為善始今更重問顯其用義即是其修前隨義題品者前雖是迦葉發問其義包廣但隨義類以立品目不云迦葉良由此也述古中慈光善巧住持者此下明佛性勝用能攝善星及極惡闡提偏邪外道皆是如來無緣慈光普示佛性令法久住故云住持三章意中二先正示章意次此經下辨異以顯立名所從初如文初文又二先標意以徵起次一義下別釋釋中云佛性義至種子者正以佛性為菩提種子佛性勝用者佛性是勝法若非勝法焉有勝用從惡五陰等者從善陰生無漏五陰從無漏五陰生涅槃陰始自闡提惡陰乃至等覺無非果性由來解者古來皆作此解也果果性至應身者三世示現三世也因中佛性至世攝者正因佛性全在生死故屬世攝合三乘者同到彼岸故六道皆有佛性者一一皆具五種佛性也前品別據萬善了因者前品廣破定業示不定令修道品使見佛性即約行明修故屬了因今品約遍攝故屬緣因從初意者從此五章初意則與初列大章立名同也次釋文為三先標列章門次舊解下述古三斷善下正釋初又二先列章次以虗妄下釋章意言以虗妄力者無別虗妄只佛性全為虗妄對斷善邊立名為便次述古中又四先述次今明下略非以示正義三舊云下重述古釋四義下廣破初云兩人更遞者一人作善即一人作惡一人作惡即一人作善次示正義中云如河中七種者此七經歷度河或超或次見於佛性三重述中云接識義者起信記引且此公立義未起四住者起信疏記中古人有此義若起四住亦有佛接去成佛何但未起者四廣破中云與八萬劫者與外人計如縷丸盡自然得道同也應在別處者應在無煩惱處也上數破此義者如師子吼中最多此計以佛性力故如石自吸等包括始終者六譬皆先菩薩次二乘後闡提菩提義當華嚴所以始終對於五時文鱗中者但且一往隨文對之經云世間之義者含闡提言世間因果出世果因家業者諸佛以化人為事所以最後不棄闡提義兼無差者若非平等焉能等教故云無差象不足者若差別約事而論象力火盡力猶恐不足此但消譬合法不齊經云何故羅漢於阿羅漢者善星意云羅漢是小阿羅漢是大何故世尊小人於大人所生妬嫉心耶而宛然相見者夫人鬼不合相見今得相見者驗是大權示現不見後接者不見修羅後手接入海無礙者遍斷世出世善故名無礙如無漏無礙者此是分例無漏一發永無失沒闡提遇緣即發善心故非全例向時作惡者但有正因善未有修得善也理外者未順佛教修行衆生也不能救之者了種微弱故云不能又佛性是常者正因佛性也語勢牽勞令者經云衆生我性佛性是常謂以真我顯於佛性相從俱常也經云具足莊嚴者謂修得緣了也即是有善者若是有善何故名一闡提經云快發斯問者能多利益令後世衆生而得正解因中説果者現在因中有未來果性也經云説果為因者如云佛三十二相等在衆生身名説果為因經云説命為食者如因食得命食是因命即是果今云説命為食者正是果中説因也故論云觸不定者成論第三云問曰今地等火皆是色香味觸衆無差別耶答曰不定如石土中有色香味觸或但有色觸如金銀等或水有色香味觸或有三色香觸或風中有觸無香或有香觸是故不定皆是無記者以善根昧劣故屬無記求業對善思者夫身口作善皆由意故以求業對善也經云身業口業意業者業所依也取業求業者業相應也施業解業者業自性也給養親友自相染愛奉事師長但為人情設施外人唯祈恩田由斯施等皆邪業也經云不求因果者不求佛性因及菩提色香非苦者闡提但有憐愛之善喻如色香非苦並無記性者無記有四一異熟二威儀路三功巧處四通果異熟者謂三界五道果報五陰即異特熟故變異熟故異類熟故具上三義故名異熟二威儀有二一威儀事謂行住坐臥四塵為性二威儀心即意識勢力強盛能引發威儀眼等五識自性羸劣雖緣威儀不能引起威儀第七末那唯執賴邪為內我既不緣色等四塵所以不發威儀第八賴邪雖緣色等諸塵亦性是羸劣不能引發威儀言路者謂威儀行路也三功巧者一切巧事謂綵畫雕鏤五塵為體二功巧心即是意識眼等非威儀準前四通果者謂證果有於通用亦名變化無記六一變化事謂改易形質無而歘有小乘以五塵為性大乘以五陰為性二變化心即是意識為中下云云者謂更有轉中為上下也不定斷善者若能改惡發心則不斷若不發心則斷故名不定若定則不爾者若是定者應永住地獄既無是理則知不定問可見者若聽出家是不知根云何而言具足根力經云具足十力者即是十力中第四知根力也約餘人為答者顯如來具足根力非但知善星一切衆生上下根悉能知也經云無異路者造惡造善皆無異路何以故若發菩提心必至佛性泉若起闡提心必至三惡泉舉事問者既舉事為問還依事奉答就果合者就現果身合也就因者由因致果故次就因合説教不定者由機不定致令如來説教不定佛如明鏡普現衆像故云照根不同衆生不達者未得教法深益之人致有斯諍特是略耳者過去謝是故不説又由過去善根令生善根説現知性是故略之初智人聞有等者此約二諦相即而知聞有無者約雙照時即達雙亡若説雙亡時即知雙照等又聞有者小乘教也謂聞小乘即知彈指合掌無非佛因何況小乘而不皆入一乘寶渚故云聞有知無等一二等者只是有無以法何者以被機故若説於有即無而有若説於無即有而無故云不作二説亦是聞於有聞即具餘三門不解對治者説有説無治其著有著無也封疆不同者謂土境不同人風各異人風既異則根性不同如來隨根説教不定良由此也唯得肉食者説令無肉味方得食之九住言不見者説九住不見十住所證佛性者且順機緣宜作此説涅槃八味者如前名字功德品中説次釋一義者帝釋是善義內以善法調意故名一義經云帝釋者此云能作天主憍尸迦者過去世時波羅奈國有婆羅門姓憍尸迦此云本時性也寶頂者從髻中明珠為名寶幢者與修羅戰勝遂立勝幢名為寶幢無過者若去聲呼為佛檀越無諸過惡也復云超諸天表則平聲呼論家至為此者只是過未四諦智比於現在故得比名今意在大不須依論以釋澤州亦云佛知生死無常若無我不淨知涅槃法常樂我淨為八七如梵行者此釋可依經云四食者色陰中有段食識陰中有識食行陰中有思觸二食受想不論言色陰有段食者香味觸是段食性色陰所攝餘三可知四識住處者有漏陰中除識一種自餘四陰為識所依謂識住色中識住受中識住想中識住行中以無二識故不云識住識中今文中云但除色者意取四陰即四識住也陰通內外者段食在外思觸識三食在內煩惱者正在行陰者行陰彰顯最與煩惱應相又善惡陰俱屬煩惱若法相師聞説煩惱是五陰應大驚怪引此文示之亦名三修者更進一釋明三乘皆觀五陰修身戒心得成三乘也經云所謂因果者三世十二因緣不出因果也只教慳人等者此即轉勢説法只令慳人但行餘五度若行餘五住任運自能行施餘五互為首亦爾經云舍利弗至憐愍者舉資顯師獨具根力薩婆多據事者此是有部宗多據現事也有一工巧者將此文證前純陀品則知純陀身是工巧之子子者男子之通稱故古人作大匠子釋因成是體等者相續但是因成經時前後得相續名相待但是因成橫待竪待得相待名故此二待並名為用色心之總者支支皆具色心也若為其佛性義者亦且順前一師所立佛性之義今亦同彼立以顯正義故也經云功德者謂有巧即德功因德果對下因果也合義者合會義也於草木計者既云離陰有我故於草木而計為我即有六者以中有足五道為六此計無中陰家及遮計有中陰家義若計有中陰應有六道既無六道但有五道驗知無中陰明矣若言有者但佛為緣別開耳經云無色衆生無有中陰者毗曇法中説除四空餘一切處定有中陰以無色界無處所故用等智者佛弟子外人等用有漏欣厭智斷惑名為等智但禪定退者以欣厭心修縱得上界禪亦有退此定難捉者此定睒爍疾利不得久停難可捉持但以欣厭心修得二三果則有退若據次第修人得電光定從欲界入初禪不云有退經云樂多遊行者身無趣遊行口無趣談話即其相也經云一內外二因緣者一受生煩惱於生時起貪等結二鄣道煩惱現起染汙妨礙聖道彼羅漢受生煩惱一向不起名為不退鄣道煩惱得有起義名為有退又約煩惱因緣分別一性使不斷為因故起二以不正思惟故起三緣力故起阿羅漢人無前二因而起煩惱名為不退緣力生結名為有退謂見增上可貪境界暫爾生貪是即攝心斷之令滅又有漏等智斷結則有退無漏智斷結則無有退又鈍根有退利根無退經云有時解脫者以要待時方得解脫時有六種一得好衣二得好食三得好臥具四得好處五得好説法人六得同學待此六時名為鈍根不假此六得解脫者為利根寄言故有為者依教説是有為又依俗諦是有為已壞三因者愛取有三因也經云心即上行者生天也下行者三途也經云心定常者謂定有也經云獲得正道從須陀洹去皆名正道成論有鄣不障者五欲兼重業即障道若單五欲則不障經云定遮正道者若在家人遮於初果以為正道五方便者念處及𤏙等四經云遠離煩惱者但是伏煩惱名遠離也經云諸外道至斷四禪煩惱者用欣厭心斷四禪修惑即修習𤏙等觀發世一法並是順宜並在得入聖果相應思為正體者夫施者皆以意思深信方能有施故以意思為體由意思故即以身口助之令所作成就暢其意地施定無三者只是隨宜樂欲不同而有此説計有三無為者一虗空無為頌云此中空無礙明虗空無為以無礙為性由無障故色於中行名為虗空二擇滅無為頌云擇滅謂離繫擇者慧也由慧簡擇四聖諦故滅者涅槃不生名滅擇內所得滅名為擇滅三非釋滅無為頌云畢竟礙當生別得非擇滅言當生者當來生法此當生法緣會則生緣闕不生於不生時得非擇滅此非擇滅礙當生法令永不起名畢竟礙言別得者謂非擇滅有實體性緣闕位中起別得得故非擇滅得不因擇但由闕緣名非擇滅論云如眼與意專一色時餘不見聞等色聲香味觸落謝過去畢竟不起得非擇滅名云云經云不從智緣者謂不從擇滅得滅但是從於闕緣而滅即是計有非擇滅無為經云若近若遠者過去為遠現在為近若細者細謂鄰虗塵以就事為言者夫云色者約事有於能造所造皆如前文今但別為一機宜作此説唯有能造不云所造曇無德定云無作非色者亦應云非心彼部明無作戒非色非心為體僧祇破前雨師立應云以心為體前念戒中已釋不作心果者明無表色不為心果何者以無表自以身口作色為因發於無表色為果但是以色因發色果故非心因果也經云其心雖在惡者此明無作色不屬於心何者以心在善惡無記中既不失戒驗知不屬於心河西云不生餘色者同於不作異色因果也先舉聖人者聖人觀破凡陰即是聖陰故云皆無明所出又凡夫迷聖陰即成凡夫又若作陰蓋義人天陰蓋三趣二乘陰蓋三界有漏菩薩陰蓋無漏佛陰蓋覆一切衆生令得大涅槃經云從受因緣者應從愛因緣未敢改一云天攝者謂是天種二云鬼神者是鬼神種也下三趣至為一有者明下三趣若更開者地獄亦有輕重不同餓鬼亦有上中下品畜生復有水陸空行不同亦應分為多有今但一趣自為一有人有四州不同不云修羅者且消經三字也因果者二十五有不出因果也善惡者三善為善三惡為惡七識處者三空為三初二三禪為三欲界人天為一故合為七論云不樂住三途及無想非非想處三惡有苦煎逼識不樂安第四禪處有無想定殘害識識不樂居非想一地非想滅定亦殘害心識識不樂居故非識住八福者澤州云人中富貴為一六欲天為六初禪已上合為一是為八此釋可依經云及受一戒者受三歸已但標心持一戒即得説相時但標心持一戒名受一戒亦不須云併受五但持一經云或一念者只是時外一念非謂一剎那為一念經云不名得齊者一日一夜是齊分故所以減此但名得戒善不名得齊有犯重捨即失者犯重已即失戒也二法滅盡者正像末法滅盡即失戒也二根生時者若二根互轉則不失謂僧為尼尼戒具足為僧亦爾輪中具明然今文中正明二形生捨經云如多羅樹頭者此是抑挫之言亦不一向失戒示為者𤏙等四善根位為入無漏因也受道者最初受得戒為示道等基止也一三皆是大乘者此皆在法華前及涅槃後聞三乘歸一乘悉是大乘初心之人有此執諍又若聞法華開權顯實已必無此諍若法華經前顯露教無有彰灼説三乘歸一乘之義故知必是爾前密聞而生執諍又大論中問何名諍法答三藏是諍法衍門少有此事今言諍者多在三藏三乘若大乘有諍悉在初心經云須陀洹至不得佛道者餘國所得此文非例近代者於涅槃經起諍名為近代又梁代已來亦有此計亦名近代當果與真神者以計當得名離衆生有心及衆生者謂衆生及心即得菩提名為即衆生有多世界則有者若薩婆多十方亦無迦葉品二若十使下辨異也經云是名執著者內心執著也經云若從他聞者從佛聞也若自尋經者佛滅後自尋經也若他故教者四依邊聞也經云先見牛者黑特牛也有三譬者舉三以責問者若先曾見後容有疑佛實不示曾説須陀洹人必無有退汝又不見何得於須陀洹人而有疑耶先問涅槃者涅槃為定有為定無為何相貌如此事理者涅槃理也濁水事也經云遇濁水者此譬無理何者若先曾見後於餘處更見濁水方可有疑既未曾見何得有疑經云苦非苦者謂於寒熱等苦見非苦涅槃故云於涅槃中而生疑也自能生福者任運而能生福不同外計自然冬收水土者對前牧少也三州柔弱者三洲之人富樂執見心劣無於剛決經云有五事者謂施人色力壽命安樂辨才經云如蓋是一者腦蓋也昔有智慧等者此約隔世明習因習果也清升善根者人天善根也徐僕射理人者善能決斷他人是非己身有犯而不間答問天柱瑜者天柱山亦名望秦山瑜即頓悟禪師配天柱寺後武婆時改為道樹寺云云經云非是下劣者利根之人方能斷善利人初入等者謂初人獄怖畏時生以有三念故已如上説先領旨者如佛上説三世因善可斷果善不可斷斷善之人復有佛性今領此旨通別三世者為過去下是別為遍三世是通也即有兩難者初若未來下難令非未來次從何故下難令在未來若在未來三世所攝云何言常難現在亦爾令非現在者若是現在何以不見既不可見云何言當一云是了因者見有可見之言即判屬了因亦有此義二謂正因者見有如來亦説佛性之言謂是衆生有即名正因今意與九地佛性相當若謂往時者未來斷善前名為往時經云云何道諦三十七品者只一道諦分別則有三十七品不同名分別答苦集滅亦然答之緣由者皆是分別之因由耳經云七事者常樂等四唯在於果真實善三則是通因因則屬於三世果則一向非世所攝初明雖有而無者雖有佛及等覺之性由煩惱故常果未顯屬於三世故云而無雖無而有者必定當得常果故云而有故不得言非三世法者修因所證故屬三世當相者佛性當體非三世攝若果地佛性一向非三世攝具此三義其理究盡未來全見者全見之時不屬三世若善五陰者由初證得常樂習果之陰以在因故猶屬三世重明後身者因與分果皆屬三世約修證説若言當體皆非世攝失念者破因既云現前如何失念若言失念不應現前與凡何別云云有無常一事者此約相奪以説既無於常義當無常經云定有佛性等者若言定有現在未見若言定無未來必得故以遮止令勿定説即名置答反質答之者只反質答不答所問義當置答經云遮止者謂遮其命莫定執二莫著者前迦葉我聞不答下是其著相故佛非之令其莫著因中因果者習因習果也經云非是過去等者如來果性也惡法五陰一向因性者非但凡夫一向名惡一分煩惱結業未盡亦名惡法一向因性應身果性者吾今此身即是法身常身得專屬三世經云雜血乳者佛性與無明煩惱業雜由未清淨名為雜血果中備有等者須陀洹等是因中習果醍醐即菩提果也既在未來者衆生若現在三十二相等何云未來能生善根現在既無云何而言未來能生現受樂報者善惡二報也終不生果者未來業若生方得於果若無於業終不生果佛答意者衆生雖有佛性要修緣了方乃得之以由煩惱未有二因今未得果合第一譬至不生果者未來若修緣了方能得果故云佛性因緣能生也若鏗然固執者若定執正因佛性者如執燈明未出不能破暗若因緣假名者若曉未來因緣會得則能得見如了燈日雖復未至未出不可定執不能破暗經云能生衆生佛性者能生初住及後身等佛性經云若言五陰是佛性者若云衆生有佛性應在陰心之內云何説言非內非邪經云或時有時解脫解脫者現在得入豈有無真俗之中者業道即俗煩惱道即真苦道即中三道即三諦所以中道非真俗外復應雙是者謂雙是者謂雙照也及如虗空者計外也根塵合者生即法界全根是根即法界全生是根坐無二方名為合即體一又佛性如虗空者明衆生依正未造之時本如虗空造已亦如虗空遍一切處又佛性如世間道有未行者有欲行者有正行者有已行者雖有未行等不同不可突道有二佛性亦爾悉皆無二理無二是者十方三世諸佛同一法界而無二理事毫差者一生無非法界故也先出二執者而衆生不知故執菩薩為自行化他生二邊執故遮之經云佛性非內非外者約遮權以説亦內亦外約開權顯中道以説下去例爾經云金剛之身等外也十力等內也若定執者即墮邊是故如來皆先遮此二邊一一悉以法界釋之經云內善思惟下約修行起計以説經云檀波羅蜜下亦是約修行定執墮邊以説經云不斷者現在不能斷也不滅者未來必得故滅猶如燈炎者此取炎炎相續不斷為譬經云時節異者水土時異經云有淨不淨者若發心斷煩惱即淨現雖未淨未來必淨經云亦生不生者修習緣會即反此不生經云是名執著者若云乳中已有於酪不假酵𤏙即名執著經云離是二事者離執著虗妄已修習必得誰作次第者次第者皆由因緣和合方有酪等若無方便誰作次第經云不等者只是由心不遍而起偏執經云智者聞涅槃經人即是智者經云明欲者欲為發識之緣故云欲也經云異果者草為乳因乳為草果求酪於乳草中定無無章門者非一因生一切即是無章門也經云以餘緣故者鹽是淡物之餘緣也經云譬如種子者類於鹽執其相則同先責難者責即難也經云鹽亦應有微不醎性者難意者不醎之總既有醎性鹽醎應有不醎性耶此即互難難有今無難無今有也經云鹽一切者只是一切法如鹽譬也經云次第説故者內四大種子本從因緣而有名為次第不從方便者不從外四大而增長內也依理起教者由佛性理起教方有能詮之用依教以立行故次明修因等用別明自意語者自意是今經正意故更別釋經云知幻者知幻方法因也知幻人者能為幻人也知幻果報者知由因致果也知幻伎術者知幻功能也知故煞者煞業也知煞人者能煞人也知煞果報者知因煞生死墮地獄有異就果來生人中壽命短促有等流果所感依報乏少光鮮有增上果知煞解脫者知煞貪愛母無明父等得解脫也又是知因煞得解脫也煞五婆羅門等乃至知耶見者略餘業道故云乃至知耶見者知不信因果也知邪見人者知一闡提也知邪見果報者知邪見人死墮阿鼻是異熟果來生人中邪見轉增是等流果依報眷屬悉皆闕乏是增上果知邪見解脫者知因耶見識達正道名為解脫得無量罪者波斯匿王先有誠教有犯佛者罰財入官彼聞得罪謂招此罪故求與財云云隨自他意可知者説有是隨他説無是隨自説俗是隨他説真是隨自説常樂等是隨自説無常等是隨他經云十住菩薩少見佛性者初住菩薩尚具見佛性今言十住少見者但赴他冥樂耳就一法即略者一行一解一一皆有略廣相對經云不應語者不與世法出世法相應故不應説經云鹿子母者是毗舍佉夫人有子名鹿無有而有者十力等本來體如虗空名之為無猶修即斷而智所成有十力等故曰無有而有有所無者有謂煩惱等今由即知而斷斷煩惱之有而今無不善無記者略不牒於善聚又善堪助菩提故略不説又善惡成無記報陰也經云聖非聖等者聖無為實寂靜非淨非界煩惱非取受記非有非三世非時常樂我淨非色等非內入非外入非十二因緣並類無所有而有餘句並類有所無經云後身菩薩至餘菩薩者此文須存二釋若言後身不解佛性即前二教補處其餘菩薩即補處已下若作與奪釋者圓位等覺尚未窮妙覺極地佛性況等覺已下菩薩然疏中正作此釋故云尚自不了又別教向中菩薩亦未能解何況行住已下名餘菩薩事開業行因果別教俗諦十法界業行因果藥病等不同及世界俗諦世味熟德等二乘皆不識應身為世諦者化叵難量不可思議故非二乘能了上文云現病是佛境界非二乘所智即其例也何處説世諦者意云何處經中説世諦此亦自是一解今經自云耆山説也別有所關者五時八教七重二締等遍於一代或盈或縮相入相即及開顯等皆非二乘所知境界性者惡耶堪為佛所觀境未有一毫之智名境界性萬善了因者了因了於萬善名了因性亦名緣因者指上萬善也衆生性者衆生名通通於深淺既云俱有通名衆生佛性一句至七句者此通就今中通大章共釋故云一句至於七句自他語兩亦者抑挫闡提現在未有佛性名亦無當來必得名亦有又昔未發心名亦無今方發心名亦有俱無者善人無惡邊惡人無善邊故云名各無一邊善根人有無得之性者有於無所有有所無句也次單約理內者此約法法內眷屬以釋也謂此為能解者他自謂此釋為得意也又約三諦者三締攝法盡由未得三諦不至彼岸俱無中道因果者未有緣了真因分果也錯魚七略反但求實利者謂順涅槃以求解脫名從戒戒經云不具隨道者不具定道無作也餘六深陰者伽陀此云重頌尼陀那此云因緣阿波陀那此云譬喻闍陀伽此云本生毗佛略此云方廣阿浮陀達摩此云未曾有此六深陰難解故不信今意應如法華玄文第八引達磨多羅云不信六部互不相通謂小無廣問記大無緣喻義但信六部其互相通謂修多羅只夜伽陀伊帝曰多伽闍陀阿浮達磨以文消今其理雅合經云智不具足者從初發心唯求佛智名此具足降此之外皆不具足鳥喚反驚歎也前四方便者五停一別念二總念三𤏙法四若準下三十三經初一不淨二念處三因緣四𤏙法與此少異大乘則通三十心者此依別教大乘以釋則住行對餘四方便十回向對也第一屬到彼岸者分到彼岸因前第二者用前第二人為緣也仍本似位者此釋為勝刀長者音雕此殊不見理者不見通別二教彼岸所至故知涅槃有異者大小二涅槃不同小涅槃不見性分段變易二死異通別互舉者生死河別唯佛能度涅槃河通通於四人承保四年五月書寫之了
