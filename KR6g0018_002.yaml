body:
  text: 釋哀歎品就疏文為四先釋品次此文下辨異三興皇下述興皇釋四今明此品下今師正釋初云世界者內外異故次又已生善訛者訛謬也佛若去世已生之善必墮耶小未生善翳者翳隱也佛性之善隱而不生又現惡者學人正使未盡無學習氣未盡也將惡者塵沙無明也次辨異中前品從人者純陀人也後品從事者長歎屬事也前品對者俗謂工巧之子也今品對道者三修比丘是今品無供者唯有請法也前品雙請者請受最後供及請住世此品請唯住世前品因人者上文云汝哀愍我等唯願速請佛久住於世間利益無量衆即是因大衆所以純陀請此品請比丘自請住前品略明佛性者以因獻食等開常名之為略前品論今教者且約佛及純陀皆論今教圓常佛性之法此品具明勝劣三修前品二人論者文殊純陀二人論也今品對佛論者三修比丘對佛前品動執生疑者因聞二施無差即執昔疑今搆差別疑與於五難此品破執除疑者破劣修之疑執修勝三法備有通別者於此十異一一皆通前品此品能論者亦是人前亦有哀歎之事前品文殊等亦是道今品五十二衆豈無於俗前品亦有無供者詣佛邊衆今品亦以法為供地動通前者既云純陀去後未久之間其地忽然大動通於二品下諸異例然思之自見三興皇釋中之生起者是彼自生起也四今明下正釋中云不離因緣者莫非四悉感應道交因緣故動也然文中安置有緣於解脫中即為人般若即對治法身即第一義聞三力不異而異而動於地生悲喜心即世界也次二人大衆亦復如是其義無量者五十二衆能引所引人人皆具四悉故云也引淨名四句次第對四悉可知四事止華氏悲者前品末一舉如來境界等四文是腷符逼反意不泄也若單形聲者動起踊是形震乳𪹼是聲經云一向動者形直動名為動前後次第周遍動者名為遍動一時遍動經云兜率天者差摩頭竭經并道行經皆翻云寂然釋論五十一云妙足亦云兜述而有辭者應是地動聲中有於今日如來將入涅槃等語故云聞是語已經云食所不應食者無常之法不應修行故云不應高圓明者主出萬民之上曰高衆德周備曰圓了達萬民之情為明深入水底譬親益者水依地依山如子依親而有依怙蔭育之益山若入水而水有依故以入水譬於親益水色同山者師能開導解同師旨故以同色為譬光宅至照智者光宅意云因時修行有返照智果滿智息故無返照四失者舊疏云四大可笑樏纍音謂俗外有真真外有俗名曰樏隔牛糞淨土者他意云土本不淨今釋迦但於穢土上假現淨土何以知然如釋迦足案地其土方淨如以牛糞磨地其地方淨故也指端種覺者謂證妙覺已既無返照之智如人觀於指端不能見遠無記如來者明如來智慧出於善惡之外名曰白淨無記一智三智者俱能破暗三智一智者俱能返照非三非一而三而一者俱是難思即三而一者即三為一俱皆既能照豈如開善但一智獨照而已三一難思者觀師云但只有一智自能返照何以不知即三而一即一而三即非三非一一而三而一體彌法界寂照相即故曰難思述舊者今家與舊科文大同但名文小異但從同邊依古科節以索經文巨有所妨者巨大也始從鹿菀終至般若若密若顯來至法華鄣灼開權咸見佛性同入圓常豈可俱名小乘伎藝旃陀羅者二乘之人未得非常非無常益如來捨應猶如將子付栴陀羅道機不耶名顏貌端正聖心慈憐名常愛念勸教三學名教伎藝所習功成名悉通利此喻有始佛捨滅度令諸比丘為變易生死所切名付栴陀羅以況無終經云我等至於王子合前諸子蒙佛教誨合教伎藝以具正見合悉通利亦合可形端正已得入小乘果名具正見此合有始也願莫放捨合後無終諸論者法瑤曰此譬佛具足般若應住世為我說之如其涅槃似於諸法界而不說今意正畏死魔何者如來何不降伏死魔而畏於魔捨入涅槃三違誓譬者寶亮曰謂佛不應負誓昔發四弘願處生死度一切衆生云衆生病愈我幸是可度之數而佛息化豈不違誓經云故有祕惜者佛若不住教我令得解脫者則有祕惜如彼醫也民無佛聊生者譬未破無明也攀類文殊者佛既偏教文殊我今還欲攀類文殊如來何故不教詔我令同文殊遺棄我等入般涅槃即譏師意矣止外悲等者應觀心實相觀佛亦然觀佛實相觀心亦然如何同凡而生憂喜得失憂喜者八風四順是得是喜四違是失是憂失不可愁憂追者法性無失無得何有憂悲只此憂悲體性恆寂故不可追勤遮二惡等者對勤觀念處名正勤見思本起名已生惡觀於即空令已生不生故勤精進塵沙無明名未生惡觀即假即中令末生不生故勤精進竭力盡誠行四三昧遮此二惡一切智名已生善此善易生故云泥洹道易得道種智一切種智名未生善空智已生勤如增長假中智未生令得開發善故則無憂喜者善是真性故也正念者常觀涅槃涅槃體遍遍而常寂名曰無念誰臣子弟者有主乃有忠臣奉之有親可以孝子歸之有師可以弟子事之今求正念念本冥真能所俱寂故誰主等誰去二句約應誰度二句約感朕直稔反我也謂無主我還得正路者得涅槃正路也得善者得小乘善失善者失大乘善猶如喪子今聞近慧者今觀心性即是涅槃近豈過此況開定慧者世間精進尚自無憂況出世定慧耶生死涅槃者生死無常涅槃是常俱契非常非無常大涅槃體明解二用者如來涅槃即是方便示生亦是方便常即無常無常即常皆令住三德藏中故云法爾又言法爾者感則應滅盡歸真化儀皆爾經云常默然者一止啼哭二諸佛法爾皆既般涅槃何須請住復何益開其者汝自無機住世何益開其問端者若空不空必無二是宜應問之兼顯菩薩者指後迦葉菩薩能問不空是病者了俗即空方名病愈餘句然又生死虗假終歸於空涅槃圓極湛然常存為不空也昔以三無為為常今明妙有以為常餘句例然此一法釋教旨未明兼開衆問者如下三十四問是諸釋無咎者約今約昔二釋並通三種四種者三是觀前空不空文四種次文約四門是又五時之中二蘇兼帶皆具三四至今皆開無非真實故云廣分別之今更附文以釋謂生死名空涅槃不空又真諦名空世諦不空若就真實者如來藏性以為真諦真諦不空世諦名空以實故勝鬘中妄法名為空如來藏真法名不空藏若常無常者生死無常涅槃是常又世諦無常真諦是常若苦不若者寶公云若就行苦金剛已還猶名有苦妙覺已去名為非苦應云生死名苦涅槃不苦二諦亦爾若依非依者三寶可依外道非依又真法可依妄法叵依故勝鬘中說如來藏以為一依若去不去者正行出離名去耶行沉沒說為不去又因名為去果則不去若歸非歸者小乘趣大名為有歸大無所趣說為非歸又因則有歸果則無歸若恆非恆者與前若常無常通說是一若別論者不生名常不滅曰恆生死非涅槃是恆又其真諦名恆世諦非恆若斷若常者生死教斷涅槃是常又妄識可斷真識是常若衆生非衆生者內是衆生外非衆生又假是衆生實非衆生又有是衆生空非衆生又非衆生離生死故餘是衆生未永斷故若有若無者三有為法名之為有三無為法說之為無又就人論凡有生死而無涅槃聖有涅槃而無生死若實不實者生死不實涅槃名實又一乘是實三乘不實又妄情不實佛性是實又世諦不實真諦為實又二諦非實一實為實若真不真者生死不真涅槃者真又真諦為真世諦不真若滅不滅者四諦相對滅諦是滅餘三非滅又妄法可滅真法不滅若密不密者或小教密大教不密又小乘覆實名密大乘顯實名不密又大乘深隱名密小乘粗顯名不密若二不二者就乘論之權小名為二實唯一大名不二身若存至非法性者小教灰身入無餘涅槃方名法性所以身存不名法性夫法性至滅法者謂法性非滅非不滅汝昔不受自取滅度非我不等離八難者成論云四輪摧八難一宿植善根輪摧前四難二勤發正願輪摧世智辨聰難三供養諸佛輪摧佛前佛後難四生於中國輪摧北單越長壽天難次舉金沙者喻後五難如金沙甚可難得生死法中求是五事至極難得曇華喻佛出世難不應以親認佛者不應以世間親比喻於佛世間或有此事佛則不然是故呵云不應也其不識佛者自是不識法身常存無變而以認佛同親又只是不識自身之佛以不識故則非王子不識寶城者謂不識寶城內外皆寶如不識涅槃之城常樂我淨四德莊嚴即身而具以不識故身不端正無明自覆者不識自身無明煩惱是栴陀羅何關佛付其門不小者同體方便之門遍通一切故不小普收衆末曾吝惜忽者輕也指山等者捨其身首如毗富羅山又三千大千世界乃至無有如芥子許非是菩薩捨身命處故云倍多如是恩德者如前苦行皆為涅槃利樂衆生名為恩德無慚者不能慚於賢位人也繫在囹圄自無大機不減勝應非如來咎故曰非我無恩嚴峻者圓常具足之戒遍遮衆惡名為嚴峻圓離二死名曰絶險法華云生死險難即其證也定即楞嚴定也睥睨者上叵詣及下五計反謂傍視也博達今古者以同體大慧遍開四時之粗無非即妙名博達今古表裏皆寶者性德為裏修德為表修性體如故云皆寶又權用化他為表自行實用為裏故下句云充溢等瓌古曲反美玉也琦音奇不猒糞掃者不然之糞也不欣者不欣勝妙大寂瓔珞也汝不見佛等者不識常身三點四德之佛名不見佛不解真常體寂之法不悟如來宗極之說名不聞法不達上冥下契理和之僧名不入衆數不得無難者不得無界外八難次文難亦不離亦爾界外名理八難謂見修無學為三惡道無為正位不能發心名隨惡乃至無學亦爾若入無餘永滅佛道豈非三惡道難四北單越定壽難者四諦中滅諦對北方聲聞證滅如彼定壽五長壽天者二乘名為淨天若入無餘歸第一義天豈可化也六佛前佛後者二乘入觀見真出觀緣俗不見中理即佛前後七世智辨聰者二乘未見中道發無漏慧是為世智辨聰八聾盲喑啞者二乘之人無菩薩根得六通不見十界之色如盲不聞十界之聲如聾不能以一音隨類得解如啞道前方便者取初發心已後行因位為道前妙覺證後為道後而汝識者唯在灰斷雖有道前者但有三祇等方便故非圓因經云為汝等故無量劫者約成佛後中間起應示捨身等出生妙善者由性發修契性故名出生縱橫者三學徹理名縱體遍攝法名橫高廣下三釋上縱橫惑盡者亦應更云惑盡即觀盡觀亡則惑亡貧所樂法者不求大乘真性明月寶珠但愛小乘偏空僞礫非應供乞士者非界外中道究竟應供唯是真諦福他界內應供故斥云非無用而用者藥草本來無用但由衆生宜用致使藥草有用業招者業如機大地如法身赴應於感如宿善宿善有淺深致藥有貴賤此即用中三也三種宛轉者謂大地三藥草三衆生用三不得相離猶如法身起應應有說法說法即有所受機緣故云宛轉合大地三義等者如上亦不生而生已下文是般若解脫合上三亦然即超合者即還合也經云及我諸子者澤洲云諸菩薩德堪紹繼故說為子四部之衆謂聲聞在家出家各分男女同教令證大般涅槃名安祕藏今言及我諸子正是四衆不須分之所以今疏用對中心也不了覆了者施權不了覆於實了如外道論虗僞不欲人知故覆藏之如下經說法身本有者生公曰夫照極自然居宗在上上不可並故橫必非所除纍近則解脫於下無下無不應則色身是俱俱非先故縱亦非三無離理故別之尤非是以堪然不差猶如伊字此解未免縱橫如餘文三即一如細畫者如草下字中細畫相連約三目者生公曰般若居上法身及解脫二無勝故並列在下如前破之嚴主照世者三智上嚴大般涅槃下則普照法界機理所謂照而常寂寂而常照猶如天主一面三目上嚴天顏下則照世以天身妙故有此嚴舉略兼諸者法身攝一切身般若攝一切智解脫攝一切法示身說法權實諸教無不磬盡故曰兼諸不可以形相見者不可下地作文六形相取不可心想知者非凡夫二乘偏教菩薩下地心想能知充滿十方者為十界身也不廣不狹者諸身不廣應亦不狹非知非字者般若冥於法身故非知非字不可動慮分別者非下地及世間二乘等能分別紳大帶也如論語第八子悵𨽦隔壁聞夫子說一事子悵恐忘以畫於衣帶記之今正言非文字可傳能盡般若之照三諦遍朗者若權若實一心中照名為遍朗半滿具足者舉其半滿則攝十方三世佛法磬無不盡世間者謂同居土出世間者方便土出世上上者實報佛居寂光下照三土法界流注等者遍達說字咸入祕藏名為流注教法下被猶若懸河慈悲攝物譬之海涌一音演說者實通諸音且從實說云一音耳非喧非寂者非生死之喧非涅槃之靜縛脫約或智以說十智不能虗者解脫體遍法界豈是小乘十智能破為訥鈍等者同於訥鈍等以解他縛示現善惡者亦應云衆生有惡或為示善有善或為示惡而調伏之雖鄙必施者衆生雖即鄙惡而必施化以度脫之佛意業者佛有不共之法不與下地共故云意不可思議法華云如來莊嚴者約智淨也又六根清淨者雖引法華之文須依華嚴真位六根以釋包含總別者舉大涅槃包含三德及諸經異說故云總別也括事理者法身理也般若則從因至果解脫自他脫俱屬於事入大涅槃者生公云丈六之迹緣盡乃真約應不現故云入也又澤洲云所住雖常為化衆生滅應歸之即是入於化滅涅槃經云如世伊字却云化滅伊字不成不結天目者天目同伊是故略之而言我今者既言我今似如始得菩提是故釋云蓋隨緣宜奪是所證者佛上約真佛真法真僧三番斥我是僞欲捨舊未得新法不知新法為定勝不故云未能即捨一僞一真者昔教若非何意與我同證今教若是何不早說此用後文意來此為並而生去此者三修雖聞說於真常而不思惟真常涅槃安住為無動由執小志而生去留之解所以憂悲經云皆悉憂愁者一憂愁佛入涅槃二憂愁未得新伊法味佛向雖說我今末得是故憂愁快說者如來前說真常三德之理比丘謬謂說於無常等是己所證之法故快也壯者音莊正是莊束之意又只是壯哉快詮於理復能破惑故云壯也行是進趣者能趣上殖根是慧數即智德之初故云勝也語後者經中但云斷修惑不言斷見語後必知前已斷見語前則不收後惑去智亡者亡必惑亡除字通後謂亦除無常觀想應不入涅槃者以非離故得入涅槃此是執理故約雙非而釋若不離無常者我既能破惑當知此理非不離他解離者他意云若離有常則為非若不離無離無常即常何故斥言是僞作此說者其理難見肥即歎教者教是智德故用肥以歎之多作親譬者上譏請雖有五譬多分屬親上文初譬云如父母生育一子顏藐端正等上已被斥故今不作未除一邊者得空邊未能出假及非空假故也此四譬文中皆有師字所以同為一經云帝王者帝王之慈慈及一國尚行恩赦佛慈一切而一見矜耶呪師譬者世醫慈淺尚不捨病人況出世良醫不救我等七漏者見漏思漏根漏惡漏親近漏愛漏念漏如下經中廣釋見諦四思惟一者俱舍名五部如苦下具十使為一部集滅道為三部思惟四使為一部通心七使者成論云一欲愛二恚三有愛四慢五無明六見七疑亦是三毒及見欲愛有愛是貪恚是嗔無明是癡慢入癡見及疑屬利使三界分別都成九十八論人者成論人也此約分通大乘以說所以四諦皆十雖不現行種子在是故通取若現行者取之若不現行者除之所以集滅各除三道除於二五門觀者無常苦空無我不淨又佛毗婆沙有七八卷彼說見惑有五十所謂十使迷覆五陰修惑有七欲界有四貪恚癡慢上界有三除嗔義甚契當經云瘧譬者佛除我粗煩惱即曰不發而細者根本猶在未去如瘧之發芭蕉譬行者行者行是無常色是不淨三陰是無我若有我者昔令修無我我已修無我佛常我斥僞比丘謬領謂說昔更有我若有我者昔何不說云何今日方說有我三意者無常無我不淨三也即四悉者問答下世界又初下對治又將欲下生善又執下第一義釋相可解接讚騰執者接佛讚後便騰昔執謂佛實讚佛意欲破且先讚之到亂者迷無常等不知修習無常即常等經云視諸山等者譬迷五陰以為耶常等也乖善者真諦善也此約比丘所計己法為勝以釋若作乖大乘者此諸比丘聞世尊今修常樂等却謂世尊猶如醉人見日月轉下結醉過若有不修苦無常相乃至不名為聖即指修常樂等不名為聖下文佛以醉譬還諸比丘是汝自醉非我醉也此釋為正二無過者我是善修無倒亂等過但知文字者但執無常之名而不能了無常之義又汝一向謂修常樂為醉修苦空不醉豈識醉不醉義耶又佛果實常而計無常此即大醉故云未達其義聞他流轉者聞佛說真常謂為轉曰是汝自轉他實不轉汝之所非則不非有汝諸比丘向所非者正是真常也乃非其所是者今以真常非於三修所執無常之是故也斥善非善者若善修者應知無常即常汝妄謂無常是善修真常非善修汝是醉人有何實録十門者如第一卷中優婆塞十對治門六行者勝劣雙修也不知正修諸法者正即常樂我淨法也彼若救者應並云世間常樂異出常樂容可一倒一非倒世間出世名既同如何一倒一非倒世間若是倒如來亦應倒識心無倒者即是率爾同時五意識也又向舉若空四倒與常樂四到作本今復舉三到釋前四倒所由想倒者想以取假為義謬執不得實法憶想推求由此起倒者第六意識能緣於理先由心緣而復起倒見倒者能審法由審成倒藉此生於四而對則八又七識心體是心倒妄取法相名相倒於所取想建立定實名見倒又妄想謂有諸法名想倒重起心緣緣前所想名心倒於心所緣執定分明名見倒無漏心空等者實非實相謂為真實名為心倒緣想無漏名為想倒偏執定實名為見倒無上方便者是佛勝用方便也問有名無義者如執耶常外計有名有義謂勝三修無名有義如諸經中雖無涅槃之名而有涅槃之義無名無義謂涅槃體不當名義故注云云並應四句者世間為二句世間即出世間即世間為一句是世出世為四句也又勝劣相對為二句劣即勝約開顯為一句勝即劣謂示同人即無上方便為一句是世倒之德者於世間倒即達常樂之德此約開顯以說起方便用者依體起常無常利生之用體此中諸句皆須約勝劣相對為二句相即為二句舊云無常等者法不相即倒成不當今問屬當知去假在問答次第人義當別教若通論等者每一一修皆具三過謂生死進趣以苦欲捨苦言以苦捨苦者身已是苦更修雞狗等戒妄謂涅槃此更是苦如此捨苦豈可得耶又外道所作悉是苦因故也標三寶者非但一具三寶三亦只是一寶如來即佛寶法身即法寶涅槃即僧寶亦即報佛法佛應佛也法界即報佛以無染故屬佛也不縱不橫者即三而一故不縱即一而三故不橫即非三非一皆是法界不可思議經云不淨者即有為法者生公云夫橫起者皆有為也經云云何與是毒身等者佛若住世教誨我等則破無明毒身佛今說既去我等云何能與無明共居而修梵行非汝境界者機興則住機息則去而常住住而常去故非二乘所不能知佛往來者汝既不知佛是不來定得隨佛不去而去今留人法者人謂有法之人故可依止佛住機則在佛佛去機在迦葉迦葉若與我住同河西云恚慢心者此釋勝是遍修未者得四果是劣修未唯得偏空未得大理名為未極由佛性力者內佛性力外言教力若利根於法華前諸味之中聞於佛性處處顯密已入二乘雖聞方等彈斥般若洮汰於顯露教來至法華及以今教方始顯得昔雖未入已為得入之緣故今聞說即座而悟故云也無缺者猶如寶珠不受塵穢具足衆寶故也留心處者一正顯佛性二明常破無常三為顯常即無常無常即非常非無常雙亡正入圓勝修法六即之殊此是茲經之文心所以名為是留心處未除舊執者謂佛口雖說常佛身猶是無常所以請住如此觀之舊執未捨為學新伊者亦應云為未來學者故付迦葉生公曰所以付聲聞者明要須兼解然後得道苦行第一深解成就必可以軌訓後徒故付囑也改迷生信者應改劣修之迷而信真常實法如何因執而不改迷求得不得者有方便則失年物俱新者用何而二句又是萬物開發生長之時此五塵等如春時能令行人增諸結使又草物開秀之時以譬聽有機發之時也而聞法莫不開悅可悅愛果者人天果也非先解後失者若以大通佛時結竟則是先解後失今取元結大緣從本迷者說義言失者中道之解應得不得名之為失通是迷徒者未見佛性者總屬迷中之人故云通也持出者謂向佛呈其所解所證故言特出澤洲云從此已前為聞慧作譬從是時諸人下為思慧作譬思教求義名共入水求覔是寶下為修慧作譬更別證法名為競捉所證苦等悉非真理名為凡石取僞真故言自謂得琉璃珠得法適悅所以觀喜為有方便者有生圓信真常善巧觀者作譬澤洲云欲僞非真喻得旨捨詮故言特言特出出悟解苦等非是實理名知非真從是時寶珠下捨僞取真喻從初至月形喻聞慧從是時衆下至安徐喻思慧即便得喻修慧依三慧消經前已破訖今略述之令知同異著樂沉沒者著界內六塵之樂及著界外二乘沉空之樂名為水底拙觀推求者前之二教俱名拙觀何者雖破通惑永未聞佛性之名雖經方等般若見菩薩不議事悕取非己智分但有冥發冥解之義所以俱屬理即知字者知常無常即是真常名知字知義者達常無常即非常非無常名知義以珠力者一由內佛性力薰二外言教力薰及觀行力薰稱理修行圓伏三惑事理不二如水澄清能詮如所詮者淨名云字即解脫文字性離名為解脫所詮如能詮者達陰入即三點故皆云也以珠力故水則澄清者由珠體淨令水淨由佛性體如故依正不二月圓譬相似樂者月體團圓無有邊表可以喻樂月光明淨故可喻淨非上非下者謂水非上月非下又月亦不在水內水亦不在月中不在而在同一體故在水月宛然珠亦如是不出上不屬下泥即是非上非下也以上比下者以天上月比水中珠月既不上不下而得自在珠亦非上非下故可同月並喻自在又真位比相似如月比珠以顯相似自在又相似是上比於觀行以顯相似自在若法合者非變易上非分段下於伏破之間而得自在以譬我也人得其門者得圓教門人唯圓機得入故言一人不昏教水者了教契理不滯其門名不昏水不動心波者達能觀心即法性理方名不動經云則離我想者是已斷見惑則離憍下是斷思惑離我慢等用者明昔教有破見思證理之用也經云得入涅槃是義云何者為昔是為今是為昔非為今非為是真涅槃為非真涅槃故問云何經云善能咨問者能問是涅槃義者因此破於無明得見佛性亦能令他破惑見性是故歎之又善問得時能推本定今以自斷疑也王是也者王譬衆生少智譬世智執耶常暗常常者計真常為耶常外舉衆生少我威者外人耶執以伏他人自謂尊極貪引耶徒以為安樂猶如國王威伏邊夷恣引財寶以之為樂嚚莫巾反謂鈍惡也喻外道頭藍等心不識正理曰頑口不從正教曰嚚經云而王不別者王衆生不別耶正依耶療治病轉增甚故云不別生公曰耶訓會情宗莫易也俸猶與也謂他少智不識耶正虗與四事也膩潤者橫計之人處處生著如膩潤處處汙物雖非真我自在猶耶計故亦得稱我亦復至耶者不知橫計五陰起於耶病故云不知病起根原風病喻瞋以操急故冷病喻癡以頓騃故焚病喻貪以燒心故煩惱非一切病喻八萬四千塵勞也又風起卒暴譬瞋冷性凝結譬癡熱性煩濁譬愛經云好醜等者好醜是因善惡是果又善是真乳惡是耶乳醜亦然是病者不知衆生不知舊醫是病起根本王領為義者王是一國之民如愛化者謂所化中能化為王所化為徒又主為王所為徒強請者既非真師義如強為衆生師耳心不側德者謂心無實解而行於善但行惡耳口不談忠者口但惡而無實信藥少者耶常世智焉能破惑名為藥少病多者界內界外三毒全在為病多取相緣無明者無明為本取相為末由於支末無明起於八倒是不知藥者尚不知無常藥況能真常藥耶佛假說我者佛說五陰和合但有假我悉皆無常外人橫計即離而出六十二見及毗舍等以成四姓八術者依阿含經一知病體喻佛能知煩惱輕重二知病因喻佛能知煩惱起因所謂種子及不正思惟是其正因色等境界及外道耶教是因也三知病相喻佛能知煩惱相也如瑜伽說貪心則下慢心則高有如是等煩惱相也四知病處喻佛能知煩惱處也違則起嗔順則起貪不違不順能起無明五知病時喻佛能知起時謂少時老時貪時富時或寒或熱或飢或飽隨其相應起種種煩惱六知藥喻佛能不淨觀等七知治喻佛能知不淨觀治貪欲修慈觀治多嗔等八知禁忘喻佛知不淨觀時不應取彼順情貪相修慈悲時不應取彼違情嗔相也佛知八正道者藏教八正專治耶常無生八正以破無常無量八正次第治前二無作八正雙治八倒今是圓門無作八正善法亡者出世善法也慧命者常住慧命也不增者不作惡也不損者雖投嚴等擬得滅身其罪不滅名不損不生禪定者不修四禪定斷鈍使故云也唯損無增者用欣猒心修也不遍者不斷無知無明及不能化他也兼遍者菩薩四門遍學名為兼遍而無摩訶衍即空之觀名無巧術無痛惱者即色而空幻化巧治其治雖巧不能令二乘見於佛性故云不能治必死之人治難愈者無明病也次第三觀入在方能治之故云不能一時也不能令過者初住不能為二住化名不能過此是一釋須依法華疏第九中釋為正復令過本者法身本體而無可過妙覺位極智斷圓滿義言過耳今之明醫者今經唯是圓教妙覺良醫經云從遠方來者從本法身地垂迹化世名曰遠來是治病緣者常人用無常法為緣也咨受者明外道不知請佛為師名不知咨不知從佛聽聞正法名不知受謂己勝佛名反貢高謂佛劣己名生輕慢脫冠等者出四城門見病死等而即出家先依外道師等遣馬者虔陟遣還宮等六年苦行等者等取稟彼四禪四宮空法也唯明此身者初成之佛唯是文母生身故云此身猶是外道者猶宣外人之教別有本身者至法華顯本竟方知佛非外道弟子共入見王者先外化也無觀機智者但有世智無照機之用唯暗惑心遍用耶化醫方者非但用無常及常醫方只三歸五戒十善皆是佛說並名醫方文鱗者文鱗瞽龍也神通如瑞應者彼經云佛入迦葉窟龍毒不中龍火不燒恆水不溺三方取果謂東取毗梨勒果南取閻浮果西取呵梨勒果北取自然粳糧忉利甘露知嫌隱去知念現來火滅不燃斧舉不下等雖覩衆變耶執末故言瞿曇雖神不如我道真佛即語云汝非羅漢亦不得道雙然開悟師徒伏如法華疏第一及記廣引以示神通之相三歸翻耶者翻其惡師惡法惡衆歸於正法正衆但云歸依佛法僧也初求願者經云今正是時者五人應悟之時實愛念者感理冥念令無著也根緣冥對者宿善及耶善兼正因內薰成出世小機冥發故曰冥對右手至便者譬小機感及餘身分者即譬大機冥為便重明觀機至一機者正是冥起小志唯宜初教被之故云不敢多有所求經云願王宣令者耶受化已用轉教化展轉相聞譬之宣令好害事多者害真諦慧命常住法身斷首者斷真空善根之首又萬善以信根為首若以倒見為藥則無修根為斷首之解以解斷惑者以無常觀解斷於通惑得真壽命得此命已必得常住慧命方名永終以惑障解者以耶常惑障真解失慧命名橫死又以無常障中解亦名橫死癡人者二乘也鹿譬陰境馬譬橫執取常為實智人佛也此鹿非馬者破耶常非實也而執無為馬者雖知鹿無馬而便執計無處為馬正譬二乘執無常也何處復有者無常之體本自非有況更計實豈非病耶佛果無常等者意云佛是常身二乘等見佛入涅槃謂定無常與己證同既執為無常此病易識病既易識示真常佛性其心易開故云易見謂生死等者生死本是無常之法更有為無常其病難識病既難識示生死即是真常佛性佛性隱密其心難悟故云難見欲死者有可發之機故也若無機者應云必死經云當云何治者大機發也衆生不受者正指方等中見佛功德之身菩薩不思議事聞說不思議解脫謂非己分如來重說者至法華聞實相未悟至涅槃方便受開權者昔說為實今云非實即是開權昔權宜者昔用無常治常並非真實今說此意即當開權欲欺我耶者汝先言毒欲欺我耶今既令服欲欺我耶昔若毒今亦是毒故云成上誤我驅逐者却謂舊醫是妙新醫非真故云誤我此中通體是譬者明前諸文並是譬也經云智人見之者新醫口不宣唱舊醫解藥心亦不𪫦經云亦是甘露者此之乳藥本是甘露二乘過者得之謂為毒藥滑草者又亦可以能譬鈍使貪順境如滑瞋違境如澀善好眷屬者以母善好子則善好且一一往釋耳國人至不受者受他耶語名鬼所持自生耶想名為狂顛令於教門可解者令見說常即知治無常病見說無常教即知用治耶常病為此義故但合兩藥說如來之是者明如來涅槃體不同生死誑相虗假名之為實出離情妄說之為真體無遷轉是故云常為衆德本說之為主諸行所說故復名依體無生滅名不變易汝等四衆下結勸修學第四釋長壽品就疏文為二先釋題次其文下入文解釋初又三先明立名所由次今釋下明名從義顯三此是下結歸本章所對初云前之三品者序等三品雖從人從事莫不皆為顯常故長壽居後以收前常無非長壽故次前品而來譯人左右者只是唐梵之異又是上下別耳恐依上文者依上純陀哀歎但云如來及以常住未云長壽所以今云即是正言由常等者此四為因獲長壽果故云從所得立名也次名從義顯中即依四悉義以立名令樹善者謂修常樂之善故也三結歸中云餘各隨便者論三十四問專顯長專及至答中則隨問施與雖復施與亦不出於長壽因果故也次入文解釋中云佛法至三者明勸具四悉以益物初勸至又表佛即世界意初勸除下對治意二勸受下生善三勸益物下第一義其上疑既盡者明諸比丘疑常無常執心已破深信常即非常非無常已竟名之為盡初勸則默者明此經中初段但有勸文而無辭不堪文則是默受於勸今經之宗者應知律是今經重寶贖於常住慧命非經正宗不應此說生公欲令問長壽因也長壽本是入生死濟物濟之良津以慈心為本矣慈之為濟先制戒律令不作諸惡然後使行善之極也於諸戒律者然經初無諸字惑恐有本有之所跡中著於諸字又應是取下經文云我今無智於諸戒律之語成此文意故著諸字律儀定道者律儀是別解脫戒定即定共戒道即道共戒也雙照至俗者此約七重二諦中真俗俱為俗以釋也明駿曰萬善終以戒定慧為本前句舉戒本性空寂舉定慧本性空慧之境也寂定也具說如上者指上汝戒律三學文也如來境界者理境法也此明照境之慧深廣難測非九界心之所及名不可思九界言不能逮名不可議允同諸佛名者同三世佛皆乘如實來成正覺故云同也所有諸定者約行也無三智者下地分智不能問於果地三智是故辭耳聲聞不堪寄者如來勸問必欲流通而諸聲聞不任有三一智淺二壽促三無眷屬以不能任持法也強受寄者若強受寄則是如來失所寄也百二十者生屬未來入滅是故不論如不能居者居只是住不能令大乘法久住也一萬者一萬兩為一金也百萬解脫者一句出生一萬句又一句皆以九百九十句而為眷屬即成百解脫如何得歸者破云像法時釋迦已去彌勒未出如何名二十年婦時還我即是還時者受化之人通別惑盡得見法身即是還時即是歸我聲聞妄受者澤州云比丘無有受法傳化弟子可以付囑名無繼嗣無常遷逼說為病篤滅身歸無稱曰命終所付之法無人稟行名皆散失推功者有諸菩薩堪寄何不付之而令我受是故辭也盛壯端正者亦可分字解盛壯譬自行化他具足端正譬得王三昧父母者母譬得三實諦父譬權諦故以三一一三對之經云一切聲聞等者在鹿菀時金是無常至方等等會冥成於常云云妄我推功者二乘但得妄我之心故云善得無漏心推功在也澤州云不自高舉名無漏心不者吾我名羅漢心二緣者曇濟曰一以聲聞無眷屬二以菩薩多眷屬僧宗曰一善能問答現在有益二令法久住未來有益明駿曰一能令法寶久住二利安衆生是故疏云或善能問答等悉出上文者如上應以無上佛法付諸菩薩等等惑指善能問答已下文也爾時佛告大衆至女人者此中有優婆塞等皆是大機發人經云我之壽命者壽命是果之極戒歸是因之始總舉因果以勸問也若得問人者若得稱會衆機與物有緣之人問者則能利益結緣當機及下位為影嚮等唯除古佛為影嚮者不論其益例作無而意異者菩薩文解故無疑二乘不能問名無疑又菩薩能問為利衆生二乘不能問但自行故云意異身密等義者等取名字功德品乃至開耶正四者於四德品也若問命即開天行者依常命理而行於行名為天行也若問辨即開梵行者梵行以慈悲為本即是以慈故說問辨即樂者多聞分別樂也問歸即我者三歸翻耶我以顯正我又有歸戒故常在人天自在而修故問歸即我問歸即用常辨者以翻耶常之辨而顯正常之辨論云者涅槃論也佛力大者經云以佛神力是也文殊童子者餘經中說文殊童子也經多羅聚落者此云蘆葦謂蘆葦村人也甲族者即甲第甲寅以甲乙丙丁即上族也為決定衆者地住已上菩薩名決定衆已得任運入法流水中善能決定說一切衆生悉有佛性也自咨發者迦葉自疑雖在大衆之例懼非應命之人故有咨也經令汝歡喜者得宜故喜稱機故喜也佛德等者一歎佛德巍巍高勝二歎佛衆清純無雜三歎佛身堅固猶如金剛明身堅也色如琉璃明身淨也四歎佛衆智德深廣不言自絶者謂大小天隔何者小身豈能問於大身小智豈能問於大智焉敢發言扣於上聖矣借助者若從迦葉諸加邊即入聲呼若從佛加說邊即去聲呼縱容兩存者此師於後四偈存於問之餘勢又亦得是問即對五行十德等此即雙破前二家故也梁武三十二問者據有云何而數之三十七者將後三偈足前三十四合為三十七為衆作依止生者指哀歎品委任大臣等文大明覺道者覺佛也謂佛道此顯一代是佛大化之道故不可從近而洗而合成兩問者若為三十二問應合為一若三十四即開為二開為四者下答中離為四答故須開之云何得是問因長壽及金剛不懷身是問果復以何因緣問因得大堅固力問果是則上半有因有果下半亦爾所以離成四問若數合偈亦合偈亦只三十二者初二偈但為二問也三十六者取初偈復以何因緣向足都成三十三云何聲聞未曾聞常者此一往約鹿菀得小果者不經方等等席直至今座名未聞常故應有疑以之為難又且約今經顯露邊洗以為難辭聲聞至執已破者明二乘於前二品聞常疑執已破為難若爾則問不因上者既云為緣故疑則不因上品應從文遠而生雙樹之終者應知破前不成彼亦不當故約後破之故非極談者談之不極故非極談常不可修者意云若本是常常體無修若既無修一切應常一切衆生既未得常常應有修所以問於常果從何因云何果上萬德至之因者萬善因也經云何得長壽者僧宗曰一期為壽期久為長常果非期寄言長耳蓋談慧鑒無窮即般若也云何得問其因也金剛不壞身此問法身如世金剛體不可壞能萬物取譬法身三相不能移其神萬化草能變其體澤州於此偈有三門分別一定問多少昔來相傳云此偈中三十六問二彰問差別有六一總問亦請問如言云何得長壽等二求問如言願佛開微密等三難問如言三乘若無性等四責問如言如至斷疑綱云何不定說等五讚問如言衆生大依止等迦葉欲將難舊先亦而為讚嘆是故雖讚而得為問六謙問如下文言今欲問諸陰而我無智慧等謙己不堪而起後說如此分別似有眉經之遠意其理不彰故示彼學知耳三分文辨釋偈判有二初問學法云何得近無上道下問學行此云何知如下大衆問品未將答學行迦葉請云願說是大涅槃中所得功德故知前是學法後是學行法通理事行唯在事法通內外行德唯內法通三性觀三性法皆得起行行唯在善法通自他他人之行得為己法己家之行得為他法如此判者太為淺局經可者然一一問皆通三世若別對者且從一往故云經可作為衆作依止者實非阿羅漢半偈亦是四依品答以四依示為四果故也本無偈答者次此偈彼即當猶如樂未生云何名受樂皆名有餘者次此偈彼即應云如其斷疑網云何不定說此二句答中不分出若合云何不定說入不畢竟句中即開前受樂足為十三問初段但為十四問只緣實非阿羅漢句答中不開故爾答卷少者從此下至大衆問但七卷經後問少者古人將得後四偈為問者從現病品去盡經答此四偈故問少而答文以此觀之知四偈非問經悉有安樂性者僧宗曰行之所生必由乎境境中妙不過佛性師子吼是略迦葉是廣經云諸陰者上至諸佛下及五道精進菩薩者八住已上具三不退亦非境界是以息問今謂藏通別三菩薩入空出假皆不能知也皆與理合者皆稱祕藏之理即第一義皆有所擬者於四悉如前四文是已得非始者如法華中文已得之非寂場始得本云已也加而讚之者上云假佛威加借助智力大衆善根添我機辨即是加相讚如文等無有異者僧宗曰此問總一經之宏致收萬行之樞機仰弘望旨故重稱善以讚也爾問我答照理是同諸佛敷揚何以異此故曰等諸佛也偏方不定教者古人判勝鬘金光明為偏方不定教法華玄中廣破此義今家不爾前四時教皆有不定如淨名經云佛以一音演說法衆生隨類各得解等即其相也或言是祕密教者師意亦不然但祕密在佛不可結集又不可傳傳即名為顯露非方便道場者中間今日皆是迹施方便示成如何偏據寂場為始僧宗曰非唯仰等諸佛亦復同昔大士昔七處八會華嚴方廣于時十方大士雲集論義亦嘗作此問也此亦不知寂場猶是迹施大海等者僧宗曰一則深廣二則藏寶故名智慧大海法性虗空者一則萬法本來無性二則涅槃亦稱法性此非思力所及也頂戴者僧宗曰謂蒙答旨頂奉恭敬如彼藏臣答長壽因者謂云何得三字是因也若有因果等者若因定是因果定是果則不可破以不定故得成非因非果之因果若定執者則墮斷常若言開因果之祕者此約開昔權祕成今大涅槃因果方稱涅槃正體故名小緣若為顯涅槃等者此約佛意及經部意以說何者昔施三權及經帶權明實復有從初即以大涅槃心持戒護法皆為顯非常非無常大涅槃體此為正意兼明因果者因果不得不有有能顯即當因果故云兼也方便說因果者此經雙明權實因果即是雙流之用以顯正體故名因果為方便說縱容者進退詳審得中以遣斷常之著故曰縱容抑案者涅槃正體本寂性離四執名之為抑依理而修非因而因果以顯正體名之為案如是修者方曰今經因果今明若因下此即因果相對以立自他等執若單約因為四句者因自是因不由果故因名自性因因不自因由果故因名化性因果因緣故因名共性因離因離果故因名因名無因性因單果四句例爾此約圓教四句以彼破性執又若因自是因等但成別教義以因果時異法體不融故爾皆墮斷常者計自墮斷計他墮常兩亦墮二無內墮斷故云皆也從多從正者前文因正果傍後文因傍而果正多少例此以因果相成不得相離即是消云何得長壽句若覆器者具足應云覆漏汙雜今文但舉一聞慧為誡耳僧宗曰將答所問事須誡而敕之夫宗致幽玄輕心所受雖復言迦葉而意在時衆語義中者論中更有二句云聞法歡喜心勇躍如是之人乃為說此業成因者一一皆次云破九法界因成佛法界因也業若定因者果外之因也業若定果者因外之果不得作因家之果因果叵得者俱契中理故不可得言語道斷等者只因不定因故言語道斷果不定果故心行處滅精進菩薩者藏通菩薩也別人初心即知中故具不簡又別人地前雖勤行空假不知圓常復次盡簡不能已已者章安謙恭也既已咨問涅槃奧旨及案今經祕藏之義不能忘於所聞之情故云已已至高無頂等者竪窮實相高不可得名無頂橫周法界邊不得名無涯多所成就者分證已上方名成就業能破業者空業也以大涅槃心持不煞戒等業破於權業入畢竟空名為破從無住業者假業也謂達陰界入即是祕藏陰界入無住祕藏亦無住以無住故還依院入無住立祕藏因果名為立業非破非立下中業體具遮照故名正業如是下融通結意言道前者發心已後訖至菩提皆名道前妙覺為道中妙覺證後名為道後故上文下引證顯體用相即以珠力者證體也澄清者證慈悲用也大慈大悲去證用也佛性證體也躬至繫所者譬如來道前垂應應於衆生如王回駕至其繫所亦有佛性等者此是抑挫引發之辭何者理性本同諸佛即體具足此引發也性雖本具多起罪業不能得見抑之言無有之與無無其二體只衆生即佛性只佛性即衆生如王子是因以譬無性因是王子以譬有性拔苦因等者謂拔九界三惑苦因與佛界菩提善因拔九界二死苦平與佛界大涅槃樂果即用而體者四無量心用也又二乘行者慈以無嗔善根為性悲以不害為體喜即喜受捨是無貪菩薩行者大慈悲等總以大智為體又說以定慧為體悲者能不能救苦苦衆生大悲者能拔三苦衆生有衆多差別相遍約四諦者謂約四種四諦無作四弘緣十界二死三惑因果以為誓境不但四趣以無作四弘遍開一切偏小等法故爾經云脫未脫者說集諦令行未度者說苦諦令度未涅槃者說滅諦令會未安者說道諦令安經以如是等業者用前一子四心四弘三法以為業因故也云何起愛者若有愛者則有彼此何名等視言自相違展轉有妨者謂互有相妨也前後不異者前即用而體彼即體而用舉佛道彼答菩薩道前體用無二何方等視而言有妨濟危者濟其違佛教者也危惡罪也都無所損者此釋當理順於慈悲經而不捨置者此舉非顯是國以酷為本若有罪者必加嚴形而無放捨佛則不爾於有罪衆生視之如子而不放捨十四知事人者十誦律八法第六卷中云佛在阿羅毗國爾時阿羅毗國僧坊崩壞佛知故聞阿難是僧坊重閣何故崩壞答言修治是僧坊人有死者病者反戒者餘國去者佛言死者反戒者所應作事僧更應羯磨立知事人諸比丘有能多致財物能成辨事者應六年立作若新房舍應十二年立作次立知敷臥具人三立知食人四立分粥人五立分帶鉢那人六五分藥人七立知作器八立一比丘令常住知僧坊九立分處人十立受護衣人十一立分衣人十二立分浴衣人十三立作維那人十四立分處沙彌人此十四人皆以白二羯磨差之如連匿犯可悔過罪不如法見故僧與我作不見擯諸比丘不與我共事共住作曰一羯磨曰二羯磨曰四羯磨布薩自恣及諸羯磨不得入立十四人數猒惡我如栴陀羅故云不得為羯磨主等如律廣說汙他家行惡行者此普是十誦律八法第三卷所明二比丘汙他家行惡行皆聞皆知行惡是比丘共女人一牀坐共一盤食共一器飲酒共宿噉宿食不受而食乃至乘象馬車輿與多人衆中吹具等諸比丘以是事白佛佛令與作驅出羯磨與人鬪競等者律中但云喜鬪諍相言已知是鬬諍比丘便到其所言汝等次言堅持是事莫為他擊汝等取勝我是我當相助等無至城中訴言疏中應是約義以說耳令依剛正者律云一應教汝依止某甲住二應說依心羯磨法云云居士後時等者律云爾時有憂波斯那比丘和檀提子與大比丘衆五百人俱皆阿練兒納衣乞食樂處空地居士見客比丘來去坐立飲食衣鉢威儀清淨即起敬心清淨因是客比丘故請名僧明日到自舍食時僧房主開質多居士不先語我因客比丘故請僧舍食我是質多居士菴羅林中摩帝摩帝陀羅僧居主質多居士不問我過是夜已我當共是居士語至地明了著夜持鉢到居士舍見辨種種多美飲食敷種種雜色坐具問言何以無胡麻歡喜丸居士答言我今樂說一喻如疏以此居士三代為壓油業故此譏之八法者若四分中一呵責二依止三驅出四遮不至白衣家五不見六不懺七惡耶不捨八滅擯九惡罵治律教中唯此九法今十誦文但八法耳五不可見者律中舉闡陀比丘犯罪問云見不答言不見如來立法舉出衆外有利皆奪待見方行名不見罪不懺者還是闡陀犯罪識知而不懺滅如來立法舉出衆利待懺方行故名不懺常光者常光一尋常有而無增減名曰光非常者或增或減為緣不同故也有云五色光中或放一二乃至五種通身為五者放光具多緣如法華第三疏引故注云云經未可見法者未見之法汝欲見者今當為說斷四住惡者四住是體外惑故以鄰王為喻無慈詐親者見行惡而不治糾共同處者是詐親之人而無慈愍初王大臣者涉云國況佛大臣況傳法者未發令發為産已發令成為育若生若養總名諸子道機不耶名為端正識達因果稱曰黠慧三根者上中下也四部者大論中或云在家二出家為四部或將釋衆梵衆足出家二衆為四部寶亮云若二者比丘比丘尼三者沙彌四者沙彌尼三種者信偏即三教正信即圓教囑教者澤州云有犯四重五逆及謗正法此三罪人衣法擯治而死於弟子中有犯十惡輕罪之人亦須治罰名餘一子必當苦治罰惡清淨衆當佛本意是故說言雖喪三子我終不恨又超悟記云假使三子至令成就者喻尼等三人為治罰故則退唯比丘一子須苦治罰要令成就三學也僧高曰明如來以四部弟子付弘法人教命三成就假令三部弟子付弘不從治喻不盡成道餘有一衆不以少故而不治之如此釋者皆為疏中所破是故述之令知所釋不會經旨經得初移無量者不久當聞安住移密藏中大福豈過於此非子不念者如來不爾是子之外更無非子致成平等不成就他亦爾尚得福無量者不久即得開權也汝以果計因者汝何故見佛為緣入滅謂為無常之果果既無常而因亦爾耶自有世間相續者一期未斷名之為常非數緣者非擇滅無為也虗空常者虗空無為以無礙為體本自有之者即色是空無於待對名之本有佛答長壽果者前答云何得三字今正答長壽二字佛寶常者謂明一體佛寶常也次明三寶亦爾地及虗空者虗空中空行水陸及人天皆有生陰中陰壽命喻如八河悉皆作佛如河必歸於海能出人天者若人天等由迷涅槃常命從染緣起出生諸佛從體起用即淨緣起而入生死為引九界衆生入大涅槃海故云能出如阿耨達池者從主立稱此云無惱熱傍名清凉無惱熱池龍居其中故出四河者經說不定或云出八或復云出二十河各有所以長含云東銀牛口出殑伽河南金象口出信度河西琉璃馬口出縛芻河北頗胝迦師子口出徙多河言八河者佛出山東三萬五河人皆具見備取為喻餘方大河有大名聲人皆同知亦取為喻通前說八餘方小河無大名聲人皆不知故不舉之所以言八言二十者如阿含說四河去池四十里外各出四河通本二十隨方趣海涉云恆河眷屬更有四河一間摩羅三名河利跋提四名摩醯宰頭眷屬亦有四一毗婆奢二伊羅跋提三奢多須四毗低多博叉眷屬亦有四一名婆那二毗多羅三名明𠍽四名光仲婆私陀眷屬亦有四一名薩梨二名毗摩三多般提四毗壽波是為二十也婆羅門等者等取一切天人居士一切皆由菩薩所化也明因地之時施一切命化功還歸化之所以至佛則常從無住本者祕藏常令無住全九法界壽命是九法界壽命無住遍祕密藏是以此二法其體無二故能遍立一切法也定出入者若出定出入定入者但成前教義今大涅槃出之與入俱是法界體遍虗空故以空為歎經如來亦爾於衆生中壽命第一者即當出義出意正為引一切衆生入大涅槃常壽海中名之能入故舉醍醐為喻經如來壽命若如是者如前四法故僧宗曰承機致請也經不應至盡想者若不於如來生滅盡想者何故請住一却等耶既請佛住驗生滅盡之想二況者外道五通尚能延促自在住壽一劫二劫何況如來已得常壽而不能住一劫等耶經示同毒樹者皆是毒樹次永煎除故云見捨難兩教者皆有如所言言即教也難兩理無異者迦葉意如來與外道俱同生同滅則知所證之理與外人不異外道盜常教者正法時猶有四依所以外人無能盜者未法方有佛理微妙者法身體妙非凡眼所見非心慮所思名為不現外道理僞者從冥初生覺從覺生二十五諦過二萬劫已還歸冥初名曰不現佛認歸者若為大機於華嚴已是認歸為於小機次更施小彈呵洮汰來至今經方始認歸色種種者色雖種種同共一群教雖種種同詮一理不期人天等者不期人天苦果二乘苦觀等弘經人自益者此約如法弘教之人雖為他說他既不受以法末故但著名言只成自益無有婦女者無上菩提以大慈為本外人既不為無上菩提即當無慈有得之利欽慕深理者此即機中欽慕何者既欣常樂之名義問欽慕深理非常住基者以大涅槃心持戒方堪為常住本降茲之外皆非無定慧方便者圓常定慧方便也澤州云正觀名攢傍推曰搖世善逗生名漿難得漿譬人天者精純成蘇餘汁為漿意云酪之所棄尚不能得況復酪等起我人知見等者十六知見中第九我見謂橫計五陰名之為我四人見計我是行人七知者見計我五根能知五塵八見者見計我根塵能見於色及起耶見等生取者見計能生衆生如父母生子二養育見計我能養他三衆數見計我有五陰十二入十八界五受者見計我後身當受果報六起者見計我能造後世果報十衆生見總攬五陰名為衆生十一命者見謂命計速續恐速續斷十二作者見計我能有所作故十三壽者見壽計一期尋常雖計病時最切恐連持斷恐一期短十四使作者見謂驅策由我故十五使受者見苦樂由我故十六使起者見令其還生欲界名起者見故云等也人天善失者僧亮曰耶見多者能斷善根人天俱失餘是像末者生公曰佛經令人得戒定慧斯三法者本是得佛之惡道彼以取世樂失本為餘加之以水者經云士夫者執我外道是身見水也梵王者謂事梵天外道彼計梵天能生世間非是生因謂是生因戒禁取水也或計梵天為常是邊見水也自在天者事自在天外道也亦計為常能生世間亦是邊見戒禁取水也微塵者順世外道勝論外道計也彼計極微為常能生世間亦是邊見戒禁耶水也世性者數論外道計冥諦為世性亦計為常能生世間亦是邊見戒禁取水戒者謂外道執狗牛等戒或是凡夫執別行解脫戒及定共戒能得涅槃定者或是四禪八定或是凡夫有漏三昧非涅槃道執為因道是或禁取水智慧者或是外道世俗智或是凡夫聞思修智既是有漏非涅槃道執為道者亦是戒禁取水也及與解脫者謂外道六行伏惑斷下惑時無間道後證根本地名為解脫非真解脫計為解脫是見取水非想非非想天者此是生死苦蘇實非涅槃外道謬計亦是見取水也此等執見與愛慢無明相應起者盡名加水乳也有少梵行者持十善及八戒兼供養父母等皆猶佛法而有此法是如來無緣慈力少分依行果得名少梵行歸依三寶者不知歸依同體三寶為常因也既不識因亦不識果故云而實不知也遍六大城者若據破外始從華嚴等受受驅遂今且從最後說有漏智滅至涅槃者此用擇滅無為斷有漏智盡即得滅理涅槃不取非擇滅為涅槃以有擇滅但是𨷂緣而已此二智俱通淺深既有是非者猶無漏智非是涅槃所以智不捨智若道能致滅者三十七道但能通滅不即是滅故非涅槃即二智前後淺深為難今引三師但消𨷂捨智之文以法性難身者以者滅法性難今法身也更互相難者身若存者不應言法性若云法性不應言有身何者法性是無而身是有致成相害四身至不解者復云身存復云法性故今不解無想天等者舉其喻事此天在第四禪依廣果天別有高勝處是無想天受報之處有諸外道修無想定生於彼中初生有想中間想滅經五百大劫無想無想衆生定成十入謂六根四塵為十除香味二塵也問彼天不能發語無出入息如何有聲答身上諸處必有外風擊發內身以生聲故定成就也命欲盡時心想還生便謗涅槃終入地獄佛今舉之彼想滅時但有色陰而無色陰所依之想亦無色舉緣之想從生愛結者猶有心故而起煩惱名為愛結則有非至處者既無想心唯有命根持令報命而得不斷如從外來贊之名為補處不應作滅等者不應作法性滅身不滅難何者如來為緣故生為緣故滅咸令衆生至非滅非不滅云何一向作生滅難僧宗曰豈況如來妙極而當可知昔指孤滅以為法性權而非實經無有異相者佛即法僧法即佛僧僧即佛法即若云生滅即是異想此三法是一體而無三故稱無異相體是常住故云無無常相不為三惑二死所遷故無變異相即一佛體之三也以覺察之義為佛寶體無非法具衆功德故稱法寶體不隔物必與理和號曰僧寶若於三法為異修者當知此人不成清淨歸依既謂佛寶未極云何而得具足戒耶若依憑常住三歸則得戒具足也經清淨三歸者一體三歸也若昔四時等者但說時未至故不得說非謂小乘歸戒而不成就若聞今經聲聞要知佛性歸戒方具若不知者歸戒不具所以十仙既先取小果彼方入祕藏當知已得者若說化意可言已得若從機緣說時未至不可云得經如來亦爾等者有常法故合前因樹明一體法身常故則有歸依合有樹影明應身別體亦常故云非是無常即總結為常經則非諸天等者意云如來若常可為無常人所歸依處如來既是無常以無常人歸依無常佛者則非歸也經有樹無影者樹喻法身影喻應身以一體法身常故應身亦常迦葉何故難言應身無常僧宗曰舊釋樹譬真法身影譬應身於前文為便於難為不便今云有歸依者正言極果妙有是常則有歸依之德若無此德有義亦壞是故迦葉就影為難欲使無歸依之德也此釋只成一法立二義耳應依法應俱常以釋僧亮曰星月有光樹有暗影但以微故非肉眼見法身亦爾非汝所見經父母各各異則不能生子和合有子喻之如常若無於子義當無常經而作霜雹者摧於無常之見令生常見常解也承保四年五月二日書寫已了對本一校已了
