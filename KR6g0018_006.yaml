body:
  text: 梵行品二亦一往者然經中三心成共結一地捨心成獨結一地二教皆爾但是一往而已二往不然何者一子即具平等平等亦具一子二地體同不應分二即理而事者由證空平等方有此用與愛相扶者初住分得無緣慈相應視諸眾生由如一子所以同制一果文略者前三心文應具捨心捨心文應具餘三心亦是互現者只極愛一子即具空平等平等即具極愛一子此即將平以顯不平二云八地者未知何教八地三云初地者多在別教初地也若過者超入八地也若不及者今明別圓之果應不由在通教性地極愛就心者愛是大慈之志大慈之極專是就心子非我內者愛是能愛之心子是所愛之境故云非我內也結判分明者一一文末皆云名極愛名為一子即是結對上文發心學人者別圓初心法雖圓融而人未免於滯着身口意業者於五陰上起身口意業由未得三密故無非是惡救其口過者身口無過意任運無故略不經云捨而終己者譬眾生善根都盡經云善言誘喻者始施人天等法漸漸誘之令入圓極故云也通譬救因果者若墮獄等是果造作善惡等是因直甲不解者如佛向舉五譬皆住極愛及一子地後云煞婆羅門其義甚深故我不解或云五難者開初煞婆羅門難為三并第二第三為五經云昔為國王者若不行菩薩行客可煞生煞乖菩薩之道違於慈心如何名為住一子地經云若不得者難意云若不得一子地煞應墮獄若不墮獄不應斷命故左右難之不及弟子者不及須菩提也經云現身得成十力者於此犯重身不悔即得佛者我亦不為眾生作煩惱因緣更有多事者文中都有六事前三後三經云佉陀羅灰者僧高云一燒六日乃滅堅利傷人總寄迦葉者由迦葉聞故寄迦葉以試後代無智之人謂如來實罵實煞經云慧施眾生等者大真心修圓極六度所以一一皆得命長若非圓度唯不煞一得壽命長經云若儐若煞者貴得免於毀傷身體所以父母而自煞之佛答言得者上佛答意未得不動地為難法故為驅遣惡人破惑無罪是見機煞者此解為得復須縱容為何位次及護法心令其有在若俱非化者仙豫及童子俱是實者童子死已不見生處仙豫及婆羅門那見生處耶驗此不可一例判之理在其間者今則縱容得中須權實二釋以見機故權為引實實隨於權又權示同實若未宜發迹終不得云是權又今文正意前未得無畏地尚得破惑何況入地而不得耶是故二文更無違妨古人如何作相違釋經云若害和上者外人稱本師為和上亦計和上為出世父母父母是世間養育恩重此於人有罪外人所計亦有上中下罪互明與奪者無節故奪得報故與經云知方便者知機知時宜權實稱適物情意令入實名知方便經云食人涕唾者調達修𤏙法觀得上界禪化為小兒坐闍王膝上等四味者者地論云初一是戒次二是定後一是慧此後是一意作四諦釋於義則順然經中有二譬二如文出苦味者出離二死名為苦諦空平等者即地體也知見者能知見也即寂而照者寂即空平等照即知見空即平等有即知見實即平等權即知見事理亦爾平等果者平等是果名平等果又空是梵行所證故空是果引經云七地能入寂滅者華嚴十地品云解脫月言佛子菩薩何地未能入寂滅金剛藏言六地未能入寂滅今住七地於念念中能入寂滅而不證寂滅是菩薩成就不可思議身口意業行即其證也彼文仍屬別教教道之說故今不用理同能異者一子約能用空平等約體故云能異生空等者文中約所已邊且分二空理實而言以大真心修已此二空方稱中道亦是中道體具二空事空為譬者譬前生法二空也大品明十八空者大論三十四廣釋其相今依彼略消一十八空一內空所謂內六入眼空無我無我所無眼法耳鼻舌身意亦如是二外空所謂外六入色空無我無我所無色法聲香味解法亦如是三內外空所謂內外十二入中無我所無內外法四空空謂以空破內空外空內外空破是三空故如淨名云唯有空病空病亦空故名空空五大空所謂十方相空故名大空以十方無邊故空六第一義空所謂諸法中第一者名涅槃涅槃中亦無真相真空即第一義空也七有為空有為法者名因緣和合生所謂五眾十二入十八界等今有為法二因緣故空一者無我無我所及常相不變異不可得故空二者有為法相空不生不滅無所有故空八無為空無為法者名無因緣常不生不滅如虗空故今侍有為故說無為若有為法不可得則無無為之可著即是無為空九畢竟空謂以前八空破諸法畢竟盡淨名為畢竟若無諸法亦無畢竟云何著名畢竟空十無始空一切世間若眾生若法皆無有始無明覆愛往來生死不可得破是無始於無始中無執著故名無始空十一散空所謂五眾利合故有人若智慧一一分別破散人與五眾及前破散皆無所有是有是名散空十二性空性名自有不待因緣若待因緣名為作法今諸法中皆無自性性不可得名為性空十三自相空一切諸法有二種相一者總相如常等二者別相諸法雖無常而各有別相如地有堅相火為熱相如是二相皆空故名相空十四諸法空謂五眾十二入十八界等法皆入種種門一切法有相知相識相緣相增上相因相果相總相別相依相等一切皆空空無實故名諸法空十五不可得空一切法及因緣畢竟不可得名不可得空十六無法空無法名法已滅是無故無滅名無法空十七有法空所謂諸法因緣和合故有今皆空故名有法空十八無法有法空取無法有法相不可得名無法有法空亦以觀無法有法空故名之為空又九十二云是十八空性亦自空即是能空亦復皆空以二經互顯故得引同也或論七空者楞伽但列七空一者相空分拆自他共不生故二者自性空空於諸法自性不生故三者無行空陰本真故四者行空陰入和合離我我所故五者不可得空諸法妄計無可說故六者第一義空自證聖智離過習故七者彼空彼空中最下無沒彼此亦是合十八為七空耳然彼經意與大論不無小異故知楞伽七空多在藏通以自證中三離過習故從容取之稍通別圓大品唯在衍門三教大品廣空等者彼般若明空蕩相所以廣明於空即以空顯佛性今文專明佛性以性顯十一空何者一一空文皆云常樂我淨及三寶佛性為能空正體父母等為所空之壞互無空者說內空時無外空說外空時無內空餘五皆爾名互無空任理空者性自是空故云也以修行有漸故者今十一空無有淺深如何以淺深釋之十一空皆是破病者亦有此義但不合與今文同澤州云前十相空後十一真空就彼妄情所取法中以明空義名為相空就真識中以辨空義名曰真空又前十境空後一智空就境者據實以求心外無法一切諸法皆即真心體寂智者地論云一切法如說自體空名自智又就前十中初八以無明破有為空第九以迷無為空第十以其非有非無雙破有無名空空又就前八中初七明其眾生及法無相故空後一明眾生及法無性故空因緣假中而無空性名無性空畢竟空中無因緣名無相空然今經意一一空文皆明三諦佛性以為空體只作生法等釋不會經旨是故引之令識同異於文為得等者但云互無其文雖得道理不通應先出內空外空之相內外不顯但云互無致對其失於理為得者道理雖得於文不便何者文今對事別所空不同但云明外空時例解內法若但例者文相不分故不可用經云內空者無父母至財物是所空境次從是內法中不舉能空體又釋內空時無外空之境即名內空釋外空時無內空所空之境即名外空所以二空共為一科法華疏第八釋身安樂行云不顛倒即內空內無六入我我所故不顛倒不動即外不為六塵流動不退即內外空十二入空故而今經中初二空合釋其相難見是故引之例出今文二空之相若作相待者他云由待內空方有外空若內無空外亦未有故云易見合為一空者一平等空經云內外空者先出所空境次唯有如來下出能空體經云有為空者先出所空境次是中下出能空體經云無為空者先出所空境次從佛等四下出能空體始破明無者只是無始生死被破名無始空此之始破實無於始故云無無有始即是無始空始無於也法華疏云不起即無始空求原初不可得名無始空經云無始空者生死無始是所空次從皆悉空寂下出能空體經云性空者先明能空體次謂下出所空境破性說空性者他以內因外緣破四性計方得性空今釋則以法性為自無明為他以成四性破此四性名為性空經云無所有空者先出所空境次從菩薩觀時下出能空體愚癡人譬外道貧窮人譬二乘兩不之義者論八不明中今則與彼不生不滅義同己有還無者空也無眼者無實法無主者無假名經云有業有業者二乘法也寄有明無者達無即中道佛性故云寄有等法華疏云觀一切法空如實相即第一義空經云支仙等者等取小菩薩及凡夫兩是皆空者前是有是無皆空也是是即權智者權智分別故云是是實智體空故云非是今更作三句責者責前第三師但立境智前之三教悉皆如是故云此猶是偏若將空空下今以佛性中道空空前三教境智方名空空一切諸法者三教境智皆空也智體不空者能空智體不空理無並照者意云境則有二智則唯一故無並照遣義可知者智雖無二能遣所空有無之執故曰空空人多重無漏空等者若重無漏即輕有漏將有輕無名互相空故曰空空二空體下破萬法既寂下正明空空之體萬法既寂明所空境空智體又空明能空亦空故曰空空經云所得空空者辨異也二乘亦得重空三昧故須辨異經云大空者應云謂摩訶般若等方名大空更互相顯者涅槃是所空般若是能空能空即所空所空即能空故云相顯真諦空者且約對所空之境名真諦空此一真一切真俗諦空亦爾即不思議俗此一一空皆約圓融三諦釋不見元祖者若有元祖則有能生有能生即有後胤何者空即假中假即空中中即空假故無元祖然疏中欠消無所有應云三諦俱寂名無所有真即是中者有真之中方成圓義是是者中道雙照故云即具空假單照一諦者非是即中道雙非也空故是是者不議空即具於假故名是是假故非是者假即具空又不思議假能非偏假若取易曉者只空是假者云非是若雙者釋內外空及第一義空若隻者釋內空外空及有為空無為空若三者約三諦釋也若一者釋性空也經云虗空等地者住於初住真空佛性空如來空也經前離後得者經中先法說次有兩譬兩合皆先明自他離著後明得地初譬明空不受一切次明空容受一切又前譬明有染淨相顯功能次譬明容受相顯功能廣辨知見者知見既廣驗所證平等之空體彌法界故以廣見而顯其體即寂而照下生起四文一一知見無不與畢竟空理相應一知十三法等者此明內心淨故能知能見致有四辨外用經云亦見亦知者見謂五眼具足知謂一心三智圓行即是心者四教能觀心也境者亦通四教所觀也性者十界性分不改也相者十界外相不同也因緣者四教感應不同也若眾生心者十界眾生分別心不同也若根者四教根緣不同也若禪者界內外禪不同也若乘者人天三乘九乘等又為實施權則三乘不同開權顯實唯一佛乘若善知識者四教知識不同又善知識魔等若持禁者十戒也若施者四教行施不同謂廣大第一常等經云知而不見者菩薩知眾生不見佛性也編必緣反椽傳音又餘戰反用棘㓨編為蘭圍身坐臥也氀力珠反布織毛為巾名氀經云若能修行檀者四教檀也是知共行者偏圓頓漸之法凡聖共行此法名為共行是知果者文中又從闇入闇從明入闇是不善迷果從闇入明從明入闇是出世悟果經云修心者謂定也經云如來亦見亦知者見謂自見知即知他不知不見至俗者此是冥出假經云菩薩知有種下此是結但不別開此結文經云五眼所知者應云三智知今言眼者以眼顯智爾智眼相即法句論者長短句也經云不名菩薩者不名空平等地菩薩他云是遣執釋者此是地上菩薩復有何執而云遣執耶言地持者一一皆是任運能持往因釋者如法華壽量行因也經云修行世諦者不思議世諦也經云必須軟語者軟語用攝受門麤語者用折伏門二開昔權者此是施開之開三顯今實者經舉昔小不具以顯今菩薩具前文已遠者此指大章第三明四無礙智初問次答文意而為領旨上經云迦葉菩薩白佛言世尊菩薩摩訶薩能如是知得何等利佛言善男子菩薩摩訶薩能如是知得四無礙故云梵行品中也經云而汝復問者汝問契當機宜故佛讚之倒無倒者先界內外四倒智慧下九皆復約界內外以釋大小乘者約教簡也方等三藏者約部簡也經云十一部者除方廣部真空生死者先分段及變易二種生死經云若生死輪者為二死輪所轉五見者五見雖在界內二乘等於界外全是五利故云自此之前皆名耶見人菩薩二乘者約道簡二乘是化城道菩薩即實所道以二乘是菩提心魔故經云永欲斷二乘道者斷二乘之道及偏菩薩之道經云汝之聞等者皆猶得空平等故爾直是語法者他意云在此樹說云於此者但是言語之法二云見開者意云或於此即說彼於彼說此故云寧有定所略標者出標佛意也經云本有先量煩惱者佛無始來有無量煩惱以有煩惱故今在鹿菀時無大般涅槃本無有在小時無大乘修成種智般若今在小時唯有煩惱若有沙門下釋三世有法無有是處謂本有煩惱今有煩惱皆非三世所攝以於如來無非法界故本有者我本有王宮受父母和合所生之身今無大乘金剛微妙法身但有小乘五分法身本無者我身本無大乘三十二相之身今在鹿菀但有寒風索衣熱病求乳等身若有沙門下三世有法無有是處本有者我昔在鹿菀時唯有無常等觀今在小時無大乘菩提本無者由本不見佛性故今在小時致無常樂我淨三世有法准知本有凡夫修苦行心者以在小時但修苦行禪定謂是菩提致使在昔不能究竟破四魔八魔但能少分破天子魔何者陰身猶在故爾本無六度者昔無無作六度但有苦行之心所以現在不得大乘無上菩提三世可知我昔本有雜食之身者受乳糜等身也昔日無大乘無邊法身本無三十七助道者昔無無作三十七品等為是義故但有雜食之身昔無大乘無邊之身三世可知本有至取著心者但有二乘真諦定心名為取著現在至空定者昔無首楞嚴定本無至中道者昔但有編真之心無有大乘中道實義三世可見本有至菩提者初得大乘菩提本欲說之名為本有眾生根鈍不即得說名為今無本無利根名為本無今有者昔日方便施三名為今有三世可知我本說至三月者在昔鹿菀時說現在不得演說者由機不堪致使昔不得說大乘方等經典本昔無有文殊者昔日但說如來無常名為今無三世可知又每一句皆須云三世有法斯有是處何者施開廢會自因之果引入圓常化儀鹿宛然若言無是處者六即亡泯解之與惑無非法界但非世攝後釋下半者八文中每從若有沙門下是釋下半無有是處昔日有無者昔日有之與無皆是無常何者雖云今有涅槃只成釋於上半差別之義何能釋迦葉難遣純陀疑耶乃是者今有真也興皇所釋但得通意猶不相即雖言但了由是未了故今不用眾生唯作善惡等者明凡夫二乘菩薩皆只得上半差別之義文殊具得四句何者三諦即一諦一諦即三諦得上半即非三非一得下半又即一而三即三而一非三非一能益眾生斯有是處又若消偈者本有即俗今無即真三世不攝即中又本無即真今有即俗三世不攝即中四門者若約三諦為四門者真即空俗即有雙照即帀亦雙非即亡有亡無遍兼一切法者為實施權釋上半一一皆是者各得昔教上半差別義故知言有等者釋上半皆為利益釋下半經云略相等以一乘為三乘會三乘歸一乘名為略相等又如上文說十二緣總名有為名廣說略一有為中開分十二名略說廣四重之法等者將菩薩戒十波羅夷與小乘四重對辨以論輕重犯不犯及菩薩戒輕垢與小乘十三已下對辨制犯不犯異又如僧祇盜人四錢三用名犯波羅夷四分說為偷蘭偷蘭說四重者飜前即是犯說非犯等者如八不淨儉畜非犯豐則成犯輕罪說重等者四分中著白色衣犯提不點而言犯吉祇律中著白色衣犯吉不點犯提皆以生死為世上半也真為第一義下半也有時者上半即下半或說所諸法下半即上半餘皆例爾眾緣皆作有無之見者即上半也若於諸佛見無非法界非三世攝經云名為道亦名菩提者道者梵云末伽如四諦中道諦菩薩此亦名道此二何別通則是一別則末伽是其因道菩提是其果道為此義故別立二名常道雖得等者常道即是得而無得無得之得方名大得二乘雖得而是無常經類見者即實而權即權而實即非權實相似尚非虗妄何況了了是虗妄耶經云坐有如來悉知覺等者澤州云一就行二約位就行者聞慧為知思求稱覺修證名見又聞思為知修觀明白說之為見證會名覺約位者地前名知初地名見二地已上重觀名覺今明六即之位明其知見覺佛性之理梵行品三問同世者此二聞並是正聞不是難辭何者先為舍利弗說世間知見佛亦同得知見為定爾不若定爾者與世何異聞異世不知者問意者世尊既同世間有於四大著衣喫會世人何以不知見覺世尊何緣獨得知見覺耶我今不解願佛為說故云其義云何即總結二問也經云名為菩薩者謂說名字菩薩也經云不覺十二部者不知佛性十二部不知無作十二因緣即三德佛性不知八倒即常樂我淨不知無作四諦不知無作三十七品以此等諸法為因得菩提涅槃為果世間之人皆不知之若能知者即是行相似等菩薩經云梵天等者涉公云梵天初禪主自在天四禪主八譬手天護世主性者即數論計冥初性也時者謂計時生萬物微塵者即順世外道說細微塵生麤果色法及非法是勝論師計善惡行生苦樂受各計所執為萬物因名造化主世界終即邊見初禪等為真是見取此是世間所知見覺謬解為正橫計斷常者作無始無終釋者墮常計作有始有終釋名墮於斷計非謂全是外計義同此二非世出世者菩提涅槃之體不當世與出世故云非也經云不名非世間者諸佛菩薩名非世間初半行如前者同古人判明佛有大慈能與眾生大真樂所以歎之次行歎大悲者能拔二死三惑苦因苦果故以歎之喜之所離者究竟離苦也喜之所得者見眾生得大真樂也歎大捨者眾生既究竟離苦得大樂已故我捨之故云不死亦不生以戒為本者梵是淨義自若無戒焉能化他又坐行亦以戒為本文雖在此意必在初若無戒者化他無本法爾故也者道理應爾難同世者菩薩既同在世間應同世人不見覺經云是則名為世間菩薩者名字菩薩也不一向同者一同世知見二異世知見三能知出世故云不一向同但言二者略無於定也經云不為四風者不為界內外八風所動四倒亦爾經云而是菩薩所知見覺者世間初心菩薩經云乃至明了者得空平等菩薩如難陀者如止觀記第四卷呵五欲中廣說緣起不能從始至終者此但有始而無其終對前四不淨者翻前四不淨名為對前對前無始終者今第一戒翻前第三非畢竟今第二戒飜前第一為有今第三戒翻前第二不定為眾生如文非是五戒等者應云五戒十戒等以大涅槃心修名為非戒不同二乘凡夫決定心持經云自然而生者如前文歡喜心自然而生悅樂心安隱不動定解脫見佛性得大涅槃等自然而生即觀行已去人也經云執持明鏡者憑教而修戒品明淨故云面像自現觀行已去人也經云如農夫下譬由戒淨故有生善之德亦如燃燈下譬由戒淨故有滅惡之功經云以淨下文略應具如前無悔心悅樂安隱乃至見佛性得解脫涅槃譬文及合文皆須例前經云自見面貌者自知我是違教之人所以自見面貌不悅經云心則歡喜者應云破戒之人心則愁惱五受根者苦樂憂喜捨根曰憂在欲界猶未得禪而為欲界煩惱所動故憂苦在初禪以初禪中具足眼見色耳聞聲身覺解無香味二解為三所亂故苦喜在二禪得離初禪三受故喜樂在三禪二禪雖喜猶離苦得擾動不安故三禪稱為樂受三禪雖樂能沉沒行者身心是故四禪能捨苦樂即證不苦不樂相應今同禪支者同禪五支覺觀喜樂一心則喜淺樂深經云上名為樂者樂是上果之法故名為上五法佐助者得離六種五法佐助也名涅槃者大涅槃也經中信等及五見等皆須深釋方稱今文猥者惡也一無所用者無人天之用既失人天則無受道之用僕趨者菩薩為其走使令其讀持等今誡人師者既是佛法護法之人應須持戒勿得毀犯呵求有者求二十五有由其心非故屬意業不求果報者坐為無上菩提不求九法界果報方名沉審莫不請者若有利根重法之人則不須待請應為他不請之友若鈍根輕法之人則須待請故云事須適時十智等從若欲受持至佛性有十名名為十智從無當下次勸淨心經云說佛性者佛性語單且約正性秘藏則具三德涅槃涅槃宗體等者大涅槃體也說佛性宗也宗尊也非宗體之宗大乘等行也解脫用也若聞一偈等教也三業清淨者文中具明三業是也十念者阿含經云佛告諸比丘當修行十法便成神通去眾亂相到于涅槃一念佛乃至第七念休息八念安般九念身非常十念死當善修行念體息者謂心意想息志性詳諦亦無卒暴恒專一心常求方便入三昧定常念不息自致涅槃八念安般者只是數息知長知短知冷知熱出入分別息長故除諸亂想自致涅槃九念身者專念身髮毛爪齒三十六物何者是身地種水種火種風種皆是父母所造從何處來為誰求造此之六根於此終亡更生何處自致涅槃十念死者專精念死此沒生彼往來諸趣命不蹔停諸根散壞如腐敗草自致涅槃阿含唯小大品專在衍門今引小況大念境無別但觀有巧拙不同八念者於六念上更加念死念出入息有壞恐怖者聽此通於初心修於六念拂除恐怖慕果行因請三實加護示導於我令我自身一體三寶速得現前故念三寶天有近果等者華報近在於天遠感無菩提大涅槃果雖近在天天非所願故須期遠又復不可一向唯念第一義天復成不普故須並念經云何念佛者然念佛具其四意一為令建菩提願故為上求境二為令慕果行因故無念果次方念因滿菩提行故三為令如理而解了心佛眾生三無別故四為度眾生諸佛加護導述開發令速證佛德故故無念佛別十號者如釋迦彌勒等是其別名如來等十是其通名化相須分故立別號實德齊同故立通稱總結上德者將世尊總結上十號十號具足為世所尊故名世尊經云十力者謂十力降天魔四無畏伏外道大師子號者決定說也大沙門者能滅惡也大婆羅門者眾行淨也大淨者三障二死究竟淨也無能勝者萬善圓滿也無見頂者出賢聖之上故也無有怖畏者永離五怖故不驚者無能驚忤故不動者心常在定故獨一無侶者無與等故無師自悟者了見自心不由他悟故疾智者知法峻利一念能知一切諸法故大智者知法深廣故利智者見明也深智者所知淵深也解脫智者出障清淨名解脫智不共智者高出餘人不與下北共故廣普智者平等利物故畢竟智者究竟圓極故智寶者總結也人中象王者荷負力大故人中牛王者行步平等進止可觀故人中龍王者興慈悲雲澍大法雨故人中文夫者相好嚴容人中尊故人中蓮華等者二死不能染性清淨故調御人師者智能益物能物心故為大施主者以法慧人故前文皆略者具足還用七善一一釋前諸德使廣略義均故今且略消眾名之義經云以知眾生種種性者前釋知尊卑中約十界釋以此驗前釋知前當如如而解者如理而解名如如如而說者如理而說名來說我所解名如解我所說名來經云夫四魔者應云俱壞八魔侈尺氏反奢也就脚足釋者行字平聲呼滿足釋去聲呼憊𮑱界反病也五陰等者五陰等是果世間五欲一是因世間雖六不同不出因果開斷惑者有所斷者名有上士無所斷者名無上士也鹿頭人者大論云昔波羅奈王入山遊獦見二鹿群數各五百各有一主一是釋迦菩薩一是調達菩薩鹿主見王煞其羣黨起大悲心直至王前跪白王言以小事一時令鹿受於死苦若以供饍當差次送王善其言於是二主各差次送次當調達羣中有一母鹿白其主言我死分當而我懷子子非死次屈垂斷理使生者不濫死者得次王怒之曰誰不惜命次來但去母思惟言我王無慈橫見嗔怒即至菩薩鹿王所具以事白菩薩王言唯我當代即自送身到其王門眾人見之怪其自來以事白王王亦怪之王問羣鹿盡耶而忽自來鹿王白言大王仁慈人無犯者但有滋筏無有盡時但彼鹿母歸告我我愍之故若非分差是亦不可若縱而不救無異木石是身不久必不免死厄慈救苦厄其德無量若人無慈與虎狼何別王聞是語即從座起而說偈言我實是畜獸名曰人頭鹿汝雖是畜生名曰鹿頭人以理而為人不以形為人即其事也野干者大論十三云譬如野干在林樹間依諸師子及虎豹等其餘肉以自存活時間空闕夜半踰城深入人舍求肉不得避走睡息不覺竟夜惶怖無計始欲起行慮不自免住懼死痛便詐死在地眾人來見有一人言須野干耳即便截去野干自念截耳雖痛但令身在次一人來言須其尾復自念言截小事次一人言須野干牙野干自念取者轉多儻取我頭則無活路即從地起奮力絕勇開歷涉經得自濟行者之心求脫苦難亦復如是生不修如失耳老不修如失尾病不修如失牙豈更至死則如失頭即其證也彼此之異者他云梵云婆伽婆此云世尊破煩惱者破煩惱究竟盡也功德者具足果稱法界巧分別者任運分別法界法為實施權開權顯實法也好名聲者於一一方中皆稱十界眾生令諸眾生從權入實方名好聲但說三教未名為好經云大慧施者如來利生以施為首經云吐女根者久已破於女業故云吐也餘三復次至功德者為滿功德故慧施為滿功德破於女業并第四有大功德無能勝故亦屬功德經云長老者上座有德者長老五十四心者一一皆約佛心釋無下九界心方是佛因謂無所為作者因心已滿雙捨此二者常住中道也知解無記者任運而記果報無記者白淨無記也不求果報者三因開發任運契極不求九界之果報經云無語心者若知如來常不說法是名多聞無所定執者無常定執之心也經云念法者具於三意一為令常觀真行道無餘念故二為令眾生獲菩提涅槃妙果故三為度眾生置涅槃岸得諸佛所遊居處故又經中一一句法皆先舉法體次出功能如云非色斷色非色法體也能令眾生斷色功能也非業法體也斷業下功能能令眾生斷業也餘句例爾文中具約三科法門以示法相經云諸佛所可說法者能詮教法也得現在果此至圓人始終常觀涅槃行道無有改觀因果理一又一生有超登十地之義縱經多生以觀不改名現得果三藏菩薩亦據不改觀邊及於分段父母生身三十四心斷結成佛名得現果通教七地已後留惑潤生雖處處受生與物結淨土緣於潤生身而成正覺名得現果別人猶次第修節節改觀反動經劫數方滿所以不名現在得果經云云何念僧者經具三意一為令達心性理和上冥下契無二無別故二為令稱法修行成菩提行故三為度眾生令其心調柔平等無二常不變易成真僧故經云諸佛聖僧者諸佛已下名聖僧如文殊普賢等法佛非僧但是舉佛顯出僧相經云隨順修行者謂壞智相應有上冥下契適宜之用經云廣普無邊者能福九道眾生令入圓極方名上田圓僧是正直法者念僧是法念法是僧方名正直前三教僧迂迴偏曲不名正直云何念戒者然念或具於三意一達戒法性二為度眾生為淨土因三為求無上菩薩具此三意故須念戒經云有戒不破等者明菩薩只於小乘二百五十戒即以大涅槃心修一一無非法界法性即成菩薩律儀故云無雜等經云善修方便等者諸佛善修果已圓滿菩薩善修令果速滿故讚歎之或謂以為無作戒者謂是小乘無作之戒故引三釋祇至無無作色者僧祇明無作戒但取心為戒體也色非質礙者不屬身不屬心是不可見無對之色以為無表但是因緣和合假色而已曇無德者以非色非心為體屬十四不相應行攝故與數人意今經以心性為戒體故云心無愚故戒亦無愚非心所法及非色法故引上文證非此二法也經云如大地等者大地能生萬物戒亦如是能生三諍之法船舫能過度瓔珞能遍大姓人中貴大海多珍寶灰汁能除垢舍宅能遍容刀釰能遍裂橋能遍度良醫遍治妙藥遍塗等經云得須陀洹果者知佛性蹔取小果蘇息二乘故云我亦有分五念施者只是念捨耳大為三意一為達施法界成最上檀二以施遍攝眾生為淨土緣若不慧施不能莊嚴四部之眾三以施為菩提涅槃因令速滿菩提涅槃果經云諸佛菩薩近修習者諸佛修習已滿菩薩修習現在方成經云四部者在家二出家二又天人魔梵為四經云能除破現在煩惱者由行於施破現在慳貪之心名破現在煩惱若究斷結座智能斷雜華者廣明偏圓五攝一切因果名為雜善念天者為三意一觀諸天以為觀境二為念天令同諸天有分我亦同之三思惟諸天即見第一義天又悲念三界諸天不知無常及不見第一義天所以照念名為念天亦念於佛性大真第一義理之天是故不同他人唯念當果天也隨義別立者天名是一而立三界諸天及第一義天故云也不弘故衰者有惡比丘及惡時故大十二部亦不及涅槃者亦有此義自法華前部有兼帶所以不及當機故勝者一佛在世開權顯實當機益物故勝二為佛滅後被於知有佛性常住乘戒俱急帶權顯實之機故勝十二部中未必有涅槃者作此成者只勝小乘十二部耳經云佛法眾僧等者此教詮一體三寶及菩薩依大涅槃修行趣極為是義故皆稱不可思議經云以何義故復言菩薩不可思議者可爾菩薩是人復有何不可思議耶如人間事咸所不測者如人不測鬼神人中上人猶不測於下事豈是不思議耶不可以一二三思者不可以單一單二單三思也須境教之者別人須俗境發俗智方始智明故名境教不從人境者圓常境智不二之法本自有之不由二乘人及別俗境所發方有故云不從人境與止觀中發心同者生死諸結此二是下化境涅槃菩提是上求果故與發心意同二乘但知分段小分者俱見分段無常生滅不見如幻如化及以我性即俗真中者俗謂三千三千即真中故言不厭即中真俗名為不離益眾生名之不離安心意同者以三智契三諦故與安心義同如涅槃樂者如大涅槃樂也三諦上障者三惑二死障於三諦何者若迷菩提涅槃名塞達生死即涅槃煩惱即菩提名通故云同也亦似大慈者亦與發心大慈意同宅譬中今此三界皆是我有其中眾生悉是吾子又機興則來機謝則去雖有來往不出法界故以中道名為旋還三諦行者自化他皆拔苦與樂慈悲為本故名為行三諦證者道品即是菩薩道故與相似證同三諦位者此約觀行相似位也一中無量者一謂一念無量謂三千三千即空即中故云無量中一等三諦教者此約雙流之教何者為實施權常即無常以治常倒開權顯實無常即常故非邪見即於無常等達常樂我淨故與對治義同胎不能生者相似位人非父母胎能生以得相似自在之用故約三諦報者相似三諦報也第九第十二文同是一意說默者默即塞說即通三諦業者三諦破身口意三業得與破遍同經云是故此慧等者全生滅是慧名不能遠離即無能無所也終不說言我破煩惱者體達三惑全是法性故云終不說破此離相似法愛未入住者正是相似未入初住位也前滅後起者古人消異生異滅句也復伐於慧者自稱己善曰代菩薩不爾終不計言我有智慧能破於惑故云無所政代又生來下釋無能無所又生若是常下更對破古難定有不者有是有是無雙難者若有是經即有五行既有五行如何復滅沒也汎明者約於多番通途而答名為汎明指本有佛在世時法不滅名本有佛入涅槃名今無即是不滅而滅又昔小乘謂滅名本無今大乘實不滅名今有三世有法無有是處即非滅非不滅又理實無生滅緣興故成道機故唱滅故言不滅而滅經云外法者教法也內法者理法也經云天無境滅者此天乃是諸教聖位天也今佛對辨者今佛對迦葉辨經云依根不無者信等五根不無經云若佛初下明鹿菀小機所見初成復次善男子下此明寂場大機所見初成初解義等者若解釋者皆須云雖有解義無檀越不得雖有檀越為利不得雖不為利起諍不得雖不起諍說過不得雖不說過種種說不得即法滅之相六種種說者不達諸機之說而各廣引異說不能融會互相是非如今人講律但廣引諸家不能融會只成是非師法滅相經云或說有神等者如犢子部說有神我自餘諸部說無神我或說有中陰等者薩婆多部說有中陰大眾部說無中陰或說有三世等者薩婆多部說有三世一說部說無三世或說一切有等者薩婆多部說一切有等者薩婆多部說一切有一說部說一切無或言眾生有始等者化地部說有始有終經部師說無始無終或言十二因緣是有為等者大眾部化地部說是無為自餘部說是有為或言如來有病苦行等者薩婆部說有病六十年苦行大眾部說無或言如來不聽比丘至十種者如四相品說或言一切不聽者化地部說經云世間虗空者佛不久必入涅槃迦葉不更為諮問故重唱言世間虗空世間虗空而滅而非滅者示生示滅皆為拔與引偏入圓作大利益淨淨文盡非淨非不淨文奇在淨淨文中雙非釋者是梵行品四闍王是實逆者實須權引權為引實兩意並通那提者是須提子示數犯篇簫梁武不見者王意云既是梵行只應說清淨生善之法不應說於耶惡之法驗是客品經云御者進也制也經云心悔熱者此即障欲除大機動在法華時障未深機未動母以藥塗者母以世藥塗之雖塗無損滅惡緣者此六臣則是滅惡遠緣然六臣所說與佛法有同者亦有計業所為其言雖同要云煞無罪無報等文相廣者此權人所為以示後人令識耶法之相故作此說涅槃至毒藥者善人聞大涅槃則能減惡名為甘露惡人雖聞善法翻更起惡則名毒藥今闍王亦爾雖被惡勸而不從惡即名甘露朝白者曰朝而白故曰朝白經云富蘭那等者什曰迦葉母姓富蘭那母字也計一切法猶如虗空不生不滅肇云其人一切法斷滅如空無有君臣父子忠孝之道經云下業者下劣心作業為下業增上心造即為上業末伽利等者什曰末伽利字也俱賖梨母也計眾生罪福無有因緣肇云其計眾生者苦樂不由因緣自然而爾刪闍夜等者什曰刪闍夜字也毗羅胝母也計要經生死彌歷劫數然任運自盡苦際肇曰其計道不須求如縷丸轉於高山之縷盡則止何假須求今經云眾生苦樂由前世因現在無因未來果與波不同經云便得解者計初禪等為解脫阿耆多等者什曰阿耆多翅舍字也欽婆羅麤衣也非因計因著麤拔髮烟薰鼻等以諸苦行而為其道肇曰今身苦行後身常樂迦羅鳩䭾等者什曰外道字也其人應物起身若人問言有其即答有無等皆然肇曰迦旃延姓餘是字計諸法亦有亦無經云若內若外者計恒河水能滅身心二病也尼乾若提子等者尼乾是字若提母名計罪福苦樂盡由前世要必當償與今不同此計無修無道經八萬劫自然得脫也此之六師皆悉裸形自稱一切智人所計不出因中有果因中無果等開逆者開示也謂權示方便引實惡之徒固活者固病應死者治皆得差號為固活經云大王得安眠不者知王不得安眠欲覺悟於王令王知有第一安樂眠人故設此聞經云身無諸惡等者王意云我具身口具四過心多疑因身心熱惱如何得安眠耶菩薩得安眠者經中只一句專屬菩薩謂為諸眾生故餘句皆屬止惡經云若為於自己等者我今為自安己身及貪宮人採女等以何得安眠非謂東宮者由太子未紹位萬民不得安隱又只嗣主未立時不得安眠非謂為東宮時不得安眠若順疏文前釋為正若消經文後釋為順以下望上者將下無五德文不近善友驗知上文有於五德故讓不言者且以謙讓不云己是王之善友經云白法者犯罪是黑法從惡得善名為白法經云說有父母等者若無慚人不見有父母等王今說有是有慚人何不速往至於佛所經云惡富者王前造罪時名為惡富王今慚愧改悔即是善人富向人說過者發露是懺悔方便為未定故者為王未肯即知故爾經云迦摩羅病者謂癩病也初示良醫者文中具二意初歎自行大德下歎利他初又二初歎斷德次具十力下歎智德初云無師覺悟者此是大乘無師覺悟不同小乘次大慈下歎利他又二初歎利他心次隨喜下歎利他行行中具身口二行如犢遂母歎佛身行次口業初知時者善達機緣應授藥等實語者離虗妄語也淨語者離不淨語妙語者離麤惡義語者離無義語法語者離非法語一語者言無二也又實語淨語明無妄語妙語明無惡口義語法語明無綺語語能益人名為義語語能稱法故曰法語一語明無兩舌經云若不能至是處者請王莫疑經云諸菩薩僧縱有二乘至此皆知常住佛性所以皆名菩薩僧經云若有若無等者知王有二諦三諦等機若聞此法即能治王身心之病又作二諦釋即是合三諦為二諦也有力是煩惱無為是涅槃有漏是苦集無漏是滅道謂有為無漏即四諦足此是相即二諦等十一種色者謂五根五塵及無表色非色非色者他云是十四不相應行中得一行十四種色者謂五根五塵及地水火風只是俗諦者於色心外別立中道與而言之只成俗諦何者既云兩捨中道無體復立能捨所捨且云俗諦自作自受者自行破假入空名為自受自作他受者此是法身菩薩出假作地水火風及正報授藥等與受用諸文文例然者經中諸句皆以三諦釋之若乘真諦乘也非乘即人天俗諦乘薄今者不薄今闍王也經云答言憍尸迦等者佛具從末而答之經云因疑生者以憍尸迦本疑於命故云因疑生者實如佛教經云大目楗連者此舉資以顯師經云大王畜生見佛者此舉下類況於人類經云大王世尊未得阿耨菩提者此舉因行以況果德其力皆大經云大王有曠野鬼者此顯佛慈普度經云如來弟子尚有如是等者此舉資以況於師經云願善思之者如上十三事願王善自思之必不虗妄經云判合智者女人者為極惡婬女說法又判者半也得偶而合不以體六入也梵行品五經云我今當至住世者一通為一切未知常住者住世二正為王未知常住所以住世令滅惡生善雙林之眾者五十二眾已聞常竟滅知不滅世王永知故須云住如來密語者一為闍王造逆二為一切造五逆者三為一切有為眾生四未見佛性者五為阿難迦葉所領之眾六為由具煩惱不見佛性者七為王後宮之眾悉為滅惡生其善根令見佛性故唱住世唱滅亦爾非迦葉等所知故名密語經亦不定者今意須約圓人初住已上方名無為眾生又通約名字已上聞常住教者乃至等覺聞名無為眾生前二教未稟圓常悉屬有為別人知中且同圓攝若尅體簡地前並同有為深淺遠近者破前諸師定約地位判無為義毗婆為遠現在發者為近不可定作此成經云以世八法者謂八風也王未發心前恒為八法所汙何者煞父王當四違貪國位及世樂當四順又順煩惱違佛性又由為八法所汙罪不滅善不生若能發心見佛性罪則滅善則生又八耶為八法結歎者覽前六重皆是密意語所以舉四重不思議歎之初治身者由身不安則心不安欲安其心故先治身四番論光者明光功用後一番解月愛者辨光體也又耆婆識佛所入三昧驗非聊爾人也經云為是誰光者王意云應是天上月等無情之光應是人光所以興問經云是光無根者根以能生為義中道法界無能生所故云根經云非熱非冷者翻王身令得清涼然經文明中道光明一一皆約雙非二邊以釋非常謂有邊非滅謂空邊餘句例然經云實不可說者光即法界無可說覩故也經云以何因緣至光者王問意放此光明為滅我罪為不滅耶或進或退者退謂六道進謂六住菩薩七方便者兩教二乘為二三菩薩及人天為七七子之中起逆者今意於七方便中有圓機發者即便應之令惡滅善生見於佛性住大涅槃名於病子心則偏重不同古人所判真解六地者應是別十住中第六住似解六心者別十信中第六心也六番如文者初開敷鮮明譬發心次能令一切路之人譬行此即發心修行為一雙次智斷一雙漸增譬智德損減譬斷德三滅惡生善為一雙除貪惱滅惡甘露味生善滅其心罪者從此向下一一問答皆顯如來冥應益物之相又一一問答皆將闡提以並闍王令王節節勝於闡提何者由王具五德及能發心耆婆意者闡提三世求其微善永不可得佛尚怜愍不捨冥應王今具於五德如何不速見佛治心病耶闡提斷善者斷過去善據現無善未來亦無致成三世之善並亡根緣感佛者寘為感佛之緣闡提有重惡者於現惡上更撥無因果名為重惡斷現未善盡者未來之善實不可斷且據現無名斷未來過去少善者由過去五戒感今報身故云少善捨一取一者從心求理背有向無背無向兩亦背兩亦向雙非背單入具背具向複背複入絕言名為捨一取一又執有破無執無破有無等高山譬失戒品者山能生萬物如戒為眾善之本既失於戒眾善並亡樹木譬失定品者樹依於山如定因戒而發又禪名支林以樹為喻四乘者象譬圓乘對前三乘而成於四兩邊者斷破常常破斷名為兩邊獨為信首者持於獨戒戒是所歸憑處如首枕猶以求安無生善處者謂四儀之中求善皆無樹葉為衣者雖著此衣不免裸露故喻無慚去坎就離明也譬造惡分明也根緣感佛者冥感法身無緣慈力內薰成機名為感譬之親屬者只名此身為善在耳但以惡感者今家意亦以惡為機緣以惡極故即能感佛故云請醫療病也頭蒙塵土者蒙覆也五住如塵更起闡提撥無因果如頭蒙塵土此約輕重以釋倚望感應者現雖未感當當方遂初觀察等者皆冥觀冥許亦十二我見者十四諦出華嚴經者彼第三十六云佛子此第五地菩薩摩訶薩如實知此是苦聖諦此是苦集聖諦此苦滅聖諦此是苦道聖諦善知俗善知第一義諦善知相諦善知差別諦善知成立諦善知事諦善知生諦善知盡無生諦善知一切菩薩地次第成就諦乃至善知如來智成就諦此菩薩隨眾生心樂令歡喜故知俗諦通達一實相故知第一義諦覺法自相共相故知相諦了諸法分位差別故知差別諦善分別蘊界處故知成立諦覺身心苦惱故知事諦覺諸趣生相續故知生諦一切熱惱畢竟滅故知盡無生智諦出生無二故知入道智諦正覺一切行相故善知一切菩薩地次第相續成就乃至如來智成就諦以信解智力知非以究竟智力知以闡提人無信解力撥無此善名斷善根經云雖去何益者於路假使見吉復有何益感應道交者寘有道交之義二小兒者譬斷常相害又斷常自高譬之投頭而復拔髮譬共相害瓦石刀杖皆譬斷常以自相害聖人所棄者闡提拾他所棄之物沙門獨行者表闡提無出世善根不成機感佛常欲應生自無機故以無侶而表之經云往至病所者闡提雖無三世善根以無緣慈力而冥應之子細求其善根故云往至病所後觀過去者更觀無始已來復有善不略無嗔者聞他說出世因果則便生嗔即三毒足骨節是身根者謂於身口鼻等求善皆無便利不通者身相殘害不當道理名為不通肥大譬我見者遍二十五有皆計於我故名肥大經云問瞻病人者闡提以惡為機名瞻病者意志云何者為有善根可發為都無耶根緣對者謂根緣所對皆無其善剛烈者夫人及出世䑒利之善經云覺身細軟等者繒綿等譬身惡或堅如石等譬口意惡故云唯見三毒經云然不定言至死者未來時冥應有發義故云不定非佛教所制者既機道未成未宜顯應任起斷常等見及三業不善故云勿禁經云如是二悟者一聞伽離入獄二聞多見佛罪除雖聞二語意獨未審除其不定為定者罪性若定不能一除之猶罪性不定佛有能除之智定能除之故云為定經云仰瞻如來三十二相等者只觀佛身已滅無量重罪何況聞法耶經云出八種聲梵摩喻經云一最好聲清雅二易了聲有所言說辨了易解三調和聲大小得中四柔軟聲其聲柔軟令人喜聞五不誤聲言無錯謬六不女聲其聲雄朗七尊慧聲言無懺怯八深遠聲猶如雷震然今經雖不別列與彼所出聲同是故引之經云當繫心等此二十事為凡夫託事觀察折伏其心達事見理方成妙觀又今文明正助合行善須修習故云也經云我此身者身中未有無漏善根經云未得調順者未有觀行折伏經云無處不畏者三途是可畏處無道前智慧者今即以初住為道中也經云難得遠離者得真諍近分離分段得中道方能遠離八難經云無有一法能遮者身中未有一善法能遮二十五有因果之讐經云度五逆律者未有無生種智度五逆險道此文正歸王身經云生死無際者無生觀成得入初住方乃一分見生死終等覺方乃窮其邊際經云不作諸業者既不作善業名為空無經云因久明生等者罪從心生還從心滅猶如一手覆之與仰俱不離手生死亦爾因癡而滅四倒是煩惱道者此二十事不出三道咸是所觀之境經云爾時次第觀心者既滅三相定慧進戒次第增明度說者前事觀文義並略故更廣說無生妙觀以破執情令悟佛性妨於入道者雖修無生更執此四却成生滅何得入於圓妙之道經云若一切法無定者領意者若一切法無定眾生或時造惡或時造善諸佛菩薩尚乃或時示入生死或時示入真故云無定昺然者若不為修無生廣度一切但云無父者則是大無慚人四大攝十色者四大是能成則攝於根塵根塵為能成即攝於四大經云大王昔日口不教煞者此且方便寬縱王心恐報心不破所以但云削足等混高下之心者諸佛為高王口意二業心為下泯此二心求罪無相如何計云煞父定重故云諸佛世尊無有罪者汝獨云何而有罪耶經云亦得善果者由昔煞仙人今曰被煞由供養死屍今日得初果故云現世中亦得善果縱橫非法者謂縱恣造諸非法也經云我弟子至犯戒者佛亦且寬其心我弟子中有癡狂心亂痛惱所纏犯皆無罪猶無本心故爾今不言故重於死者意云非謂保重於死為重死也人犯重者煞人犯重煞畜但犯輕輕垢及提罪若就施食者如云此食色香味上供十方佛等此是傍引例以釋於等故云別論破其滯邊失理者失其中道之理經云涅槃非有等者涅槃之體非有非無而亦有大涅槃也經云雖非有等者此結前煞雖非有非無慚愧者煞則得罪正結歸王經云受果報下寄外斷常二計以顯大王無此二失又此下諸文並是示王偏執二邊不得中道之人所以前舉涅槃中道之有破其滯邊失理言受果報者名之為有者彰其業體體得果故空見之人斷見也經云有有見者常作定執有見人也無有見者謂是計斷之人撥無果報經云常見之人至非有者此但橫計之常非於佛作真常故云則為非有無常見然亦故下結云雖非有非無而亦是有常常見者定作常見之人也勸作無常等觀者正勸作無生等觀也經云我今始知乃至淺者具足應以無常對常等為觀文但出一邊經云知諸法至無我者此亦但出一邊具之應以常等四相對為觀王發心者此是自行發心也王重發心者此是下化發心也經云即得微薄者由未全除但是微薄世王經者阿闍世王經也五悔意者自他具足既聞法已皆須具五方成行儀如寶積經中彌勒云釋迦勤行苦行方始得方始得道我今座修樂行晝夜六時但勤五悔而得成道即是例經云眾生四種魔者不出耶常等四及無常等四經云莊嚴諸佛大眾者若無菩提心嚴眾不端美何以故菩提之心更相莊嚴上求下化因果滿足方名佛眾猶入賓吒地獄者業報須入不入罪則不滅經云如雜華者澤州云依佛名經雜華猶是華嚴經也嬰兒行品大即如來行者圓嬰兒也大小兩化者小聖三藏大即衍門澤州云不能起住明嬰兒心不能去來明嬰兒身不能語言明嬰兒口觀其釋文非無此意然終不及今師所釋則順經文大旨經云語未了者諸佛如來示同未了亦是即說無說名為未了經云名物不一等者如世嬰兒或云歌孃歌孃皆重言之眾生亦爾或宜說常或宜說無常或宜頓說或宜漸說如來善巧同其深淺皆令入極故云因淺而得解欣厭嬰兒者約開權釋正取和字者和淺婆深何者以三藏菩薩三祇百劫伏惑修行名之為大未得無漏是故今文以婆對衍不作大逆等者別人修行期心極果不住二邊之逆見道至為得者謂證得也九品增修者即前別教菩薩修慈從初上親與下樂乃至第九品方名修慈成就今以妄別者若非妄引無由得出以行成故止不啼哭者至極果已萬行方止自爾已前皆名啼哭遠到涅槃極果涅槃也第三單結者聖行初雙標次不次二行次雙釋次不二行三單結五行卷第九德王品初釋疏為二一先明行德同異二就文下解釋初又二初述古次今依下正釋初又二先述古次今皆下略破初云一二功德廣聖行者以二功德對於一行故名為廣以顯修成功德之相是則一行皆具二德太昌大體亦同但後兩行主對不便耳體一義異者體一可爾同是因善義則不然何者為地前因為地上因為圓善為偏善耶終於窮學者他意云等覺位滿名為窮學今亦破之為是何教窮學耶感後習果者此約別教菩薩次第行學不會圓融故須破之又習因習果之言多在權教聖明報因報果金心為體者他見第六功德有入金剛三昧即云金心為體破云初地即證何以金心為體餘德復有體不莊嚴獎勸者十德莊嚴五行獎勸行人令修學耳次破中云菩薩之位者但成別菩薩位何處不勸者行行文後皆有勸修何獨十德二正釋中云前三聖行者聖行梵行嬰兒行也亦是於證者每一行後證果之文或一二三五紙天行是所證現文但有三行故云其文則少十功德非不明修者此即真修是天行也初對告者其是對揚發起教主故先告之高貴是法身者高之極也貴之遍也法身遍一切處三身中尊高貴豈過於此德王是解脫者分身散影處處調伏遍脫眾機故如王也又若當法體應名十功德品今從所告人以題品目故云從人題品不別列名者經中但有十德次第而無功德名字經云修行如是大涅槃者涅槃是所證果經是教法依教修五行得涅槃果故云得十事功德但存九句者若并希有等八字成十句亦得分別智至非難者謂分別智難生泥洹智易得中道佛性非此二邊智能知故云非難等無色故非相等者色心麤淺故須非之無邊無中者今是即邊而中所以非於邊外之中也絕四等者四句百非之法皆世間所攝故須非之皆重說者夫言周者重說前事一遍二遍名之為周今十德各別周義不成故今不用初一聞慧等今依經破之他見有所不聞即對聞慧能為利益如何對思慧耶後三對修文相最為不便三慧伏惑何能斷疑等初一是本者謂一切法皆以聞教為本也尚不得等者破意云別教修行入地真證即與圓同今尚不用恐監教道何得用藏小通共三慧以釋故今不用文明不共下第三失如何作藏通等釋文明不聞下第四由從他聞方生三慧故不可也文明不思議下第五前三教三慧皆是思議之法文明秘密下第六今十德是所證三德真伊秘法況經自云如來密藏如何作三慧顯露釋之文明圓備等下第七前三教聞思修是二邊偏缺不圓之法文明驚下第八二乘三慧是尋常法昔日已得如何今聞更驚恠耶文明無差下第九三慧是差別法文明中道下第十二乘菩薩三慧是二邊有窮之法不聞至因相者將十德望前五行名為果證望後未極猶是涅槃因天行不聞證理而聞即涅槃因行古人如何一向作極果釋之若修證者依真修天行地地證真理妙悟不聞也發解聞也入初住時真證開發遍見諸佛彼彼身土互相融入剎說塵說無有窮盡菩薩一念悉能了知即其相也非他邊領者便破前三慧文略舉三種者大涅槃體是不聞三諦是所證即是聞故約三諦以釋故云不聞聞此是證道一心三諦所以皆言不與二乘共亦不證俗者二乘破六界緣生之俗不能從空出假具恒沙佛法其雖證真者不能於真即具中假上所至正歎者正歎一心三諦也經云三寶性相者謂一體三寶具於四德又性即一體三寶相即相三寶經云一切諸佛至常住者舉深況淺良由菩薩同諸佛證秘藏故舉諸佛顯於菩薩如來涅槃者乘如實道來成正覺即是不來而來義當於始涅槃謂所證所入即是不終而終不去義當於終始終為一雙也一一事中無非中道者二十句皆是二邊所非之法何者初非有非無者非於二諦非有為非無為者非於四諦有為苦集也無為道滅也有漏無漏者非於證真不證真非色非不色者非於色心也非名者非四陰名也非不名者非色陰也非相者非於生住異滅四相也非不相者非真也非有非不有者非二十五有之有非二十五有之空也非物者非六根所覩隱顯情塵非不物者非真諦也非因非果者非分段變易二處因果非待者謂待對真俗名之為待非不待者謂邊外之中今達即中方名絕待非明非闇者非於觀智明及三障闇惑也非出者非於二乘等但運出三界也非不出者非於人天乘不動不出也非常者非於出假菩薩外計耶常也非不常者非於二乘滯空之不常也非斷者於斷惑位也非不斷者非於不斷惑位也非始非終者非於外計冥初之始八萬劫已滅沒之終此即非斷常二計也非過去等可解餘亦如是者下九功德亦爾不聞聞一切外通經者昔外人自謂究竟二乘不知今方得知無是涅槃中不思議俗諦之法經云四毗陀論澤州疏云外國有四大論師一婆耶娑造四毗陀論亦名違陀此云智論一億力毗陀明事火懺悔法二耶受毗陀明布施祠祀法三阿他毗陀明一切鬪戰法四三摩毗陀明和異國鬪諍法知此生智故名智論第二論師名婆尼尼造毗伽羅論此名記論明一切音聲名字音句等法第三論師名伽毗羅是黃頭仙造僧佉此云數是所造論名論中辨二十五法用通大地中慧數為體二十五諦如下引第四論師名優樓佉是青目仙彼造衛世師經此名最勝明六諦義如前釋根本有三外道者然一切外人所計不過二天三仙二天者謂摩醘首羅天毗紉天亦云韋紉天亦韋糅天此翻遍勝亦遍悶亦遍淨阿含云是色天俱舍云是第三禪頂天大論云遍淨天者四辟捉貝持輪騎金翅鳥有大神力而多悉害時人畏威遂加尊事云云摩醯首羅天者此云大自在色界頂天三目八臂騎白牛執白拂有大威力能傾覆世界舉世尊之以為化本廣如止觀第十記引三仙者一迦毗羅此翻黃頭頭如金色說經有十萬偈亦僧佉論此云數術用二十五諦明因中有果計一為宗二優樓僧佉此云休留仙其人晝藏山谷以造經書夜則遊行說法教化猶如彼鳥故得此名說亦有十萬偈亦衛世師此云無勝計因中無果以六諦為宗三勒沙婆此云苦行以算數為聖法造經亦有十萬偈若尼乾子此人斷結用六障四濁為法計因中亦有果亦無果亦一亦異為異六障者如方便心論云一不見障愚二癡障三受苦障四命盡障五性障六名言障四濁者謂嗔慢貪諂云云然經中具列四大論師疏中但述其二正消經文而云勒沙經中略同不說是故具引三四論師以消經文及疏計亦一亦二者雙計前二故云與二人略同經云初未曾聞者即不聞今於此經而得知之即聞故云不聞經云深密之義不聞也今因聞也提緣由者聽受是證果之緣大涅槃經是證果之由三番說者如大論云三智實在一心中分屬三人者定易解耳作此融者只緣寄於三譬鏡不及炬不及日似如次第故須融通經云令二乘至佛道者昔來未見今方得見名之為遠歷四法者初重在經可見從善男子其聽下第二重四法謂名義為一雙從復次善男子下第三重行解為一雙從善男子菩薩下第四法義為一雙斷疑是外論者斷他外疑論也亦名離者令自他離疑網心也前後互明者內證故斷疑斷疑故內證復有何前後疑佛涅槃是無常倒者是經中初疑佛涅槃句也次明常倒者經中疑佛是常句此二為一雙并第三第四第五為三單句合為五句如此對者亦未全穩但依私對消文則便理須具列佛性者前疑名義及疑八倒文後應云斷疑心亡則能了知一切眾生悉有佛性將此文例前故云互明也經云所謂若常等四者除生死涅槃之疑若命非命者除十六知見疑若眾生非眾生者見佛性者名非眾生是除假名上疑若畢竟不畢竟者除開權未開摧疑故上文云云何名畢竟及與不畢竟謂有餘無餘義若他世等除過未疑謂於未來有報無報疑於過去有因無因若有若無者二諦疑若法非法者除執教法疑若善若非善者除人天三途疑次假名中者然經中有五計不同一於五陰疑惑不知何者是我二眼能見下六根對我疑不知阿誰能見乃至能知三色受法有五陰對我疑惑不知阿誰受報四色至他世下陰對我疑惑不知誰至後世五生無之法下於生死疑不知為有始終為無始終有始有終是耶外者計八萬劫初為始計過八萬劫已為終正直耶曲兩章互者曲中又二一凡夫耶曲二二乘耶曲經云見老人等者瑞應經上卷云太子至年十四啟王出遊欲觀施為王令左右百官導從始出東城門天帝化作病人身瘦壁大倚門壁而喘息太子問曰此為何人其僕曰病人也何謂為病對曰凡病者皆由風寒或熱或冷故得此病太子曰一何苦哉吾處富貴飲食快口亦有不節當復有病與此何異次駕乘出南城門天帝復化作老人太子問曰此為何人其僕曰老人何謂為老曰年耆根熟形變色衰餘命無幾故謂之老次駕乘出西城門天帝復化作死人太子又問此為何人其僕曰死人也何謂為死曰死者盡也壽有長短福盡命終氣絕神遊謂之死人次復遊觀出北城門天帝復化作沙門法服持鉢視地而行太子問曰此為何人其僕曰沙門何謂沙門對曰蓋聞沙門之為道也太子曰善哉唯是為快廣如經說寄有無者只是寄有無上而論雙非雙照以明不思議三諦也玄而復玄者前因果二釋俱不思議故云玄而復玄經云聞不聞義者只是不聞聞此是德王謬領之非何者意謂若不聞不應言聞若云聞不應言不聞故成錯領初奪成兩者法若定有奪聞成生法若定無奪不聞成滅法若有聞則無不聞若有不聞則無於聞云何而言不聞而聞故云不聞得是一不得非一者生滅既異不得作聞不聞一義經聞所不聞者奪意者現見不聞聞異如何世尊云聞所不聞是是一義耶先結定成兩者不聞與聞異故知定兩結定不應一者現見一聞與聞異如何而言不聞而聞是一義耶凡累三譬者此猶約法為譬也至則不去顯上不聞定是不聞至則不至顯上聞定是聞亦如生已下反顯義生已定生不得更不生顯上聞定是聞若言不生即是不生不生顯上不聞定是不聞不得更云不聞聞得已不得同上生已不生句不得不得同上不生不生句當知不聞聞有其二義如何世尊云聞所不聞是一義耶譬中無不一譬者謂譬中少於亦復如是之言即是結難不得為一也縱難者所言縱者許其不聞聞是一也經云十住菩薩者反徵也若言凡夫未得菩薩未得涅槃未見佛性是其得者菩薩已得猶名不得既有凡聖之殊驗知不聞聞云言一經云如來往昔等者若從他聞即是於聞云何言不聞復言無師者無師即是不聞如何復云聞耶是則不聞與聞本成是二何故說言不聞聞是一義耶結兩縱者既凡座不同故知是成兩法法此則先結佛果縱次結眾生縱也次難者況意者色尚有不可見何況涅槃有於聞所不聞耶障內色者凡是色法有其三種一可見對謂眼所見色二不可見有對謂耳鼻舌身所對之色三不可見無對謂法塵中無作之色初一可見餘不可見是以言惑佛明幻等者佛以幻空幻假幻中答之故云汝今善知一切諸法如幻等文中三諦義足佛意正言一切諸法皆如幻化汝何執定相難耶是為歎答者為機興問眾疑既息施佛先歎從善子汝今下是答也非青等不聞也見青等聞也即兼答者兼不聞聞聞聞也凡此三答者幻等又不聞聞等四句並為上根是一答答生生四句為中根是一答第三請答德王之問是一答為下根來相云云者不來而來不放而放等故經云云經云非青見青非青釋不聞見青釋聞所以名為瑞答是光體等者作青等是光體見青黃等是光用從真起應亦爾皆破定相者傍破德王定執之疑此光不屬因緣故無定相經云念佛者念法佛也此一段文皆說光體所以一一悉云常住自行破立者四菩薩自破無明立自菩薩燈也應以世諦者甚深是嘿即不聞世諦是說即聞應從於說逗物所宜如何專嘿不能答下具四悉意示佛道同世界意生此土善為人意滅此土惡對治意令見性得道第一義意此佛舉彼菩薩者舉謂舉覺亦覺發也如經爾時世尊問文殊師何因緣故有此光明文殊即說光明名為智慧等因此問答彼菩薩來即是佛所舉之相亦三悉說者於圓常有三悉之益但不說戒律對治以扶常耳然問答至不定者夫問答之法皆是已下而問於上今文佛問菩薩答者只是順物所宜故云不定即是人傍者上純陀與文殊對佛論於有為無為即是人傍有為無為且共置之即顯非常非無常正法則是法不傍也是法傍者正論不聞聞法而且問於去來之法所以成傍然問雖傍流光答已傍即是正何者去來之法即不聞聞而人不傍者佛問菩薩答菩薩問佛答也經云為至來等者為依俗諦故來為不至來者為依真諦故來又是無來故云來為有來去故來經云至亦不來者此明來即不來不至亦不來至此明不來亦不可得經云諸行若常亦復不來者常即非常非無常若是無常亦無有來者無常即常即非常非無常所以皆云不來故云就前境明無來又從彼來此此眾是境為此境故來後八番者初有眾生是約果報次憍慢下約因此即因果為一雙明來不來三有取行下約有取著無取著未見大真理皆名取行四若見如來下約二乘見去來五不聞佛性下約能破明去來六若見聲聞下重約二乘明去來七若見聲聞支佛下約名明去來以二乘真諦亦有四德之名而體不同故須簡遣八若見如來下約雙非明去來兼答高貴至而聞者悟故不聞迷故有聞本迹亦爾就理體為不聞分明證見為聞經云且置斯事者且置去來之事也流光在本者在彼滿月光明佛所亦作三雙之問如今德王眾已聞廣者彼眾已廣聞竟證是內悟者證理名不聞分明見名聞念念增明者念念增明名聞常契性理名所不聞經云汝今欲盡等者我久已證汝欲盡者我能善說非謂昔不能說由機未會今機始遂故致值我我言所有疑內者若權實本迹大疑法華已破為未除者今方拔出令見佛性又為末代帶實說權以顯於實除權實上疑故云能善拔出欲度生死大河者我能為汝作種智船師生父母想者一天性相關二本曾結大退大已後流轉五道今開權顯實方知天性理同故法華云此實我子我實汝父故云生赤子心能想慧施者如法華云七寶大車其數無量等賜諸子今亦如是正法佛性普示無偏若生起此文者由能盡海故無疑由無疑故見性由見性故度二死河由度河故會性由會性故得大車遊於四方直至道場似如六度者諸佛如來不空說法皆附法門佛意難知且約六度解釋故似也約精進許者若無精進焉能竭無明海約度戒許者若無畢竟戒安能拔除破戒毒箭高貴亦然者般若圓照法界故以高貴表之一句半句者了因為佛性涅槃親因故云也聞不聞是緣因者聞即修也入初住時一分契理名為不聞故云聞不聞不聞不聞是正因者理性正因本是不聞修得性顯復不當聞是故正因屬不聞聞不聞聞是境界者上正因通善惡境界唯在惡謂流轉三有之惡雖復極惡堪為不思議境名境界性又是因性者為成來五因性故更重釋又因性即正因性也因因性者聞不聞即是重因也例來不來者例於不聞等為三因五因之相約忍度許者若不安忍二邊違順焉能為他種智船師約禪度許者若非住首楞嚴三昧何能觀一切眾生同於子想令不覆器者令專注仰上如以一瓶瀉之一瓶器若覆者法水不入善思者聞已不思其法則失念之者若無念持則不專一莫求其過者令了佛性涅槃莫作偏小之解是誠勿漏者經中具四弘自聞法已若無弘願與小不殊若作別體等者若作別體解者則見佛法僧無常即汙一體若起小乘等者餘三汙為自也凡行十法者初誡覆有三次誡漏有二𨷂敬師一事義開應三三誡汙中有五故為十也又一一法皆先遮次行專取行為十法也後兩四句是譬說者古人見有如字即名為譬說今則不爾如只是同以不生生等同於不生聞等地論人者見有不聞聞等即名為教見有不生生等即云屬行見有不至等即名為理逗三根者有三種人宜三種說亦非上中下根破云今明證法為被何位三根人耶故真得有聞者由證於真有能聞之俗嶷然者凝然不動也應迹聞見者應現不斷故云聞聞則聞不聞者若能修道名之為聞證入真理名為不聞聞聞四句非是正意者聞聞等但是教門方便為吁引耳涅槃無始無終者涅槃理體不當始終是則一不聞為無始一不聞為無終不生生者不生是無始生是而終生生者輪迴無際故無始終不生生者迷真起妄故云而始非但方不會圓者作教行等定執名生不稱無生圓門名不會圓屠割傷體者專破第四師涅槃與生死離釋即是屠割之相句既屠割無生圓理任運分張故云傷體又一師依於一諦者不聞聞等四皆由證一實諦而能不聞而聞乃至聞聞況作互無者破第四師解彼釋不生不生等為涅槃則棄生生一句釋生生等三句則棄不生不生一句是則涅槃中棄生死中棄涅槃小乘小分者生死外有涅槃但成三藏涅槃而𨷂衍門即色是空真諦等又有近代澤州云先正釋聞不聞義後以生至類以顯之釋前四句有二一是生死可聞之法二是真離聞之法人亦有二一凡二聖將聖對彼真為前為兩句聖於真不聞之法堪能聽受名不聞聞凡於真不聞之法不能聽受名不聞不聞將凡將聖對彼生死為後兩句聖於生死可聞之法不復食受名聞不聞凡於生死可聞之法喰受不息故曰聞聞四中初句正答前問舉凡顯聖故有第二舉染顯淨故有第三及與第四就後類中先生後至各有四句下文自釋仰觀斯解去古諸師猶尚天隔焉能契經圓旨此亦不俟破之但示學者令知彼釋耳又此十事者十功德也蓬飛野外者明諸師釋遊𩘲無依不會圓經違於佛旨譬若蓬飛遂風飛於野外復以萍隨洪流於海表偏據事相者如前諸釋但是事相而已應佛扶語者經中佛自解竟今疏所釋須扶佛意修道忽謝者從住前來名為修道入初住已緣修即謝若事者聞生聞生句若理者不聞不聞不生不生句若智是初句若斷第三句前三句自行智斷具足聞生聞生句是所化境名他釋二人疑者德王琉光二菩薩也不聞證聖行者昔所不聞而今得聞聞不聞是證梵行者從初修慈悲入初住時同聖行證不聞不聞是證天行者初證又真修皆不離真如不聞不聞是證正因者修性本一故云不聞不聞聞聞是證境界者入初住時惡境界轉全成平等法身為令流光等惡境界轉也自淨其意者善惡皆由於意意淨則眾善立故云不生不生若就生死外法者此且附世俗釋如悉達初託摩耶名初託胎住胎名為安住此即就生死外法若就涅槃者觀行名胎託六根淨位名安住世諦無明未破名為世諦無明是世法故四住菩薩者亦不專論判教地位且證斷四住惑盡能自在破生於生生所以引之他經有六住者地持云從初發心住至十地束為六住一種性住二解行住三淨心住四行道跡住五決定住六究竟住種性住者若人無有種性雖生善道數退數進不得在菩薩六人數中若種性處成就無有退失數數增進得是一人解行人是初地方便淨心住是入初地得出世間心離凡夫我相歎故名淨心住行道跡住者從二地至七地住修道也決定住者八地九地已得報行不還不退故名決定住究竟住者十地學行窮滿名究竟住經言四住名生不生者正是行道跡住二地已上是入假化之位處處現生而非實生將別顯圓初出胎時即能利他化生自在經云生若是常等者此是更難生若是常有漏之法即無常生若無常有漏之法即應是常常與無常既其相違如何世尊說有二生相並之法餘四難悉然所生非復能生者只是所生即是他也意云若有能生則無能生故知能生所生皆無自性故云生能性也六非一是者從有因緣故亦可得說一是也復為滅所滅者復為自體滅之所滅即是體是滅故云舉體皆滅也本取生死者止觀中釋云美何生不生不可說生即名為生生不自生故不可說大師解云生即名為生者乃是諸法不生般若生生不自生者此般若生不從四句故不可說經云以生無故者只生即無生故云以生無故十因緣者過去於無明心中造作生滅行業心中已具四教機緣復由無明潤業成今識名色乃至取有於愛取有心中善根將發由昔善緣成機感佛為說四教之法故云十因緣法為生作因亦可得說雅合者彼與此消經復合也咸契等者此消經契無生教門彼依經修觀則契無生觀門故云咸也莫入空定者如前佛告文殊第二句為一第三句為二第四句為三為此因緣則不可說者一者只當句理不可說何以故未有機故二者只前理具四句故不可說此名重理不可說又只一句理具權實故不可說權即實故實即權故故不可說乃至四句者應云乃至第四句又四句即事而理者四句智斷因果化他能所具足故名為事是多聞者如下文云一時說於十二部等不名多聞乃至如來嘿然無言方名多聞何以故即遍法界說故非無此義者且泛許之而復不用別惑禪者二乘真諦全是無明仍是後教所斷又是界外之惑故名為禪生生是通惑復者四教俱斷通惑故得復名生生是復生不生是通解襌者但證偏真故不生不生是別解複者三智乃斷具足故又三諦圓滿故得復名又通惑解是思議之解惑別惑別解名不思議之解惑若思議解惑次第斷證不思議解惑一智即三智一惑即三惑凡夫三道尚即三德何況二乘別惑而非三德耶儻者只是四相當自體分各自一性未為餘相所住等時以常有故而得常名又四相與本法俱而時有互相住異等致使一法皆有常與無常本有今無至無常者本有於壞名之為常為三所壞名之為常今無故云復是無常以二義者一為念念遷變答上自生二為真所斷答上他生上文云次就自生他生難破性義竟者破自生他生竟也初經家敘相者已聞法竟得入初住分證寂光故以處空表之經云慇懃等者如前聞聞等四句及生生等聞一句即四句重重解釋方始悟解故曰慇懃經云亦令八萬等者且一往約中根得悟故云解不生生等經云然此會中者流光為述此兩相成者一問修何因得生彼土二問生彼土已如何復得上根利智二義聖在一身但是轉例之異若入實淨土勝者如香積云菩薩坐香樹下即獲德藏三昧上根利智一向入實彼無動國為勝若穢土從權入實備諳權道此人為勝如備歷文武方入將相經云不動國者如上經云於此東方過二十恒河沙等世界有佛世界名曰不動其仙住處縱廣正等是滿一萬二千由近延是也十行是止善者此十行不出十惡次第配之如文從多對為止善其中亦有行善如文經云不惱眾生者如思益經云此土眾生從且至中無嗔礙心勝於淨土百千萬劫修行六波羅蜜等總別不異者四弘總為此文是則曠路下六度具足三種等者德王初難凡作三雙初一雙作奪門次作縱門三作況門即是三雙於縱門中初從眾生有三縱一覆次縱佛果有一從一徵三更結兩縱此名六種佛說六喻者謂一切諸法如幻如炎如乾闥婆城盡水跡如泡沫芭蕉樹是也為緣禪復者此正明初未至不至不至句對前不生不生此但單云一不生句經云須陀洹等者未出三界名為至至經云斷煩惱者名得真者既云其得即是無常經云因莊嚴者有莊嚴即是無常經云阿那者謂持息入也是引外風令入身義也波那者謂持息出也是引內風令出身義也慧由念力觀息為境故名阿那波那念也亦名數息觀也六念處者此觀差別由六種相方得圓滿一數二隨三止四觀五轉六淨數謂繫心數出入息從一至十云云隨者謂繫心緣出入息不作加行隨息而行止謂繫念唯在眉間或於足指隨心樂處安止其心觀謂觀察此息風通并觀息具大種造色及依色住心心所法法具觀五薀以為境界轉謂移轉轉息風覺了至世間第一法位淨為昇進入見道位乃至盡智等此執阿含經修觀為難破拆六大者如維摩經云是身無主為如地是身無我為如火是身無壽為如風是身無人為如水是身如空離我我所觀空大也是身無知如草木瓦礫觀識大也此六大觀破我執也經云譬如虗空者涅槃可見即非既非無礙則是無常言緣修等者今若順地人立二修者謂根本智顯名為本有從二地去更起智緣真而修入於後地名為緣修若地人本立真緣二修者以地前為緣修登地為真修與此不同今明地上之法故不用彼義經云非生非出者非生謂非生死非出謂非二我一一句皆非二邊非墮謂非墮空非死謂非墮二死非別異者非俗也非同相者非真諦也經云非圓者非通故非圓非別故非方非空故非央非有故非耶餘句可知經云譬如地下者謂煩惱地下也八味水者如上已釋經云久乃得出至父母者雖經文方出父母等修不謂是今始有也似不相應者依今答非不相應似四緣三因者意云今經五因似成論中四緣三因彼論四緣者因故次第緣者心心數法次第而生緣緣者如識眼識增上緣者諸餘緣也三因者成論以所作因即是增上故不別立但立報因即今生因是自分因即今習因是共因即今依因是所以今五似彼四緣三因也若俱舍論云能作及俱有同類與相應遍行并異熟故因聖六種又大論三十二云言六因者所作因相應因共因自種因釋曰所作因者不礙於他相應因者心心數法同時相緣以心心法共相應故名因如親友知識和合成事共因者切有為法各共生因以共生故更相佐助如兄弟同生互相成濟自種因者過去善法與現在善法為因現在善法與未來善法為因惡無記法亦復如是遍因者苦集諦下十一遍使名遍因謂苦下五見及無明疑為七集下四耶見見取及無明疑此十一使是生死根遍為五部作因名為遍使報因行善惡因得無記報名為報因新名異熟因謂異類而熟名為異熟因四緣者如上五因名為因緣心心數法次第無間相續而起名次第緣新名等無間緣心心數法託緣生故名為緣緣新名所緣諸法生時不生障礙名增上緣今五復與大論等六因四緣似同也即是習因者謂自種因也新名同類因初雙答因果者初不聞布施至不見大真先明小大涅槃體無二皆不可得次從菩薩大真下至空虗之相舉因從菩薩爾時下舉果即是雙答也小分真者未能於一一施皆達法界此之有相無相並是真小因緣後一正則是對者經中若為恐怖下先舉非次從善男子如人下顯是三從善男子譬如下舉譬此經明生生等者謂觀近即遠方名深邃故云生即不生生等即有不有者有謂二十五有亦是觀近即遠故云深邃即空者謂達有即畢竟不空者點空即百界千如不思議俗也即非空非不空者雙非上有無故云深邃也
