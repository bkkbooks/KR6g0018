body:
  text: 迦葉品第十四卷三度門者謂貪覺嗔覺癡覺修不淨等對治故名度門則足因緣者以愚癡多者教觀三世十二因緣謂三世相續故不斷三世迭謝故不常又過去破常未來破斷現在因果雙破斷常何者以十二因緣輪轉無際因果不息剎那不停念念無常以治其癡二世十二因緣破我何者於父生愛於母生嗔名為無明父遺體時謂是己有名之為行從識支去至老死與三世同不取過去無明行二支故云二世破我以推現未無常求我頗得一念十二因緣破性以推求一念剎那無常故無性實廣如法華玄文第三卷境妙中說經云分折十八界等者雜心論中說觀六界所謂地水火風空識及分折十二處并三十六物等法皆為破我故云等也總深別淺者謂境別觀總境總觀別等四句分別如四念處文說境觀俱別名別相四念處空解成者只𤏙解觀成已有無漏氣分名為空解多用色定者欲是散地發此觀為難苦粗重者極惡深重名苦粗重能障上界名苦粗障欣上地時靜妙離三隨起一行猒下地時苦粗障三亦隨起一猒下地心名無間道欣上地心名解脫道如是無間及以解脫各有九品伏斷下地九品煩惱亦能證得九品無為唯除非想自下八地皆容外道六行伏斷十六諦者具足應論減緣行等三十二諦觀謂苦下四苦空無常無我集下四集因生緣滅下四滅止妙離道下四道如跡乘是為十六如法華玄第四廣釋亦是苦法忍者此是𤏙法觀不應用入見道觀釋經云自性𤏙者𤏙由內無漏諦智生名自性是𤏙經云如是𤏙法等者有法者是三有法有為者為作有果也是法報得者約果顯內明其體是三有法也是因緣者能與色界五陰作因造作彼陰也十善相應心者善相應心後即發此定若論方法者觀諦方法也只是實法者此定未能伏斷惑但名實法牽於初禪者由欲界最後一品惑引起初禪定共斷欲界九品惑也更將非想定來伏不用處者非想定但能斷不用處惑當地是有漏不能發無漏故不取非想當地九品也引藍弗者藍弗雖即不發𤏙法何方外道得此定能發𤏙法所以引之事鄣未來者身及床鋪等得未來定則能破之性鄣者修惑是也具煩惱性人者即十善相應心人也第二解云性鄣等者此解為勝一頂法者凡有二義一者退即歸𤏙進入忍住頂善根進退兩際猶如山頂二者𤏙頂二善俱是退法就退法中頂善窮極猶如頭頂是身之極故云頂也二忍法者得忍善根終不造作無間惡業不墮惡趣不復受列而生濕生亦更不受無根北洲八難黃門二形等果報并迷理惑得忍善根此惑業報悉緣四善根得非擇滅是謂忍法勝利功德故俱舍云忍不墮惡趣即其也三世第一法者前三俱緣四諦為境世第一法唯緣欲苦今言緣四諦者四中隨緣一行故名緣四諦乘前三人緣四諦故作是說言世第一法者世間七方便人皆是有漏故名世間此第七人於世間中最殊勝故名為第一得此善根有士用力離同類因引聖道生故名最勝俱舍論云第一入離生即其義也見所斷惑名云為生猶如生食與人為患見道能斷故名離生四苦忍者斷見諦惑有十六心八忍八智觀欲界四諦有四法忍觀上界四諦有四比忍此十六中前五心名為見道第十六心是修道云云言忍是慧者辨其體性以見道中見法明白慧用增強故偏言之理實而言性亦五陰言緣一諦者明觀方義於苦諦下趣緣一行鈍根之人名為愛行將入見道有其二類懈怠增者則留苦行我慢增者留無常行利根之人名為見行將入見道亦有二類著我所者即留空行若著我者留無我行故隨根性行相不同苦忍等心見峻疾道傍修狹少不及餘諦故言緣一五初果至第十六心者第十六比智心是須陀洹體此人唯有一觀方義故也頂法唯是行陰者以觀四諦故屬行陰真空一諦者從苦諦下入無漏十六剎那無間名為真空一諦九十八使者通名使者以驅役為義驅能使行者心神流轉三界故通受使名亦名煩惱以喧煩為義惱以逼亂為義能喧煩之法逼亂行者心神致使真明不得開發故名煩惱謂欲界苦諦下具十使一身於名色陰入界中妄計為身名為身見亦名我見謂計我如麻豆及如母指惑計遍身計我不忘名為我見二邊見計我斷常名為邊見三耶見由計斷常不信因果復計此我以為自然冥初世性即二十五諦又計從父母微塵梵天等生而耶心取理皆名耶見四戒取謂執耶為道於非戒中謬以為戒如耶雞狗牛等戒名非因計因名戒禁取五見取復因此見通至非想謬謂涅槃信此非餘名為見取六貪欲引取無厭名貪欲七嗔恚忿怒之心名之曰嗔八癡以迷心緣境隨有所起則念念乖失而不覺知皆是癡也九慢自恃輕他曰慢十疑迷心乖理猶預不決曰疑集滅除三見謂各除身見邊見戒禁取道唯除二見謂除身邊二見合成三十二上界四諦下各除一嗔餘同欲界合五十六是則見惑有八十八足修惑有十思惟欲界有四謂貪嗔癡慢上二界各除一嗔但有其六以六足四名十思惟皆能潤業受三界生故名思惑合成九十八使也問四諦下惑依何理教增減不同耶答依阿毗曇上界不行恚問何故身邊惟在苦耶答此見依身故名身見依於身見而起邊見餘三非身故無此見又見苦斷故故在苦下問戒取何故唯在苦道答唯彼所起問戒取計因苦諦是果何故在苦答計多苦行望為實因故在苦下非出道故妄謂出道是故復於道處能起集滅異此故無身見無身見故亦無邊見集滅非道不生戒取又復戒取在於苦道二諦下者本是內道見苦能斷本外道者見道能斷故唯在二問八十八中初果所斷既唯見惑何故中有五十二思答此思依見見為根本但斷於見根壞修枯若迷事思此中不攝問修所斷中何故無疑答見道已斷理合無疑八十八頭蛇死者在前死也如四十里水見者惑瀾漫遍於三界及以依正處處生著皆障諦理喻如四十里水修惑雖遍三界不障諦理輕微易斷又五鄣不同修惑但為一部喻如一渧經云此三重故者一切衆生受身無不計我即以我見攝邊見戒取攝耶見見取攝餘四鈍使故云此三重也恆存有我者謂覽實法總立於我即是身見皆信耶神者持戒邪求及持雞狗等戒望得涅槃皆依邪神及邪師教所起我見似正見等者三皆內心所起是故難識故云似也我見乖正慧等者以耶我違於正慧等經云獲得四事者二果已去皆獲此四信首五根者只是信進等五以三毒為內者利中之鈍為內非修道中三毒經云須名無漏者此不回梵文下逆流文亦爾小般若者金剛般若也亦皆逆流至不者須陀洹是逆流之始尚得逆流之名餘三果人逆流最得何以不得逆流之名餘三若不得者須陀洹人亦應不得此逆流經云若斯陀含至云何得名等者先次釋若斯陀等不因須陀洹斯陀等從何而得耶經云凡夫之時等者先舉例也如在凡夫時已有俗中名字如空生得道果已即名須陀洹決更得二果先所得者即名為舊二果望前名為新得三果望前二果二果名舊三果名新云云經云一者解脫者分證智德涅槃即分證斷德又澤洲云有為功德名為解脫無為功德說為涅槃一切聖人皆具此二又解脫者即分得盡智涅槃者即分得無生智然解脫涅槃名本在極今通初果所以逆流之名而通於後菩薩名通下者須陀洹人亦求二智菩提菩薩亦求菩提所求菩提既同當知須陀洹人亦名菩薩經云正覺因果者謂能覺知苦果集因滅果道因故也經云正覺共道者覺名通下故名共道不共苦唯在於佛經云尋觀法相者求佛教都無外道之法是故不信不應名何者若言初得道即名須陀洹者何不從苦忍初心即名須陀洹而十五心由名為向十六心方名須陀洹耶經云具足八智者佛意但云得法在初名須陀洹不論於人猶未答三果之問所以次更問起一毗曇師者釋其無理一時觀正當於共却云不共故不可用河西釋共不共今家不破消經為得又若直消經意只應云賢位與超果人共得超果已不與方便位人共又方便位與四果共初果是不共次即初果是共二果不共展轉至第四果皆前是共後是不共只應作此釋也皆從中過者無漏心速疾雖從中過而不取果又如神通人通雖速疾理數非無比現者比謂上二界現即欲界苦法忍苦法智忍是定智是智但不取定定因智果故也隨得一諦者隨不根同亦有具緣四諦不專一向唯緣一諦初果但明正位者初果是無漏首故名正位一果兩向者一先修向次證二果證果已觀已復行又是二果家向此即向後之向故云攝得那含向是也經云為食故行者無漏食故修行也經生者者生彼方得那含也更明信解者即是信行人入修道轉名信解人也鈍根憑信進發真解故名信解是人證果有三謂三果云見得者是法行人轉入修道名為見得利根人自以智勳見見法得理故名見得是人在思惟道次第證三果云云故開善彈云此簡利鈍非是二人謂此非二種那含也身證者還是信解見得二人入思惟道用無漏智斷上下分結發四禪四無色定即是用共念處修八背捨八勝處十一切處入九次第定三空事性兩鄣先已斷盡又斷非想事鄣滅緣理諸心心數法入滅盡定得此定故名身證阿那含何者入滅定似涅槃法安置身內息三界一切勞務身證想受滅故名身證又云但有身在心如氷魚蟄蟲是故奪云但名身證又俱舍論云不還果修得滅定轉名身證滅定無心由身證得故名身證轉世那含修羅漢向更不出觀斷八九七十二品修惑亦未即證羅漢果云云大乘不說者正消今經亦須云大乘不說只是廣略不同其理無失經云無色界般涅槃者即上流般中有於二人一誰修者即樂慧是往色究竟二無雜修者即樂定人也言雜修者謂修多念有漏等於現身上者於欲界身即得那含羅漢二果也遍四禪受生者此即遍沒人餘文遍十八天處今且依經云無自在定者謂勤修觀解名為精進定心難現名不自在即無四禪定也解怠有定翻前可知即散業者散壞有漏業也不受正生者不受上界生也被道心者非學非初果學非無學非阿羅漢正是那含修羅漢向故云也緣真心者證無漏理也修舊心者住果不進即如當位住名學無學即失念者一退果名失念二出觀同散心亦名失念又言一是一非下重判經中四句初言非學者是受生心受中陰生二學者是無漏因此二未是涅槃故云二非涅槃三無學者是無漏果四非學非無學者是命終心捨中陰身如雜心論說羅漢報生心及與威儀意隨順威儀心故趣向般此二是涅槃若後解下重判第二師解釋准前可知常修行者生色界已長時修行方般涅槃但有勤修無速進道不待自勤者謂不俟精勤修道也大論云生色界已不經文修無功用行而般涅槃勤修速進二道俱無故云無行論師云以慈悲心而薰者此解非理故今不用一羸劣者身力羸弱不能修道故爾還成前意者成上得失意也經云若善法者大體皆不出三道即三德故前方便道至因位者只是始從四念處至那含總屬因位經云亦名沙門者此句明因下句辨果經云七種果者說此七果為顯涅槃果異前六也經云平等果者此果即淨土果以十善為近因復以三灾為疏因三灾起時衆生方能發心斷除乏者斷一切乏是餘道者斷一切道是在因之位皆名乏也兩非意者非一切乏非一切道也又非修行非具足經云五分法身者然三藏教似作無作戒為戒身根本淨禪觀練薰修為定身觀滅生四諦乃至道場見四諦盡為慧身正習俱盡名解脫身了了知見正習已盡戒定慧滿不受後有名解脫知見身通教但於三藏五上加罪不罪不亂不味無生四諦乃至佛地見真圓極為慧身從初見地解脫見惑乃至坐道場時一念相應慧習氣都盡住有餘涅槃名解脫身了了不見縛之與脫而能種智佛眼自見住有餘無子縛入無果縛亦見衆無生縛無脫而見縛脫名解脫知見身別圓皆約九種戒九種定九種智界外習盡種智佛眼了了知見法身顯現亦知見他法身隱顯次位不亂此之二教但有次不次即不即之異今文則兼藏教聲聞緣覺五分法身正意唯在三乘共位經云永斷三世生因緣者明其因古亦斷三界五陰身者章其閇喪故云我生已盡依毗婆沙初是斷集智依勝鬘經後是斷苦智梵行已畢竟者章其因圓又捨學道者明其果極依毗婆沙前是修道智依勝鬘後是證滅如本所求今日已得者謂小乘人無知本發心猒三界苦唯求涅槃今斷見修煩惱已盡已證究竟無為涅槃依毗婆沙是燈滅智明其果極修道得果者者章其圓依勝鬘經是修道智故云所作已辦獲得盡智者明其因已無生智者彰其果喪故勝鬘云所斷煩惱之更不受後故云不受後有其向屬何所攝者支佛既經涅槃河亦應有向為屬何攝申意者屬第六人攝別有意者此正在三乘共位以釋又今應從圓釋方稱經文何者既云成就六波羅蜜名到彼岸前二教及別地前並未見佛性悉不受具足六波羅蜜名應從圓釋及別證道同圓以釋故云別有意總結大宗者只是總結大意耳佛性亦有亦無者未有現用故名亦無未來心得故名亦有即是兩破者若云闡提得菩提名深著不得名虗妄能破此二故也以別破通者明通教非俱因位不修無量三學佛亦未修悉須改觀所以破之令其改觀經云作五逆犯四重者由未見佛性則成逆中理犯菩薩戒等以通涅槃為河者明此七人但過通教涅槃河下文方云若修無量三學得度變易河到大涅槃岸經云是名染著者若云闡提此身不用修即得菩提者名為染著經云心口異想異說者由想不當正理故令說異若云闡提不用發心修行即得成佛則名異說經云謗佛法僧者謗身中一體三寶也經云凡夫所得者若有說言凡夫得八聖分唯舊是凡夫作此說者名謗佛法僧若云非凡夫所得此亦不可修即得也經云一者不信嗔恚心者只聞闡提成佛不成佛皆生嗔心經云雖信不解義者須解大涅槃理方得成佛若不達此𥥌信成佛無有得義經云於異身中者改闡提業得人天身於此身得菩提名為異身以人天業非是佛因致使成謗經云不作不生者本有故不作不生經云煩惱因緣故不可見者只由此言即成謗義經云一切都無下明無從方便下明有二言相違所以成謗佛性之理者若是數法則屬三世佛性理體非數法故果中說因者現在修行得見佛性由過去善根四結隨自意語者即以三界結示也經云何名為如虗空者問意云為定同於質礙虗空為復異此虗空若同此者即三世攝經云如虗空華者全空是華故非三世不復細開者此假文有標釋結可見故不開之經云如來佛性涅槃者佛以虗空喻於佛性迦葉則以如來涅槃有證有得對於佛性令佛性成有故約三法為問令虗空之譬成有經云為非涅槃等者世人終不敢云二乘非如來煩惱非涅槃唯不信墻壁瓦石即是佛性不唯正報者正法念是小乘亦云心造於依正涅槃本絶者涅槃本是絶待法為赴權機作相待說虗空本待者空是世間之空本從相待得名今則借喻正因佛性絶待之理名為絶耳此即不例者謂有無不例也無非四大對者一切皆是四大無別四大對於四大故也經云涅槃是有可見者修習即可見也是色者色解脫及真善妙色足迹者涅槃為八正道之踐極章句者摩訶般若解脫法身三法具足名大涅槃妙世伊字是有者妙有也是相者無十相故即是無相之相是緣者涅槃為衆生增上緣光明者從譬得名即般若當體已餘名皆屬脫解第三破外道計空者世性眼所見空不堪為佛性喻故廣破之真諦有重數者此破次第空類如小乘所證真諦從淺至深次第而入故云重數經云盡虗空至海水者盡佛虗空如海水相若具十方虗空者十方空聚在一處名具足空唯鳥來栖樹者此即動合不動物只是體用者如人是物體能動即物用二指亦爾但隨取一指為體動即是用兩苦合者如二手二指先已自合復更兩雙共合故云如二雙指共合也或心神等覺者百論第一云外曰實有神如僧佉經中說覺相是神內曰神覺為一耶為異耶外曰神覺一也內曰覺若神無常若覺是神相者覺無常故神應無常譬如熱是火相熱無常故火亦無常然今所計與彼意同故是引之若有來時者云若有物來入於空中空能容受則知空有其用不得言一可解者一器中有餘器及餘處皆有於空故云空則非一兔角亦非者以兔角但有其名而無其體故非世攝所以借喻佛性同不可得若無此觀者二乘及偏菩薩無中道觀不能破大煩惱所以於世有諍先明如來二明菩薩者此舉果人因人但無有諍故與物和者稱機適會故名為和違於旨者如前二十一雙諍論是經云一者信心等十法皆依圓釋並須非前三教信等方稱文旨何者一起圓信生死即涅槃煩惱即菩提即空假中六即甄之方無諍下九法例爾先明有次明無者略列二法以之為戒遍一切法皆通有無經云所有罪過者有三漏故即是罪過法身破壞者法身實不可壞但為漏所障不見即名破壞又餘二身依法身法身破餘二則破即是觀不觀者觀即初句不觀即第二句經云輕者自去者非全自去但是輕微易斷經云說是二義者有無二義也離諸結漏者既是中觀所治漏則通界內界外因於緣者外五塵境也說者成小不同者偈云欲知汝過皆由思覺生若能斷思覺知汝即無有涉云如來昔住王舍城中阿難乞食有女携兒就井汲水女見阿難容儀端正心生愛著住目不捨不覺以索繫兒井拔出兒死因生悔心故說斯偈食訖還以白佛佛令阿難受持是偈云是過去佛宣說彼女曾聞非女智力而能演說故云成小不同無明與我見合者無明與三界見惑合為一簡異欲漏者明上二界一一禪地各因緣於塵境能生漏心故云除欲界中因緣又一心支為內四支為外又五支為內當地五塵為外二禪已上例爾何以故由未見性皆名為漏經云諸漏根本者由本有無明迷真起妄與一切漏而為根本也經云作想者辨所迷法由憶想故生於漏心名為作想經云貪因等者無明為三毒之本故也何以異說者何以今說與昔異耶互為因果者前念為因後念為果不善思惟無明更互皆爾經云子是近因者如由無明故不善故不善思惟即以無明為近因先起思惟亦爾能燋因緣者以中道觀燋無明漏互令其妄滅不使從因而至於果經云智者當觀下先明內心起漏次從誰共住下因外緣起漏何時者十二時也誰共住者因惡知識也何處者因依報起也經云衆生一身者為遮耶見之人故設此問或復說愛至取相者意云說愛名通所謂善愛及菩薩愛樂佛法而不生於取相大期者或胎中墮落及百年等皆名大期經云在斷中不者正問無漏果報為用斷不無漏無有果報者且順小宗後無果報云無果也經云牛即是水草者水草是牛因食是人因名果中說因至梵天邊者此明從欲界修於上定當來必生於彼此望於彼名梵天邊定是意業者此修彼定由意思故名之為業所以常謂色界為心者只是常思彼界耳迦葉品四經云從惡煩惱者舉極粗煩惱為觀境也經云滅同此疑者汝之所問正稱末代所宜故佛讚言之在言少異者雖小異其體是同故前文云慈即佛性佛性即慈正出所生行者更助其問意若達煩惱即是梵行五觀十二因緣者十二因緣為五陰因故次陰復觀十二緣令滅陰因見陰涅槃識初起時者一者識初託胎未能別分二者大體簡於五識以卒爾見未能分別即屬無記故云五識准無記想得假名者想能分別假名青黃赤白及善惡之法故須觀之色陰粗淺者一者粗淺二者易解所以不觀亦是且順經文隨機之說行陰過重者由受想流入行陰而成作業名為過重起三因者愛取有也說識為觸者觸是對礙之法故說識等為觸謂觸因受果次第因緣者只是受次第想因也即是煩惱前心者俱舍頌曰明無明非二彼疏釋云無漏相應觸名為明觸染汙相應觸名無明觸與有漏善無記相應觸名非明非無明觸故云非二也今文正明無明是愛取前心八聖道是無漏前心有漏善耶記謂人人善心也經云非有受者四句求受不可得但有假名故也經云斷是和合者三假四句推之令契佛性中理名斷和合行心中別有想到者由受想流入行心到令行心起於想到乃有不用處者以十一切處但至空識二處有一切想不用處則無故云但前二是一切經云復有大想下明上界想從此已前並是欲界起想名慧心者能滅世諦想心故得慧名此兩意者善近惡捨捨一切惡法而得解脫前云想二者若緣宜略說耳經云云何聖人而有倒想者佛意云若為即是一切聖人倒想汝試說之煩惱門者由之通入故名為門經云十種想者所謂色聲香味觸想生住滅及男女想依前倒想生十種想也中容捨心者只是平不善不惡心自然符會者自然與意符會而成作業經云不白至無漏業者今文一往云無漏名不白不黑准餘文說實報土名亦黑亦白寂光名非白非黑云云不得云報者無漏無報故也煩惱至招報者他人但云業能招報煩惱不招報今則不爾煩惱亦能招報苦之與有者若通以七支為言亦名有亦名苦今從別對不從通說故爾後兩句亦爾者有為頭名亦具四句苦為頭亦具四句例前二句說之將此四句對今經中十二句只是三道故也老死至何等者且約一期十二因緣以說跨節相生者如因煩惱而生愛取行生有餘者類此經云一百三十六地獄者前現病品中已釋無明為傍者無明是小乘習氣故名為傍互相因待者互相資潤也能生中道佛性者衆生佛性本自有之何故云生釋曰若非圓伊祕教詮於正性修緣了焉能見性由教而見義說能生遂使闡提還生善根者前苦折挫今則接引故云還生此行希有者今經皆用大涅槃心修行故歎希有歎三寶者教是法行是僧主是佛又教詮一體三寶行趣一體三寶佛是一體三寶果此非正問梵行體者如上梵行七善及四無量則以三淨為梵行體今文道品等但是梵行之緣詮於梵行經云善男子一切法是者依迦葉泛爾通問佛亦通途而答由此故引起迦葉歷別廣問又佛約開權以答故云一切法是一切諸法者權法生權行實法生實行今正約開權顯實法生一行一切行即如來行故云滿教含一切法又被後代悉備權實之人也經云或說是善不善者不善是所破故云不善及耶見等經能生行者然迦葉通取一代教法為問只此涅槃是一切法者今經大體其具三意一者約開昔權顯今實二者從昔已來用大涅槃心次第修習至於初地得見佛性具一切法三者始終圓修常觀涅槃行道初後不二名一切法下文能為初地菩薩至十住菩薩是輕品同斷者此約同體三惑說也觀師禪莊嚴等者此師自立最無義理道品通一切人修如何判云非凡所行彈開善意者世第一法尚非梵行何況忍等邪天台至多種者一明當分道品未必具品方能得道三四二五單七隻八當分是道故云當依念處得道又云是道場又云是摩訶衍念處既爾餘品亦然是為當分道品而非調停二明相攝者如念處一法皆攝諸品釋論云念處既攝餘品餘品亦攝念處是為相攝道品亦非調停三明約位者如念處當其正位勤是𤏙位如意足是頂位五根是忍位五力是世第一位八正是見諦位七覺是修道位此是約位亦非調停四明相生者如修念處能生正勤正勤發如意足如意足生五根五根生五力生七七覺入八正是為善巧調適戒定慧等皆名為正清淨心常一則能見般若是為根生亦是調適又初從師受法繫心憶念名念處為求此法勤而行之名正勤一心中修名如意五善根生名根增長名力分別道用名七覺安隱道中行名八正道能如是修得道有漏五陰當知道品是有漏皆是無漏者則是見諦思惟所行道品一向是無漏法華之文意在於此若八正在七覺後亦得是有漏亦得是無漏何以故依八正入見諦即是亦無漏若正在七覺前一向是無漏如止觀第七卷道品中說梵行之宗者宗尊也要也清淨梵行以道品為尊為要經云若離如是三十七下若離此法不得小乘之果從乃至下若離此法不得大乘菩提涅槃二果經云不見佛性者菩提果也及佛性果者涅槃果也經云梵行即三十七品者此是正助合行故云即是經云能壞顛倒者能壞八到也能壞惡見者前二放壞三界見惑後二放壞同體見惑能壞怖畏者入地住已能離五怖畏經云畢竟造作者令衆生修即得云造作以為梵行者何故云不得為梵行因耶有漏則有執心者有漏之法體是執著不能無得者只是不得無著耳先定義宗者為得無漏因為不得耶皆帶取相者修五方便雖為無漏作因而實是於有漏體實不執者雖是有漏能為無漏作因故云體實不執而自體有執者未得無漏名為有執發心相續者梵行之法令於衆生從初發心上求菩提下化衆生念念相續方名梵行世唯一心故不取之但輕後三心者輕受想行三心也但一往得境者明五識但是卒爾取境未成三假第二剎那和合方名因成前念續於後念名相續假待餘無心知此有心名相待假舉果明因者五識是果能增諸漏故名為因所餘各一者九性後七喜即喜覺支八猗即猗覺支九捨即捨覺支此三各自有體不令散失者以涅槃心修不令墮於二邊常住涅槃中道之法故也經云三十七品根本是欲者上求菩提下化衆生以欲為本故也經云如來先於此經中說者先於德王品中已聞難於今欲經云若言了因者了欲上求無間方名了因為不放逸經云明觸名之為因者明即求菩提欲心也最有多句者夫觸者以觸對為義相應為義初句以信因緣與近善友為對為相應以明觸下諸句例爾皆得說也者皆可得說三十七品為菩提因也未明定苦者申於經中戒與定苦共別淨根戒即定共戒故與前木叉別攝護五根者是不雜戒即定共戒也諸慧悉捨者捨權沙門果及二邊慧故云除斷等滅相似者須約觀行六根分證以論傳滅又如從初住已上滅初住心更得二住心等經云如是涅槃云何可得者問意者如是涅槃為用修方得為不用修自然而得若用修方得修相云何以總名說之者只是總云想耳大品十想者大論釋云九想如縛賊十想如煞賊通言想者能轉心想也能轉計常樂等諸顛倒等想故名為想前三想為斷見諦或說中四想為斷思惟或說後三想為修無覺道說是以壞法之人修此十想能斷三界結使證無漏聖果一無常想觀一切有為法無常智慧相應想謂衆生國土皆新新生滅故無常二苦想觀一切有為法苦智慧相應想常為三苦八苦之所遷逼故苦三無我想觀一切法無我智慧相應想以有為法皆從緣生無有自性悉不自在求我頗得四食不淨想觀諸飲食不淨智慧相應想世間飲食皆從不淨因緣故有云云五世間不可樂想觀一切世間不可愛樂智慧相應想謂衆生國土皆有過惡無可樂也六死想觀死智慧相應想若一期果報無常為二種死之所遂則出息不入息也七不淨想觀自他身不淨智慧相應想謂觀此身內有三十六物外則九孔常流從生至終無一淨也八斷想觀涅槃離生死智慧相應想行者思惟若涅槃清淨無煩惱者當斷結使證涅槃九離想觀涅槃離生死智慧相應想行者思惟若涅槃清淨離生死者當雜生死證涅槃十盡想觀涅槃結使及生死盡智慧相應想行者思惟若涅槃清淨結使及生死永盡當斷結使及生死業證涅槃彼十唯在於小今經十想專求涅槃是故引之令知所期觀智有別與無記者無記即無記陰不當苦與不苦也四食者夫食但資身得住即為食所以衣服等是觸食光音如似牛一角青色長息者如仁王經云一剎那中有九百生滅即是九百生滅為一念一百二十念為一瞬六十瞬為一息三十息為一須臾三十須臾為一日一夜十五日為半月三十日為一月若依仁王念亦不短皆是為緣長短不等經云是名沙門等者先歎其人能息惡故名沙門梵行無染名婆羅門是寂靜下歎其勝行先歎斷德不起惡業名為寂靜離煩惱染說為淨潔永離衆苦說為解脫是名智者下歎智德知過求出故名智者識是達非稱曰正見到岸可知名大醫下歎利他德可解是名善解下謂解上如來隨自等三種語也諸佛七種中語者知上因語至如意語如前王語說就今知七種中又二先自知二德斷七種下斷他疑網七種語者如上已說一味大慈心者同體無緣慈悲故名一味第十五卷陳如品釋疏為二一釋題二就文下正釋文初又二初正釋題次開善下明品來意初又二先翻名次其義下釋義初云火器者具足應云此翻火器婆羅門種其先事火從此命族火有二義照也燒也照則暗不生燒則物不生此以不生為性阿若者名也此翻已知或言無知無知者非無所知也乃是知無耳若依二諦即是知真以無生智為名也次釋義又二先正釋次若作付法下重述付囑意初云且出四意者四文次第引四悉左舍利弗右目連前佛滅度者謂舍利弗目連在佛前入滅餘弟子中亦有此例特法者迦葉也領法者阿難也于今未來者迦葉阿難二人並未至婆羅林會所以對告陳如通別諸人以顯陳如皆是上座甘露及開祕藏生善中最初見甘露在鹿苑真諦滅也中間方等般若皆為布演甘露來至法華已開祕藏為未入者今更重開以此四義一一皆須序其經歷一代引入醍醐顯權巧畢次述意中云若任持紹繼者持佛法至彌勒佛出也流通遺命者作流通釋亦有其義次來意又二先敘古次今明下正釋初云開宗略說者從純陀及哀歎二品初開常宗略說常義從長壽已下即廣說也得前少意者若云答上問但只得今文正觀之文失下破耶等意而文未盡者三品未來也一燒身品二起塔品三囑纍品次正釋文中初云即四悉意者初上求下化異即世界也餘三次第對三悉可解又從初至一分無明在皆具止行二善智斷分具一一無不分證常樂我淨故云獲得常色等二隨所宜者今文正順機緣宜樂但說五陰是常若淨名中三十二菩薩各說入不二門阿含中五百各說身因般若中遍歷諸法皆云清淨無二無別悉是隨機故云可見心是緣法者是能緣法也佛無礙無緣者無非法界互遍互入等爾時過意界此即大論文也彼云若發真可是智業求發真猶在意地此師引意界證有色住在智業中證有心若證今經意者過意界證因滅是色住在智業中證獲得常色雖別圓者別人後心方具常色圓人初心即具經云是名沙門名婆羅門者但云沙門婆羅門即是無常若知沙門婆羅法者即是常也又初明其有人具足沙門下明其有法也二結成褒貶者初文褒也一切外道下貶也經云作師子吼者亦能吼於無量師子吼也謀議有五者前四番皆順外計之說即是實門之第五一番違於外道宗計讚歎如來等即大權所為共熟未熟作破耶始末經云或說我生淨飯王家者小乘見也或說不生大乘見也經云我今此身是涅槃大乘見也或言滅身者小乘見經云說無常等小乘見也經云說有常樂等逗大機發者又外人本計常今為說常順其宿計則易開悟經云亦不見聞金翅鳥王者據知如來不可思議大勢力等則是大權示速之相經云罵時不嗔等文中一一皆頗外人不如於佛外人意云汝諸人等順則喜違則嗔佛則不爾佛一身具三十二相等汝諸人所事一神唯有一相等云云刨音齚契也鉏須反然涅槃至非常者為衆生故作四門說使從門通入圓伊涅槃之理故云欲以常破之舊富此難者只是正當外人所計及當自然之計此難最拙者既難他能所俱是無常自立於無常汝因亦應無常耶是萬法性者一切萬法皆從性生所生之法皆是無常染粗黑者論云薩埵剌闍怛但摩薩埵此云有情亦云勇健今取勇健義剌闍此云塵怛摩此云暗三德應云勇塵暗也若傍義翻亦云黃赤黑亦名貪嗔癡亦名樂苦捨其宗迦毗羅者如論云神我為主是又迦毗羅外道此翻黃頭計因中有果又入大乘論云迦羅所說有計一過作者與作一相者與相一分與有分一名為計一如莊嚴云佛果下舉佛法中於三假法所立不同以顯外人所立染等三不同也不妨有續待者有因成亦無妨何者由萬善因成故因續於果故名相續待於不得知佛是得即相待假二諦同體者還成二諦不分故不可用若答汝義者此破意且用別教破之由彼本計能所法別故今亦以能所破之有時說有者若昔說無常意命至非常非無常若今說常即令入非常非無常故無二語終以苦識至樂者觀於相續假即是苦識念念無常作此研之得入涅槃即名為樂道諦例爾者始從念處還以無常觀研之成於涅槃之樂止是方便者始從念處已上皆屬方便優樓僧佉者計異謂作者與作異等涅槃何曾定常者涅槃之體離四句故但以不生煩惱為涅槃者達煩惱即涅槃亦是定觀涅槃行道故云也宜作此說者宜作互無別教之說若論正理等者今且約現在云牛馬互無若論正業理性不得一向定無後方轉故涅槃亦爾約破行道宜說互無若論理體本來相即故云非全互無涅槃同是涅槃無者有涅槃時無煩惱有煩惱時無涅槃也有無之惑者無漏中有微細煩惱即是無明相似無漏者𤏙位已上也及被導者忍位及世第一法能引導入無漏名為被導前莊嚴釋未為全當我解脫色者解脫於無常色獲得無色此解違經故不可用苨奴底反遂為輕略者如牛糞種甘蔗種日曝種泥土種如大瞿曇住甘蔗園云云既目得者由聞佛說法即得羅漢不同善來也是默然答者即默破他有無也又佛法中真我非汝所計有無所以默答十四難者大論云一世界及我常二界及我無常三世界及我亦有常亦無常四界及我亦非有常亦非無常五世界及我有邊六世界及我無邊七世界及我亦有邊亦無邊八世界及我亦非有邊亦非無邊九死後有神去後世十死後無神去後世十一死後亦有神去亦無神去十二亦非有神去亦非無神去後世十三是身神十四身異神異若佛一切智人此十四難何以不答答曰此事無實故不答我即衆生等者不出十六知見十六知見文在大品大論廣釋一生者見計我能生如父母生子二養育見計我能養他三衆數見計我有五陰十二入十八界四人者見計我是行人五受者見計我後身當受果報云六起者見計我能造世果報七知者見計我五根知能五塵八見者見計我根塵能見色及起邪見九我見謂橫計五陰名之為我十衆生見總攬五陰名為衆生十一命者見謂命計連續恐連續斷十二作者見計我能有所作即士夫見也謂外人執我有士夫之用十三壽者見壽計一期尋常雖計病時最切恐連持斷恐一期短十四使作者見謂驅䇿由我十五使受者見苦樂由我故十六使起者見令其還生欲界名使起然今經中前破我見有其三破及我是一并我是作者三義後別破見者知者餘有十一知見例皆自亡故不俟一一破之我有二種者此是臨急之言立於二義則非遍義者我既不遍則是無常云何計常出無去處者若有云處即是無常云何計常二我何異者二我若異即是無常云何而言我體一耶經云如是至出世出者世即俗諦出世即真諦既違世諦即違真諦既背二諦非耶何謂此即破竟者只如此救即當已被破竟臨急無理強轉義宗以求其勝終不可得如張人我下類於天得佛得之相法與非法者有情無情法也義則可然若承上文意來須作我字義雖若是准於下文復不可改隨下文業字者是業所作文是經云如其吉者由被破竟故名不吉若定不吉佛更用者成佛不吉非我咎也經云但受一邊者但受明遍於室不受炷邊有今明經云同諸聖人者一切聖人皆以正理而破於耶今歸平等涅槃正理方是大平我豈得等者我既不等即是無常何如計常應非我作者若非我作何故計云我是作者若非作者即是無常乃是假我者謂假根境空明識衆緣和合方有其見名為假我必無實我者必無外人所計自能見也但不同實我者不同外人所計我也佛義不立者難佛無我義不立有我義則成誰見誰聞者約我有用為問綏雖音是胡子因十二因緣等者正由無明行與識等和合而成此身若道理者意云佛是得理之人應說有我若無我者常樂我淨從我而得經云滅內外至六識者滅於分段等識即得常識等須滅身後者須滅我慢及以煩惱方得常樂我淨不可將此耶見身即是故云須滅又若次第修者先滅分段身等方得常樂我淨若圓修人不須云滅但觀此身即是三德漸漸令淨即名為得六根淨人即其相也非自非他等者此用衍門四句破執遠離於慢由他起慢名為他生內心起名為自生共離可知四句推於求慢叵得皆如幻化故云非也異先身命捨先身命得中陰身命此外道正計中陰無因自然而有非因緣得故云也經云一切法亦如是者因果及依報法皆從因緣而有經云汝云何見等者佛問意者汝依何法何智何處見世間有法不從因緣有耶榛仕巾反說文云藂木也謂密茂之林曰榛依此釋為正實如小栗者即小茅栗子是一業所得者且據一人業所得一期果報身命無二也色心連持下約不異而異之相經云因即五陰等因即善惡五陰果即五陰果即無記五陰故俱舍云因通善惡果唯無記謂於現在起善惡成當來無記陰牒計非之者牒前火燒榛木而有絶炎計來非之經云五日者佛告世後五日方得羅漢據此而論皆是述昔以足身見成六十二者能生所生合稱故成六十二又此四句皆後破前各執一句成六十二大品云譬如我見攝六十二見攝六十二見者彼經十四云示我見根本六十二見世間空既云我見為根本即是我見攝六十二也闊狹竪等者今言邊者但約竪論過去望現在現在望未來三世計我邊際分根故也乃計如來即色涅槃者計身神俱滅即斷見也若身不滅等者計身神俱不滅常見也兩亦兩非即是雙計他人不見者古師約自身上解作於六十二見謂我自如色來等又衆生五陰亦爾我不作此說者我不曾作汝耶計之說經云是名為見者若作是說堅執不移是名為見見執所緣名為見處見能集起未來苦果名為見行造作耶行名為見業堅執所緣名為見著為見繫縛常在三有名為見縛因見生苦名為見苦取非為是名為見取由見便有三塗可節名為見怖為見燒然名為見熱纏心不離名為見纏就見能說者從如來名為下是能見能說謂能見生死即涅槃能說見過而遠離之圓滿端正者因圓果滿依正成就名為端正又雖在理性三因互冥諸法具足無有缺減又名圓滿端正若共者亦有亦無句若離者非有非無句破四性已四悉因緣起機假說前後令物獲益則不相乖又佛性本有名為在前衆生修習方乃得見名為在後兩亦兩非例此陳如品二無常等者取等兩亦兩非句邊等四如去等四也先業為因者又內識心為因也又一解云下此師約觀行心釋與觀師同者今家用觀師釋經云一切諸漏斷者子縛斷一切有者二十五有果縛亡也少分稱得度者那含人但斷九品修惑證得三果始是分度四月識者四分律云有裸形外道名布薩與身子論議結舌無言歎云短少者尚爾況堂堂者乎至跋難陀所而求出家後問其義而不能答即生念言沙門釋子愚暗無知即便休道比丘白佛佛言若有異學來投出家四月共住有一外道衆僧與四月共住佛命比丘為其剃髮受三自歸沙門十戒四月內之供養衆僧諸比丘每對沙彌說諸外道行見俱惡當受苦果如見毀時不護外道知其不退與受具戒此即試外道之相一時根性者謂順其宜樂根性不同或言止觀者以止觀攝一切法故云欲得四禪等經云今報佛思入般涅槃者令一切人見其入般涅槃知從佛邊而得還令一切人歸依於佛而求度脫所以寄諸比丘而傳白之佛答不去者恐墮無窮故佛不答於生陰前愛者於前身上起煩惱等若煩惱復因煩惱者今身煩惱復因前世煩惱於今煩惱上復起煩惱故無前後蚶如㓨蛤如盡破其證義者破其前引鐶釧等義也經云性自入水者性是因水是緣此即因緣何故計為自然耶全無此語者無諸法悉有自性之語今則取意破之不同祠祀者還寄彼所計而以破之經云作漿者甘蔗漿也作蜜者壓甘蔗為蜜甘蔗與餘藥知為石蜜經云無有一性者無有自然之性也然佛之本義者佛本只說煩惱為身因亦不云其前後又不曾說因身而有煩惱外人何故難在前耶先發遣傍者雖云遣傍還成正答上已難身在前故須先遣還成我者明佛不曾說身在前若云在先者是汝自立汝義不立還成佛所破之義故云何因緣故而作是難除彼所計之一時者除外人定計因中有果果中有因之一時何者若言身定在前是計果中有因若言身定在後是計因中有果前後而一時者今明正是因果前後之一時何者以現在身望過去因義當煩惱在前身在於後而復因果未曾相離故云前後之一時一時而前後者此亦因果之一時將現在身望未來報於現在身起煩惱復為未來身作因義當身在前煩惱在後名為一時之前後無前異一時者謂由過去一時因果感今現在一時果身亦無一時異前後由現在因果一時復招未來身因果正意云有身之時即有煩惱有煩惱時即有於身因果未曾相離而復因果不失故名一時而復前後何以故良由百界千如三千世間即空假中唯在一念故無前後緣成由果者中論第一觀因緣品云緣成由於果以果復緣先故若未有果何名為緣故論偈云果先於緣中有無俱不可先無為誰緣先有何用緣此即總破一切因緣也今經明一時前後以立因果其義不同故云此別有意若一在前等者若云煩惱在前則煩惱有始身在前亦爾對治化機以說者謂化儀約事皆先破煩惱令入真常故云要因煩惱而得有身仍帶理說者理無前後事有前後故云雖也故知實理者謂唯說圓常若不稱機却成權法有餘之說故云若說常者受化之徒謂佛同彼外道云云色心體一者全色是心全心是色故云一也剎那理等者只是事全是理理全是事法無二體故云等也貴在納衣執破者且順納衣宜說煩惱在前身在於後了性同空者空即涅槃也內外誰施者一念三千依報一千是外正報二千是內即空假中同一法界故無內外二行經文者一時中一行前後中一行故此二行經文者是極理決定之說釋大疑之要但炷是燈器者油注盞皆名燈器不得名炷者未燒但名燈一者潤業者澤州云無明始終常有身起之時必依無明如夢中身必依睡心故說一時有者謂身望因煩惱而得有身問無明依何而生依真識依何身識常住由如虗空更無所依此解復與諸師小異若潤業者煩惱潤業能為身作因亦有一生二生未酬此業故名為奢若潤生煩惱則與身俱時能潤於生復潤於業為未來因生陰之初者初託胎時於父生嗔於母生愛即其例也又云於中陰身起煩惱能潤生身於義為便者此亦泛依彼釋若從圓說一念三千無復前後此為正義死陰之中者此取現在臨終時最後剎那起潤生愛為潤生煩惱今用此釋一時因果三義者由過去因感今世果由今世果起未來因有漏之法是一時而有三義之異殊堪反於耶難者今答一時因果及以有漏是一時法反破外人所計因中定有果中定有因之難無不皆遣然此三師者迦毗羅僧佉勒沙婆如前說彼家者諸外道也現在一世相生者外人但計二十五諦從性生大等有主有依以為因緣不云從過去業力因緣為此義故與佛因緣果也求那下云云者風大造鼻水火造舌地大造身如論文香相品者成論第五香相品初問曰多摩跋等衆香合故其香異本為即此等衆香更生異香答曰因香和合更生異香如青黃色雜更生緑色有以種種業因緣故生種種香又衛世師人謂白𨭛鉛錫金銀銅等皆是火物而是中有香故知非唯地有云云後後雙者下全是彼論第三四大相品文言汝猶隨濕緣是水者汝何不達寒因緣而成於地猶故隨水因緣而名水水耶芰角並者波動與風相望名芰角並又若以凍望地亦成芰角若凍望水波望水俱名相望並果報參差者應知或時根具是後報貧窮是生報貧是後報根具足生報富等例爾二種無法者前計虗空兔角二法也弃通從別者隨病用藥破性不同遍通一代稱適機宜故云通也五時次第別也多用因緣破性者如今文中先用正因緣破外人性執耶因緣文是次用無常苦空等如今諸外人歸伏之皆具四時之益一代次第初設教法取機之相次用中道者向後用也破於偏漸者偏即前二教漸即別教也互用無失者明五時互用不定祕密四悉被機不定前後破一切內道等者如前立五時次第用此五時以消今經得道之人文橫竪自顯經云涅槃是常者此用深理而形淺法經云何因緣故作如是說者佛為知我心為別有意作如此說經云乞食是常者以常乞故名之為常別請無常者別請時疏故名無常跨節者不依其所念以即用出世深理答之名為跨節然至理中衆生無盡者問何故云無盡耶答若言衆生有盡涅槃亦須有盡何以故衆生即涅槃故故不可言其有盡然經中約事以答疏文約理釋者顯事不離理所以約理釋之念阿難解之者一代隨逐世尊佛法皆能任持所以不說魔法云何為亂者只是說多為亂耳八諦者欲色等上下各四觀苦過者是過患若不觀破必起苦因觀苦出者觀苦出要謂出生死觀苦入者入涅槃也經云或有示現神通等者是示化迹又欲識魔佛法異者權實之法魔能說之應問何者是權何者是實何者即權而實即實而權即非權非實作此問者魔必不能答之以此驗魔則知魔佛可識折阿難真心者恐阿難自恃是佛親侍過一切人故須此折各有重任者荷負正法各於十方弘化名為重任呵實行者亦是一住對辨耳弘宣深理者弘揚大法談深證極非二乘所能約迹為聲聞云其不堪與奪者大小相對而為與奪若言與者二乘既從漸入頓開權顯實已竟故堪付囑但欲論近者謂是法內眷屬故云也普賢文殊者意云若據與普賢文殊同位同能廣化其人甚多然諸經中別出普賢文殊最堪流通付屬弘廣菩薩亦應如此不取通名應是有別弘廣菩薩魔王發心者必皆大權所為也翻音不同者五天音不同也梵音兼義者辨才但總持之義五事斷辛者小乘爾前未斷至此經方永斷蓇里登反裨薄錍反賴盧達反涕提音為正淨地品者此十地菩薩是父母生身由有毒蛇等不淨之畏故以十篇陀羅尼淨此地名淨地品圓教一生者若從實行釋者此人昔時於前三教久已修學權門純熱今值釋迦聞圓常極教即破無明乃至入第十住地等所以名為肉身未免此釋為正就應身釋今所不用但三寶名種種不同者諸陀羅尼中雖種種名不同三寶攝盡摩竭大魚者大論第七云五百買客入海採寶值須魔竭魚王開口船去甚疾船師問樓上人何所見耶答言見三日乃大白山水流奔趣如入大坑船師云三日者一是實日二是魚目白山是魚齒水奔是入魚口我曹了矣時船中人各稱所事都無所驗中有優婆塞語衆人言衆人吾等當共稱佛者字佛為無上救苦厄者衆人一心共稱南無佛是魚先世曾受五戒得宿命智聞佛名字即自悔責魚便合口衆人命存聞若今經一體三寶總持之名七方便人常住慧命則永存矣鸚鵡生天者賢愚經云須達長者敬信佛法一切所須悉皆供給時諸比丘日日往來說法教誨須達家內有二鸚鵡一名律提二名賖律提稟性黠慧能知人語諸比丘往來每先告語家內聞知愸理敷具後時阿難往到其家見鳥聰黠愛之在心而語之言欲教法二鳥歡喜授四諦法偈言豆佉一三牟二提耶三末伽四此四晉言苦集滅道其家門前有樹二鳥聞法喜悅樹上次第上下七反誦習其暮宿樹為狸所食緣此善心即生四王天阿難明日遂到其舍聞二鸚鵡為狸所煞還白佛言須達家內有二鸚鵡昨教誦四諦法其夜命終不審識神生處何所佛告阿難緣汝授法生四王天乃至第六天七反生天無有中夭阿難又問六天壽盡當生何處佛言下閻浮提出家成辟支佛一名雲摩二修曇摩大品至無上明咒者彼經第九大明品云復次憍尸迦是善男子善女人聞是深般若波羅蜜受持親近讀誦正憶念不離薩波若心若以毒藥熏若以蠱道若以火坑若深水若欲刀煞等皆不能傷何以故般若波羅蜜是大明咒是無上呪此即一心三智之般若尚能遍蕩三惑二死之毒何況世間之毒而能傷耶即六妙門者彼經云聞觀世音菩薩六字章句正念思惟觀心心脉繫想一處見觀世音菩薩即得解脫成阿羅漢云何當得見觀世音菩薩及十方佛名若欲得見端身正心使心不動心氣相續以左手置右手上舉舌向腭令息調恂使氣不粗不散安祥除數從一至十成就息念無分散意云然經中唯有數息一門又相彰顯餘之五門疏中依經義立何者既云六字章句驗知六門義足二隨門者捨前數法一心依隨息出入攝心緣息知息入出心住息緣無分散意是名隨門三止門者息諸緣慮不念數隨凝寂其心是名隨門四觀門者於定心中以慧分別觀於細微出入息相如空中風皮肉筋骨三十六物如芭蕉不實心識無常剎那不住無人無我身受心法皆無自性不得人法定何所依是名觀門五還門者既知觀從心生若隨折境此則不會本源應當及觀觀心此觀心者從何而生為從觀心生為從非觀心生若從觀心生則已有觀若從不觀心生不觀心為滅生為不滅生若不滅生即二心竝若滅法生滅法已謝不能生觀若言亦滅生非滅非不滅生皆不可得當知觀心本自不生不生故不有不故即空空故無觀心若無觀心豈有觀境境智雙亡道源之要是名還門六淨門者知色淨故不起妄想分別受想行識亦復如是息妄想垢息分別垢息取我垢若能心如本淨不得能息所息及淨不淨故名淨門故此六門通於四機遊入何者藏人觀息無常通人達息如幻別人了息具恆沙佛法圓人見息是佛性祕藏數息既爾餘五例然故彼經云我即數息使心不散霍然意解銷伏結使得無生忍住首楞嚴三昧云云今經俱知圓常佛性暫取小果蘇息終不滯偏所以經云魔王聞是陀羅尼已悉發菩提之心云云善神王者持善令不失惡神王者遮惡令不起慢從他使背上者此慢從五利使背上而起若斷五利此慢即除得下定者下八地定名為下定我心殊多者即是上定意明須跋得非想定名有慢者由輕他下八定故有慢名經云皆隨往日者外人但信往因而招今果不云今身作業而招來果致成外道耶見撥無因果也無定之報者若能修道即得解脫故不可言其有定報也作八行觀者然此八觀有總有別總以八觀觀彼四陰和合不實別者以無常等治四陰理無常觀識苦觀於受空觀於想無我觀行以癕瘡等治四陰事謂觀受如癕觀想如瘡觀行如毒觀識如箭若止觀中引用即云受如病想如癕行如瘡識如㓨又觀空處如病識處如癕無所有處如瘡非想處如㓨其名雖異其治大同以有此八心易生猒疾能捨離修習無漏問四禪但以苦粗障三而為方便空等四處何須用八答空處定細不說八過患難識凡夫亦有依六行者不及聖種離之速疾涅槃無想者然大涅槃實無想於橫計有想驗非涅槃受是惡身者無間出已即受此身經云況其餘者況劣藍弗外道者也經云斷一切諸有者二十五有見惑全在修惑唯有非想一有在也經云云何名為實想者我今不解請為說之經云一切法無自想等者用摩訶行明四句推撿令入畢竟實相空理也此空遣於俗有者以畢竟空蕩於三惑二死之有也須跋悟道者翻譯家只譯九字來耳其時未有後分故爾所以疏家名為得道之文今有後分此九字合在後卷出家文後著之後分上甚深妙法者聞上實想等法且取小果佛言善哉善哉者意云今正是時隨汝所欲故歎善哉善哉而以許之須臾之恩者只上一喚善來之言即得道果如何可報行苦遷逼者以苦依身在未免行苦所遷於是時須者當此語時即入滅也法應如是者應身現迹化緣若畢法爾應入涅槃遺教品者此品正令教法以被將來益物不窮永不絶應盡等三是遺身益物令權種熟脫三何以故吾今此身即是常身法身所以舍利法界遍益衆生當當不絶疏云化用掩迹者非但如來化緣已訖攝迹歸本而五十二衆經歷一代來至今經減同如來攝迹還本而復遺教遺軀遍益將來經云爾時佛告至我大涅槃是標難思法體勸令護持從我於下釋其難得所以以勸修習利益自他今已顯說者自法華前以權䨱實或顯或密來至法華及以今經彰灼開權同入祕藏故云今已顯說十方三世一切諸佛者亦如法華開權顯實引五佛化同所以十方三世諸佛一一皆為令衆生至一切種智今亦如是皆同諸佛住大涅槃常樂無缺等放捨身命者放捨應迹遺驅也諸佛摩頂者諸佛以權智手摩諸菩薩實智之頂即是權實合一方名正不失致感諸佛常現其前疏云初外覺者諸佛化耶皆先同後異故先在外如乾草葉者須跋外道衆中為最上首一化便歸猶如乾草投大火焰況餘劣者耶入諸境界者不出六師故云受行耶法音音陰車匿比丘至調伏者今經明車匿與大論互異彼令依梵法治今觀十二緣令漸調伏言雖互異意須相成梵法治已必須令觀十二因緣以調其心方得入法若不爾者空治無益尸波羅戒者別解脫也依四念處者今文能依圓教念處如是二人皆以深心者一福田勝二心勝故等若佛現在至全身者恐後代人疑福有優劣少故為問起以除其疑乃至畢苦者近得羅漢遠入妙覺方名究竟畢苦此是真如之法故無盡也若見如來舍利至見僧者此一體境智不二僧也輪王以少福者以十善化世故須起塔供養於都城內者欲令多人發心故也其轉輪王雖未解脫者文中不云次羅漢者以未斷煩惱故不得著次言皆紹王位者皆是王種豪勢各自守護不均貧群故令城外普益群生蹀止多許少者天帝是佛檀越故與多中之少不同餘衆難生是中者舉劣以顯勝何者第三禪是三界樂之極處難得生彼彼雖難生修者必得大衆遇於如來最後涅槃真金色身身心快樂復遇於此百千萬位不可為喻疏云舉因顯果者因圓果滿於果身上普放光明等應盡還源者化緣已說名為應盡安住德祕密之藏名為還源故上文云安置諸子祕密藏中我亦自住其中即此義也從初禪出入第二禪者准摩耶經此是無間三昧不合著出字若言出者即經散心應云入初禪已次入二禪如是次第至滅受想定從滅受想定起入非想處漸漸次第還入初禪逆順皆無間不經散心名無間三昧亦名練禪即九次第定也次間入出者此即薰禪亦名師子奮迅三昧猶如師子奮諸塵土諸奮迅入出為熟靜散心故順入者其入九定從初禪以至滅定逆者從滅定起復入悲想如是次第復至初禪如是逆順皆經入一散心三超入出者此入修禪即超越三昧從初禪起已入非想非想起入滅定起入二禪二禪起入滅定上界皆須滅定為主下則漸漸滅入三四空識不用處非想至非想已還入滅定此即順入也逆者從滅定起入初禪初禪起入非想非想起入初禪此即初禪為主則上漸漸減至二禪已還入初禪復有逆順相對交過者從滅定起入初禪初禪起入非想非想起入二禪二禪起入不用處不用處起入三禪三禪起入識處識處起入四禪四禪起入空處空處起更入四禪四禪起入識處識處起入三禪三禪起入無所有無所有起入二禪二禪起入非想非想起入初禪初禪起還入滅定入既有三出亦具三皆經散心為異也此依摩耶經略出其相然今經語略大體則同應如彼廣疏云變樹形消者枯榮非枯非榮祕蜜寶藏皆不可得法界無相故以形消表之機感荼毗者通而言之始從華嚴已來一言一教皆是機感又今經始從如是終至奉行莫非機感今別指唱滅名為機感以標品目疏云彰別者別在俱尸凡衆爾時大衆至扶於如來入金棺者如來不可思議平等之力一切大衆同時以手扶於如來而入金棺疏云餘城亦爾者十六城等皆爾餘時亦爾者未荼毗前皆爾從諸天人乞妙香木者以表報恩供養也其地乃是至處者明三世諸佛化道悉同益物事等皆於此處而闍毗之唯有迦葉獨自明者迦葉於佛滅後住持佛法應治此等故不令餘人聞之復持舊疊著新疊上而不除舊疊者使凡聖普受平等之福故不除之一時禮拜者弟子事師皆接足宜禮有三十六極大力士者只應云四八三十二從心𦚾中火者以同體智火焚權迹軀等聖軀廓潤者於平等法身以現舍利如狀芥粟普益一切名廓潤廓虗空也千張火全不燒至除外一雙者中間皆燒表如來常行中道故爾疏云餘經八國者長阿含云迦葉從畢鉢羅窟出赴闍維所佛現雙足迦葉禮訖傳中云分為三分謂人天海人中一分復為八八國者一拘尸國諸末羅衆二波波國諸末梨衆三庶羅國諸跋離衆四摩迦陀國諸拘利民衆五毗提國諸婆羅門衆六迦維羅國諸釋種衆七毗舍離國諸離車衆八摩竭國阿闍世王衆各云我當於彼求舍利分各嚴四兵即敕香姓婆羅門汝持我名問訊拘尸諸末羅衆起居輕利遊出強耶吾於諸賢每相宗敬鄰國敦義曾無諍言我聞如來於君國中而入涅槃唯無上尊實我所天故從遠請求骨分冀還本國起塔供養香姓受教白諸末羅言誠如君言佛此滅度國內人民自常供養遠勞諸君求舍利分終不可得時諸國王即集諸臣若不見與四兵在此當以力取時拘尸國即集諸臣共以偈答如來遺形不敢相許彼言舉兵吾斯亦有是時香姓喻衆生人曰諸賢長者受佛教敕口誦法言心服仁化豈諍舍利共相煞害舍利現在但當分取衆咸稱善尋復語言誰能分者衆舉香姓仁智均平可分舍利云云即分舍利以為八分瓶塔第九灰塔第十存時髮天持上天起塔供養明星出時分舍利訖有餘炭者畢鉢村人白衆言乞地餘炭起塔供養皆云與之諸國各於本處起塔供養簡無緣者簡稟方便教人未堪塔聞於圓常佛性真伊祕密故不與之疏云其文未盡者既云未盡不合題為上下只應云三十七三十八卷耳承保四年五月二日以華林房本書寫了
