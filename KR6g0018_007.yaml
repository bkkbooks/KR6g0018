body:
  text: 德王品之二佛性不持者既有佛性何不住持令不墮獄若墮於獄當知佛性無有住持之力若無四德者若有佛性何無四德之用既無此用豈有佛性耶經云若斷至我淨者若斷於性云何復云當得常樂我淨耶前難令涅槃無常者指前卷末悉皆令轉者若一切不定闡提及二乘皆應即轉成菩提佛菩薩已得菩提竟皆悉轉成闡提等又應知諸佛是定中不定而為眾生現生滅故闡提二乘是不定中定以一切皆當得菩提故歎現德者為欲利益及憐愍等悉是現德之相經云以不決者後時方得涅槃凡法為外等者凡夫法為外二乘法為內又二乘等法為外大乘法為內又意業為內身口所作為外又界內善為內外界善為外中道佛性非此二邊有漏等亦同此簡性非已得者佛性非斷已還得既無新得之理驗知佛性不斷又斷已得下消經中若斷已得經文云色與相者青黃等是色方圓等是相又礙是色性青黃等形現可覩者名為色相香味等例爾經云生相者十二因緣不定也方便道者只是示迹不定此二不滅者涉公云內則護方外障塵坌亦表如來內心堅淨外相藏美中間壞者萬累俱消經云如諸國王者世間國王諸天擁護名為天子稱世間天生天者二十八天善因所感名為生天餘二可知舊解及興皇所釋非無一途但不相即及𨷂遮照故今不用今明鬼即非鬼下於鬼上具三諦義非鬼即鬼下於非鬼上亦三諦義即非鬼非非鬼下於非非鬼上亦三諦義足此即一句皆俱三諦是一即三下複疎上三諦若不複疎不成圓諦一一句皆爾又至釋文經中皆作雙照以釋良由中體具足遮照故須二種釋之佛現兒像者佛現三尺兒像化此長者破其恩愛恩愛即欲愛煩惱破此愛已得第三果經云亦能知他眾生心者知九法界眾生心也經云如來生在東天竺地者竺者種也胤也劫初之時梵世諸天順後受業下閻浮提化生人間五天竺國本是天種名為天竺如來生處住婆提者轉法輪處舍衛國是或王舍城者得道處也又私謂至易解者私意云置此是得宜也明七漏者然文中列七漏全是成論文開邊為斷常者決定有我無我是假我者攬五陰以立宰主名為假我真我者只是神我耳我能作因者能作善惡因也此苦最通者三界皆有故名為通行具無常者無常是因苦根是果無常等四各有因者此未全當大體非無此釋煩惱等四者謂陰死等四魔今亦有此判秉行之眾者此且約秉法為僧須明理僧境智和合是專志義方是真僧永斷於生死即解脫者自既脫於二死即能處處現身令他永斷二死故名解脫由我能聽者由我聽法得見真我以三觀治三漏者欲有無明三也若能至心聽即世界者今助二釋成世界義何者聽法心喜故屬世界二者有能聽所聽所聽中有名有義故屬世界論中云一法下對治也涅槃只是因緣之法者由緣法了所成故屬因緣除正因性者正因屬理所以除之只是淺深者前品猶是淺位菩提今不痛即深位菩薩也驚柝者柝音託擊柝周易云重門擊柝以待暴客如持更等德王品三經云無念慧者念中無慧故也偏據苦中生念者今之念偏於四心中偏據行心麤故亦是行心中細剎那剎那常起故屬行心於三受中偏據苦受餘三心二受非無念漏心稍輕微且不論之又由餘三心二受助成行心故爾起貪嗔等者具十惡業故云作種種惡初少許法說者譬說八文法但一段名為少許初六譬道緣者若能深心思惟得入方便道名為道緣無明能構眾生四大者由無明構造養育此身所以無明譬之如王餘二解非無一意稍不順經顯然者斷非私隱故云顯然為迴𮨇者此即走中迴𮨇也五根至栖託者五根取境流入意地是故五根為識栖託即入空者於外凡位中修習人空觀方便也安心空境者安心念處境也經云咄哉男子者驚覺令發也六塵能劫善財者正由內六根取境致令失財若內根不出塵則不入今偏名塵為師也無明闇心者由無明闇為六塵蔽斷常衝擊者於五陰上更起斷常名為漂急漂字去聲呼筏不可依者初心恐道品微弱故云也譬眾善法者諸助涅槃善法也兩手譬權實二智者觀俗名權智觀真名實智戒定二法對上二智三學具足道品之法此三攝盡經云截流而去者漸漸入無漏也在此在流者未斷生死煩惱為此岸菩薩修行伏惑未斷及未至極果俱名中流今又文八譬通於四教二乘菩薩所觀次合八譬者一一合文皆先云觀身如篋等次皆云菩薩觀是四等通於毒虵等尋文可見四大有內外者外四大與內四大同故但合內誘引眾生者修觀慧時方知誘引但前三心者受想識三心也無明為始者此約一期報身以說經云三垢者貪嗔癡三垢也如人望舍者初心修觀觀於五陰未見陰理猶如望舍六根無情者清淨四大名為無情亦不具四者地具四微其力薄故水具三微無香火具二微無香味風但一觸力最大故此由外人所計若佛法中一大皆具四微塵是滓累者二乘為變易六塵滓累喆音哲但此開二河者若從因說名煩惱河若從果說名生死河又破煩惱河入涅槃河到於彼岸六河如下第十二疏釋第七譬戒定智慧者及第八到彼岸皆須通四教道品鬪諍本者由各定報故爾佛猶有漏者示同有漏者有漏也經云有涅槃大涅槃者此二涅槃俱在滿果既經長時者亦不出從晨朝至中夜若據請答聞不聞中有涅槃但是從德王初至今為長時爾多有所含者含於大小涅槃二理及世間涅槃辨通五時名為多含經云如人觀骨者假想觀也如舍利弗等者二乘之人雖斷正使不斷習氣有習氣故感變易身不得如來常樂法身非大涅槃也言習者身子有嗔習難陀有貪習畢陵有慢習槃特有癡習如牛呞比丘齋後爵飯如迦葉阿難聞大樹緊那羅王皷七寶琉璃琴迦葉起儛阿難歌吟皆由習氣使爾如止觀第四及法華疏記第二廣說就我見明習者正是二乘別惑前開宗者指前純陀品無凝然常者純陀品中古人有四種常今但引二經云即是皇名者二月星現生長萬物名毗舍佉星第十德王品四皆約無分別等者無分別謂證大乘涅槃而論分別十種功德五神通等別故云若十若五若欲開此為四者今還列上聞聞等三種四句其體無殊故云何淺之有不以二相見者世尊天眼非但唯見細色亦於細色即見佛性五眼皆然故云不二對地亦應無失者既是圓融十德橫竪對地亦應無失帶圓法門者今經專明以大涅槃心修五行而證十德證有次與不次若以十德竪對十地義當於別十德互融無非圓證名之帶圓又今經帶實明權如次第修證證已同圓復名為帶又帶權明實顯權力故是則前三助圓皆知常住若據此意是則始證圓修却成圓帶於別與經部合者今經部中尚兼藏通何況於別雖具四教共知圓常佛性但修行時有次不次互相兼帶則是部中正意與五時會者今經明開權顯實與法華同又同名醍醐若用權顯實與前四味同何者由具次不次二行故爾與諸教合者今經具明次第不次第則同前教咸知佛性復不同前與逗機合者逗四種機前三助圓咸歸秘藏經云一心作一等者二乘欲作神通要先入定於定心中方能作所期事若欲更為別事須出定已更作期心然後入定方能為之故云不得眾多經云所現身相等者一一文中皆言數量者為存方便教意以顯不次故爾經云先取聲相者此由敘昔皆須先緣聲相而修今則轉用大涅槃心修所以先述在昔修相經云體非是果者非果之果故得是常經云不作佛相者不作能說人相也經云以無相相者於觀於四德無非法界而得涅槃故云無相相原由惡心者亦有人聞惡聲能觀此惡增其觀慧故也經云庭燎力召反詩云庭燎火燭也廣雅云燎燒也乃借天眼文助結者只是指於昔所不見而今得見正是結文以顯不與二乘共相無別借文先橫知六道者具足知十法界眾生心念縱讓佛果須云知九法界心今云六道者且依現文次竪知十六心者此就遲速并異菩薩之人欲知初心即能知之餘心心亦爾聲聞人欲知第三苦類忍心至第十六道類智心方始得知支佛欲知第三苦類忍心至第七集類忍心方乃知之問何故偏言欲第三心耶答其他心通依上界禪起欲知他人無漏心時還緣觀上無漏之心同地易知於彼觀上無漏心中苦類為首故偏言之言至第七心者以緣覺人欲知他苦類忍心擬意觀察彼心已謝起苦類智緣覺尋觀追而不及即於上界集上伺之故偏言第七前知六道下今家判釋慈成上梵行者此明初地菩薩無緣之慈與上各別何得成經云慈名世諦者二乘之慈名為世諦經云不從緣者捨偏得圓不屬眾生緣法緣故也經云闡提慈者有憐妻愛子之慈經云犯重禁等慈者由慈愛於惡境名之為慈經云捨黃門慈者黃門無志屠等愛於惡境名慈經云不見持戒者此約畢竟戒說也亦是生空等者初依其煩惱誰云證於生法二空性地屬通此不可用以初撿心者以大涅槃心撿之驗三亦然者根勝既具十三根增長既具十根本根深根廣等三亦須具十三具十餘四者根勝既具十三及十根本乃至根長等四一一皆具十三及十修亡相檀者令修亡三檀也止伏欲界惡者且約持戒伏身口惡為劣外人例如上答無畏者如前則生不動國文皆具止行二善又夫修淨立行者皆先為求涅槃心為本即以此心攝於眾生同生其國十四有者各經中有則為二十八生樂論義者樂慧人也樂禪定者只應云樂定禪語濫色界四禪然生尼吒等者此名遍沒始從初禪經歷十七天處捨初天生次天如是傳傳至色究竟超者從欲界超至色究竟此此正是全超也若生無色者此即無色般也無色亦有勤修速進二行方般涅槃者今文不論不云中生者以中般但名為中不名於生故不論之輪轉餘勢者然果報未亡者但是酬因之餘勢耳非圓意者今須依開權顯實以大涅槃心修達生死身即法身常身何況二乘而不即法身耶寧待入於變易方得轉矣須依亦即甄之經云上中上者亦名上勝上經云初發心者初修十五心成就滿足又五十心因果合成一百心也經云八十者初兩十二為二十四五大星東方歲星南熒西太白北辰星中鎮星為二十九北斗星為三十馬天三十一行道三十二婆羅三十三功德三十四二十八宿者東方七宿角亢氐房心尾箕南方七宿井鬼柳星張翼軫西方七宿婁胃昴畢觜參北方七宿斗牛虗危室壁為六十二地水火風為六十六梵陀提拘臂首半母為七十四四天王為七十八造書婆藪為八十世人所事或名為天惑名為神色淨故者緣因資般若名為色淨故般若淨般若了緣因故云般若淨故色淨經云大至火天多屬四天王處梵天八臂天首羅天屬色界樓陀天等皆屬欲界天經云中表俱淨者中謂法身表謂應身四臂或當主此者四譬次第對四悉隨文釋相可見不見色相者作業外彰身口名為色相又十二因緣俱屬於色故皆云色不見色緣者煩惱潤業名為色緣不見十二因緣空者空即不空故云不見不見因緣假者假即是空故云不見亦不見中者即二諦雙亡中亦俱寂故云亦不見中一切法亦如是者四諦六度等悉具三諦亡泯雙照故云如是次為他離怨者以煩惱是菩薩大慈之境故不名怨五住菩薩者即別教五住菩薩上能出假也經云八魔者菩薩昔以分離界內四今則破於界外四名為離八河西所釋自是一途非應大道今所不用三種業者有漏無漏非漏非無漏三也例一切等者有謂生死無謂二乘常為有邊斷為空邊垢為有邊淨是空邊縛脫亦爾菩薩修大涅槃中道雙非諸二也經云我實不生閻浮提者且約方便教意我自有淨土權示在此導利眾生經云慈氏菩薩者明土本淨穢由於生如淨名中如來之趾案地即其例也信首諸根者如華嚴十種六根開善全是三藏菩薩者既云猶生欲界具於五事只成三藏菩薩義以此菩薩根具位在第一祇初中間登地者亦未知為屬何教今須在圓前四是報果等者若入初地俱名習果俱名報果不須分之經云其義各異者自在持戒布施得五事自有依大涅槃修行得五事汝何以將淺而難於深經云有分果者以世間施招人天依報正報皆有限量名為有分感生死根名為有果脩大涅槃證大涅槃正報依報體周法界無數無量名為無分永超二死名為無果而獲中道大般涅槃無因無果之果也三忍者等覺為上忍十地為中忍八地已下為下忍退非菩薩者非第十地菩薩也佛菩提智者等覺用佛菩提智斷最後品入妙覺例如住前修觀斷一品無明即入初住此義非為難見然古人解要有進退不應懸殊者應如前第五功德冶城云通外凡及三十心乃至對登地等故云不應懸殊窮覺者等覺也此一三昧者金剛三昧也何異金剛般若者引彼經意者破古人金剛三昧不應一向唯在等覺如金剛經云應云何住云何降伏其心此則猶通初心何呪不通諸地以燒草為譬者初地斷惑如燒草以顯中道如存山經云無有折損者無有能摧破此三昧者經云在於大眾色亦不定者此明一行於隨眾行大論三十八云如頗利珠隨前色變自無定色諸法亦爾或常無常論以一理應於眾理釋曰理行如珠教法如日情如眾物觀如現色德王品五於位則淺者以初聞正法及是第二周始故云位淺初證不聞聞者下九功德並與初功德證同故云也棄其內德等者由內證實理能外化他不可偏作自行以釋寄事而表理者寄求善知識等事而表諸地證法淺深不同亦如善才求善知識得法淺深即其例也例如淨名者例同也彼經觀眾生品云此室釋迦牟尼佛阿彌陀阿閦寶德寶燄寶月寶嚴乃至十方無量諸佛是上人念時即皆為來廣說諸佛秘要法藏說已還去以顯登地已上須近善友聽法不同古人專在淺位經云而作近因者今此四法通於別圓前之二教並不談中為此義故不任為今經近因故須先簡若開顯已無作圓常何簡之有又今明四法須具二義一示地前可修得入登地二入地已仍須四法筞發令疾入後位慧品為正者大涅槃了因種智為正行緣因為助行諸佛起發者如華嚴中八地菩薩欲沉空十方諸佛同時而勸正明化他亦須自近善友令他近善友等經云有人身遇眾病者三惑重病也熱譬愛者熱病之人貪一切食故喻於愛次冷譬癡者病冷之人身體痺死無所覺知如癡無識勞譬慢者勞人諸事不能狀如於慢下譬嗔者痢病不可禁制故譬於嗔瘧譬疑者或發不發又或寒或熱如疑猶影疑自疑他等通別之惑名同體異者通惑於見思上立利鈍名別惑於塵沙無明上立利鈍見思之名故云也經云離十惡等者此並是雙流之行修行十善者十善為諸行之本故令修行十善四行戒施者此即乘戒俱急也配前五人者一菩薩二佛等五今明不爾只一人身具此五法不須配前而實已潤者縱未顯獲已得冥資似如一化者十二部對華嚴方等兼鹿菀部中有小涅槃即後教謂八聖道者此無作道品用畢竟空修以大般涅槃經云夫聽法所言夫者下蘊深旨今亦如是始於彈指小善終至圓常通一切法皆為顯於十一空涅槃極理故云夫也經云要以繫念等者同前三解而修於行故云思惟經云三三昧者皆以大涅槃心修一一無非法界達二十五有而見一實等經云如法修行者此文專約開權以釋經云不生不老者離分毀變易二種生死等經云軟語及呵責語者即勸誡二門二門具於四悉如法華疏第五說經云若有觸者喻身業若有念者喻意業說業說即口業具譬三業修行經云眾罪得滅者喻能生善滅惡也經云不觀種性者譬不擇機緣錢財者譬為眾生已不求恩報無據者盡無生二智教門唯云羅漢得之不曾云初果亦得故云無據此出阿含者如中阿含舍利弗教化病經中說有彼長者字須達多身重有病于時遣使問信世尊并請舍利一𮨇舍利遂往須達見來即欲下床舍利便止別坐一床慰喻長者莫怖莫怖所以者何諸凡夫人成就不信身壞命終墮於惡道生地獄中長者今日已有上信以是信故能滅苦痛生極樂處或得斯陁或得阿那含長者先已得須陀洹果故不說之此初慰喻善戒二多聞三惠施四善思五正見六正志七正解八正脫九正智十一一慰喻辭同初初十中前五是世間善後五出世間就出世中正見正志是無礙道慧名正見正思惟名正志正解正脫是解脫道然河西所引復不與此全同一目謂法眼及法慧者此釋為勝今亦用之且約專心聽受屬於法眼修行屬慧以慧觀察令見佛性故也一目為天眼者此釋無意為是修得為是報得耶上果不伏聽下果法者意云凡近善友須簡劣從勝故爾寧復至五欲者無心思五欲五欲任運亡故云寧復有心經云四顛倒即斷者須云八倒斷也經云能令一切凡夫至苦惱者從凡夫至須陀洹皆為四苦所苦不云後三果者上果輕微且略不說經云如法修行者稱法性而修行也又是稱教法而修行也一明正行二善者此是雙流之行遍滅法界惡遍生法界善二明空無常解者此即乘戒雙修達常樂我淨無非法界名一切空佛具萬德者以實而言只四德攝法無外何略之有善實是不虗者實外無法故曰不虗故名解脫者此明得禪外道望下不得禪者得解脫名互有與奪者實而言之與故有真實奪故非但無常樂我真實但無經云依世俗道者依世智忻猒心斷下八地惑名依世道所以無常者謂現在未有於常但有無常後仍結異者從不名佛性下是後身佛性者等覺佛性闕我樂剩見言六少見者現在未見未成一轉即入妙覺全見所以現在名少見也五善者涅槃分果善也以義異故者此辨因位菩薩心中佛性由有煩惱與佛果地佛性不同開善云此二者即指今經六七二文即文判之者古人判之只前所列文是八住至六住有五者一真二實三淨四善五可見此闕第九住中第一常名若與常名則不異也五住初住有五者一真二實三淨四可見五善不善謂修者善不修者不善善與不善異者前八住單善在第四此文善不善存第五故云異也經云一者可證者若能修者方乃分證知法章具二義者經中句句皆具一體別體二義故云若善不善等應身佛即別體也知實相者覽前三寶等無非實相非因非果之體所以更約實相釋之是故經中句句雙非以顯於體又句句皆有別體謂初住已上而有遍於諸德之用又前五知見及正行二善空解等皆是果上所有證之法故有別體差別不同等用故云遍通諸果皆有異義經云若善者涅槃善也經云若知不知者知一體小外不知經云若修不修者修者善不修者不善一一並是雙流之行皆對小外簡之此前未說至之言者此前未說虗空實相文後已有行結之相從是名菩薩修因下文是又前未說者應知今實相泯今五文無非實相非因非果及非有非無悉明雙流之行又前未說者復以真空蕩前六文無非虗空真空者即畢竟空理異二乘空事空者將事空以顯畢竟空涅槃空者偏約所證又此又三空即約三諦明空若合三為二即二諦明空又真空是法說事空是譬說涅槃空是合經云不見虗空者真空之體不見故經云雖有五眼所不見者此即見而不可見經云慧眼見者真空唯慧眼見即不可見而見經云若是無物下簡出世間之空非其真空以世間空除物方有若除物有空空乃名有故云乃有為實經云以常無者只由無常致無真空常樂我淨一云虗空不可見者此釋順經今用之二云至識心見者明虗空非六七識心之所見如實相體非六七識所見六七識心但見光明如由別體三寶導此識心成行得見一體三寶故云方得見空人總於法者法謂常樂我淨實相既通者通於涅槃如來佛性故有三樂此據正因者此即合理性三因為正性以未見故但名正性問斷煩惱處然德王問言如來昔說身智盡處以為涅槃今說煩惱盡處是其涅槃二言相乖故須重問未是涅槃者當知初斷煩惱處未是涅槃言處者約身上斷煩惱盡處也答魔之詞出長阿含長阿含第二云又告比丘吾今所以誡汝者何天魔波旬向來請我佛意無欲可般泥洹今正是時宜速滅度我言止止波旬佛自知時須我諸比丘集乃至諸天並見神變波旬復言佛昔於羅尼連禪水邊阿由波尼俱律樹下初成佛道我時白佛佛意無欲可般涅槃今正是時宜速滅度爾時如來即報我言止止波旬我自知時如來今未取滅度須我諸弟子集乃至天人見神變化今正是時宜可滅度我言止止波旬佛自知時不久住也是後三月當般涅槃時魔即念佛不虗言今必滅度歡喜踊躍忽然不現魔去未久我即於遮波羅塔定意三昧捨壽住命據此捨壽猶是隨機不同月令者此是舊月令新月令無此說周家時者周家十一月是年朝所以二月即成於四月三月即是十二月為歲朝不得用此聞立月增減以釋此時與彼不同但依第二釋謂嘿為滅者滅即涅槃也經云波旬意謂等者波旬嫉佛化人恐奪其徒屬空其宮殿欲得佛不化人即是涅槃是僧寶故者菩薩但僧寶無涅槃故簡僧異佛法也餘之十文者一一皆對二乘簡出大涅槃相又二乘對外道非涅槃二乘亦得不織不覆等名涅槃若對如來二乘涅槃即名織覆等織覆只是繫縛經云不生煩惱乃名涅槃者二乘雖得涅槃猶生別惑非大涅槃而菩提實未全除者縱破一品無明變易五陰而未全除又縱示同六道之陰而亦不為陰所覆蓋皆是因緣者只由三世因緣和合所成無有自性又若約圓說者皆由法性為因無明為緣而生於陰一根有三者苦樂平平三受也即離四見者一即色是我二離色是我三色大我小我住色中四我大色小色住我中四陰例爾各有四句現在有我者謂色有我色無我亦有亦無非有非無以為四句一一皆云神及世間常等餘文但云現在常無常等四其名雖異而義是同經云身見者謂計我如麻豆及母指或計遍身計計我不妄亦名我見此見依身故名身見計我斷常名為邊見由計斷常不信因果復計此我以為自然宜初世性即二十五諦又計從父母微塵梵天等生皆名耶見執耶為道名非因計因名為戒取復因此見通至非想信此非餘名為見取小不次第者前三同彼四戒五施六天前是四禪者以大涅槃心修此四禪為入涅槃方便通則至前者通於初心即體達五陰無非法界更修百八三昧者如大品經中廣說經云守護導涅槃之心能導行人至於樂果如世導者善知前途通塞之相若不護之焉至寶所以慧異者准法華疏云定具足名心自在慧具足名慧自在定慧具足名俱解脫人故大論云慧得好解脫心得好解脫無復無知者無取相無知二煩惱也煩惱趣心者謂煩惱覆心覆慧也二云九地等者不須離對但上下文初地已下住住皆具三種四句為定皆令縛解者難意皆令本是解本是縛又為心即是解為待緣方解耶若心本有煩惱者若本有者不能令心得解若本無者本已是解如何今日方云解脫定有下二句准此正難無縛無脫者既無縛無脫如何復言心得解脫前四明無所縛者此明心性不為貪等所縛後一明能縛者此明貪等不能繫縛於心故也明無解者諸佛菩薩既不拔虗空中㓨驗知無貪不名為解明無得解者此明無因也明無得解道者既其無因寧得有果經云如過去燈者如大論云燈來時無闇有闇時無燈故云燈不滅闇今明惑即是智智即是惑故無能破但隨義為三者但隨經文次第以判為三非專次第答前三問據正義者佛立中道正義非德王耶義因緣中道者因緣即是中道也經云善男子心亦為不貪等者上難云若心有慧可云心得解脫心既無慧如何云心得解脫耶佛答意者心體本非有非無本來無繫為是義故說心得解脫經云亦非不繫者遇緣即為所繫也非心者非無心也雙非兩捨者今為顯出中道心體本無繫縛所以雙非兩捨耶小二邊不云即邊而中意在此也經云細即是常者計隣虗塵也經云以時節者外人計時為心因由某時故而生其貪故彼計云時來眾生熟時去相摧促時能覺悟人故說時為因經云以不能知心因緣者不知心性中道本淨因緣而為無明繫縛輪迴六趣受二十五有生死經云被無明枷下明不斷惑凡夫次從有人隨於圊廁下四譬斷結外道經云一切凡夫唯觀於果者唯計即陰是我離陰是我等不觀因緣者一不觀世間末因緣二不觀本因緣本因緣者即法性因無明為世間因緣即法性人而不逐之但逐無明塊而不放捨二十五有終無出期一明因果至故有者中道心性非因非果依性而修便獲於果貪心亦爾經云識則得生者因率爾五識生第六意識也二明心性至和合者心性本淨無有和合由無明故致有和合又由略因緣而有和合譬如氷有和合故有團圓水無和合故無團圓經云諸佛菩薩至不淨性者若言心性本淨為惑所覆猶屬教道且順權說若云本心清淨眾生聞者趣於耶見謂心即是不肯修道為令眾生斷除貪等方見佛性故云終不定說等若依實理心性本來未淨猶如無始唯水無水雖全是氷則不得云氷不是水眾生心性亦復如是雖本是無明則不得云非是三德秘藏是故圓人唯觀無始三道即三德故不同權人却覆方見經云云何心共貪生者此句明一切凡夫與貪俱生俱死經云謂火灾者亦應云無明法性因緣達此因緣即得大般涅槃下三句若斷盡則不共貪滅初地菩薩為眾生示有俱滅經云除不動地者初地菩薩猶有煩惱名共貪生永無有滅故云不共貪滅經云譬如日月等者此文譬顯亦順教道若依實理烟等即是日月經云不貪之心者本淨心也難行苦行者中道之行難行也經云無常見常等者實是無常計為耶常實是真常計為無常餘三亦爾實是脫法即計為縛實是縛法即計為脫經云非乘見乘者非乘為天人乘又是三乘實是一乘計為三乘實是三乘計為一乘經云總別之相者總為計我別謂計所故云便作色相等經云見日月等相者此計壽者見也經云若見我是色我者即色計我以為一句色中有我者色是我虗空色大我小也第二句我中有色者色是我瓔珞我大色小也第三句色屬於我者色是我僮僕繫屬於我也第四句初一我見後三我所執我我所名身見色陰既然餘四類爾總執五陰為二十身見經云畜二沙彌者如僧護經云二沙彌共被相抱臥死入䥫被地獄若不共臥畜亦無過經云修習三十七品者舉因行法以顯初住已上所證德王品六淺深非一者雖有淺深悉明證位功德而言三十七品者無作道品也直起中懷者直是內證名起中懷不為耶曲緣之取礙多就理明者專就證論也二信因果者如純陀施食得五事果施是因報是果信二諦名者圓二諦三諦者即二諦而論三也只是一體隱顯為異者二智隱二身顯也以根深故即增長者牒終行布施下文一切諸法等者從若諸沙門下是一切法也次戒聞智慧者戒即牒前戒聞即牒前多聞智慧即牒前親近善友以五法互相資故不見橫竪者雖有橫竪之相而實無橫竪修行故云也左右解之者應云由內解故無疑由無疑故有內解經云有少善者正因佛性名少善也初開經時說者指現病品經云日從山中出者日從山東而出今言山中出者但是寄山顯相而言中耳中出譬本有佛性至正南譬現在身若不聞不戒等令不至西譬既有佛性必得涅槃更無所疑通慜者慜達也以新破新者般若破取有智德成以故破故者無始無明滅故斷德成作恩念恩者前證受新法句應攝入此句中十二因緣大樹者過去二支為根現在五支為質現在三因為華未來二支為果魔王共戰者亦可將前能聞能答對此文只應解於初後二者前難本只難於現病品末第三菩薩之人遇與不遇自能得善發涅槃心今何故要歎佛性方令得涅槃耶二者前難現病品末第一闡提遇與不遇俱不能發今難意者闡提既有佛性應自能發何俟聞歎方能發耶前難文菩薩在初闡提在後二乘在中中間舉來者前問中舉來也然德王本不難二乘但相從舉來耳經云若不遇下重釋前二乘及闡提經云一闡提輩至涅槃者據現在無修緣了名為不得一闡名信提名不具者信具二善闡提所無惡欲之邊者以惡極故名之曰邊經云佛性非信等者佛性非信進念定慧眾生不具信等名一闡提又不具者過去非無少善但現在無修得善名為不具而有是理者當來必得涅槃故云也箜篌譬眾生身者譬五陰實法也經云眾生佛性至無住處者不屬五陰也歎善者歎佛性善也經云我所作也者若言諸佛等聽我所作名無慚愧人經云不為生天等者不為二十五有而持戒也經云不作破戒者謂四重不作缺戒者謂十三不作瑕戒者謂世已下不作雜戒者定共戒也經云不生憍慢者菩薩以大涅槃心輕重等持而忘其相得善戒者由於持戒而得涅槃善也經云欲說善道者欲說涅槃善因令眾生得涅槃善果方名真善友也但令伏下界惡者今亦不全非此釋消經亦有其理浣人猒穢者作背捨觀但取猒穢為背捨觀不取淨相經云尸利毱多者涉公云尸利毱多火坑陷佛毒食藥佛如來于時履不燒食毒不損彼捨耶見為佛弟子十二文多者今經十二部猶兼於權故且除之除全體者謂涅槃通權及遍一部其體廣愽故以除之但取四偈者四偈顯義同圓是故偏取但取常住者以今昔善根相扶只聞常住二字性變易即達三德秘藏取寂嘿者只說即無說故云多聞不離理即其義也故知損之者周易云以至於無為肇公改用今且依肇以佛性理極名為無煩惱損盡亦名無為經云法無性者涅槃之法無自性等體即法界遍一切處故云無性經云難作能作者此約聞已起行若定知此難得涅槃必須行之不可直云我今唯觀實相端拱守理未為全當一一皆依中理以忍二邊之惡等不存著者謂妄其功也經云色者非地水火風者色體本是畢竟空故非地等又不離地水等者地等全體是空也經云以相似續者凡夫不知色性本空橫計前念似於後念相續不斷菩薩得者具前多聞中始從十二部至常說法五事故名得經云不得現見諸佛菩薩者不得現與諸佛菩薩而為眷屬但是魔眷屬耳經云若鹽能令非醎者空非顛倒如何修得見不空法者我於凡夫見不空處而見於空故非顛倒今言非空使空者今達於有而令其空故云使空經云闡提者數論外道也七地菩薩能入寂滅者初地念念入法流心心趣解脫及七地已入寂滅何須寂忍唯在佛地以前文為體者興皇取後涅槃經顯示佛性為體此師取前修習三十七品為體餘皆可見者檀攝二覺謂除捨也尸攝三謂正語業命忍攝四謂念根念力念覺正念進攝八謂四正勤進根進力進覺分正精進禪攝八謂四如意定根定力定覺分正定思攝十謂四念處慧根慧力擇覺喜覺正見正思合三十五餘有二信通三十五一切諸法信為本故謂信根信力婆沙以實體十一攝三十七先以七覺收餘六科謂四念處及慧根慧力正見入擇法覺分四正勤進根進力及正方便正方便是正精進入進覺分四如意足及定根定力正定入定覺分念力正念入念覺分是即二十四法攝入七覺餘不入者謂二信為一及正思惟一語業命實但二并七根本覺成三十七正命入語業中然於七攝中攝喜入擇攝除入捨又但舍中實體但十以十合語業命三為一戒支故道品入涅槃者無作道品也方近於理者十德始末不離一心三諦而解釋之方攝十德理體降此釋者悉皆不可第九已上者正是第九已下皆爾經云輪迴生死者輪迴分段變易生死也經云五種鹽者案四分律藥犍度中有而五種鹽初五者謂黑鹽丸鹽樓鹽摩鹽支頭鹽府移反後五謂鹵鹽灰鹽新陀婆鹽施遽鹽海鹽此等名或約色辨或約處明若此上五鹽謂顆鹽綠鹽赤鹽白鹽印鹽鹽有多類大略五耳第十一師子吼品文為二先釋題次就品下入文解釋初又二先正釋題次地人下釋品來意初又三先述古次非為下縱奪三此俱下正釋次縱奪中意者然從菩薩一邊標題非為不得但不可一向三正釋中又二先標意次何者下釋釋中三初據文義以釋次或者下問答釋疑三今明下附四悉法門以釋成初云能吼無量者佛是果人益於因下故云能吼等次釋疑又二先立疑次答下釋目者音以古字此是會意字師所類反五偈曰師偑巾曰師三釋成中云世界者師弟及三業六即異故屬世界為人者子者為資也亦慈也資故生自善慈故生他善對治者治前三教不能決定說一切眾生悉有佛性之世然別人地前雖知未能定說所以三教俱為所治第一義者師居眾位之上窮佛性原故當第一義題具多意者具師第六即四悉開顯佛性之義次釋意中二先述古次今明下釋初又二先正述次今悉下略非云非菩薩說者此明菩薩但是能問佛性人不應名能問為說由問故說說在於佛佛說入證佛性以酬菩薩之問為此義故不可偏從菩薩題其品目乖各者乖角亦得次就品下入文解釋中云皆屬了因者萬善屬緣因由能了知了於萬善萬善方能資於正理所以萬善屬於了因有性無性者正取有性為果性及果果性有眾生句亦取有眾生為正因有真無真者取此二句為境界性唯有二十五有惡境又生智者數數觀之智顯境境發智故名為生習因因果者上句取有因下因取有果三句者取有作有業為報因取有報為報果因性者取二因以為因性因因性取二果以為果性果果性依作無作者作謂造作故屬因性十八修者但依前列亦章數即足同異若此者同謂不出佛性異即如上諸意是即同而不同不同而同但未為得意者勸問雖引十八條意在佛性若但依佛別勸師子吼亦作別問焉能顯於佛性所以未為得意總勸者但勸問佛性也敦勸者正應須問令眾得益經云白佛言者此三字猶屬經家不可置上句末將此三字成於下句其順文體譬法身者此是十力四無畏等法所成之身地即尸羅者尸羅不清淨三昧不現前尸羅為眾善之本如如意足依戒而發經云欲壞非師子者前三教皆不能為師子吼經云為欲令住處淨者三德秘藏三惑不染也舉非者非二乘外道凡夫所能也前合舉非者聲聞緣覺等自法華前皆未能作決定之說故云非也前三問問法者謂約法為問問人者約人為問也一問果性者他見有云何為佛性即名為問果次問因性者見有以何義故即名為因後雙問者常樂我淨通於因果今將後人來問前法者初將一切眾生問理佛性體次將十住菩薩問分佛性義後將如來問究竟佛性名又將三人歷於一法遍問並通云何眾生佛性體云何住菩薩佛性體云何佛佛性體佛性體既同云何復有淺深不等耶餘佛性義佛性名亦爾初問理佛性體者未有緣了之用故名為體直言般若者但云般若不云波羅蜜是故屬福若此土則福勝慧者淨土一劫持戒不如此土從旦至食時無嗔礙心故云福勝但爾尚智慧者謂但慕仰極果智慧也十住菩薩至通教者住為能依地為所依以通教第十地菩薩同於通佛俱能八相故云十地菩薩為如佛所以菩薩同佛屬智慧莊嚴九地已下俱屬福德若消此文等者意云此一段文猶是敘昔故作今昔二意消之在昔聞常須論密入是教不定人入不定故云利根人等最下既然者三藏菩薩及人天既於法華前密得無生通別菩薩及人天二乘人豈不能耶我若二嚴等者難意云我若具二嚴亦應能答佛若具二嚴亦應能問二義既齊問答不成故云非也非是一二於一二者明今二嚴非是差別一二之一二乃是一體無差之一二又是無一二之一二也不同凡夫定執一二也亦是言於無言者類如淨名中三十二菩薩即是言於無言文殊即以無言於言淨名杜口即是無言無言今具二嚴同彼三十二菩薩也非是言於言者不同凡夫二乘相也良以雙亡一二等者師子吼是即照而亡如來是即亡而照所菩薩授雙亡佛授雙照雖然各授為顯亡照而無亡照若無一二等者意云先有一二方可雙亡一二若無一二無法可亡不見空邊者邊即中故名為亡邊中即邊故名為亡中中邊俱寂體即法界無二相方名第一義空經云及與不空者亦是中道不空而空也非前非後者別教第一義空在真俗後名為淺深圓則俱在一心故非前後空者者謂宰主即二邊宰主也此乃名同者二乘以離斷常為中道菩薩以出假稱機為中道凡夫但以所行作中道想如此三人皆非佛性中道其名雖同而體永異經云苦樂行者二乘以行苦行破生死苦名為苦行得小涅槃名為樂行無圓遍之義者此之三人無於佛性中道法界圓普之理見也既言果下釋經中涅槃句知此果從因因生者佛性境為因性具能觀智為因因由此二因生於二果中道者下釋中道二字皆顯現下釋經中種子二字何者由中道種因等四性得顯又由四性種子中道得顯也能生兩因兩果者由佛性種子能發緣了二因成菩提涅槃二果又是種子能顯中道者由緣了二因種子能顯中道故云更互又種子者三道中即三因種子如淨名經云六入七識等為如來種不同唯識立種子義奈此文何者只緣經中云涅槃又云中道又云種子若不依今解釋文甚難消又是傍正者且對能觀所觀義便立傍正名又應更云佛性傍為緣了種子餘兩可知二生死他云是論中不生亦不滅句三斷常是論中不斷亦不常句然論八不不與今文相應不用此釋不一不異者果是不異因是不一當得上果者所計之常是其上法由作此計當來得於上果故云能得最上菩薩如理而見者明諸佛菩薩如於無常見人所見如於常見人所見即是如於二種道理所見也而是兩邊之上者此句消經中何以故即是上故文此即指第一義空出過前凡夫外道二人之上經云生死本際者無明是過去本際有愛是現在本際又十二因緣即是三道名為本際兩因夾一果者文中正明現在五果即是中道能破生死但云二因夾一果名中道者何能破於生死耶經云中道之法者只眾生三道因果即是中道之法經云如貧人者二十五有貧人也前後舉非等者凡夫是前非二乘是後非菩薩居中名為中是下第三正釋此章無常無斷者二乘不見佛性無常樂我淨智斷二因不得以因之家之因為因因者不得以能觀智家所觀境為因因境但是單因耳只得以能觀智為因因智是從因起因故曰因因不得以果果家之果果亦爾得以因家之果者以能觀望觀所而得果名若現望涅槃果則名為因因境但是因者十二因緣但是所觀理性之境故名為因境體非因者非因因也然譬與法乖者法中則以二法為因譬文則以一事為二因二果亦爾今但取法譬俱有二因二果名同為譬例二果亦爾者涅槃當體是果望智復名果果復涅槃之果涅槃當體是果復涅槃作果故名果果經云是因是果者觀十二因緣智與涅槃為因名為是因阿耨菩提是智慧家果名為是果緣性則二者從是因句開出二因從是果句開出二果非因非果謂正性合緣為正者重屬當上合二為一文也正無復數者正當無正豈是數量耶經云無知無見者能知所知無能見所見境即智智即境無二無別故曰甚深廣釋甚深者六門一一皆明十二因緣即是中道佛性凡小及偏菩薩自體雖具而不能見唯佛明了故曰甚深經云雖無受者即不常而有果報即不斷受者雖滅謂不常果不敗亡謂不斷無有慮智謂不常利合而有故不斷經云無有終始者十二因經三世輪迴如旋火輪故無終始亦應少見其始者謂一斷一切斷故得少見始名今互顯沒者明菩薩但云見終約用觀智斷惑或以釋或最末後名終始則杳然者此約或起初後以釋十住菩薩但初斷其終未見即法性之微細無明原始故云杳然十住破元品無明者初破一品也當果不起者變易果不起也即是品品皆有當果也自性無所有為易者體達現在十二因緣即法性則易窮十二因緣不染而染無初則難所以菩薩但見其終私謂初住所斷者此約觀智初斷一品以反釋然經中且約分數為終以說並始斷故者初住十住菩薩並是始斷也故知賢位者此顯別地前未見也經云栢毱者皮毱也為人所打不得自在凡夫亦爾常為十二有輪所載流轉三界無有邊際類前定樂行等三者前定樂行是出假菩薩今在地上論見不了了即是別教得入之人則不得全同且存教道云同前耳望十住為不見者此亦未可初住已見如何望後即名不見一箇菩提者菩提無別如何望十住為不見耶若言不見初住等應別有一箇菩提經云即第一義空者此說佛性當體是空不同十一空中第一義空彼空第一義名第義空即五佛性者五亦不出三因以佛性只作三因結亦得正當此難者亦如正法念經云佛見眾生身中三十二相八十種好具足結跏趺坐及地論中不用修道佛作此說者正當師子吼菩薩難也然但明佛性下簡非若言佛性在當下正釋藉緣而具者藉緣了也罪當非現者正因現在未顯名非現眾生現有名非當若見此意者言眾生現有亦得當有亦得何者由現有故當來緣具方證故無諍也約緣成果者眾生由迷緣故未見未足佛菩薩從破惑緣得故有諸地等不同故云也事用未足者全未有用亦名未足分有用者亦名未足經云雖無地獄陰界諸入者眾生雖未有佛陰界入未來必得佛陰界入經云本有今無者此偈意者為師子吼本作無差別難佛作差別答雖云差別三諦具足故云三世有法無有是處亦差亦無差者上半差下半無差不一不異下融通三諦結歸偈旨今長行釋者文為二初正釋次更約下重約本末結成三諦融即以釋初又二先述意次若生死下釋釋中又三先釋上半及長行三世有句次生死雖復下束成二諦以消上半三本有之有下釋下半結成中道雙亡無差正意次結成三諦中云二河相望者謂生死河涅槃河若無上原不知河之底深本末非本者生死之本非涅槃本也本末非末者涅槃之末非生死之末也非本非末者生死涅槃之本非本本即末故生死涅槃之末非末末即本故不屬三世也又此四番釋者大體不出差與無差何者前三釋上半差第四雙非釋下半無差又經中凡有三種者須作一例大體釋之若言有涅槃即須云三世本今俱有涅槃若言無者三世本今俱無涅槃生死本今有無今亦爾又三世在皆有佛性是即三世有法則有是處三世有法斯無是處方稱偈旨即是三諦者初兩本末為俗第二句為真三四是中道遮照一一皆是差即無差無差即差等不即心為佛性者佛性當具現在心未即是也不取眾生為佛心者當來佛時非今迷心意云要修方得不修不得故云也心不即為佛性者迷心不即同果佛性也六度莊嚴者緣了二嚴也豈同萬善者簡車體異具度也經云莊嚴畢竟者約修習以說畢竟畢竟者約所至所嚴理體佛性以說更無別體者若能嚴不嚴所嚴則能取體別今能嚴唯嚴所嚴所嚴復嚴能嚴故無二體經云首楞嚴者約理性論楞嚴三昧也經云有五種名楞嚴約依理修習定得名般若約智金剛約喻謂所擬皆斷師子吼約說佛性約法身理體又此五名楞嚴金剛從定立名般若師子從慧作名佛性總於四名和闍梨者呼為大地者俱舍頌云受想思觸欲慧念與作意勝解三摩地遍於一切心釋云前三句標列第四句釋得大地法名受者謂領納苦樂不苦不樂相想者取像謂於前境取差別想也思者造作謂能令心有所造作也獨對根境識三和合而生能有觸對欲者謂希求所作事業慧者於法有能簡釋念者謂於緣明記不忘作意者作動於意謂能令心驚覺為性勝解者謂能於境印可此事如此非不如是赴殊勝解三摩地者此云等持持心於一境轉亦持心所從強說心遍於一切心者釋得名也此十心所遍通三性四心三界九地有漏無漏一切心品故名大地地即心王此十法依心地起名大地法通五品者法起十數者十數前後而起不得俱時故云義說為十釋論名為徤相三昧者大論第三十七云首楞嚴三昧者秦言徤相分別知諸三昧行相多小淺深如大將知諸兵力多少故名徤相應須說我者謂說真我也經云我當從其啟受齊法者法者外道意云可中佛為說常我即受佛齊法會通者有即說無無即說有名為會通色有二十種者俱舍云色有二種一顯二形或開二十如論日焰名光月星火藥諸焰名明餘色可見名影翻此為闇形平等曰正不平等為邪庸者薄翳也經云以藥力故者緣了藥力故也經云非一切者名為三寶者不見一體三寶也經云得見一分者一住皆見一分佛性也如初日月者前月末後月初雖復未見不得言無或稍稍盡者並譬初住已上即事未有者若云未有十力等用此則可然若云現無此性者即成違經為惑所䨱者只由此言即成於害何者既云為惑所䨱即當已有三十二相具足若除煩惱即得見者只成別義故不可用未會圓旨者亦是未成圓備也佛性非一二三者前三師各執墮於三門雖墮三門以各執故不能通理見於佛性但成諍論以求通者若執一求所通終不可得故勸令捨也如云見象者今家解釋如得象身若得象身不失身尾等兩國中間者更立上勝淨土為三土七八地者並斷習氣者但成通教義不出破煩惱言者但出三名不云破煩惱已皆得見性故云也釋論三觀者引彼文者不會今經彼以慈心不淨因緣等三治貪等三今經三種破已皆得見性故不同彼真諦破假病者心緣至理則破假名之病是伏非斷者破見思證真諦義當伏於塵沙無明故也出功德者從空出假假是利他功德又一空一切空下能約圓中三人以釋自有一人知於圓融樂觀一空一切空而見佛性自有一人亦知圓融而宜觀一假一切假而見佛性自有一人亦知圓融而但觀一中一切中而見佛性所以皆云三諦俱空等亦未能知者古人無四教釋義所以不知破之深淺是就別意者猶對三教名為別意前譬就外者月譬等是外也心則為內等者應知十二因緣支支皆具色心今且一往分於色心為內外耳是則一支皆具餘支私謂文中等者經中既云為內外事是知外則兼於依報塵境也非謂以十二至境者然經中正為辨支支皆具佛性非謂專辨觀境然過去之果者此則不論略果及略因但所二因生於今五果也七日為識者此釋不當捨中陰色初一念染汙心識託父母精血妄想起於華池等愛即名識支豈待七日方得識名次師釋當毗婆沙釋從識至於現身死來合有十時胎內五時胎外五時名為五分與今文同與眾生名者假名眾生也五果之後者受是五果最後支行中稍增者稍能造業貪受增長也但轉名名者但將現在識名未來生將現在名色等名未來老死以果同故經云歌羅邏時死者謂六入未具一歌羅邏二阿浮陀三卑尸四伽那五波羅奢呵如是答時名名色於此位時死者但具前四支而已不具苦受者於三受中除重苦受但有餘二無重想無重愛雖無其重而有於樂受及平平二故具十二經云十二部至不聞者此敘昔兼帶部中小乘十二不聞佛性昔雖不聞不可云涅槃十二亦無佛性合三十六句下云何非苦非樂句但有雙非一句准諸句合有苦非苦二句則成三十六句又章門及解釋文大體專明眾生本具此理諸法具足與諸佛菩薩更無差別修習即得經云解了大涅槃經者由涅槃經詮十二因緣得見佛性故云也初約善惡共解者初一善男子能約善法釋次從欲有三種下至是名惡欲純約惡法釋從云何大欲下約善惡共解解脫翻無累者此說無據不可用眾生應以應身為體者若言天行以定為體如眾生以應身為體永不相關故無此理經云夫少欲至樹下者此約高下以釋親近國王等此是下色出家人私云皆不爾者今經以大涅槃為性體豈用小輪以釋內外緣得樂者外謂大涅槃及上界禪法如從外來也出菩薩地經者菩薩善戒論一名菩薩地經第二云何名快樂義快樂義有五種一者因樂因行善法得他世樂是名因樂二者受樂從因因緣身得增長心得安隱是名受樂三者斷受樂修習聖道斷諸受故道得增長無有諸受名斷受樂四者遠離樂永離煩惱身心無患名遠離樂五者菩薩樂受常樂故名菩薩樂始從修因終至後果故云從淺至深也聞見者從教聞也師子吼品二若欲聞見者勸於凡夫令依教相而聞稱教而見明見義者若能依教觀察得有見義復論中四明能見之行方得證見經云如來心相者若能依教見自心相則見如來心相淨名云如自觀身實相觀佛亦然即其證也取聞見等者與上辨異也今約凡夫修行聞已思惟觀察聞見則強眼見則弱以眼但見佛身而無於觀慧知是方便等者今則依教知如來平等法身所有應迹皆為眾生方便示現此則為緣故不同上經云為誰受身等者則知如來為眾生現身說法也經云以身惡業加者前惡境加佛也經云物無見過者只是喫食細耳經云不諸破法結者如幻如化等以明中道故不破也兩捨是兩教者前兩教但離斷常假立中名而無中體所以初不破法結為兩捨也相成是別教者即不度眾生句及非一切成句此二屬別謂地前二觀成登地中道名曰相成雙照者即凡有所說及說不為利二句屬雙照也經云正語者軟言合法名正語離妄不虗說為實語言無乖離應時和合故曰時語言無綺異稱當法理說為真語經云二種因緣者聞見眼見名因緣以此二種依教修行必見如來心相即四依人者意云四依或示麤細當以難知何能依教知如來心相耶初二濫後二者初人行細及第二人心細濫第三人初人心不正第二人行不正濫第四人也直置僧寶者四依也經云至舍利弗影猶戰慄者此明戒之功用以驗究竟不究竟也經云若為正法者以大涅槃心受持也經云亦名聞見者結能見佛性即是聞見故云亦也經云根淺者信根淺易動也是市易法者若有要求如市易法以易貴任運法爾者十四法相成任運從淺至深故云也經云是故菩薩性自下結前十三句先領旨者由二因得二果實如佛說經云戒則無因者以戒在初但有於果更無別法為戒作因故云無因經云涅槃無果者解脫既為涅槃因涅槃又為常樂我淨作因故知涅槃無果若其無果是無常法云何如來說言由持戒故得見佛性住大涅槃耶涅槃居在諸行之末者涅槃句前文中在第十一疏此為難且云末耳經云猶如燃燈者無因緣則無燈緣合方有緣合有者則成本無今有以有還無是無常法涅槃亦爾應是無常偏結一邊者不結持戒一邊應云持戒若爾是為常法釋迦日短者從晨朝至中夜瓶由拒立者謂因瓶故立拒又因拒故瓶立即是互為因果此釋未全會經今家只取拒三足互為因果二足假足而立一足又假二足而立三足遞互相對一為單因二為重因喻果及果果亦爾拘音笋虗音拒更互上下者上時則下為因上為果下時上為因下為果此釋則諫今不全用若尅定三世者不取過去二因現在五果現在三因未來二因以顯因果因果但取更互相緣以顯因因果果之相而復不許用毗曇義者古來皆不用此義以解今文今師意云但借大生小生之言譬此文因果因果義亦無失經云生能生法者明於大生但能生於色心等法不能自生其猶生世間眼不自見猶不得自解不自生故由生生明其大生由小生生小生偏能生於大生故名生生大生為此生生所生名生生生生不自生賴生生故生者明其小生由大生生小生雖復能生大生不能自生故賴大生生此即正消經文大相是因者能引起小相故所以小相為因因又亦可小相為因大相為因因以為本法作因故又大相於八有能但舉一相即具八相小相於一有能只能生一大相故是習果故者由破煩惱所得故是習果也無相待因者顯涅槃為絕待因所成也但是語勢者但畢竟無語勢與無相似非全同於有時無等以畢竟無常樂我淨為體故非正意籠散者雲散故有也互無之意者如旃陀羅無婆羅門法婆羅門無旃陀羅法也有小分是涅槃畢竟無與涅槃俱是寂滅無涅槃體具常樂我淨所以畢竟望於餘五分名小分是經云眾生父母者由諸結成眾生眾生得父母方能成就所以父母名為了因經云六度是生因者親能生菩提故後橫竪者八正橫六度竪也世人俱屈此並者若云生果是無常者屈於涅槃涅槃是常也且用首楞嚴通者且以楞嚴定為生因也如步屈虫者破初師次如鳥除二翅者破次師鳥不成就如佛性無體豈作單解脫者猶非相即雙是故也次師以獨在中即名單脫先破因中有果者正破因內有果也佛性中道者合上故名眾生悉有佛性也世人求酪取乳者世人求酪則取於乳若求佛性於五陰求如何而言佛性非內性應在內者何故而言佛性非內耶經云我亦不說乳中有酪者我亦不說乳中已有酪果但云有酪性耳乳即是空者乳體本是畢竟空藉因緣有但假名經云一切生法等者難意者一切諸法不假因緣時至自成眾生佛性亦復如是何故復云非內非外佛答意者者我但云乳有酪性何時復說乳時已有酪果故云乳時無酪初作即空奪者乳酪因緣而有因緣皆不可得故云即空經云金鐵師者乳若已酪者眾生有性及已是佛則如一人有其二能既無二種名字云何難言乳已有酪何不從角者師子不知角是酪緣但取角非酪因為難經云角性煗者角具四大煗即是火性也舉非果為難者酪是乳果菴摩非是乳果以為乳果之難經云乳灌者乳為樹緣因樹子是正因須兩因者正因緣因二也經舉四大譬一因也復有幾因者經中但云為是何因疏云幾者正意問言為只用一因為總用二因故云幾因也正為眾生者眾生五陰即正因性莊嚴至假名者他見正因者謂諸眾生即云假名是正因佛性復有境界者境界乃是正因此復太通前後不及今所不用生其陰軀者謂六度能為陰身正因作緣顯於佛性非謂六度生於陰身不應餘解者還須如前非內非外而解可更思之者雖非內外而內而外今依三諦思之若有己面者自生求不可得見他面者他生求亦不可得二求皆不可得定知乳中無於酪果知馬無駒者馬既無駒驗乳酪果併是兄弟者云因中有果者如女有子子更生子子又有孫若已有者則是一復所生故云併是兄弟世無此理何故計言因中有果乳譬亦然若乳有酪者即應已有生蘇乃至醍醐經云若其至酪性者正意云乳無樂果知子無樹者是故當知乳無樂果下諸文皆須此結今已患臰者如有人明日欲服蘇今日應已聞蘇香世無此理驗知乳中定無酪果於據反也既其不定者師子吼於不定中作定問佛約定中作不定答此得大體若此經云因緣故生者即是本無今有因緣故滅者即是本有今無佛性非生非滅即是三世有法無有是處然須約三諦准前三文以消偈旨不可只消上半經云一切眾生至身如我者此為破執只得云眾生但有佛性不得云即同佛身經云不牽者不可牽引等也經云虗空界者眾生身中若無空界一切風血悉不得行轉動俯作悉皆不得又眾生陰身本是平等空又眾生具足六界所成四大空界識界經云金剛珠者無能毀壞佛性亦爾三惑二死無能毀壞經云有佛性性者有自佛性及有果佛之性故云性性正言為子應能自了者應能自了酵𤏙而生於酪已足為八者以乘足他乘則為了他則是正他數於乘乘則是正他為了別有一法自了了他者若智斷外別有一法能自了他為了因者即非了因經云已同酪壞者同前酪喻中若有性了何須外緣破此同彼泛舉三答者正在轉答餘二非正故云泛舉經云擣壓乃得者佛性亦爾緣了資發必當得故且法王所為者只是佛隨機宜說有說無豈可以世情執諍經云應當觀察者眾生若修緣了必當得見據正因執有者前文先破因中有果由被此破今則執正因是為難中道正性者難意者正因是有若無正因世尊何故復言一切眾生以有佛性必定當得菩提耶經云若尼𤘽陀子等者設並意者若尼𤘽陀子名佉陀羅子容可尼𤘽陀不生尼𤘽陀樹今見尼𤘽陀子非佉陀羅子驗知尼𤘽陀子有尼𤘽陀樹既無互生之理則知眾生定有正因佛性傍舉者傍舉類為並也瞿曇自是瞿曇驗知眾生有正因性經云尼𤘽陀子至不得稱為等者難意者尼𤘽陀子若不名佉陀羅子者眾生佛性應非佛性乃名草木性耶經云亂想故不見者如人視一𤘽則為餘物所亂經云雲表星者雲外星也經云豆在豆聚者將一豆置本聚中則不識者新來之豆經云不同如是八種者八種雖不可得見而體是有尼𤘽陀子定未有樹枝葉華果故云不同經云今則有之等者由有樹性後具因緣方得有樹佛性亦爾由本有性後具緣了方得成就而悉見之若如此者是則無咎舉非果為難者佉陀非尼𤘽果也經云二俱無故者尼𤘽陀子中無尼𤘽陀樹及無佉陀羅樹何故難言子有樹耶何不出油者既不出油驗知子有於樹經云因緣故有者如子因緣故有樹以壓因緣故出油佛答但云有油不言有胡麻油所以被進一難既非外義者此非外計義但是佛法修行起計故非破之菩薩且爾者亦應云眾生亦爾以菩提心因緣故而得成佛非關佛性佛性無發者進退作難也經云無菩提心者無菩提心明本無因心亦無阿耨多羅明本無果心故得類性以結難辭人天不須佛性者若只求人天但唯世善不用知性性專為無上菩提之因故言也經云心是無常者然心雖依性發發未稱性故屬無常闡提不發者若能發心則佛性不斷由不發心名斷善根闡提實不能斷佛性也經云五緣成者牒前難中生蘇要待因緣所謂人功水瓶鑽繩方成蘇也經云一名者同一礦名喻諸眾生同一假名一實者同用四大以為體質喻諸眾生五陰為實所出不同者以喻性別經云義僧亦爾者此第一義僧即是佛也經云諸佛和合者此即緣了滿足圓備之僧眾生有此果佛滿足之性志願強弱者志願堅固及正助合行乃不退經云不作心者無菩提志願及行也疑心者疑自為有佛性為無佛性疑涅槃為有為無等恡惜身財者如前若聞入地獄經無量劫方得菩提亦不為苦等於涅槃至不滅者方有退之人謂言真令一切眾生永入滅度名為涅槃所以生於怖畏之意涅槃是永不滅之法心不堪忍者不能堪忍修習故心不調柔者或樂人天或樂二乘或樂出假皆是不調柔心餘例可知自輕己身者不自信己身有佛性三不仁者春秋傳第八云仲尼曰臧文仲其不仁者三不知者三下展禽展禽柳下惠文仲知柳下惠賢而使在下位己欲立而立仁人廢六關注寒關陽關之屬凡六也關所以禁絕未遊而廢也妄織蒲家人販席也言其與民爭利也三不仁也作虗器謂居蔡山櫛梡也有器而無其位故曰虗也縱逆祀聽夏文躋僖公祀爰居海島曰爰居止於魯東門外文仲以為神國人祀也三知也今引六中之一以況出家覺道之徒切令捨於世務故云臣有所妨又句句應論觀慧者只於釋經與三諦等合即當現解坐馳者莊周當貴坐亡坐馳無益又專念下小乘空觀也又念蒼生下別教出假愛見大悲若能無念者起信論云若人能觀無念則為向佛智故唯念一心三諦佛性之理故云一心中覺於文非要為利根人即文成現以消經文成於信行所別起現相為傍經云眾因緣者覽上諸因緣也以假人制心者他云假傍人制己心心緣於法者法謂法身實相之法以大涅槃心常師此法故無邊耶之僻深淺自在者貪欲惡心起時制令見性即是於淺見深名不淺心名為自在經云涉路而去者如前遲得名退故今云而去不退之行者皆是無生忍不退之行也經云四攝者布施者如法求財常思施愛語者施已安處令安樂利行者自利利他平等攝取同事者謂利益故同其事業又行而說名布施無染心說名愛語授他無疲名利行離過安他名同事前是並約財後是約法今趣舉三十二相者一切法無非佛因且趣舉三十二相業求佛心便者業是佛因舉因求果為便若圓修者一一無不為成法身故也𦟛勅龍經云七處滿者大品經云兩手兩足項兩肩餘相可解然三十二相因雖各各論其真因者持戒精進精進無戒尚不得人天身況餘相耶此則三藏教相本空無生是通教相本道種智是別教相本實相是圓教相本八十種好經文不釋今依大論八十九解八十種好次三十二相而辨八十種好者相好乃同是色法皆為莊嚴顯發佛身但相總而好別相若無好則不圓滿輪王釋梵亦有相以無好故相不微妙通云好者可愛樂也八十種好莊嚴身故天人一切之所愛樂故云好也即是以慈修身故有此清淨相好之身業也一無見頂者二鼻高好孔不現三眉如初月紺瑠璃色四耳輪相成五身竪實如那羅延六骨際如拘𤨏七身一時迴如象王八行時足去地四寸而印文現九爪如亦銅色薄而細澤十膝骨堅著圓好十一身清潔十二身柔軟十三身不曲十四指長纖圓十五指文藏覆十六脉深不現十七踝不現十八身潤澤十九身自持不逶迤二十身滿足二十一識處滿足二十二容儀滿足二十三住安無能動者二十四威振一切二十五一切樂現二十六面不太長二十七正容貌不撓色二十八面具足滿二十九脣如頻婆菓色三十言音深遠三十一齊深圓好三十二毛右旋三十三手足滿三十四手足如意三十五手文明直三十六手文長三十七手文不斷三十八一切惡心眾生見和悅三十九面廣姝四十面淨滿如月四十一隨眾生言和悅與語四十二毛孔出香氣四十三口出無上香四十四儀容如師子王四十五進止如象王四十六行法如鵝王四十七頭如摩陀那果四十八一切聲分具足四十九四牙白利五十舌色赤五十一舌薄五十二毛紅色五十三毛軟淨五十四廣長眼五十五孔門相具五十六手足赤白如蓮華色五十七齊不出五十八腹不現五十九細腹六十身不傾動六十一身持重六十二其身大六十三身長六十四手足軟淨滑澤六十五邊光各一一丈六十六光照身而行六十七等觀視眾六十八不輕眾生六十九隨眾生音聲不增不減七十說法不著七十一隨眾生語言而為說七十二發音報眾聲七十三次第有緣說法七十四一切眾生不能盡觀相七十五觀者無猒足七十六髮長好七十七髮不亂七十八髮旋好七十九髮色青姝八十手足有德相又法華疏解八十種好與此不同謂二十指手足表裏八處平滿疎膝䏶六庭好妙肩肘腕六處滿兩𦞳奇中三處好臗丸二處馬藏一兩膊二腰臍二脇腋乳六腹胷背項四上下牙上下脣兩頰兩鬢兩目兩肩兩鼻孔額兩𮌋兩耳顯圓若分別四種好義准相可知業果即了因者成於果也總結四法者如下眾生等四是也而一五性者一總五別也上兩番者一破因中有果二破因中無果文理抗行者解釋經文不會涅槃理體名為抗行諸佛境界者今明境界唯在果性以其煩惱起故是常者煩惱雖起而佛性是常問果果等者問意者果果在佛眾生如何是常了因有能了所了萬善復有轉動自因之果豈得名常皆不可思議者能了即所了所了即能了因即果果即因無非法界常住豈非不可思議第十二卷師子吼品三縛解者前卷廣破因中有果無果為建立眾生悉有佛性竟眾生以何因緣而得見之故次明於縛解經云應無縛解者更分字解者正性無縛體本不生不滅緣性無解惑體本淨故無縛解此惑體性者只此事惑體性即起即滅故無可縛經云因此五陰等者此文大體明因不即果用因致果譬文亦然合文但用法文意消即得經云為汝分別解說者為汝分別此陰至彼不至彼等經雖有五情者五情欲謝漸漸羸弱故無覺知經云理無西逝者逝由往也日既從東沒西更無往東之理又只是此影更無歸西之理二釋並通即死明生者此取合文成於譬意也經如燈生闇滅者即生即滅即滅即生更無餘心同也經云如䗶印印泥者䗶印在泥中間名之為印此身非是中陰所出者明中陰身非是中陰自生由於死陰業因緣故有經云文非泥出者文由於䗶印也經云不餘處來者亦由䗶泥和合而有文現故云也如大理獄者此是世斷獄官類於中陰定判善惡方可受生又善惡過去已定中陰中但是判斷其事又云住陰中或經七日或經多日多日義強為受胎因緣難會又父母精血如泥識託其中如父攢麤官反而揣者應云段食食若和水則不可揣今言揣者未為全當既有想陰者思想生處等夫食者資身得住名食中陰身得住由此三食古人有四食章者如成實論云餅菓飯等名為段食思求段食令命不絕名為思食冷𤏙等觸名為觸食心識持身令不滅壞名為識食若依毗曇一切色法持身不壞悉名段食心數法中思為思食觸為觸食六識心王名為識食今經所說多同毗曇能云善覺觀者謂思想善惡及思生處即是覺觀經云於母生愛者男子受生於母生愛於父生嗔見父是其競色女人受生於父生愛於母生嗔此是我見者謂是我已有故屬我見空中無生㓨者死五陰本空無煩惱㓨云何今修聖道斷之經云如捲等者只攬指為捲亡捲是指若不了者謂捲指殊陰與煩惱亦復如是迷故繫縛解全法性合掌等例了疏中所釋復是一途報在故有縛者此縛即脫也渧者此所自天而墮為渧滴者此約一滴當體也養育者如母養子子待於母為樣諸法雖畢竟空者五陰及煩惱名諸法也未圓者未圓滿也生煞羊家者由前世惡緣未盡而生此家非無漏使爾六譬者六譬中但釋初一後一中四不釋此開習報兩因者以道力習因也生惡國者由諸惡報因牽生惡國下上者謂六度菩薩當不可得何況後教菩薩無邊心者緣無邊識名無邊心淨聚者離於多緣心聚一處名為淨聚水中丈夫者世界初未有地但在水中坐外道觀見名為水中丈夫更通上者前一期及念念文是過去二因者亦應更云現在三因未來二果故非涅槃標兩章門者共亦有過各亦有過故雙問之經云可算數者人人各得是可數法不一故非共者終者即得故不二故非各者以體同故法界體性者但取淨分法界體文棄五六七識又不辨同而復異異復當同若爾下便破我解彼等者我解彼人解處彼人解我處解是故不異亦無觀境者無所觀境界因性也非因非果云何有正因涅槃之體從緣現故者終者必得故也經云忍辱草者草譬佛性同牛食譬修八正道者醍醐譬得佛果經云亦不得名薩婆若智者果智唯一各各得者智不名一各各得之等名各各得之故不一不相妨礙故不異經云無漏正中道者中道無漏之理心佛眾生同共有之無有障礙修者皆得不同世道障礙之喻經云四生法界者謂十八界有謂三有也道謂二十五有因修二十五三昧破之經云置毒乳中者乳喻眾生本有清淨佛性無始聞一句了因與此本性俱時而有互相薰互相發眾生隨在五道之中重聞教法隨五道力發則不定故云乃至醍醐餘文借此譬五時教修道因緣者此敘往昔修道因緣無始已成駈魔逐外駈盡即入涅槃今昔皆為成就眾生故託處時及人而度脫之非處非時等者簡除機未會處等十六大國者長阿含經云一央伽二摩竭提三迦尸四居薩羅五䟦祇六末羅七支提八䟦沙九居樓十樂闍羅十一阿濕波十二婆蹉十三蘇羅婆十四乾陀羅十五釰浮沙十六阿梨提廣如經說經云汝不應言𤘽尸至如人乘船凡有四譬皆是大處大人大藥大船以度法界大機眾生不云小又一從廣至狹故居此城二示小即大一塵之處無非法界三機宜止此而度脫之汝不應言極陋隘小報發心者昔於此處發菩提心今敘往昔以熟物機故云也搜所求反經云奉修十善法者上上十善謂法界法也經云修習慈心悲喜捨心者從本四心垂迹四心以化眾生遍六大城者遍於大城駈逐六師皆是主伴共熟機緣故潰亂者胡對反謂潰散逃向他國誘諸眾生瞥芳滅反蹔見初亦曾瞥聞未審知之經云十力者一是處非處力即是四種四諦智決定因果知生滅之集決受三界之苦斯有是處生滅之集若至無餘涅槃斯無是處若生滅之道能盡苦入涅槃斯有是處生滅之道若至三界斯無是處二業根智力知四種集諦等三禪定力知四種道諦八定分別淺深照了不差四根力知過去苦集不同五欲力知現在苦集樂欲不同六性力知未來苦集得失不同七至處道力知四種道諦所至之處八宿命力照過去一世多世種性好惡壽命長短九天眼力照未來好醜十漏盡力知四種滅諦所證無漏心慧等解脫經云四無所畏者一一切智無畏即是俗知四種苦諦為他分別明示過患決定師子吼無微畏相無能難言是法非法二障道無畏四種集諦障四種道滅決定師子吼無微畏相無能難言此非障道三盡苦道無畏四種道諦能行是道得盡苦出世間決定師子吼無微畏相四無漏無畏即四種滅諦各有所證各有所滅決定師子吼無微畏相然十力無畏若約教分別則藏知生滅四諦通知生滅無生二種四諦別則次第知四種四諦自淺階深圓則一心中知四種四諦咸歸圓常佛性六即甄分如餘文廣說經云五智者誠論第六五智品云一法住智諸法生起名法住智如生緣老死乃至無明緣行以有佛無佛此性常住故曰法住二泥洹智者知此法藏名泥洹智如生滅故老死滅乃至無明滅故諸行滅三無諍智者隨以何智不與他諍此名無諍智四願智者於諸法中無障礙智名為願智五邊際智者隨行者得最上智以一切諸禪定薰修增長若於增損壽命等中得自在力名邊際智承保四秊五月三日書寫已了以同月七日一校已了
