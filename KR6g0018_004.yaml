body:
  text: 疏卷第六釋如來性品疏文為二先釋題次就答下入文解釋初文為九初正釋次諸師下破古三地人下敘地人所釋四又論下判失五今明下重釋以顯題旨六間答下釋疑七有師下述生起相八然此一品下示正答文九論人下述古初中二初約果性釋次又如來下約因性釋初言允同三世者謂諸佛皆乘如實道來成正覺故云允同三世不同即世界也舉初以標後者初謂如來即後世尊正云說於十號為生物善故屬為人破諸異計者破三乘外道異計故屬對治又如來下第一義可解次約因性釋中初文佛與生異因果以異顯同故屬世界又果之本下為人舉顯目隱為生理善也又性理下對治舉如來性勝棄九法界劣令入一性故屬對治文如來名通下第一義以如示人者乘機利物故名示人次破古中又二先序次義皆下破初云能避苦求樂者正由此言即為所破何者佛性體遍有何彼此夫彼此者悉是無常故非性義次破中云不以心神等者六法等下文自釋不可用釋此品故今不用三序地人釋中三先序次是義不然下略破三私謂下結判以斥失言非無一邊者論師非不得別教之義故云一邊又前諸師計心神六法但得內外一邊今佛性非內外而內而外故不用古所釋四判失中偏據本有者但成正因而無緣了偏據緣了者但云衆生心神六法故屬緣了而無正因緣了無體故不可用據當果者當果不通於因故今不用如盲觸象者各得尾耳失象正體五重釋題云中豈獨一法者如諸偏據一法者是佛性非有下列四句若得四悉之意四句互說皆通藏者下明有門中具四悉益以有接斷者為生斷見之人理善故說佛性是有以有破常者說於佛性真常妙有破於橫計常見之人屬對治悟佛性至非有下明佛性是通所理四門是能通門故云佛性非有如人問橋者彼方等陀羅尼經第三云我於往昔作一比丘時有居士設大施會於一切沙門婆羅門貧窮下賤所須珍寶衣服飲食我時貧窮故詣會所於其中路見有大橋於其橋上見衆多人忩忩往來時諸人中有一智者我已愚意問彼人言是橋何人之所作耶是何從何來今向何處去此木何林所生何人所斫何象所載此木為是青松白松如是次第說於七千八百問已爾時智者便語我言咄癡沙門居士請汝但步路去至於會所可得悅意汝今徒問如是等事於身無利咄癡沙門今且速去還當語汝我時聞此便到曾所食已蕩盡財物無餘見已懊惱結根㘁叨是何苦哉却到橋上見向智人智人問言汝為憔悴多不吉耶答言我向徒問無益之言使我果不值於飲食財物智人語我夫為沙門於身無益理不應問應觀諸法於身利者宜應須問云何為利謂不讚己不毀他觀平等法自既利己復能利他是時有九十億諸忉利天聽智者說發菩提心是故當知佛性四門皆可入道諸家偏執如彼問橋亦隱亦顯者始從名字乃至等覺並具二義且如名字位中解故名顯未見名隱觀行位中有觀故名顯未證故名隱相似見故名顯未證真性名隱分證故名顯未窮後位名隱亦外亦內者如經下合是也六釋疑中理或合論者性在惑中故名為藏全不論惑者從理性本淨而說七生起相中六道區分者應云十法界毀陰得罪者由妄心毀妄陰故得罪也今存之者今家用此義也八示正答文處中僧亮曰答云何作善業大仙今當說以廣長專金剛二果之因也上略明因故以慈悲護法為本今廣明故從三歸終至十地法瑤曰佛性是正因善業是緣因故引之以示因果業始性終者若據衆生佛性未名為終今從菩薩所問以說既問云何作善業極是問始既云能見難見性見即問終僧宗亦同此判九述古中二先述次今明下正判初云既其無我者破其假我既云是假則無真我故云誰御次正釋中云不能作於善業者此明理性位未能為善業握出藏己者明究竟位不須善業中間須作善業中間四句者中間四即也若約四句者得四句更束六即位作隱顯名隱不能理即也顯不須究竟即中間四即位位具於隱顯如前說第四句謂善業體非隱非顯也次入文釋於中從四倒品生者由前倒故不見佛性從此問起為定有我為定無耶若定有者一切衆生悉應成佛何故今日悉在二十五有之中而不得出故云有則非有不得說者為有我病及耶我病故不得說佛性釋疑者說二種教即是釋疑經云我者至悉有者夫如來藏我及佛性體一而義異具八自在為我義乘如實道名為如來以不改故謂之佛性悉有者常樂我淨是佛性也因亦有果果亦有果故也經云煩惱所覆者即覆論我不同別發劫覆見我為緣說之者若衆生有四悉機宜說當來方得成佛而為說之窘渠隕反急也迮也謂乏緣因資種智達故云乏緣有能生力者能生行解之力此性包含者五陰十二入十八界一一無非三諦法界故曰包含僧亮曰得金藏者必能富人若見佛性則得成佛此性廣轉者一色一香無非三德祕藏法界之法故云也家人者宰主為家人俱迷於理為無有知者澤州云二十五有衆生名為家人人有勝劣名為大小同不解性名無知者但菩薩者三藏菩薩也但聲聞亦爾論人許三藏三乘外別有共位三乘故著但菩薩等出擬菩薩為大者出擬菩薩義兼藏通出假俱不知經云時有異人者澤州云異人喻佛勸修佛超群俗故名異人善解造修顯性之法名知方便以法告示名語女人勸之斷障令善益彼名雇除草緣為化力者說佛性為我作化他之力也經云善知方便者巧顯佛性也經云我今雇汝者僧宗曰擬宜之譬耳經云我知方便者以三達四辨必能廣說經云尚自不知者僧亮曰同身事近異身則遠近尚不知況遠者乎經云我今審能者生曰公理不可沒唯我能知經云掘出者生公曰除結惑之覆為掘見佛性為出言同哀歎者彼亦有二病二藥也彼譬顯者彼譬已成劣三修此譬隱者示一切衆生悉有佛性也女譬前佛者後佛亦行先佛法也經云是女愁惱等者醫之與母隨義為喻取其長養慧解之義如母治惑之義如醫更無別旨無我苦味等者此即以甜和苦通名為苦亦與真常相違經云以苦味用塗者生公曰無我之教非物所嗜為苦味也僧宗曰應云醫以藥塗而云母者表無異體故也經云不可復觸者愛染名觸身皆是無常名不可觸真我緣起者此明大機冥發顯終未受故云除復邪我病去無我藥已經云我已洗竟者無耶常等病不復更用無常之藥故云洗竟經云漸漸還飲食於方等般若大機冥發成通別人故云漸漸還飲人別者九界不同法通者佛性無二人別非佛者衆生但有佛性者未有常樂我淨等德故云非德昔既無別人者今昔人既不異昔人無常法性是常此之常法昔復屬誰經云不應生怖者不應方等憚發不受般若無心怖取來至法華涅槃方知已有故云不得不有總唱無者若有我者不應流轉二十五有既流轉生死驗知無我始生終沒者驗知無常差別等亦作此難六雙為十二難者始終一差別勝負一因緣一苦果苦緣一忘念一處一難現用者現在但有無常之用無有常用驗知無常無真我也應無生滅者生始滅終也前譬得而失者明佛答為二初文者本有性理故得遇緣起惑故失後譬失而得者從雪山下文是也無失云云者佛性之理不當得失由於解惑論得論失故注云云言王家者澤州云喻如來三千世界是佛化處名為王家凡夫衆生惑性增強名為力士心有佛性故言眉間有金剛珠經云都不自知者法瑤曰以耶惑之首壞正信之額正信既破豈知有佛性耶雖不知有而至理羼然如珠沒皮中也經云因珠入體者因珠故成二乘乃至成圓常住大涅槃也機名於佛者有通名別名機親者名別通助者曰通失非失者入皮故失停住故不失當果在當者衆生即雖未得來世方具喻如影現於外佛智默照者沒在皮裏為默影現於外為照惑輕曰皮者謂喻二乘也經云心懷驚等者昔來只見自身無常不淨今日忽聞我身即是常住性猶如明鏡照了分明無常有變易故起奇想經云不能親近善知識者不能親近實教知識所以不見佛性下去例然無不成者由不識故還同生滅違於無我即見真我無我方成經云不知無我之處者不知無我本是真性作此斥者令於無我即達真我故云尚自不知等所以失理者以煩惱覆故雖有佛性衆生不見名為失理倒惑交加者起斷破常起常破斷等名曰交加初分得者名字已上俱得分名高曰譬十地菩薩聞佛說已能見少分明佛性理幽遠也行者聞說知煩惱性之下有佛性也筒徒紅反筒也桶他孔反下為正譬十地了因者以稟教修行始從初地已上修得了因契於果地三德之法故云以因承果過去生生者佛於過去處處修十地因熟今日令亦衆生修因尅果又稟教修行通於中間四即經云是藥時者因力分滿名之為熟又理從緣顯名藥熟時陰身中現名從地出顯在行心名集木筒證會本性名味真正又集木筒中者理理教中集又了能顯正名集六味譬六道者若別譬者苦酢無常醎無我苦樂甜我辛常淡隨義用之處處皆通經云真味至月者不與僞雜為真性必在人不可遷轉如停留也圓明不偏喻之如月性云非男非女者為不定根人又是無色界根性經云實有煞生者生公雖懷五陰無損佛性傷五陰故名曰煞生不可以無損謂無不善業也六法只是五陰者此破定執不可計以神亦爾復當前難者消此文雖便計定有無性之惑覆於有性之理故不可用有住不住者佛性之體住非不住令衆生性作住不住說妨前後文者前後文皆明畢竟清淨非內外等石砂等者喻煞六道五陰也佛性教作善惡者非但起善由於佛性起惡亦由於此經云汝今欲知至義不者欲知衆生身中祕藏真實義不經云惑有眼毒生等者寶亮曰更顯方等成毒不成意也反覆相成者只是毒藥成甘露甘露成毒藥傷毀破壞者破法身也入理生善者智德成顯體破惡者斷德成也諸文之下各有合譬者此三行中各有合及譬也似約三諦者約圓融三諦菩薩當於三教免魔縛者達己身一體三寶即魔界是佛界焉更有於能縛也善分別者分別昔歸為權今歸為實也經云則是我之性者性不假捨我自身而歸彼佛若捨我歸彼是則棄本從未非為真歸是以勸令深識自身當果之性生理善者一體三寶是理善之極即智德分成破惡毒藥者謂斷德分滿故云二但有得也又我性者是因性也有佛性者謂果性必有如此解者審入祕蜜藏也經云如我所說偈者指上若能諦觀下二行偈也初併不受者我今都不知下是謂併不受別體三寶及果地一體三寶復併歸依者迦葉曰佛言我亦歸三寶下是佛皆不許歸者佛意唯令自歸依己身中一體三寶是己善業不許歸他初總云不知者三寶既有真有僞今欲歸之而作善業但不知真歸之處故不知也性云云何歸佛者佛能除畏故云安慰法能斷疑故言自在僧是福田故曰無上利如前四相中說者如四相品下卷結百句解脫文說謂一切衆生怖畏生死諸煩惱故受三歸等是無預約自照者不能自照己身三寶經云衆生業亦然者衆生造善惡業必當感善惡果亦如子在胎必當生不久又若修善業必當見己身一體三寶故云亦然澤洲云并法同喻衆生身中三寶真性能生當果名衆生業同子有無故名亦然或令歸現者大乘別體即是一體或令歸當者衆生當得自身一體也經云以其不知故者若不知而歸則不成歸故文在生死經云假名優婆塞者三歸不成豈是真實經云汝於諸菩薩者通於住前住上也賢劫則第四者是釋迦也第七佛者亦是指釋迦諸非但名同十方亦等本起報經云釋迦為能文為儒義言能儒此美迦葉有弘法之功矣經云歸依聖僧者承正解以示人善道也何不以正我翻於邪我者此則互難令出二門對治之相正路者三歸是趣佛正路諸有所無有者三惑二死並已故也三隱時一體者衆生一體三寶全在理性故名隱時昔日須依者今涅槃教興故不須依於佛性至法僧者法性有覺照之義為佛寶性有軌生物解之義為法寶境智和合即僧寶問何故要令歸依己身一體不許歸依餘二耶答恐忘自身一體故不聽歸他也理緣者真諦理性緣也即當今家昔教第一義就緣者順機修行即當為人對緣即當對治因緣者昔但順隨世間因緣即當世界即對治意者若消此文正用對治意冥得餘三悉益者非無其義故注云云經云若欲隨順世間法者今世世教興故須歸依一體昔但是隨順世間方便引接令歸別體經云於我身中者心佛衆生三無差別故舉佛身以顯衆生身具一體與佛無異正令衆生於自身中起塔廟想法僧亦然問身有法僧者此以別體問於一諦體也言身有法僧者意云聞法是法寶出家為僧是僧寶能說此法者說於己身有法性即是法寶能常憶持觀察即是僧寶他尚歸依我等者他尚歸我一體汝何以不自歸汝自身中一體而但歸他別體邪又他尚歸我即指自身為我他尚歸我我豈不自歸己身一體耶依此釋亦便經云我當次第者次第示衆生一體三寶之相不敢為例者一體三寶非二論所明故不敢例法華云真聲聞者昔日由僞今方真實即成同體方便義說為他作化一體者我自得一體已能為他作一體歸依之處故云我當舉體者全體是也而不相違者不達即和合是僧義作此分則者汝今不應同於生盲不見一體二乘得聖者未得二乘聖者同前凡夫結自身說別者時機未宜且作別說引一體大將譬了因者大將雄猛能破強敵以安國如了因即般若遍蕩三惑以照理太子譬正因者當紹王位以治國如正因即法身遍一切處常益衆生大臣譬緣因者大臣輔佐內稱主心外通民庶以助國如緣因即解脫助了以顯正性經云不應生下劣心者不應如諸聲聞不知一體故也如王先者意云王子不應生下劣心應如先王故得成前紹繼大王譬亦三臣中第一譬正性調伏諸臣譬了因下臣依持譬緣因故云亦爾經云我示三事者示謂示現別體以化衆生又示謂指示示於衆生一體之上有於三義所以疏中作指示釋後釋為正經云剛力者所擬皆斷自身一體能斷別體疑網故喻之如刀不取別體者不取昔別體也他已成者果地已成一體於我無預故不聽依何者恐迷自身一體還同小外經云大勇猛者知於自身有佛性一體三寶者皆名勇猛經云清淨行處者一體是圓觀所觀之境故云處也經云奇特之事者一體三寶超過九法界之表昔所不說今方宣示故歎奇特經云亦當證知者此即自述我亦當證此祕藏真三歸處下度愚迷者令他悉入祕藏故注云云稱歎佛性等者即是稱歎衆生心中現在隱時一體當成顯時一體與佛無二故約相好歎之以我衆生己身一體隱顯相好之相明矣乖中之惑者由乖中道為三惑所覆也此有非道者若定計有無不名中道雙非有無方名中道經云若我住者常見之人說有神我住五陰中名為我住即是常法不離於苦外道宣說神我是常故從其意宣說為常法五陰是苦我住陰中名不離苦若無我者舉其斷見斷見之人說無生死假名之我乃至涅槃真我亦無以無我故修行無利無所資潤故無所益經云若言苦者為苦遷變故屬於斷亦常亦斷者有妄樂故屬常為苦逼故屬斷不知是誰者應有此計未見其有故云不知見修斷過等者見前人修斷有過即自修常見修常亦爾尺蠖烏反郭味蠖易云日往月來月往日來日月相推而明生焉寒往暑來暑往寒來暑相推而歲成焉往者屈也來者伸也屈伸相感而利生焉尺蠖之屈以求伸也彼意明其自然相成今用捨一取一如彼蠖蟲對前無我者第三句既云無我第四句應云修餘法我者是則名曰如來祕藏今言法常者誤也常是通者此義有妨餘五皆通何獨常耶經云修餘法苦者生死本是法身而二乘等但作苦解經云修餘法樂者只邊即是中道佛性大善下四句亦爾疏中欲顯中道為勝故且簡邊理相應即以辨中道經云及正解脫果法也津通也中道分明者經云中道遠離二邊即是分明之相愚尚不疑者若以此解為正者應云愚人尚自不疑何況智者而當有疑而生諸見至輕便者愚人聞於中道增其利便如服蘇輕便何以故見利易悟義如輕便又本是諸見分別之人今聞中道不二佛性於中得解如服蘇輕便後解為正蘇是好藥者佛性有力無畏之用能破斷常名為好藥亦得輕便者於斷常中得見佛性名為輕便迷惑意者若依六卷以釋即當前文愚人無疑之意說有為無等者此即顯中道妙有等無二異不二者無別二來異於不二復無不二來異於二當知二即不二不二即二即非二非不二三聚者色心非色心三也地風亦爾者止須治地止足治風又上息治沉重地病下息治虗懸風病不善醫者即二乘人不知佛性是也初可見者如來合良醫知諸煩惱合善知而為除斷合偏發開示下合消息不應染著者佛性猶如虗空不應生著有即表無者有謂妙有體同虗空道理不無者真善妙有性同虗空不得一向定斷滅之無若定說者則名妄語應能放光說法現力無畏芳何以哩然者若定有者推檢之時應有應對現無應對則不定有乃至四句者僧宗曰即色之過如僧佉離色之過如衛世師計一神我不一不異如犢子道人斷見外道計一切無復與前反皆是諍訟經云佛性種子者種以能生為義既具三因佛性必得菩提何謂無常經云假名不實者夫有言者但是假名不應定執佛性亦爾不定有無解惑對辨者只是愚智相對總法是境智不二也先舉無明者此約業惑不二以明中道僧宗曰生死體空從本已來無二無別涅槃體如如亦本來無相此是體識諸法實相之理成中道行如此釋者宛然成二非為不二次舉行識者此約業苦明不二經云白法黑法者善惡二法也僧宗曰通漏無漏明因果也經云應修一切苦者苦即法身凡夫如何作世樂解懸指般若者以般若中盛明無二故得引同深奧品者彼燈炷品中明前𦦨後𦦨俱不能燋炷燋炷亦不離前後𦦨昔已文說非獨今明重出謬性非經不辨是章門者凡從因緣生酪者即是立章門若云不自不他生酪者即是破章門何故不立本為破故置二門經云乃至醍醐亦復如是者五味之上皆有一是一非故云亦爾不應相似相續者破自生者自生是獨一之法將誰相似今酪身似於乳復續乳後而生身續他有驗不自生故云自生是一往也若計他生者身應破云乳酪時異相味皆異時等身異他生義不成經云先有酪相者以乳中先有酪性還生後酪名為自生六位者六即判得醍醐故云肥膩譬佛性等他經復云明起者由別起智明而斷於惑致屬次第教意由惑智解不相即此釋違今經就修習緣了者今助破之前次斷先明豈非解了而云淺近耶先定者為乳中定有酪性為定無酪性而我未解故問是義云何乃名為生者若先有即是已生云何而言從乳因緣而生於酪身假因緣驗乳無酪性乳中亦應有草者乳中亦應有於草子也初研譬者研其定有定無等故云研譬經云不可定言至酪者不可二字冠下二門經云不生菟角者菟角是定無但有其名乳中身不定生於無故知不得說云乳中定無酪性以理解釋者令違因緣之法皆是假說而已理體本是真常故名理解又是依於道理解釋衆生福力者衆生語通故約三種釋經云從因緣生酪者酵燸漿水等為因緣經云牛味者即乳味也經云是乳滅已者身得酵燸即轉為酪名為滅已醪音勞以物攪之者頗求樹汁等投於乳中名為酵非謂用於酒酵但是借酵字消經而已若作醪字此是清勞字翏力救反高飛開轉斷義者如前轉無明斷無明得明與上相似又正是無明轉即變為明與在前文同故云開轉經云雖同一鹹者譬一切衆生雖同為無明所覆皆有上妙佛性之水若消譬者鹹水之中自有八功德水不雜於鹹經云種種功德者功德譬佛性毒草喻無明經云剎利等者應云九法界衆生皆為煩惱所覆不見佛性四象至等者案西域記象有四一嗢鉢羅二鉢特摩三杓特迦四奔茶利迦即是青黃赤白四色又一鉢頭摩象二優鉢羅象三𤘽物頭象四分陀利象於天雷時耳上有其鉢頭摩華文生者說之以為鉢頭摩象餘三亦爾三云此象者解此同第二釋經云增長法身者法身體無增長由衆生終有淺深名為增長第二答能見難見者僧亮曰上三歸中明我性有佛性似如有神我之性為佛性也今廣明佛性非有非無離乎二邊處於中道無相可執其性玄妙非二乘所測十住大士猶尚曖昧豈非難見耶淺行聞見者住前菩薩也經云佛性甚深甚深者謂生死即涅槃煩惱即菩提深之極也故重置甚深之言經云云何甚深至入者佛性有何相狀不可得見而復難入耶總舉十譬者觀經文十譬與止觀十乘觀法相應第一譬不思議境故一諦三諦即空假中名為佛性經云以一指示者一一皆須云問言見不僧亮曰金錍譬諸經教一指譬三乘諸經說三涅槃實欲顯一常住涅槃文隱義微譬一指也二指譬法華破二涅槃一乘雖顯義未明了譬二指也三指譬今曰佛性常樂之說即便少見者悉身已居終終則感果理鄣說已便見始則力微難說雖示不了是以經說十地菩薩見終不見始也如疏破譬三忍者寂滅一思在佛是故除之又初地至十地下約通教釋此譬一諦下約圓教釋惑於無我者昔教迷於無我謂是真實不達無我即是真常之我故云惑於無我經云虗空鵝鴈者由虗空無明所鄣見佛性鵝鴈了此與上求義同身有上求必具下化經云譬如醉人者由無明醉見真常遠路不明了此與安心義同以止觀安於法性之道若無寂照焉能見道經云遍行求水者由無明渴逼迷悶不見佛性清水此與破遍義同遍破二死三惑之曠野方能少見三諦之白鶴經云遠至大舶者由處虗空無明見佛性樓櫓了此與通塞義同導師若不識通塞焉能過五百由旬達於佛性樓櫓之是非經云通夜者遊無明夜見三德佛性了此與道品義同道品是通三德佛性之門如通夜遊經云王事所拘者由無明事所拘見佛性牛聚了此與助道義同因他得見豈非助道經云為是蟲耶者由無明蟲見佛性塵明此與次位義同以實相心持戒一作一止自淺階深六即位別經云為是牛等者為無明牛障弊見佛性人了此與安忍義同安忍人牛等速順經云見盡菩薩者由無明天像等見盡菩薩真性明此與離愛義同離於相似天像䇿進令見真菩薩像也經云云何肉眼而能見者且約六根淨人父母所生眼為問實通凡夫經云隨順契經者小乘經也而有識者非空識二處識而自有細識而有想者非空識之有想非不用處之無想而自有細想此就同界釋若理內凡夫者依佛教修內凡人也王子富於法財者菩薩道尊譬之王子凡夫無德譬之貧人互相者感應相開名為互相往反者如大通佛時機來相應名往衆生退大流轉名反子身退大文亦息化亦名為反故云往反經云有一好刀者真我常住謂之有一自在可悅謂之好解則斷惑喻之刀結習永盡謂淨妙第一言持刀者身捨捐應也法皆隨者義云持去機感刀密者機興則應謝應息𢟅來𢟅去機皆不知義如逃行而非彰灼名之為蜜讇於琰反又是鹽反典誥者謂有典教也經云我庫藏中無是刀者小乘真諦庫中無耶我刀也五方便者五停但是對治初門用五停治惑令堪修念處是故除之又復合總別念為一并四善根為五素為親厚者若取意說即是昔於大通佛所曾結丈法今文正意明於往昔曾稟小化故云親厚未欲破此耶計者明小乘人來欲破此耶計機緣未宜故也唯明無我者此性文迮但云無我及皆悉不見我刀真實之相未說無我等教經云時王大㗛者僧亮曰雙樹之說真實相也文字品就文為二先釋題次文中下釋文初文為四先略釋題以開密下述舊三今明彼下破四今依下廣釋約三諦以顯文字具三諦之用初文者僧宗曰上已廣因果及廣流通然以文理合為經體故此品廣文鳥月二喻廣理文理既鄣於經無𨷂智秀曰以十四音用表圓理自為滿字表未圓理謂之半字此亦同古人之例二三如文四廣釋又二先約三諦釋次即字無字下融通復疏三諦初文三初文是空能滅半字者開半即滿更無半相名為滅半次文云半字是諸經書下假也文章根本者從一涅槃流出半字等開此諸經等即是圓常名為開祕三從又云若解下中道也即字無字下次融通復疏三諦又三先結次譬如下譬顯開三一一字下合初法中無字空也無字即字假也亦即下雙非具足下雙照也次喻中又二先正譬顯次一即種種下釋成三諦之相初俱成一器空也次而種種不失假也三亦名種種下中也次釋文中如如前解者從一云根本下純是涅槃大法名認歸此約先失而後認為此義故異於開權後解者但云是佛方便之說也非認者非先失而後認非與者非先與方便而後與在真實何者一切本是大涅槃法文理之本者小為大本因小得入於大故法華云我此九部法隨順衆生說入大乘為本即其證也經云是法非法者是法滿也非法半也即是開半明滿以旁隨字者謂十二音入於迦佉已下三十四字以字隨音者以迦佉已下三十四字隨阿等十二音而皆出生一十二字如迦迦隨於惡阿之音而得餘皆例爾然澤洲云梵章中有十二章其悉曇章以為第一於中合五十二字悉曇兩字是題章名餘是章體所謂惡阿乃至魯流盧樓外國正音名億力伊離栗離此是初章就此章中迦佉已下三十四字是其字體初十二字是生字章末後四字是呼字音將初十二呼後迦等生字之時有單呼者依後四中栗離二音其復呼者用後億力伊離二單復呼中並有長短聲別故有四音前後合說有十六音而經說十四音者前十二中後二助音非是正音故除此二然今依義淨三藏寄歸傳云惡痾益伊屋烏頡里是一字蹊梨是一字里離翳藹汙奧菴阿右十六字皆是聲韻向餘字上配之凡一一字便有十六之別猶若四聲於一字上即有平上去入四番之異其涅槃云十四音者不言末後二字以與初字形無別也其頡里蹊梨四字成西方二字更加里離始成四字為此古人有魯流盧樓之失深成譯者之過其文字品自非對授終無解理腳佉伽唬我者捙社繕喏吒詫荼綻拏多他拖𭷚娜跛叵婆𭊃麼右五五二十五字名便繕那此之一名自因多義一未成文義二成文義三男女根義四齊醬義五氣味義等然其大意總是第三轉聲能簡別義此二十五字未將上韻來配時但是半字不堪呼召野囉婆捨灑娑訶藍叉末後二字不入其數右腳等二十五字并下八字總有三十三字名初章皆須上聲讀之不可著其字而為平去入也且如將十六韻聲配三十三時初一腳字成十六之別然當今時俗始教童多不道頡里一字蹊梨一字里一字離一字四字所以但有十二之殊若為十六者亦成無過以其四韻用處不多是以人皆不存十二聲者謂是腳迦上短下長抧雞美移反上短下長短俱上短下長雞計上長下短孤告上長下短甘箇兩聲俱短箇字用力出氣呼佉等十二聲並宜昉此此十二字皆可兩兩相隨喚之仍須二字之中著子注而取短長也餘三十二字皆可昉斯總有三十今十二名第二章了悉談總有十八章但學書得一章識字略足漸學餘也然依此旨消經者義略周矣經云則能攝護大涅槃者東提頭賴色常王護常無常南毗留勒迦樂王護樂無樂西毗留博叉我王護我無我北毗沙門淨王護淨不淨不令外人取其枝葉斫伐破壞云云書缺二字者僧亮曰言十四音所列十二端應經云書缺二字此為證也如前引義淨所說此亦未當所言字者梵云阿察羅此方義翻名為無盡與彼涅槃常義相同梁武由此意四開善同緑洲如前說五莊嚴復能生與前生共為十四故不可也六治城過同莊嚴河西以前十二等者若無義淨所解此釋猶可依用何者以魯流盧樓前十二為十四音二語者夫云語者多字方成二字為語故未可用力未成為半者謂將上韻來配但是半字故云未成以得阿等十二字遍入諸字一字皆具十二字方滿名故云也無牽申等滿者前文無於引無常合成滿字之常如前所引四斥為果是童所不習學者如前頡里等四字始教童多不習學可然若言盧樓二字童不學未有憑據經云重童者上聲呼下去重字字皆隨音勢上聲呼之經云超聲者那羅等九字是超聲謂滿口五音具足鴹調之聲名曰超聲經云雖復處在陰界入者不即六法但理而不不離六法由於五即方得見性經云是故半字義者若從本體流出以釋則平昔法性為滿字本滿為半字本半字復為世間本若從末為本則世間文記等為半字本半字為滿字本滿字法性本雖展轉相依其體無二又半字義至煩惱者半字雖於真諦全是無明別惑所以半字為煩惱本性云半人但是居不足之地皆亦半人更明無字之義者僧亮曰上云一切善法根本人謂亦與如來為本佛無師悟非字所攝名離文字性云無字義耶者耶常及二乘但名有字而無字下常樂之義鳥喻品就文為二一釋題二文為下釋文初又二先略釋次舊解下廣釋初又二先引河西次今更下正釋初云真應者常是真無常是應月喻隱顯者隱喻應身無常顯喻真身常住法瑤曰法身玄妙寂冥絶於視聽之表於情為隱見丈六謂之為極名顯達常無常者達陰界入即是常無常即非常非無常故名隱顯法瑤曰昔說無常為令得常得常由乎無常豈得相離是則共成一聖名共聖行破曰凡言共者二行並觀今昔身乖何名共行依二諦三諦者然經但明二諦相即以不思議二諦即三諦所以依義作三諦釋一教一切教者圓教遍攝遍開一切教也次廣解文為三初敘舊中云此乃兩類為兩雙者若作異類為兩雙喻雙流行亦得問中問娑羅者上問中云云何共聖行娑羅迦鄰提也舍利者鷺鷲鳥也次然漢下略非以示正義相中云呼為雙流者謂凡夫所修名雙流行聖人所行名雙流用三問為凡下問答斥非以顯正為三先問次他解下先敘舊三今言下正釋初又二先問起為解釋之諦次他解下釋初問意云身言雙流為凡共凡行常無常為凡與凡共行無常為凡與凡共行常為與聖久共行等更不得立第四句若立則同上也次他解中文二先述他解次又一家下重敘失初又二先敘他次此不應爾下破失譬旨初云但識金等者金譬常鍮譬無常次重敘二先敘失次明下破三正釋中云雙飛雙息者即力而理名雙息即理而力名雙遊二諦即中名雙息中即二諦名雙遊非二中亦爾又無常常即非常非無常名雙息非常非無常即常無常名雙遊又安置諸子祕密藏中我亦自入亦名雙息雌雄亦成者二鳥即一鳥一鳥即二鳥方曰雙遊橫竪者一行具一切行為橫一一無不契於祕藏名竪又六即淺深名竪位位遍攝諸法名橫凡與凡共行者謂一切凡夫共行此雙流行凡聖共行者凡夫觀無常常全是聖人涅槃常無常聖人觀常無常全衆生生死是何故爾法體無二若凡自觀凡夫常無常不名雙遊聖人亦爾要達凡聖法體無二方名凡聖共行非凡非聖共行者凡聖俱契非常非無常祕藏之理不當凡聖故也文𨷂聖與聖共行句如前說約人法者六即人涅槃法良由人得法淺深不同故爾次釋文中合中云但是略耳者文中但云是苦無常我等三不云是苦樂無常即常無我真我何以略之以顯法同謂苦即樂等經云云何是苦無常等者問意云何只苦無常等如迦鄰提鳥雙遊耶前多斥倒者指哀歎品常破無常也只生死中有異法等者以於生死作異見異解何者二乘於生死作苦等異菩薩於生死作常等異名為異法法體本來相即方曰雙遊借此以顯無常者借於世間暫時無變之常顯成世間常義經云汝今不應至說者先前其聞非故云不應一往生之問者意云一往觀迦葉時如來同於諸物似於無諦之問實非無諦然佛下出非無諦之相今問憂悲等者此出問意如下迦葉引出作難何者涅槃若無憂悲佛於餘經中何故說言如來亦有憂悲若有憂悲即是無常不經云直以世諦至常者佛意云前借世也果暫時之常以為況喻豈謂如來只同此果經云雖有煩惱之身全是佛性故曰如無經云譬如金朴者亦作此針說文作此礦朴普木普角二反與璞同五譬皆是分喻不同波水之喻何者融朴為金金出朴存若喻雙遊於義未忉經云譬如衆海歸流者亦是分喻由入方鹹無憂悲即有我者真我也有憂悲即無我者聞世有無我也經云無想天等者初明無想不得定有若無想下不得定無以是義下結無定處以其無想而有壽命故無定處如來憂悲亦爾無解慈悲實無憂悲為衆生故任運而有所以譬之如無想天經云依枝等者神依和合樹居所以不得偏依枝節此即明其非有雖無定下顯其非無佛法亦爾合譬者無憂悲合有我而於下合無我但於無中說者如來無解慈悲無思無念由衆生扣任運而有若等義說憂悲者一大慈悲故憂二權應故憂平等法性實無憂喜故云義說經云微塵至立者虗空尚不立於微塵況有舍宅耶又舍雖不定因虗要因空地而立經云性無住故者虗空不受物舍宅性不住空故云性無住也病常者耶常病也安隱而遊者住大涅槃而遍遊法界澤州云二鳥喻佛如來五濁增時名為盛夏煩惱識盛名為水長佛選正法化人令住名選高原不及約起倒以釋則順經文兼常無常等者應更云名第一常第一無常等經云死匂者匂能證表即是死果之處經云無天眼者若有世尊真天眼者方見真我云何至智慧臺者升高見下故知如來有於憂悲月喻品就文為二先釋題次今分下入文解釋初為六初明二品相成以顯題盲次河西下述河西釋三問答下釋問答意四梁武下傍引儒宗所計以明天地日月之相五長河含下示正教所明以異儒六此品下示答文意初二如文三釋意中云兩問一答者如上云何得廣大等有二問但用四依一品答一兩答者如上問云何得長壽則作兩重因果答河西只是一句者就河西言品雖有三意只是一但一問一答而已餘之二句兩問一答一問兩答文中少有此力故云可解今師意云三十四問皆是一問一答為定月取虧盈者虧為隱盈為顯顯喻真身虧喻應身曰用長短者長喻顯短喻隱星以去凶者吉譬顯凶喻隱以論適宜然澤州云上來明佛定業作用下約日月星宿三喻明佛身口二業作用今明二行及以隱顯莫非三業適宜不可分二現違經文月攝日星者月能虧盈盡夜俱視光用是同故得攝二四引儒中云髀𢍉婢反䉈蘇旱反日月橫行者謂東西行耳繞天地轉者從天上沒地下轉也五引正教中云角行者落角行也次入文解釋中用答三問者上只一問含於三問故今答三自然運轉者由衆生業力使轉矣持風者持在空中二住風者令住不墮下如作盜人者阿含經云有有人偷苽云咄咄月莫出待我偷苽了任汝出不出名不樂見三三本攝者依佛法但立三時雖立三時三四十二亦與四時同也非簡賊住者佛法不立秋時若簡賊住應問汝是何時受戒若云秋時即是賊住西國俗中本立四時既未入佛法不知佛法立時之限又律中夏不安居得提罪春冬不安居得吉罪春秋同者曰長短同凉氣同故不立秋時力都聊反人性也其作除故等者此怪星至國王崩立故云除故布新經云一經耳者法瑤曰起一聞之功終籍此慧衆惡消除不言一經歷耳煩惱便盡正顯此經功能滅惡生善齊法身也菩薩品就文為二先釋題旨次今就下入文解釋初又三一騰答意次釋菩薩下釋義以顯標名三然河西下判得失初云上有十三者突非阿羅漢半不答及魔波旬合為一問但有十三然耶正品疏現開為身聲兩答則有十四若開羅漢則有十五若據上開初行為四問是十三則有十六雖然盈縮大體終取十五為定若上為十三菩薩品則須答十三大衆品應答八問佛事者純明常樂我淨及非常非無常法也此下明菩薩修行大般涅槃故屬菩薩力答十二至十七者古人意云大衆問但答六問次釋義中菩薩義至四重者正為及簡出未發心得菩薩名者非此四攝故先列之三力供養者籍草亦云布草燃燈及石蜜漿為三供養已發願我當來成佛亦名釋迦侍者弟子皆同虗信者只於三藏實有鏗然塊礙緣生之法體達如幻虗心而信故名虗信乾慧者慧未得先生先淺水為乾攝法不盡者不能於一中先量先量中一等又不能攝圓教智釋因果惑理八種之法故云不愚退不攝一切衆生者別人入十信發心方名菩薩十信已前未發心者此教不攝佛根性者前三教但是菩薩法圓乘方名佛法所以獨菩薩乘不攝於圓妙覺聞即菩薩者衆生先上謂佛是佛尚名衆生何得不名菩薩理性為因者理性為因涅槃教光為其菩提種解此即名為未發心菩薩又皮應知納涅槃教光薰者得為菩提因名未發心菩薩闡提及前三教根性約未轉邊聞悉不受不得名為未發心菩薩又直指圓乘根性名未發心菩薩從謗而信者從理性迷聞涅槃教轉成名字則名發心豈會經宗者今經以圓常真伊之教純詮醍醐佛性以為其宗故不得作餘解三判中云此答四問者從此至為病汙只有四問不為病汙者由見性故不為病汙為是義故而答諸問同顯佛性一意而少眉目者今師所明圓常佛性與河西同猶如一面而皮辨於諸答別別不同以顯佛性如面具於眉目次入文中云歎經傍答者因大涅槃教光遍觸一切衆生為其菩提心因即名歎經此大涅槃教能詮一切衆生理性涅槃由理性具得菩薩名即名答問但是從略名為傍耳善根微少者正出未發心菩提之相今用此釋故不非之經云衆生雖無菩提之心者涅槃教光薰其內心為作菩提之因正當理性未發心菩薩此品之前者生善在今滅惡文前故云之前前品之末者月喻品末云譬如日出時衆霧下有十行六字是滅惡文次仰非者若云涅槃光入毛孔得為菩提因者義應不然何以故夫言因者文却修行方始得遂蒙光成因故未可也持犯等難者即是持犯先有差別經云何故說四依義者若云一切衆生聞因涅槃光而發心者只用此光衆生盡發何故如來滅後復令四依出世治惡賞善耶積善方解者別人修行動經却數方及成因經云除一闡提者具三障故謂不見因果煩惱障也說無因果業鄣也世世積惡今成闡提報障也大福大事者圓乘根性方能供養無量諸佛等名為大福聞是經也得為菩提因緣獲菩提果此即感應道交大涅槃藏佛性因果名為大事經云無量諸佛等者今是實發不同照連等權要須經却不墮三惡者經云墮三惡者在觀行位身未斷惑戒緩乘急致有退耳經云若有聞是大涅槃至菩提以者此正明未發心理性菩薩以聞經故得菩薩名經為其菩提之因了此即轉成名字菩薩疏中云聞涅槃是名字菩薩者且從聞經不用發心邊釋故除理性菩薩塗瘡譬聞慧者藥但在皮薰漸漸除故譬思慧塗目目能見境故譬修慧開善但九譬者今師為十前金剛譬能破壞一切後金剛取其體蜜不受外塵殊成兩別要路者是菩提路始也為後世開眼者為彼世人開祕藏之眼逆順各若十者若順十以則從細至粗從無明起乃至一闡提以若逆十以則權一闡提以起以至先明如止觀第四卷明懺護是其二者是彼十中云二約善以明懺悔者是彼第七修補過昔三業作罪不許晝夜今善身口意䇿勵不休非移山嶽安填江海以此翻彼縱恣三業心經云夷坦者夷平也坦寬也生死際者窮無始罪原即是無際之際至先至處者窮未來罪境訖至先生忍臣方名至處經云獼猴者獼猴譬闡提月譬涅槃水譬有淺相善水中譬菩提闡提雖聞涅槃菩提之名終不能得如彼獼猴也緣起如僧祇律第七云佛告諸比丘過去世時有城名波羅奈國名伽尸於空間處有五百獼猴遊行林中到一尼俱律樹下有井樹下有井中有月影現時獼猴主見是月影語諸伴言月今日死落在井中當共出之莫令世間長夜暗冥共作議言云何能出時獼猴主言我知出法我提樹枝汝提我尾展轉相連乃可出之時諸獼猴即如主言展轉相提未至水獼猴重枝折墮井死而時樹神便說偈言是等騃捺獸癡衆共相隨唯自生共惱何能救世月佛告諸比丘爾時猴主今提婆達多是伴者今六群比丘是爾時也曾更相隨順受諸若惱今復如是經云猶灰覆火者由愚人見現在不見未來以先明灰覆佛性因果火亦是覆世間因果之火惡不即受報者闡提生報非現報故以報在將來矣以上不字而冠於下明長行中如乳成酪應如偈中亦用上不字冠下如乳句不如乳即成酪也經云無目者但見現在不見未來也不見羅漢道羅漢能斷未來生死而此人不見也重舉非者作小謗大即是其非經云投之濁水者謂衆生五陰濁水也疏云先常至八種者先常苦空等五是實觀因解等三是似想觀合為八滅八種病四倒三毒及等分也經云過八種術者僧高曰此經理圓功德力勝故言過也不懺過去者宿惡若多須用潟藥常德譬薰者薰藥遍體喻常德體通樂德譬丸者丸藥補益故喻樂示三途苦報者謂指示三途是苦報之處令其發心此教須去者忘教詮理故云文字即解脫義說為去母譬經教者母本是發唯少依教修行故云與我母藥如疏所十地行滿者過十月也即譬十地滿足慢為乾者慢高愛下以喻乾濕超悟記云初地菩薩有大悲故不取涅槃名推乾有大智故不住生死名去濕此與興皇同除斷常諸倒者由除無明八倒即除大體無判經云乳餔者餔口中嚼食也塗鼓譬著教者所塗之鼓譬受化機受於教法名為著教澤州云新毒藥譬理大鼓教以佛菩薩新所詮理資成教法故云也㿃赤白痢竹例反齊為席下齊是諸腸原故也前答除鄣者指前除三障文也前是法身善逝身者由諸佛法身冥加自行方得成就又逝由往也即唱滅之力身令自行成就經云若得順風者譬修行得聞大涅槃法則疾至薩雲彼岸一體多約果人者一體三寶此約究竟果位證得以釋地住也上但是分得今唯極果經云如來密語其除難解者四十餘年未曾顯說如來常存無有變易來至法華涅槃方始顯說名為密語如四非常者是無常苦等四也各有其意者謂以大乘說常破於無常等今文正意佛說一法智臣善解常即無常無常即常生即無生無生即生是佛密語如何作相破釋故今不用今寄一事者謂約法釋也佛說生滅等者只生滅一法而生四解方名智臣此約教下之法釋約門釋者約能通教門故有二釋之異六卷鹽器與此同初明不動樂德也次無相淨德也三明常也四佛性我德也次第對四門意亦應別解經云波羅奢樹等者總以三樹譬涅槃經衰滅之時不解密語常雨不降不得常里水陸枯悴譬無人天善經云衆生薄福者值此惡時即是薄福由惡比丘致令法無威德經云哀哉大險者不解如來微密祕藏必墮三途流轉無已故名大險所遮則開等者經中無此意不須此釋經云時有一人者譬受學求法人也餘知見者除境智外泛爾觸釋名餘知見又是用無常等觀以助正觀名助為餘善男子下備合者僧高曰從善男子至美味合第一加水從是諸惡人至之語合第二加從抄前至伴侶合第三加從受畜至水乳合第四加曇讖曰止取杪前著中後為三加中後著前為四加說必依諦者涅槃常理實不可說依二諦說如加二分水經判出兩句者經中二句分明餘二句者女人不知佛性只是女人女人男子若知佛性則名男子男子為成四句故具說之雙辨起沒者大法與處名起不與處名沒故指罽賓等即其相也兼遣上開者答問文少故名兼也然此是答問下先騰疑意文為二一設疑以徵釋從何故復言下次騰兼答疑意初文二先設疑徵問次河西下釋疑初云疑何不決者意云純陀從前至今聞佛所說疑何不決今更令他騰耶次釋疑中云二人為支者不如云唯益是存也次騰中二先設聞次今舉下釋言懸與理同者然迦葉本問與純陀之懸會故佛釋純陀之疑迦葉之難懸解若舉偈至無差者具足應云差即無差無差即非差非無差方釋迦葉之疑此一偈凡四出下是第四如來為釋分為四初示所出意次成論下出異解釋三今則下正釋四觀師下述觀師所釋初文經云本有今無者本有無常今無無常本無今有者本無佛性今有佛性此二句是牒純陀差別之疑何者然純陀本將昔難今將今難昔佛即用下半泯其差別之見何者本有今無亦無是處本無今有亦無是處所以牒其二句而以無差釋純陀之疑所以章安於一一句皆作三諦等釋又應更云本有無常今有無常者今昔俱須見性故又本無常今無無常無常即理故又本有佛性今有佛性是性無二故又立故差別三世有法斯有是處忘故三世有法無有是處大意是同者同顯一無差意也亦為下亦三釋根者傳至二十六最為下根性也次異解中皆有立有破可見破中云正是純陀所疑者金剛前後相應望正是差別與純陀疑有何別耶非開得意者偈意正見純陀差即無差故云三世有法無有是處若不相即則非偈意即昔日之今者謂今日無昔日般若何以故此二句猶是金剛心前致非今日般若金剛心也後者亦是差別何名無差三乘至涅槃正是無差別同於純阿能釋疑本有煩惱等者此即破煩惱得涅槃亦是差別還同純陀何成釋疑本無涅槃亦爾疑難宛然者純陀疑宛然迦葉難宛然體用具足者有於本有今無等因果之用也亦應隱而不顯者今日身顯已不隱別昔日隱應不得顯此亦差別何關釋疑三藏師者謂真諦三藏也生死無始等者釋第二本無今有句也涅槃有始下釋本有今無句也惑滅道存者小乘破煩惱方得涅槃即是無常亦是現在過去者釋迦是現在即是本有今也滅度復是今無現在未來者即是本無今有者彌勒當成佛故有三可三等者只緣差與無差體不相即所以差與無差並成差別故今不用今明不爾下今師對古人釋開三不失一者於一佛乘分別三故合一不失三者即同體方便故本有今無合差即無差句本無今有合無差即差故云斯有是處三世有法斯有是處者為順化儀故為順機宜故為實設權故為引入實故為雙流行故為存今昔因果故何者若無因果衆生即佛何用修道故立因果引令至極然純陀疑正執昔曰三乘因果差別為難佛今以無差別之差別因果而答亦遣純陀之疑故云三世有法有是處無常常者差即無差常即無常無差即差非常非無常三世有法無有是處境智非境智者差即無差故非境智無差即差而境而智即非境非智三世有法無有是處因果非因果者我體非因非果猶能我人因果名生例如境智明差等相本有只是有者有句也今無亦是無者無句也又云上半是有者本有二字也下半是無者今無二字也兩派者今昔為兩派上半不融為兩派三正釋中云一諦即三諦者此明本是即家之差何以執昔小差難本大差三諦即一諦者今永無差何以難今令同昔小無常之差只無一句即三前具足方釋差別之疑亦是無常即常等者為純陀本執昔無常為疑故約無常等以釋疑此則何難不遣者遣迦葉難也何疑不除者除純陀疑也一有一切有至世界者此即三諦無差別之差別釋純陀等定差別之疑難故屬世界對治者一實之無治昔三乘差別之有即為人者亦有故生真俗之力善亦無故生中道之理善又亦有故生三乘力善亦無故生一乘理善一悉即具四者一悉皆具四句即四悉相可解四明觀師所解又二先述次此解下結判初云三句出所非者無有是處為能非可今無者本有煩惱今無煩惱也此無可令有者今有佛性也非今之本者本本不同今本今本即是一實也此今非本者今今非本今本今無佛性令令有佛性為此義故今本不同並是他釋澤州云佛於過去無量劫前有生死身名本有當於爾時無常法身說為今無佛於過去無量劫前無前法身名為本無當於爾時有生死身說為今有若就凡夫二乘論之彼於現在有生死身名為本有無常法身說為今無又於現在無常法身名為本無現有生死無常之身故曰今有三世有法無有是處者破他定義此言不足若具應言三世無法亦無是處若就佛論佛本所有生死之身三世恆有無無是處今已斷離本無法身三世恆無無是處故佛今已得若就凡夫二乘論之彼本所有生死之身三世恆有無有是處故當必除斷彼本所無常住法身三世恆無無有是處故當必修證以是義故諸佛菩薩聲聞緣覺亦有差別如此釋者疑難宛然以是而觀當代盛行之疏解釋若斯況其餘耶是故録之令知同異仰勸後學深因今師之解意氣包括釋難遺疑方稱經旨衆生業報者無始有於正因佛性報也何曾證入者大涅槃體不當出入假設之言者世雖無佛由有涅槃教在無容二乘取小涅槃必住大涅槃故云而實不爾經云名為善有者大般涅槃是極善法妙有法故名善有經云乃有一佛出者僧宗曰圓解難固常倒易生無善滅佛不得恆現善機希有所以時一出世背化失機動經劫數云何說大致教唯以三乘級引故知小果權施而非實也經云性相者由性外相同異云何第九答上者問中有猶如樂未生云何名受樂用此半偈助成不壞衆義經云欲護正法者內護常住不壞之法衆生受者後為不壞眷屬檢覓則無者但有假名所以推撿無體不識手足者謂不識身手足之色也已下注第十大衆問品就文為兩一釋題次就初下入文解釋初又二先正釋題次河西下騰問數初云為大衆所問之境者但見釋迦一一毛孔出諸化佛皆領五十二衆受純陀等供即互相問純陀有何福德少許粳糧充足如許大衆因此得名名大衆問品無為大衆者觀師意云迦葉無為大衆問故名大衆問品澤州云上來廣明菩提之因此下次明如來涅槃之因因諸大衆請以論之就斯以題故云大衆所問品次騰數子云兼答遠離病問者即是超答此問經云純陀過已等者與物尸城中眷屬也經云種種光明者前青黃等外復放種種光明者為普收大會供養故放種種光明意在於此又古佛道法過中不食其時身至不容發言故放光以顯意也經云執持衣鉢者此是無供之衆經云一一毛孔等者皆是無供之衆及五十二衆故云無量經云自受純陀者僧宗曰法身無像應化何殊自受純陀者示請立有人顯彼無宿願之異耳經云所食之物者無純陀之少粗亦無大衆之多妙故云亦無差別經云供養誰者若無佛受供寂後檀行何能得滿故有此歎經云諸佛法應爾者機興則來機謝則去故云應爾經云已經無量劫者如法華壽量品所明文遠經云永處安隱處者文已住於三德祕藏即處也經云汝聞應修行者常觀涅槃行道令最後檀滿十三偈者僧宗曰無指的文正應各除前後四偈取中央偈大意明佛法身圓極應而不滅前四偈一往應喻後四偈令其安安有在不應愁惱經云假使烏與鵄者六雙六雙中皆先一偈違問答礙文可見經云爾乃永涅槃者佛意云如上諸鳥得如親兄弟我方入涅槃身無得如兄弟之義驗我不曾涅槃何故謂我入涅槃耶七葉至臰者涉公云七葉無香可喻生死婆師馨馥可況法身迦留果毒喻煩惱身鎮顯極甘喻常樂身假令臰花發香毒果變甘則是純生善生善無惡佛化方休今身未然云何永滅佛果冥真者雖云冥真不離通真冥真尚可出真更非故應責云出照何境復斷何惑經云無有愚癡者雖有煩惱如無煩惱故名無癡經云是旃陀羅者此云煞者煞菩提心害於慧命罪豈過此大衆屬上句者此自是一途未為全當經云獨受我供者如來不可思議一一赴彼心念他彼自迷經云譬如藥樹者此即滅惡身也兼答遠離者祕密文廣則當於正餘二文略名之為兼隱覆者有餘覆無餘也經云一切契經云一切契經者經通大小有餘無餘亦通大小如下釋二取三罪人者能改惡能護法所以取之經云持戒至差別者持戒毀戒盡可布施讚嘆復有何差我今不解願佛為說經云唯除一人者佛不彰灼云除一闡提者為欲驚覺時衆生於後問非唯除一闡提趣向闡提心者亦須簡之經云我今未解者不知如何即是破戒之人故云未解雖非即是者且據現說彰口未知內心趣向在何故名雖非即是經云若犯四重至正法者於一身上重疊犯四重五逆要有誹謗正法方名闡提有人雖犯四重等由信因果謗法之人不信因果故名闡提經云所言破戒其義云何者但破律儀即名破戒於為復別有所犯名為破戒我今未解故云其義云何六妙藥者今家法華方等懺法皆先以逆順十心等而為方法今此六藥與彼大同亦可通用三護正法者此當四弘中法門無邊誓願知夫懺悔者皆須先發菩提心若不發心罪則不滅上求下化不成五達罪相者即是觀罪性空寂生護法心者有佛法處護令不斷絶無佛法處建立令得與顯河西云發心達罪者即是無生懺悔謗坐念實相亦與此六意會經云譬如日出等者大涅槃曰能除一闡提暗冥之心淺行菩薩者前三教賢位菩薩聞涅槃而發圓解也經云本性弊惡者未改悔前名本性惡經云得生天中者得生第一義天中也如種破核者身自無善種河能令他而生善種前一切施等者只解一切之言則成有餘之說若言三乘得報異者則是實說經云王舍等者王舍城中有優婆塞先力尼乾問施福尼乾答云施我得福施佛無報優婆塞聞嫌不平等遂來問佛佛知其意即答其言一切布施唯可讚嘆彼聞歡喜生信敬心是故如來而說此偈經云亦為菩薩至祕藏者證無餘義乃至菩薩人中之雄攝取持戒捨棄破戒皆是無餘之義經云少分一切者有餘之義故也九十五種等者九十三道名體俱邪修多羅阿毗曇二名正而體耶故名修多羅鬼阿毗曇鬼指實行二乘者除應化二也經云第四八戒者具更分持之人也非因非果者實相之理名為正道故云非因非果常樂等法是能通門名為助道經云等視衆生者差即無差故云等視無差即差為隨宜故作有餘說經云唯願小停住者佛是三寶中勝何不久住世間利益我等又佛受供也必入涅槃力不得止且小停留待三人至表迹應無常者機息應謝應迹亦滅復何可怪經云爾時大衆生菩提心者此是聞法已為報法恩及發心也故重供養大論至跛兔者大論第二十六釋精進無減中云乃往過去無量阿僧祇劫有大樹林多有禽獸野火來燒三邊俱起唯有一邊而隔一水衆獸窮逼逃命無地乘爾時為大身多力鹿以前腳跨一岸以後腳距一岸令衆獸蹈背上而渡皮完盡壞以慈悲力忍之至死寂後一菟來氣力已竭自強努力忍令得過過已背折墮水而死前得度者今諸弟子是最後菟須髮陀是第七卷現病品釋文為兩初釋題次從就文為四下入文解釋初文二一述舊次今皆下正釋初文者更有僧宗曰上來所說當宗雖舉未有發實將顯至人患纍斯晝是以先示病相因請更起光儀顯勝以表無病之旨因答第二十九所問也開善答離一切病者佛實無病示現有病令他離病以現病答上云何諸菩薩遠離一切病問望後為正者以現病品在五行初故屬後為正次正釋又二先釋名次就品下釋疑於中又二先立疑次由前下釋可見次入文解釋中偏言四分者以此四種緣力而生現能發業招集病果故偏舉之通別病因者有病之因莫過四箭如來也離不應有病內救外濟者或唯內救無外濟或唯外濟無內救容有病因世尊身內外具足何解稱病而不為諸衆生說無上法經云尸波羅蜜者戒學也諸禪等定學也修諸正勤慧學也經云教大迦葉者此是迦葉童子語大迦葉是佛長子已於法華得授記竟何不為說令入念不退位四卷意者弟子不同即世界大乘即第一義理不退即生大乘理善治惡即對治治事理之惡經云不治諸惡比丘者世尊在世不治世尊去後何人能治經云纏者十纏也一無慚二無愧三嫉四慳五悔六眠七掉舉八昏沈九忿十覆釋曰無慙者不重賢善於諸功德及有德人無敬無崇無所忘難無所隨屬說名無慙言功德者戒定慧也有德人者有戒定慧人也無忌難者無畏懼也不隨屬者不作弟子禮也無愧者頌云於羅不見怖謂諸善士可呵厭法說名為罪於此罪中不見能招可怖畏果說名無愧嫉者謂於諸興盛力令心不喜慳者謂財法巧施相違悔者謂於惡作力身不稱以遂生追悔即此追悔解惡作起何者良由先因惡作方起追悔故知惡作是追悔所依也眠者謂令以昧略為性掉舉者謂令心不靜也昏沈者謂身以重性於善法中無所堪任忿者謂令心憤說名為憤隱藏自罪說名為覆無慙慳掉舉是貪家等流果無愧眠昏泛是無明等流嫉忿是瞋等流悔是疑等流覆者若有智人覆是貪等流無智人覆是癡等流猶此十使纏繞衆生纏繞淨心故也蓋謂五蓋一欲貪二瞋恚三昏眠四掉悔五疑謂貪恚蓋障戒昏眠蓋障慧掉悔蓋障定定慧無故於四諦疑疑故能障解脫及解脫知見蓋覆纏綿心神眠暗戒定慧等皆不得發若經部釋眠眠障定掉悔障慧今此五蓋通於界內外不專唯在欲界故也單慢開為兩者從慢上開為兩也著我所由者陰為著我之由又是著我我所名為所由即我慢相增上慢者未得上法自謂也得名增上慢憍慢者於其父母師長等邊不能等敬名為憍慢成論中名慠慢放逸者不修善法也貢高者者是慢之類也自恃名高陵他名慢也對心直類反謂怨也頻申等者惛沉睡眠之相果中說因者重病是果此病由於往業所致故名果中說因不經云修菩提時至金剛身者經中皆先因世樂願於衆生令得出世上上法樂方成如來之行經云從金剛際起者從初即用種智斷煩惱而感此座故云智力外道稱佛等者外人毀呰世尊為甘蔗種牛糞種瞿曇是本姓故從本稱之經云不知方等典者意云若知等典人則知化佛不滅度不知之人則生永滅之見為是力故請起息惡經云唯有諸菩薩至善射人者明諸菩薩及文殊能知如來畢竟常住如善射人凡夫外道皆生無常之想故請息惡也蓮華是瑞者華從毛孔而出色相敷榮驗知無病華能含果者表於修因感果有自在解脫之用前亦放光者通指前文放光其光過百千日言非病所能者非實病者所能放光也身放光明即大悲薰身經云阿鼻地獄等者正法念等經梵言泥黎此義譯為地獄謂地下有獄故言地獄獄縛也謂縛罪人不得解脫也婆沙云梵言捺落迦此言受苦器即是苦之器具也亦云那落迦此言受苦者謂是罪人也昔人不解分別但總言地獄言捺落迦者具有四義一不可樂二不可救三暗冥四名地獄今經中所說四中之一也瑜伽云此下三萬二千踰膳那有等活等活下四千踰膳那有黑繩等七如是也下六捺落迦相去皆隔二千由旬其八寒地獄皆小於熱地獄俱舍乃云下過二萬至無間底極為淺近又准長阿含經俱舍智論等地獄有八一名想瑜伽云等活大論名活活受苦相者謂彼有情多共聚集種種苦具次第而起更相殘害悶絶躃地空中有大聲言此諸有情可還等活可還等活次彼有情顃然復起如前苦具還更殘害由此因緣長時受苦業盡方出大論云獄卒喚之咄諸罪還活故名活活二名黑繩智論云此中罪人為謂獄卒以黑繩拼之或為四方或為八方長者金𢭃𢭃者令長而斬截之落其手足等此人宿因讒賊中良妄語惡口狂煞無辜故受此報業盡方出三衆合謂彼諸有情為獄卒驅逼令入兩䥫𦏌頭大山之間彼身入已兩山迫之身被迫亡一切門中血便流注如雨鐵𦍞頭馬頭象頭師子頭虎頭亦復令和合置大鐵槽中壓之如壓甘蔗血便流注復和合已有大鐵山從上而墮令彼有情跏在地若斫若㓨或檮或裂等業盡方出四號叨謂彼有情尋求舍宅便入大鐵室中即便火起由此燒然極燒然遍極燒然身被燒已苦痛逼切發聲號叨長時受苦業盡方出五大號叨謂彼室宅其如胎藏苦身過前發聲遂大六燒熱謂彼獄卒以諸有情置無量踰繕那三熱大鐵熱上左右轉之表裏燒摶又以大鐵串從下貫之徹頂而出反覆而炙令彼有情諸根毛孔中悉皆焰起等長時受苦業盡方出七極燒然謂以三支大熱鐵串從下貫之徹其兩轉反頂而出又以三熱大銅鍱遍褁其身又復倒擲如前三熱彌滿灰水大鐵鑊中而煎煮之其陽涌沸令此有情隨湯飄轉或出或入沒令其血肉及以皮脉悉皆銷爛唯骨璅在尋復之置熱鐵地上令皮肉血脉復生如故長時受苦業盡方出八名阿鼻此云無間智論云此之地獄縱廣四千由旬正法念經說縱廣八萬由旬七重鐵城七層鐵網六十八隔周匝七重皆是刀林四大銅狗身長四十由旬眼如掣電耳如釰樹有十八獄卒卒有八頭頭有十角皆如牛頭一頭有士四眼眼散鐵丸置罪人口中即燒其口及以咽喉徹於腑藏從下而出等長時受苦業盡方出言無間者其中有五一報無間捨身即受二受苦無間中無樂故三時無間定一却故四命無間中無絶故五形無間其身充滿八萬由旬一人多人同處其中不相障礙皆悉遍滿業不思議也此八大獄各有十六小地獄周匝圍繞各各縱廣五百由旬故俱舍頌云此八捺落迦我說甚難越以熱鐵為地周匝有鐵墻四面有四門開閇以鐵局巧安布分量各有十六層八大地獄一一地獄各有四門一一外皆有四增且如無間自有四門一門之外有四地獄一煻煨增二尸糞增三鋒刃增四醎河增一煻煨增煻煨齊睞彼諸有情出求舍宅遊行至此下足之時皮肉筋骨並皆銷爛舉足還生二謂尸糞增死尸糞為泥此諸有情為求舍宅從前出已漸漸遊行陷入其中首足俱沒等三鋒刃園俱舍云鋒刃增一銛刃路有利刀釰仰為路二釰棄林三鐵㓨林彼諸有情從前出已遊行至此下足之時皮肉筋骨悉皆消爛舉足之時還復如故等四烈河園俱舍云醎河增有廣大河沸熱灰水彌滿其中彼諸有情尋求舍宅從彼出已來墮此中猶如以豆置之大鑊然猛熾火而莫之隨湯騰涌周旋回復於河兩岸有諸獄卒手執林索及以大網行烈而住遮彼有情不令得出等所言增者謂從根本獄出更遭此苦故名增也一門有四即四四一十六獄也阿鼻既爾餘七大獄亦然并其根本合有一百三十六所也又有孤獨𤥶落迦所受苦相處所雖小種種苦具無不具如吉祥問大採淥豆子經廣說其相經云八寒地獄者一頞部陀若依新譯頞部陀此云皰極重廣大塞觸所觸一切身分悉皆卷縮如瘡皰二尼剌部陀此云皰烈猶如皰漬膿血流出三頞唽咤四嚯嚯婆五虎虎婆亦云歇唽汰郝郝凡虎虎凡受罪有情苦音差別以立其名六溫鉢羅此云青蓮華由廣大寒觸一切身分悉皆青游皮庸破裂故也七鉢特摩此云紅蓮華過此青已色變紅亦似紅蓮華八摩訶鉢特摩此云大紅蓮華謂寒更甚身色紅也然今引與經中列名大同小異名雖小異其義大同在文可見是一一華下化佛利益經中具有依正及三業利益在文可尋序品中云有頂者如彼三當釋故經云云舉昔證今者昔已除病因病果驗知今日無病經云如言如來者謂是如來密語故也此中三病人異前者今文中前三病人全是大衆問品中三人彼但有此不差之人今文則剩有不差不差故與前異與前碩異者此與四依品并涅槃彼為護法則驅遣惡人若有破戒者不聽受獨讀誦大涅槃經今則許其發心為菩提種故聽其供養等又此文初三病人於前則三人之列於今但成一耳差差者即開出怖畏等者即開許菩薩也中者即是不差差人次後開五種是也斷三結者問見或既有八十八使如何但說斷三結已即令得果答論云此三種結三三昧近對治法身見是空近對治法戒取是無願近對治法疑是無相近對治法復次三結生或增上身見生六十二戒取生一切苦行謂投頭拔髮等疑於過未一切處生猶豫又云疑過去因現在果疑現在因未來果故但說三十四二十八者謂人七天七為十四人天名經云中陰為二十八須會釋之者法華疏第七云然大經有三文第十經云成菩提第十九經云至大涅槃第二十經云得阿耨菩提心若得菩提心必至菩提及涅槃得菩提心謂至因菩提涅槃謂至果果中有智斷菩提是智涅槃是斷具說始終具說智斷故說三文記家釋云第三是因前二是果果中既是智斷二德故後發心菩薩可指初住分得智斷就經三文皆云八六四二豈可因果同經爾許時耶此且一經故菩提涅槃並通因果若教仍權但至初住縱至極果其教亦權豈必八六等方至極果耶則與一生入地生身得忍為妨五下分云云者問何解此五名順下分答下謂欲界此五順益下分界故名順下分謂貪恚不出欲界身見不出我心戒取不出下法疑不出凡夫又貪欲瞋恚故不過欲界故有能超上生有頂由身等三還生欲界故說貪瞋如方獄身見等三如防邏人故俱舍論云由二不謂貪瞋由三復還下謂身見戒取疑五上分者一色界貪二無色界貪三色無色掉舉四色無色慢五色無色無明由此五種能令有情不超上界名順上分結以貪過重兩界別論經過八萬劫等者澤州解云一約厭心種子強故名鈍根經多劫等方發菩提心善厭心種子弱故經劫少名為利根速能發菩提心言猒心者謂從初欣樂無漏以重故令根鈍如是利鈍根別故始自八萬至十千也天台大師意則不然由界內經生多少不同致令界外其根利鈍不等不約欣猒而釋
